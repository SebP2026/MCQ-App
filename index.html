iday:    T withdraws \u00a310 and purchases SHARES.</p>\n<p>Remaining: \u00a310 still credited to the account.</p>\n<p>Question: How should the painting, the shares, and the remaining balance be attributed across Trusts A, B, and C?</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-navy\"><strong>Method 1 \u2014 Clayton&#x27;s Case (FIFO: First In, First Out)</strong></span></p>\n<p>The first money paid in is deemed to be the first money withdrawn. Apply in strict chronological order of deposits.</p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-slate\"><p><strong>Day</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>Deposit</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>Withdrawal</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>Balance</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>Attribution</strong></p></th></tr></thead><tbody>\n<tr><td><p>Mon</p></td><td><p>\u00a310 (A)</p></td><td><p>\u2014</p></td><td><p>\u00a310</p></td><td><p>\u2014</p></td></tr>\n<tr><td><p>Tue</p></td><td><p>\u00a310 (B)</p></td><td><p>\u2014</p></td><td><p>\u00a320</p></td><td><p>\u2014</p></td></tr>\n<tr><td><p>Wed</p></td><td><p>\u2014</p></td><td><p>\u00a310 \u2192 Painting</p></td><td><p>\u00a310</p></td><td><p>A paid in first \u2192 Painting attributed to A</p></td></tr>\n<tr><td><p>Thu</p></td><td><p>\u00a310 (C)</p></td><td><p>\u2014</p></td><td><p>\u00a320</p></td><td><p>\u2014</p></td></tr>\n<tr><td><p>Fri</p></td><td><p>\u2014</p></td><td><p>\u00a310 \u2192 Shares</p></td><td><p>\u00a310</p></td><td><p>B paid in second \u2192 Shares attributed to B</p></td></tr>\n<tr><td><p>Balance</p></td><td><p>\u2014</p></td><td><p>\u2014</p></td><td><p>\u00a310</p></td><td><p>C paid in last \u2192 Balance attributed to C</p></td></tr></tbody></table></div>\n<p><em>Clayton&#x27;s Case result: A traces into painting | B traces into shares | C holds the \u00a310 balance. Note: the outcome depends entirely on the order of deposits \u2014 arguably arbitrary and potentially unfair. Readily displaced (Barlow Clowes).</em></p>\n<p><span class=\"nt-txt-navy\"><strong>Method 2 \u2014 Pari Passu Ex Post Facto (Single Calculation)</strong></span></p>\n<p>Identify total contributed by each trust as a fraction of the overall total. Apply that fraction to ALL withdrawals and the remaining balance in a single calculation regardless of timing.</p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-slate\"><p><strong>Contributor</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>Amount</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>Fraction</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>Receives</strong></p></th></tr></thead><tbody>\n<tr><td><p>Trust A</p></td><td><p>\u00a310</p></td><td><p>10/30 = 1/3</p></td><td><p>1/3 of painting + 1/3 of shares + 1/3 of \u00a310 balance</p></td></tr>\n<tr><td><p>Trust B</p></td><td><p>\u00a310</p></td><td><p>10/30 = 1/3</p></td><td><p>1/3 of painting + 1/3 of shares + 1/3 of \u00a310 balance</p></td></tr>\n<tr><td><p>Trust C</p></td><td><p>\u00a310</p></td><td><p>10/30 = 1/3</p></td><td><p>1/3 of painting + 1/3 of shares + 1/3 of \u00a310 balance</p></td></tr>\n<tr><td><p>TOTAL</p></td><td><p>\u00a330</p></td><td><p>\u2014</p></td><td><p>Each trust holds 1/3 of every asset</p></td></tr></tbody></table></div>\n<p><em>Pari passu result: Equal 1/3 shares in all assets regardless of when money was paid in. Simple single calculation but may not reflect actual contributions at the time of each withdrawal.</em></p>\n<p><span class=\"nt-txt-navy\"><strong>Method 3 \u2014 Rolling Charge (Preferred)</strong></span></p>\n<p>Calculate fractions at the moment of EACH withdrawal based on who had contributed at that point. Recalculate after each new deposit.</p>\n<p><strong>STEP 1 \u2014 Wednesday withdrawal (\u00a310 \u2192 painting):</strong></p>\n<p>At this point only A (\u00a310) and B (\u00a310) have contributed. Total in account = \u00a320.</p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-slate\"><p><strong>Contributor</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>In account</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>Fraction</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>Share of painting (\u00a310)</strong></p></th></tr></thead><tbody>\n<tr><td><p>Trust A</p></td><td><p>\u00a310</p></td><td><p>10/20 = 1/2</p></td><td><p>\u00a35 of painting</p></td></tr>\n<tr><td><p>Trust B</p></td><td><p>\u00a310</p></td><td><p>10/20 = 1/2</p></td><td><p>\u00a35 of painting</p></td></tr>\n<tr><td><p>Trust C</p></td><td><p>\u2014</p></td><td><p>\u2014</p></td><td><p>\u2014</p></td></tr></tbody></table></div>\n<p><em>After Wednesday withdrawal: A has \u00a35 left in account | B has \u00a35 left in account | balance = \u00a310.</em></p>\n<p><strong>STEP 2 \u2014 Thursday deposit (\u00a310 from Trust C):</strong></p>\n<p>After C&#x27;s deposit: A has \u00a35 | B has \u00a35 | C has \u00a310. New balance = \u00a320. Recalculate fractions.</p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-slate\"><p><strong>Contributor</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>In account</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>Fraction</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>\u2014</strong></p></th></tr></thead><tbody>\n<tr><td><p>Trust A</p></td><td><p>\u00a35</p></td><td><p>5/20 = 1/4</p></td><td><p>\u2014</p></td></tr>\n<tr><td><p>Trust B</p></td><td><p>\u00a35</p></td><td><p>5/20 = 1/4</p></td><td><p>\u2014</p></td></tr>\n<tr><td><p>Trust C</p></td><td><p>\u00a310</p></td><td><p>10/20 = 1/2</p></td><td><p>\u2014</p></td></tr>\n<tr><td><p>TOTAL</p></td><td><p>\u00a320</p></td><td><p>\u2014</p></td><td><p>\u2014</p></td></tr></tbody></table></div>\n<p><strong>STEP 3 \u2014 Friday withdrawal (\u00a310 \u2192 shares):</strong></p>\n<p>Apply the recalculated fractions (A = 1/4, B = 1/4, C = 1/2) to the \u00a310 used to buy shares.</p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-slate\"><p><strong>Contributor</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>Fraction</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>Share of shares (\u00a310)</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>Balance remaining</strong></p></th></tr></thead><tbody>\n<tr><td><p>Trust A</p></td><td><p>1/4</p></td><td><p>\u00a32.50 of shares</p></td><td><p>\u00a32.50</p></td></tr>\n<tr><td><p>Trust B</p></td><td><p>1/4</p></td><td><p>\u00a32.50 of shares</p></td><td><p>\u00a32.50</p></td></tr>\n<tr><td><p>Trust C</p></td><td><p>1/2</p></td><td><p>\u00a35.00 of shares</p></td><td><p>\u00a35.00</p></td></tr>\n<tr><td><p>TOTAL</p></td><td><p>\u2014</p></td><td><p>\u00a310.00</p></td><td><p>\u00a310.00</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-navy\"><strong>Summary Comparison Table \u2014 All Three Methods</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-slate\"><p><strong>Asset</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>FIFO (Clayton&#x27;s)</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>Pari Passu</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>Rolling Charge</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>\u2014</strong></p></th></tr></thead><tbody>\n<tr><td><p>Painting (\u00a310)</p></td><td><p>A: 100%</p></td><td><p>A: 1/3  B: 1/3  C: 1/3</p></td><td><p>A: 1/2  B: 1/2  C: 0</p></td><td><p>\u2014</p></td></tr>\n<tr><td><p>Shares (\u00a310)</p></td><td><p>B: 100%</p></td><td><p>A: 1/3  B: 1/3  C: 1/3</p></td><td><p>A: 1/4  B: 1/4  C: 1/2</p></td><td><p>\u2014</p></td></tr>\n<tr><td><p>Balance (\u00a310)</p></td><td><p>C: 100%</p></td><td><p>A: 1/3  B: 1/3  C: 1/3</p></td><td><p>A: 1/4  B: 1/4  C: 1/2</p></td><td><p>\u2014</p></td></tr></tbody></table></div>\n<p><em>Which method applies? Start with FIFO (Clayton&#x27;s Case). Displace it where result would be contrary to parties&#x27; intentions, impracticable, or unfair (Barlow Clowes). Where displaced, prefer rolling charge; use pari passu only if rolling charge is too difficult or expensive to apply.</em></p>\n<h4 class=\"notes-h4\"><span class=\"nt-txt-blue\"><strong>Example 7 \u2013 Proprietary Claims in Practice: Choosing Between Options</strong></span></h4>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><tbody><tr><td class=\"nt-cell-cream\"><p><span class=\"nt-txt-gold\"><strong>Facts</strong></span></p>\n<p>T is trustee. T misapplies \u00a350,000 of trust money, mixing it with \u00a350,000 of T&#x27;s own money (wrongful mixture, balance: \u00a3100,000).</p>\n<p>T uses the entire \u00a3100,000 to buy land (now worth \u00a3140,000).</p>\n<p>T is insolvent. T&#x27;s unsecured creditors are owed \u00a3200,000.</p>\n<p>The beneficiaries must decide what claim to make.</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-navy\"><strong>Analysis \u2014 Wrongful Mixture: Trust + Trustee&#x27;s Own Money</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-slate\"><p><strong>Contributor</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>Amount</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>Fraction of land</strong></p></th></tr></thead><tbody>\n<tr><td><p>Trust</p></td><td><p>\u00a350,000</p></td><td><p>50/100 = 1/2 \u2192 \u00a370,000 share of land</p></td></tr>\n<tr><td><p>Trustee (own money)</p></td><td><p>\u00a350,000</p></td><td><p>50/100 = 1/2 \u2192 \u00a370,000 share of land</p></td></tr>\n<tr><td><p>Total purchase price</p></td><td><p>\u00a3100,000</p></td><td><p>Land now worth \u00a3140,000</p></td></tr></tbody></table></div>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Option</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Value Recovered</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Why / When to Use</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>(A) Claim 1/2 proportionate share of land (\u00a370,000)</strong></span></p></td><td class=\"nt-cell-blue\"><p>\u00a370,000 (captures \u00a320k gain). Ranks as beneficial owner \u2014 AHEAD of T&#x27;s unsecured creditors.</p></td><td class=\"nt-cell-blue\"><p>BEST option here: asset appreciated AND T is insolvent. Beneficiary is ringfenced from insolvency.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>(B) Equitable lien for \u00a350,000</strong></span></p></td><td><p>\u00a350,000 (secured). Ranks as secured creditor \u2014 still ahead of unsecured creditors.</p></td><td><p>Better than a personal claim if T insolvent, but does NOT capture appreciation. Worse than (A) here since asset has risen.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>(C) Personal claim for breach of trust</strong></span></p></td><td class=\"nt-cell-blue\"><p>\u00a350,000 (unsecured). Ranks with unsecured creditors \u2014 worth perhaps 25p in the \u00a3 if T is insolvent.</p></td><td class=\"nt-cell-blue\"><p>WORST option if T is insolvent. Only viable if proprietary claim fails.</p></td></tr></tbody></table></div>\n<p><em>Critical point: T&#x27;s interest in the land is SUBORDINATED to the beneficiaries&#x27; claim \u2014 T cannot assert their 1/2 share until the beneficiaries are fully satisfied. This further protects the beneficiaries in insolvency.</em></p>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Flashcard Q&amp;A</strong></span></h2>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Question</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Answer</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p>What are the three steps in an equitable proprietary claim?</p></td><td class=\"nt-cell-blue\"><p>(1) Following \u2013 locate the asset; (2) Tracing \u2013 identify the substitute asset; (3) Claiming \u2013 assert personal or proprietary right.</p></td></tr>\n<tr><td><p>What are the two Re Diplock conditions for equitable tracing?</p></td><td><p>(1) Claimant had equity-recognised right of property in the asset; (2) Asset held by a person in a fiduciary relationship with the claimant.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>What is the rule in Re Hallett&#x27;s Estate?</p></td><td class=\"nt-cell-blue\"><p>In a wrongful mixture, withdrawals/dissipations made for the trustee&#x27;s own purposes are attributed to the TRUSTEE&#x27;s money first, preserving trust money as the remaining balance.</p></td></tr>\n<tr><td><p>How does Re Oatway modify Re Hallett?</p></td><td><p>Where an identifiable asset is purchased from a wrongful mixture and the remaining money is later dissipated, the identifiable asset is attributed to the TRUST. The order of withdrawals is not determinative.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>When can a beneficiary cherry-pick the most profitable application?</p></td><td class=\"nt-cell-blue\"><p>Only where the dispute is SOLELY between the beneficiary and the trustee. Cannot cherry-pick where it would prejudice innocent third parties (Shalson v Russo).</p></td></tr>\n<tr><td><p>What is Clayton&#x27;s Case and when is it disapplied?</p></td><td><p>First in, first out rule for current accounts. Disapplied where result would be contrary to parties&#x27; intentions, impracticable, or unfair (Barlow Clowes). Disapplied in every post-Barlow Clowes case.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>Which method is preferred when Clayton&#x27;s Case is displaced?</p></td><td class=\"nt-cell-blue\"><p>Rolling charge method. Pari passu ex post facto is used only if rolling charge is too difficult or expensive to apply.</p></td></tr>\n<tr><td><p>What claims are available for a WRONGFUL mixture (trust + trustee)?</p></td><td><p>(1) Proportionate share of the asset (captures gains); OR (2) Equitable lien for the amount misapplied. Trustee&#x27;s interest is SUBORDINATED until beneficiary is fully satisfied.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>What claims are available for an INNOCENT mixture?</p></td><td class=\"nt-cell-blue\"><p>Proportionate share ONLY. Cannot assert lien over innocent party&#x27;s share. All innocent contributors share rateably.</p></td></tr>\n<tr><td><p>When should a beneficiary choose an equitable lien over beneficial ownership?</p></td><td><p>Where the traced asset has DECREASED in value. The lien secures the full original sum as a priority claim, avoiding crystallising a loss by claiming a depreciated asset.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>What is subrogation in the tracing context?</p></td><td class=\"nt-cell-blue\"><p>Where misapplied trust money discharges a secured debt, the beneficiary is subrogated to the creditor&#x27;s security \u2013 treated as if they had loaned the money and holds equivalent security (Boscawen v Bajwa).</p></td></tr>\n<tr><td><p>What is the principal defence to an equitable proprietary claim?</p></td><td><p>Bona fide purchaser for value of a LEGAL interest WITHOUT notice of the trust. Takes the property free of the equitable interest.</p></td></tr></tbody></table></div>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Common Exam Pitfalls</strong></span></h2>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Pitfall</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Correct Position</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Confusing following with tracing</strong></span></p></td><td class=\"nt-cell-blue\"><p>Following = tracking the SAME asset as it moves. Tracing = identifying a NEW SUBSTITUTE asset. They are different processes though often used together.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Applying Re Hallett to benefit the trustee</strong></span></p></td><td><p>Hallett protects the BENEFICIARY, not the trustee. Re Oatway confirms the trustee CANNOT use Hallett to claim an identifiable asset purchased from a mixed fund when trust money was later dissipated.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Applying Clayton&#x27;s Case automatically in current account scenarios</strong></span></p></td><td class=\"nt-cell-blue\"><p>Clayton&#x27;s Case has been disapplied in every case since Barlow Clowes where it would produce an unjust result. Always consider whether the result is fair before applying it.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Confusing wrongful and innocent mixture rules</strong></span></p></td><td><p>WRONGFUL (trust + trustee): proportionate share OR lien; trustee&#x27;s interest subordinated. INNOCENT (trust + innocent third party): proportionate share ONLY; cannot prefer one innocent party over another.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Always choosing beneficial ownership over the equitable lien</strong></span></p></td><td class=\"nt-cell-blue\"><p>If the traced asset has FALLEN in value, claiming beneficial ownership crystallises a loss. The equitable lien is better \u2014 it secures the full original sum as a priority secured claim regardless of value movement.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Forgetting cherry-picking is only available in two-party disputes</strong></span></p></td><td><p>Cherry-picking is available ONLY where the dispute is solely between the beneficiary and the trustee. It is unavailable where it would prejudice innocent third parties such as unsecured creditors of a bankrupt trustee (Shalson v Russo).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Omitting the bona fide purchaser defence</strong></span></p></td><td class=\"nt-cell-blue\"><p>Always consider whether the person holding the traced asset is a bona fide purchaser of a LEGAL interest without notice. If so, the equitable proprietary claim fails against them \u2014 they take free of the equitable interest.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Confusing pari passu and rolling charge methods</strong></span></p></td><td><p>Pari passu = single calculation using each contributor&#x27;s fraction of the TOTAL paid in. Rolling charge = recalculate fractions at EACH withdrawal based on who had contributed up to that point. Rolling charge is preferred; pari passu is the fallback.</p></td></tr></tbody></table></div>"
      }
    ],
    "Formalities": [
      {
        "id": "trusts-w6",
        "title": "W6: Formalities for Trusts of Land",
        "content": "<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Trusts Law \u2013 W6: Formalities for Trusts of Land</strong></span></h2>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Topic Overview</strong></span></h2>\n<p>1. s 53(1)(b) LPA 1925: declaration of trust of land (or interest in land) must be manifested and proved by signed writing</p>\n<p>2. Key requirements: some writing; evidences settlor&#x27;s intention and terms; signed by person able to declare the trust</p>\n<p>3. Declaration and writing need not be contemporaneous; trust is unenforceable (not void) until formalities satisfied</p>\n<p>4. Exceptions: s 53(2) LPA 1925 \u2013 resulting, constructive and statutory trusts exempt</p>\n<p>5. Where legal title transferred but no s 53(1)(b) writing: court may enforce via constructive trust (Bannister v Bannister) or resulting trust (Hodgson v Marks)</p>\n<p>6. Rochefoucald v Boustead: court will not allow statute to be used as an instrument of fraud</p>\n<p>7. Failure of formalities in two-party situation: trustee denying trust vs settlor revoking</p>\n<p>8. Three-party situation: trustee seeking to keep property vs settlor seeking return of property</p>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Summary Revision Tables</strong></span></h2>\n<p><span class=\"nt-txt-blue\"><strong>Table 1: s 53(1)(b) LPA 1925 \u2013 Requirements in Detail</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Requirement</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Detail</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>The provision</strong></span></p></td><td class=\"nt-cell-blue\"><p>&quot;A declaration of a trust respecting any land or any interest therein must be manifested and proved by some writing signed by some person who is able to declare such trust or by his will.&quot;</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>&quot;Manifested and proved&quot;</strong></span></p></td><td><p>Declaration and writing need NOT be contemporaneous. The trust can be validly created orally; it is simply unenforceable UNTIL s 53(1)(b) is satisfied. It does not need to have been in writing from the outset.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>&quot;Some writing&quot;</strong></span></p></td><td class=\"nt-cell-blue\"><p>No prescribed form. The writing must evidence: (1) the settlor&#x27;s intention to create the trust; and (2) the terms of the trust.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>&quot;Signed by some person who is able to declare such trust&quot;</strong></span></p></td><td><p>Signature is usually the settlor&#x27;s, but the TRUSTEE may also provide written evidence. Documents signed by an AGENT do NOT satisfy s 53(1)(b).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>&quot;By his will&quot;</strong></span></p></td><td class=\"nt-cell-blue\"><p>s 53(1)(b) expressly allows trusts of land to be created by will. A validly executed will (complying with s 9 Wills Act 1837) satisfies s 53(1)(b).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Effect of non-compliance</strong></span></p></td><td><p>NON-COMPLIANCE renders the trust UNENFORCEABLE (not void). The settlor can change their mind; the trust will not become enforceable unless s 53(1)(b) is later satisfied or an exception applies.</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 2: Exceptions to s 53(1)(b) \u2013 s 53(2) LPA 1925</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Trust Type</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Authority</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Resulting trusts</strong></span></p></td><td class=\"nt-cell-blue\"><p>Not subject to s 53(1)(b). Can arise over land without any written evidence.</p></td><td class=\"nt-cell-blue\"><p>s 53(2) LPA 1925; Hodgson v Marks [1971]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Constructive trusts</strong></span></p></td><td><p>Not subject to s 53(1)(b). Can be imposed over land by the court without written evidence.</p></td><td><p>s 53(2) LPA 1925; Bannister v Bannister [1948]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Statutory trusts</strong></span></p></td><td class=\"nt-cell-blue\"><p>Trusts arising under statute also exempt from s 53(1)(b) formalities.</p></td><td class=\"nt-cell-blue\"><p>s 53(2) LPA 1925</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 3: Where Legal Title Transferred but No s 53(1)(b) Writing</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Scenario / Case</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Outcome</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Basis</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Rochefoucald v Boustead [1897]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Legal title transferred to defendant on oral understanding he would hold on trust. Defendant claimed statute as defence. Court ENFORCED the intended express trust despite absence of writing.</p></td><td class=\"nt-cell-blue\"><p>Equity will not allow s 53(1)(b) to be used as an instrument of fraud to deny the beneficiary&#x27;s interest.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Bannister v Bannister [1948]</strong></span></p></td><td><p>Vendor sold cottage at undervalue on oral understanding she could live there rent-free for life. Vendee later sought to evict her. Court imposed a CONSTRUCTIVE TRUST giving her a life interest.</p></td><td><p>Constructive trust; exempt from s 53(1)(b) under s 53(2). Unconscionable to deny interest.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Hodgson v Marks [1971]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Elderly widow transferred legal title to lodger on oral understanding she would retain beneficial ownership. Court recognised a RESULTING TRUST in her favour.</p></td><td class=\"nt-cell-blue\"><p>Resulting trust; exempt from s 53(1)(b) under s 53(2).</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 4: Failure of Formalities \u2013 Consequences by Situation</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Situation</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Consequence</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Gratuitous self-declaration; formalities never satisfied</strong></span></p></td><td class=\"nt-cell-blue\"><p>Settlor can simply choose not to produce written evidence. In the absence of facts making it unconscionable to deny the trust, the beneficiary cannot assert any interest in the land.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Gratuitous transfer on trust; settlor changes mind; no constitution</strong></span></p></td><td><p>Trust is BOTH unenforceable (for non-compliance with s 53(1)(b)) AND void (for lack of constitution). Subject to additional circumstances making denial unconscionable.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Legal title transferred; no s 53(1)(b) writing; trustee denies trust</strong></span></p></td><td class=\"nt-cell-blue\"><p>Court may enforce via constructive trust (Bannister v Bannister) or resulting trust (Hodgson v Marks) \u2013 both exempt under s 53(2). Equity will not allow the statute to be used as an instrument of fraud (Rochefoucald).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Legal title transferred; no s 53(1)(b) writing; settlor seeks return</strong></span></p></td><td><p>The trust may still be unenforceable. However, if the trustee has acted on the oral trust, the settlor&#x27;s attempt to revoke may itself be unconscionable. Facts-specific.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Three-party: transfer on trust for third-party beneficiary; no writing</strong></span></p></td><td class=\"nt-cell-blue\"><p>If trustee denies the trust \u2192 Rochefoucald / Bannister / Hodgson principles apply (constructive/resulting trust). If settlor seeks return \u2192 court will consider whether unconscionability prevents denial.</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 5: s 53(1)(b) vs s 53(2) \u2013 Summary</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Issue</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>s 53(1)(b)</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>s 53(2)</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What it covers</strong></span></p></td><td class=\"nt-cell-blue\"><p>Express trusts of land or any interest in land.</p></td><td class=\"nt-cell-blue\"><p>Resulting, constructive, and statutory trusts of land.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Formality required</strong></span></p></td><td><p>Signed written evidence manifesting and proving the trust.</p></td><td><p>NONE \u2013 exempt from written formality.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Effect of non-compliance</strong></span></p></td><td class=\"nt-cell-blue\"><p>Trust is UNENFORCEABLE (not void).</p></td><td class=\"nt-cell-blue\"><p>Trust can arise and be enforced without writing.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Agent&#x27;s signature</strong></span></p></td><td><p>Does NOT satisfy s 53(1)(b).</p></td><td><p>N/A</p></td></tr></tbody></table></div>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Flashcard Q&amp;A</strong></span></h2>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Question</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Answer</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p>What does s 53(1)(b) LPA 1925 require?</p></td><td class=\"nt-cell-blue\"><p>A declaration of a trust of land (or interest therein) must be MANIFESTED AND PROVED by some WRITING, SIGNED by a person able to declare such trust, or by will.</p></td></tr>\n<tr><td><p>Does the writing need to be contemporaneous with the declaration?</p></td><td><p>NO. Declaration and writing need not be contemporaneous. The trust exists but is unenforceable until the formality is satisfied.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>What is the consequence of failing to comply with s 53(1)(b)?</p></td><td class=\"nt-cell-blue\"><p>The trust is UNENFORCEABLE (not void). The settlor may change their mind if formalities are never satisfied.</p></td></tr>\n<tr><td><p>Can an agent&#x27;s signature satisfy s 53(1)(b)?</p></td><td><p>NO. Must be signed by the person able to declare the trust (usually the settlor) or the trustee. An agent&#x27;s signature does not suffice.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>What is the s 53(2) exception?</p></td><td class=\"nt-cell-blue\"><p>Resulting, constructive and statutory trusts of land are NOT subject to s 53(1)(b). They can arise without any written evidence.</p></td></tr>\n<tr><td><p>What is the principle in Rochefoucald v Boustead?</p></td><td><p>Equity will not allow s 53(1)(b) to be used as an instrument of fraud. A court can enforce an intended trust even without the formalities where denial would be fraudulent.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>What type of trust was imposed in Bannister v Bannister?</p></td><td class=\"nt-cell-blue\"><p>A constructive trust (exempt from s 53(1)(b) by s 53(2)), giving the vendor a life interest where she had sold at undervalue on the basis of an oral undertaking.</p></td></tr>\n<tr><td><p>What type of trust arose in Hodgson v Marks?</p></td><td><p>A resulting trust (exempt under s 53(2)), where the widow retained beneficial ownership having transferred legal title on an oral understanding.</p></td></tr></tbody></table></div>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Common Exam Pitfalls</strong></span></h2>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Pitfall</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Correct Position</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Saying non-compliance with s 53(1)(b) makes the trust void</strong></span></p></td><td class=\"nt-cell-blue\"><p>NON-COMPLIANCE makes the trust UNENFORCEABLE, not void. The trust may still come to life if written evidence is later produced or if an exception applies.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Requiring contemporaneous writing</strong></span></p></td><td><p>The writing need NOT be contemporaneous with the declaration. The trust can be created orally and evidenced in writing later.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Thinking an agent&#x27;s signature satisfies s 53(1)(b)</strong></span></p></td><td class=\"nt-cell-blue\"><p>An agent&#x27;s signature does NOT satisfy s 53(1)(b). Only the person able to declare the trust (settlor or trustee) can sign.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Forgetting s 53(2) exemptions</strong></span></p></td><td><p>Resulting and constructive trusts of land are EXEMPT from s 53(1)(b) under s 53(2). Always check whether the court can impose one of these to give effect to the parties&#x27; intentions.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Ignoring the fraud prevention principle</strong></span></p></td><td class=\"nt-cell-blue\"><p>Where a person uses s 53(1)(b) as a cover for fraud (e.g. trustee denies trust after legal title transferred on oral understanding), equity will impose a constructive trust and prevent the statute operating as a fraud instrument (Rochefoucald; Bannister).</p></td></tr></tbody></table></div>"
      }
    ],
    "Purpose Trusts": [
      {
        "id": "trusts-w7",
        "title": "W7: Purpose Trusts and Perpetuity",
        "content": "<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Trusts Law \u2013 W7: Purpose Trusts and Perpetuity</strong></span></h2>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Topic Overview</strong></span></h2>\n<p>1. Beneficiary principle: general rule \u2013 a trust must have a beneficiary to be enforceable</p>\n<p>2. Charitable purpose trusts: exception \u2013 enforceable by A-G and Charity Commission; no perpetuity limit; cy-pres doctrine</p>\n<p>3. Non-charitable purpose trusts: &quot;trusts of imperfect obligation&quot;; only valid within Endacott exceptions; common law perpetuity rules apply</p>\n<p>4. Three requirements for charitable status: (1) charitable purpose (s 3(1) CA 2011); (2) public benefit (s 4); (3) wholly and exclusively charitable</p>\n<p>5. Heads of charity under s 3(1) CA 2011: 13 heads including poverty, education, religion, health, community, arts, sport, human rights, environment, animal welfare, armed forces, and general analogous purposes</p>\n<p>6. Public benefit: two elements \u2013 identifiable benefit + public or section of the public (Oppenheim test). No presumption of public benefit (s 4(2) CA 2011)</p>\n<p>7. Wholly and exclusively charitable: mixed purposes \u2013 severance; incidental non-charitable purpose; charitable head covers it</p>\n<p>8. Cy-pres doctrine: s 62 CA 2011 \u2013 five grounds for altering purpose. Initial vs subsequent failure; general charitable intention required for initial failure</p>\n<p>9. Perpetuity rules: rule against remoteness of vesting (beneficiary trusts); rule against inalienability (non-charitable purpose trusts); 125-year statutory period</p>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Summary Revision Tables</strong></span></h2>\n<p><span class=\"nt-txt-blue\"><strong>Table 1: Charitable vs Non-Charitable Purpose Trusts</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Feature</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Charitable Purpose Trust</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Non-Charitable Purpose Trust</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Enforceability</strong></span></p></td><td class=\"nt-cell-blue\"><p>Legally enforceable. Enforced by Attorney-General; practical responsibility with Charity Commission.</p></td><td class=\"nt-cell-blue\"><p>Trusts of &quot;imperfect obligation&quot; \u2013 no recognised method of enforcement.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Validity</strong></span></p></td><td><p>Valid if charitable purpose + public benefit + wholly and exclusively charitable.</p></td><td><p>Only valid if falls within a recognised Endacott exception (and only in wills).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Certainty of objects</strong></span></p></td><td class=\"nt-cell-blue\"><p>Relaxed rules \u2013 sufficient to show intention to apply for a charitable purpose.</p></td><td class=\"nt-cell-blue\"><p>Void for uncertainty if purpose or means of achieving it is unclear (Re Astor).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Perpetuity</strong></span></p></td><td><p>No limit on duration \u2013 can exist in perpetuity.</p></td><td><p>Subject to the common law rule against inalienability.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Failure of trust</strong></span></p></td><td class=\"nt-cell-blue\"><p>Cy-pres doctrine \u2013 property applied to another charitable purpose.</p></td><td class=\"nt-cell-blue\"><p>Property results back to settlor on resulting trust.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Tax benefits</strong></span></p></td><td><p>Significant tax benefits.</p></td><td><p>None.</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 2: Requirements for Charitable Status</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Requirement</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Detail</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>(1) Charitable purpose</strong></span></p></td><td class=\"nt-cell-blue\"><p>Must fall within s 3(1) CA 2011 (see Table 3 below) AND be for the public benefit. Both must be satisfied.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>(2) Public benefit</strong></span></p></td><td><p>No presumption of public benefit (s 4(2) CA 2011). Two elements: (a) IDENTIFIABLE BENEFIT \u2013 must be capable of identification; not settlor&#x27;s belief; detriment is weighed against it. (b) PUBLIC OR SECTION OF PUBLIC \u2013 Oppenheim test: (i) beneficiaries not negligible in number; (ii) distinguishing quality does NOT depend on relationship to a particular individual.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>(3) Wholly and exclusively charitable</strong></span></p></td><td class=\"nt-cell-blue\"><p>If mixed charitable and non-charitable purposes: (a) INCIDENTAL/SUBSIDIARY non-charitable purpose \u2192 trust remains effective (Latimer v IRC). (b) SEVERABLE charitable and non-charitable portions \u2192 court severs if trust language permits and amounts are quantifiable (Salusbury v Denton; Re Coxen). (c) Otherwise: trust is void; property on resulting trust for settlor.</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 3: Heads of Charitable Purpose (s 3(1) CA 2011) \u2013 Key Rules and Cases</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Head</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Key Rules</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Cases</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Prevention/Relief of Poverty</strong></span></p></td><td class=\"nt-cell-blue\"><p>&quot;Going short&quot; (Re Coulthurst). Relative concept \u2013 judged against person&#x27;s status in life. Does NOT mean destitution (Re Gardom). Cannot benefit the rich (Re Gwyon). Can be temporary. Can be inferred (Biscoe v Jackson). Public element relaxed for poverty trusts (Re Scarisbrick).</p></td><td class=\"nt-cell-blue\"><p>Re Coulthurst; Re Gardom; Re Young; Re Gwyon; Re Sanders WT</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Advancement of Education</strong></span></p></td><td><p>Not confined to formal instruction \u2013 includes training, research, broader education. Must involve element of teaching/passing knowledge into store of educational material (Re Hopkins). Increase in knowledge alone insufficient (Re Shaw). Research must be of educational value.</p></td><td><p>Re Gott; London Hospital Medical College v IRC; Re Shaw; Re Hopkins; Incorporated Council of Law Reporting v AG</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Advancement of Religion</strong></span></p></td><td class=\"nt-cell-blue\"><p>Includes belief in one or more gods or no god (s 3(2)(a)). Must ADVANCE the religion \u2013 positive steps to spread/sustain belief (United Grand Lodge). Does NOT cover cloistered communities with no public benefit (Gilmour v Coats). Public worship on land = charitable (Neville Estates).</p></td><td class=\"nt-cell-blue\"><p>R v Registrar General ex p Segerdal (Buddhism); Gilmour v Coats; Neville Estates v Madden</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Advancement of Health / Saving Lives</strong></span></p></td><td><p>Includes prevention/relief of sickness and promotion of health. CC takes broad view including complementary/holistic methods if sufficient evidence of benefit. Rescue services included.</p></td><td><p>Re Resch&#x27;s Will Trust (hospitals); British Pregnancy Advisory Service</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Citizenship / Community Development</strong></span></p></td><td class=\"nt-cell-blue\"><p>Includes rural/urban regeneration and promotion of civic responsibility/volunteering. Focused on community not individual. Must be wholly and exclusively charitable.</p></td><td class=\"nt-cell-blue\"><p>IRC v Oldham TEC</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Arts, Culture, Heritage or Science</strong></span></p></td><td><p>Art must be &quot;of merit&quot; (Re Delius; Re Pinion \u2013 &quot;junk&quot; not charitable). Monuments of cultural/historical significance may qualify; monuments to private individuals unlikely. Heritage = history/traditions passed down through generations.</p></td><td><p>Re Delius; Re Pinion; Royal Choral Society v IRC; Williams Trustees v IRC</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Advancement of Amateur Sport</strong></span></p></td><td class=\"nt-cell-blue\"><p>s 3(2)(d): sport promoting health by involving physical or mental skill or exertion. Bridge: charitable (Hitchen Bridge Club \u2013 logical/lateral thinking). Target shooting: NOT charitable if fitness not GAINED from activity.</p></td><td class=\"nt-cell-blue\"><p>Hitchen Bridge Club; Cambridgeshire Target Shooting Association</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Advancement of Human Rights</strong></span></p></td><td><p>Must not stray into POLITICAL objectives (seeking to change the law). Raising awareness of human rights issues and securing enforcement of human rights law are acceptable.</p></td><td><p>McGovern v A-G (Amnesty \u2013 political; not charitable)</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Environmental Protection</strong></span></p></td><td class=\"nt-cell-blue\"><p>Includes preservation and conservation of natural environment and sustainable development. Independent expert advice may be needed to show subject is worthy of conservation.</p></td><td class=\"nt-cell-blue\"><p>\u2014</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Relief of Those in Need</strong></span></p></td><td><p>Relief due to youth, age, ill-health, disability, financial hardship or other disadvantage. Does not require poverty; must show specific need (Joseph Rowntree).</p></td><td><p>Joseph Rowntree Memorial Trust Housing Association v A-G</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Advancement of Animal Welfare</strong></span></p></td><td class=\"nt-cell-blue\"><p>Includes welfare of particular types of animals (Re Moss \u2013 cats). Improving slaughtering methods (Re Wedgewood). NOT: care of particular named animals of testator. NOT: abolition of vivisection (political purpose) (National Anti-vivisection Society).</p></td><td class=\"nt-cell-blue\"><p>Re Moss; Re Wedgewood; National Anti-vivisection Society v IRC</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Efficiency of Public Services</strong></span></p></td><td><p>Armed forces, police, fire and rescue, ambulance services. Physical fitness (Re Gray); regiment library (Re Good).</p></td><td><p>Re Gray; Re Good</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>General/Analogous (s 3(1)(m))</strong></span></p></td><td class=\"nt-cell-blue\"><p>Purposes recognised as charitable under previous law OR analogous to/within the spirit of earlier statutory heads and case law.</p></td><td class=\"nt-cell-blue\"><p>Catch-all provision</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 4: Public Benefit \u2013 Key Rules</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Issue</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Authority</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>No presumption of benefit</strong></span></p></td><td class=\"nt-cell-blue\"><p>s 4(2) CA 2011: there is no presumption of public benefit. Must always be positively established.</p></td><td class=\"nt-cell-blue\"><p>s 4(2) CA 2011</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Identifiable benefit</strong></span></p></td><td><p>Benefit must be capable of identification and description. Settlor&#x27;s belief as to benefit is IRRELEVANT \u2013 question of fact. Benefit weighed against detriment (NAVS v IRC).</p></td><td><p>Re Hummeltenberg; NAVS v IRC</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Public or section of public (Oppenheim test)</strong></span></p></td><td class=\"nt-cell-blue\"><p>(1) Beneficiaries must not be negligible in number. (2) Distinguishing quality must NOT depend on relationship to a particular individual. Number alone does NOT guarantee public status.</p></td><td class=\"nt-cell-blue\"><p>Oppenheim v Tobacco Securities Trust [1951]; IRC v Baddeley</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Poverty exception</strong></span></p></td><td><p>For poverty trusts, the Oppenheim personal nexus requirement is RELAXED. Purpose must benefit a description of poor persons, not particular poor persons. &quot;Poor relations&quot; can be charitable (Re Scarisbrick; Dingle v Turner \u2013 employer).</p></td><td><p>Re Scarisbrick; Dingle v Turner</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Charging for services</strong></span></p></td><td class=\"nt-cell-blue\"><p>Charities may charge for services and even make a profit if reasonable/necessary to carry out aims. But opportunity to benefit cannot be unreasonably restricted by fees (ISC v Charity Commission).</p></td><td class=\"nt-cell-blue\"><p>Independent Schools Council v CC</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Political objectives</strong></span></p></td><td><p>Political objectives (seeking to procure changes to law/government policy) are NOT charitable. But political means may be used to achieve a non-political objective (e.g. environmental campaign for planning issues).</p></td><td><p>McGovern v A-G; CC Guidance</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 5: Cy-pres Doctrine (s 62 CA 2011)</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Issue</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Doctrine</strong></span></p></td><td class=\"nt-cell-blue\"><p>Where a charitable purpose trust fails, surplus funds are applied to another charitable purpose by way of a scheme established by the Charity Commission or the court. Prevents resulting trust back to settlor.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Subsequent failure</strong></span></p></td><td><p>Once property has been given to charity, it is given for all time. Subsequent failure \u2192 cy-pres applies automatically without need to show general charitable intention.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Initial failure</strong></span></p></td><td class=\"nt-cell-blue\"><p>Cy-pres only applies if the settlor showed a GENERAL CHARITABLE INTENTION (not merely an intention to benefit a particular object). Test: was the intention to benefit a particular object OR a general mode of charity?</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Five statutory grounds (s 62 CA 2011)</strong></span></p></td><td><p>(1) Original purpose fulfilled or cannot be carried out. (2) Purpose does not provide use for all the available property (surplus). (3) Property from similar trusts combined for more effective use. (4) Original purpose referred to an area or class of persons no longer relevant/suitable. (5) Purpose has been adequately provided for by other means; OR ceased to be charitable in law; OR ceased to provide a suitable and effective method of using the property.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Bisco v Jackson [1887] example</strong></span></p></td><td class=\"nt-cell-blue\"><p>General charitable intention found: intended purpose (soup kitchen and cottage hospital in Shoreditch) was a specific object, but the underlying intention was to benefit the sick and poor of the parish. Cy-pres applied.</p></td></tr></tbody></table></div>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Flashcard Q&amp;A</strong></span></h2>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Question</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Answer</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p>What are the three requirements for charitable status?</p></td><td class=\"nt-cell-blue\"><p>(1) Charitable purpose falling within s 3(1) CA 2011; (2) Public benefit (s 4 CA 2011); (3) Wholly and exclusively charitable.</p></td></tr>\n<tr><td><p>Is there a presumption of public benefit under CA 2011?</p></td><td><p>NO. s 4(2) CA 2011 expressly removes the presumption. Public benefit must always be positively established.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>What is the Oppenheim test for public or section of public?</p></td><td class=\"nt-cell-blue\"><p>(1) Beneficiaries not negligible in number; (2) distinguishing quality does NOT depend on relationship to a particular individual.</p></td></tr>\n<tr><td><p>In what circumstances is the Oppenheim test relaxed?</p></td><td><p>For POVERTY trusts \u2013 &quot;poor relations&quot; and employer-employee nexuses can be charitable. Poverty trusts are &quot;of so altruistic a character&quot; that the public element may be inferred.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>What makes a purpose &quot;political&quot; and therefore non-charitable?</p></td><td class=\"nt-cell-blue\"><p>Seeking to PROCURE CHANGES to the law or government policy (McGovern v A-G). Using political means to achieve a non-political objective is permissible.</p></td></tr>\n<tr><td><p>What is the cy-pres doctrine?</p></td><td><p>Where a charitable purpose fails, surplus funds are applied to another charitable purpose by way of a scheme (CC or court). Prevents a resulting trust to the settlor.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>When is general charitable intention required for cy-pres?</p></td><td class=\"nt-cell-blue\"><p>Only for an INITIAL failure. Subsequent failure \u2192 cy-pres applies automatically. Initial failure \u2192 must show general charitable intention (intention to benefit a mode of charity, not a particular object).</p></td></tr>\n<tr><td><p>What is the rule against inalienability?</p></td><td><p>Applies to non-charitable purpose trusts. The trust must not tie up property for a period exceeding the common law perpetuity period. Unlike the rule against remoteness, there is no statutory extension for these trusts.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>What happened in Re Astor&#x27;s Settlement Trusts?</p></td><td class=\"nt-cell-blue\"><p>A non-charitable purpose trust for &quot;maintenance of good understanding between nations&quot; and similar purposes was void: purposes were too inherently uncertain AND there was no mechanism of enforcement (no Endacott exception).</p></td></tr>\n<tr><td><p>What is advancement of education \u2013 what does it require beyond mere increase of knowledge?</p></td><td><p>An element of teaching or education, or the result must pass into the store of educational material/improve communicable knowledge. A mere increase in knowledge without educational dissemination is insufficient (Re Shaw; Re Hopkins).</p></td></tr></tbody></table></div>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Common Exam Pitfalls</strong></span></h2>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Pitfall</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Correct Position</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Assuming there is a presumption of public benefit</strong></span></p></td><td class=\"nt-cell-blue\"><p>s 4(2) CA 2011 expressly REMOVES the presumption. Must always be shown positively.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Treating all advancement of education as charitable</strong></span></p></td><td><p>Must be teaching/educational dissemination, not merely an increase in knowledge. Generating new knowledge without passing it on = insufficient (Re Shaw). Research must be of educational value (Re Hopkins).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Forgetting the relaxed public benefit test for poverty</strong></span></p></td><td class=\"nt-cell-blue\"><p>The Oppenheim personal nexus test is RELAXED for poverty purposes. Poor relations and employer-employee connections can satisfy the public element (Re Scarisbrick; Dingle v Turner).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Assuming political activity = automatically non-charitable</strong></span></p></td><td><p>Political MEANS to achieve a non-political objective are permissible. It is seeking to CHANGE THE LAW or government policy as a PRIMARY purpose that makes a trust non-charitable (McGovern v A-G; CC Guidance).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Applying cy-pres to initial failure without checking general charitable intention</strong></span></p></td><td class=\"nt-cell-blue\"><p>Cy-pres is automatic only for SUBSEQUENT failure. For INITIAL failure (where the purpose never got started), must show GENERAL charitable intention (intention to benefit a mode of charity rather than a specific object).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Thinking non-charitable purpose trusts can be created inter vivos</strong></span></p></td><td><p>Non-charitable purpose trust exceptions (Endacott categories) only apply where the trust is created IN A WILL. Cannot be created inter vivos.</p></td></tr></tbody></table></div>"
      }
    ],
    "Resulting Trusts": [
      {
        "id": "trusts-w8",
        "title": "W8: Formalities, Constitution & Resulting Trusts",
        "content": "<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Trusts Law \u2013 W8: Formalities, Constitution and Resulting Trusts</strong></span></h2>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Topic Overview</strong></span></h2>\n<p>1. Three methods of disposition: outright gift; self-declaration of trust; transfer on trust</p>\n<p>2. Constitution: valid transfer of legal title to trustee (or self-declaration = auto-constituted); method depends on asset type</p>\n<p><strong>Structure</strong>:</p>\n<ul class=\"notes-list\"><li>What was the disposor trying to do?</li><li>What formalities were necessary to perfect the transfer and did the disposor comply?</li><li>General rule: Equity does not perfect and imperfect gift or trust</li><li>What exceptions to the general rule are potentially applicable?</li><li>What are the requirements for the application of the exception(s) and were they satisfied?</li><li>Conclusion?</li></ul>\n<p>3. Milroy v Lord: equity will not perfect an imperfect gift. Transferor must do &quot;everything necessary&quot;; cannot use another method if intended method fails</p>\n<p>4. Exceptions to Milroy v Lord: (1) Re Rose principle; (2) Mascall v Mascall extension \u2013 beyond transferor&#x27;s control; (3) Pennington v Waine \u2013 unconscionability; (4) Strong v Bird \u2013 fortuitous vesting; (5) Donatio mortis causa</p>\n<p>5. Resulting trusts: automatic (failed transfer on trust) and presumed (gratuitous transfer; purchase money)</p>\n<p>6. Presumption of advancement: displaces resulting trust in certain relationships (husband to wife; parent to child; in loco parentis)</p>\n<p>7. Testamentary trusts: governed by s 9 Wills Act 1837; PRs obliged to give effect to valid gifts/trusts in will</p>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Summary Revision Tables</strong></span></h2>\n<p><span class=\"nt-txt-blue\"><strong>Table 1: Formalities for Creation of Inter </strong></span><span class=\"nt-txt-blue\"><strong>Vivos</strong></span><span class=\"nt-txt-blue\"><strong> and Testamentary Trusts</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Trust Type</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Method</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Declaration Formalities</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Constitution Formalities</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Effect of Non-compliance</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Inter </strong></span><span class=\"nt-txt-blue\"><strong>vivos</strong></span><span class=\"nt-txt-blue\"><strong> \u2013 Self-declaration (non-land)</strong></span></p></td><td class=\"nt-cell-blue\"><p>Self-declaration</p></td><td class=\"nt-cell-blue\"><p>NONE \u2013 no prescribed formality. May be created orally, in writing, or by conduct (Paul v Constance).</p></td><td class=\"nt-cell-blue\"><p>AUTO-CONSTITUTED \u2013 no transfer of legal title required. Settlor retains legal title and becomes trustee.</p></td><td class=\"nt-cell-blue\"><p>N/A \u2013 no formality to breach. Trust simply may not be enforceable if intention is not sufficiently clear.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Inter </strong></span><span class=\"nt-txt-blue\"><strong>vivos</strong></span><span class=\"nt-txt-blue\"><strong> \u2013 Self-declaration (land)</strong></span></p></td><td><p>Self-declaration</p></td><td><p>s 53(1)(b) LPA 1925 \u2013 must be manifested and proved by signed writing. Declaration and writing need NOT be contemporaneous. Agent\u2019s signature insufficient.</p></td><td><p>AUTO-CONSTITUTED \u2013 settlor retains legal title as trustee. No transfer required.</p></td><td><p>Trust UNENFORCEABLE (not void) until written evidence produced. Settlor may change mind.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Inter </strong></span><span class=\"nt-txt-blue\"><strong>vivos</strong></span><span class=\"nt-txt-blue\"><strong> \u2013 Transfer on </strong></span><span class=\"nt-txt-blue\"><strong>trust (non-land)</strong></span></p></td><td class=\"nt-cell-blue\"><p>Transfer on trust</p></td><td class=\"nt-cell-blue\"><p>NONE \u2013 no prescribed formality for declaration of trust of non-land property. May be created orally, in writing, or by conduct (Paul v Constance).</p></td><td class=\"nt-cell-blue\"><p><strong>Legal title must be transferred to trustee using the </strong><strong>CORRECT METHOD for that asset type</strong> (see Table 2). Equity will not perfect imperfect transfer (Milroy v Lord). Exceptions: Re Rose; Mascall; Pennington; Strong v Bird; DMC.</p></td><td class=\"nt-cell-blue\"><p>Trust VOID \u2013 incompletely constituted. Automatic resulting trust if legal title was transferred but express trust fails.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Inter </strong></span><span class=\"nt-txt-blue\"><strong>vivos</strong></span><span class=\"nt-txt-blue\"><strong> \u2013 Transfer on trust (land)</strong></span></p></td><td><p>Transfer on trust</p></td><td><p>s 53(1)(b) LPA 1925 \u2013 must be manifested and proved by signed writing. Covers both creation of beneficiary\u2019s equitable interest AND declaration of the trust itself.</p></td><td><p>Transfer by DEED (s 52(1) LPA 1925) and registration at Land Registry (s 27 LRA 2002). Legal title passes on registration. Exceptions to Milroy v Lord apply.</p></td><td><p>Declaration failure: trust UNENFORCEABLE (s 53(1)(b)). Constitution failure: trust VOID. Both failures: trust void and unenforceable.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Testamentary trust (any property)</strong></span></p></td><td class=\"nt-cell-blue\"><p>Created by will</p></td><td class=\"nt-cell-blue\"><p>s 9 Wills Act 1837 \u2013 will must be: (1) in writing; (2) signed by testator (or someone in their presence and by their direction); (3) testator\u2019s signature made or acknowledged in the presence of two or more witnesses present at the same time; (4) each witness attests and signs. Also satisfies s 53(1)(b) for trusts of land.</p></td><td class=\"nt-cell-blue\"><p>On testator\u2019s death, legal title to the estate vests in the personal representatives (PRs). PRs are obliged to constitute the trust by transferring legal title to the named trustees (or retain it if they themselves are the trustees). Formalities and constitution rules do NOT need to be separately considered once a valid will exists.</p></td><td class=\"nt-cell-blue\"><p>Non-compliance with s 9 Wills Act 1837: will is VOID. All gifts and trusts in it fail entirely. No separate formality/constitution analysis needed once a valid will exists.</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table </strong></span><span class=\"nt-txt-blue\"><strong>2</strong></span><span class=\"nt-txt-blue\"><strong>: Constitution \u2013 How Legal Title Transfers (by Asset Type)</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Asset</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Method of Transfer</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>When Legal Title Passes</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Key Authority</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Registered land</strong></span></p></td><td class=\"nt-cell-blue\"><p>Deed (s 52(1) LPA 1925); registered with Land Registry (s 27 LRA 2002).</p></td><td class=\"nt-cell-blue\"><p>On registration at Land Registry.</p></td><td class=\"nt-cell-blue\"><p>LPA 1925; LRA 2002</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Shares</strong></span></p></td><td><p>Signed stock transfer form sent to company registrar (with share certificate or indemnity).</p></td><td><p>When transferee registered in company&#x27;s register of members.</p></td><td><p>Milroy v Lord; Re Rose; Zeital v Kaye</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Choses in action (debts/bank accounts)</strong></span></p></td><td class=\"nt-cell-blue\"><p>Written transfer plus written notice to debtor or bank (s 136 LPA 1925).</p></td><td class=\"nt-cell-blue\"><p>On receipt of notice.</p></td><td class=\"nt-cell-blue\"><p>s 136 LPA 1925</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Chattels (incl. physical cash)</strong></span></p></td><td><p>Deed of gift; OR delivery with evidence of intention to transfer.</p></td><td><p>On valid delivery with intention, or execution of deed.</p></td><td><p>Re Cole [1964]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Cheques / bills of exchange</strong></span></p></td><td class=\"nt-cell-blue\"><p>Endorsement by transferor (signing name on back) per Bills of Exchange Act 1882.</p></td><td class=\"nt-cell-blue\"><p>On valid endorsement.</p></td><td class=\"nt-cell-blue\"><p>Bills of Exchange Act 1882; Jones v Lock</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table </strong></span><span class=\"nt-txt-blue\"><strong>3</strong></span><span class=\"nt-txt-blue\"><strong>: Rule in Milroy v Lord \u2013 Core Principles</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Principle</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Detail</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>The rule</strong></span></p></td><td class=\"nt-cell-blue\"><p>&quot;Equity will not assist a volunteer.&quot; If trust property is not vested in the trustees, the trust is incompletely constituted and void. If legal title has not passed to the donee, the gift is imperfect and the donor can change their mind.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Must do &quot;everything necessary&quot;</strong></span></p></td><td><p>Transferor must do &quot;everything necessary to be done&quot; to effect the intended disposition \u2013 i.e. follow the correct method for transferring legal title. If they fail, equity will NOT perfect the disposition or treat the transferor as having used one of the other methods.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>No substitution of methods</strong></span></p></td><td class=\"nt-cell-blue\"><p>If a donor intends to make a GIFT but fails to transfer legal title, they will NOT be treated as having self-declared a trust (Jones v Lock; Richards v Delbridge). They did not intend to assume the obligations of trusteeship.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Milroy v Lord facts</strong></span></p></td><td><p>Settlor intended to transfer shares to Lord on trust. Completed a deed but did not complete the stock transfer form/register Lord. Held: trust not constituted. Equity would not treat settlor as having self-declared.</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table </strong></span><span class=\"nt-txt-blue\"><strong>4</strong></span><span class=\"nt-txt-blue\"><strong>: Exceptions to Milroy v Lord</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Exception</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Conditions / Principle</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Authority</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Re Rose principle</strong></span></p></td><td class=\"nt-cell-blue\"><p>Equitable interest passes to transferee (and transferor holds legal title on constructive trust) once transferor has done &quot;everything in their power&quot; to vest legal title. Conditions: (1) correct method of transfer used; (2) transferor has done everything in their power; (3) documentation in hands of person capable of effecting legal transfer. Disposition becomes irrevocable.</p></td><td class=\"nt-cell-blue\"><p>Re Rose [1952]; Milroy v Lord</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Mascall v Mascall extension: matter beyond transferor&#x27;s control</strong></span></p></td><td><p>Transfer irrevocable if the transferor puts the matter BEYOND THEIR OWN CONTROL, even if documents not yet sent to person who can effect legal transfer. Sufficient that documents given to intended transferee. Contrast: sending to own agent/solicitor = insufficient (agency revocable). Key limit: Re Fry \u2013 where consent of Treasury required but not obtained before death, transfer ineffective.</p></td><td><p>Mascall v Mascall [1985]; Re Fry [1948]; Zeital v Kaye [2010]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Pennington v Waine: unconscionability</strong></span></p></td><td class=\"nt-cell-blue\"><p>Equity will perfect an imperfect gift in any situation where it would be UNCONSCIONABLE for the donor to resile, even if Re Rose / Mascall conditions not strictly met. Documents need not have been sent off or delivered to donee. Goes further than Re Rose.</p></td><td class=\"nt-cell-blue\"><p>Pennington v Waine [2002]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Strong v Bird: fortuitous vesting</strong></span></p></td><td><p>An imperfect gift or release is perfected if the intended donee obtains legal title in ANOTHER CAPACITY (usually as executor/administrator of donor&#x27;s estate). Conditions: (1) intention to make an IMMEDIATE gift (Re Freeland \u2013 &quot;an intention of giving, not an intention to give&quot;); (2) intention continues UNCHANGED until donor&#x27;s death (Re Gonin); (3) intended donee becomes EXECUTOR (Re Stewart \u2013 or one of several) or administrator (Re James). Equity will not enforce the debt/claim against the donee provided continuing intention shown.</p></td><td><p>Strong v Bird [1874]; Re Stewart [1908]; Re Freeland [1952]; Re Gonin [1979]; Re James [1935]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Donatio</strong></span><span class=\"nt-txt-blue\"><strong> mortis causa (DMC)</strong></span></p></td><td class=\"nt-cell-blue\"><p>Conditional gift made in contemplation of death. Conditions (Cain v Moon [1896]): (1) Gift made in CONTEMPLATION OF DEATH from an identifiable imminent cause (King v Dubrey); (2) Gift is CONDITIONAL on death (revocable if donor recovers); (3) Donor DELIVERS or parts with DOMINION over the property (can be constructive \u2013 Sen v Headley; Rahman v Hassan [2024]). Effect: donee may require PRs to complete legal title transfer after death. Full transfer of legal title not required before death.</p></td><td class=\"nt-cell-blue\"><p>Cain v Moon [1896]; Sen v Headley [1991]; King v Dubrey [2015]; Rahman v Hassan [2024]</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table </strong></span><span class=\"nt-txt-blue\"><strong>5</strong></span><span class=\"nt-txt-blue\"><strong>: Resulting Trusts \u2013 Types and Rules</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Type</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>How It Arises / Conditions</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Effect / Rebuttal</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Automatic RT: failed transfer on trust</strong></span></p></td><td class=\"nt-cell-blue\"><p>Transfer on trust made to trustee but express trust wholly/partially fails (e.g. uncertainty of objects/subject matter; non-compliance with beneficiary principle; subsequent purpose failure). Legal title must have been transferred. If unconstituted: settlor retains property; nothing to result.</p></td><td class=\"nt-cell-blue\"><p>Beneficial interest automatically results back to settlor. Settlor gains S v V rights. No rebuttal available.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Automatic RT: partial failure or surplus</strong></span></p></td><td><p>Validly created trust subsequently fails in part (e.g. runs full 125-year perpetuity period with property unvested and no gift-over; non-charitable purpose trust with surplus and no gift-over).</p></td><td><p>Undisposed-of beneficial interest results back to settlor (or estate). Arises automatically.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Presumed RT: gratuitous transfer</strong></span></p></td><td class=\"nt-cell-blue\"><p>A transfers legal title of asset to B gratuitously (B provides no consideration) and no evidence A intended a gift.</p></td><td class=\"nt-cell-blue\"><p>B holds on resulting trust for A. Rebutted by evidence A intended a gift; if rebutted B becomes full owner.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Presumed RT: purchase money (full price)</strong></span></p></td><td><p>A pays full purchase price for asset registered in B&#x27;s name; B provides no consideration.</p></td><td><p>B holds on resulting trust for A unless shown A intended a gift or B provided consideration.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Presumed RT: purchase money (contribution)</strong></span></p></td><td class=\"nt-cell-blue\"><p>A and B both contribute to purchase price; B is sole legal owner or proportions of legal ownership differ from contributions.</p></td><td class=\"nt-cell-blue\"><p>A and B hold equitable interests proportionate to their respective contributions, regardless of legal title. Rebutted by contrary common intention or express declaration of trust.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Presumption of advancement: husband to wife</strong></span></p></td><td><p>Transfer from husband to wife (including during engagement). NOT from wife to husband or fiance to fiancee.</p></td><td><p>Displaces RT presumption. Transfer presumed to be an outright gift. Can be rebutted by contrary intention.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Presumption of advancement: parent to child</strong></span></p></td><td class=\"nt-cell-blue\"><p>Transfer from parent to child (including adult child; less clear for mother). Also in loco parentis (person with financial responsibility for child; typically only while child remains minor).</p></td><td class=\"nt-cell-blue\"><p>Displaces RT presumption. Transfer presumed to be an outright gift. Can be rebutted by contrary intention.</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table </strong></span><span class=\"nt-txt-blue\"><strong>6</strong></span><span class=\"nt-txt-blue\"><strong>: Issue-Spotting Guide \u2013 Formalities and Constitution</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Step</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Question to Ask</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>1. Identify the intention</strong></span></p></td><td class=\"nt-cell-blue\"><p>Is this a GIFT, a SELF-DECLARATION OF TRUST, or a TRANSFER ON TRUST? The method used and formalities required differ accordingly.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>2. Formalities for declaration</strong></span></p></td><td><p>Is the subject matter LAND? If yes \u2192 s 53(1)(b) LPA 1925 applies; must be manifested and proved in signed writing. If non-land \u2192 no prescribed formality; can be oral, written, or by conduct (Paul v Constance).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>3. Constitution (for gift or transfer on trust)</strong></span></p></td><td class=\"nt-cell-blue\"><p>Has legal title been transferred to the donee/trustee using the CORRECT METHOD for that asset type? Self-declarations are auto-constituted (no transfer needed).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>4. If constitution has failed</strong></span></p></td><td><p>Consider the four exceptions to Milroy v Lord: (1) Re Rose; (2) Mascall / beyond control; (3) Pennington unconscionability; (4) Strong v Bird / DMC.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>5. If transfer on trust fails</strong></span></p></td><td class=\"nt-cell-blue\"><p>Was legal title actually transferred? If yes \u2192 automatic resulting trust arises. If not \u2192 settlor retains property (nothing to result back).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>6. Gift to wrong method / precatory words</strong></span></p></td><td><p>If intended as a gift but failed: equity will NOT treat as self-declaration (Jones v Lock; Richards v Delbridge). Must show clear evidence of intention to be a trustee.</p></td></tr></tbody></table></div>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Flashcard Q&amp;A</strong></span></h2>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Question</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Answer</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p>What is constitution of a trust?</p></td><td class=\"nt-cell-blue\"><p>The valid transfer of legal title from the settlor to the trustee (for a transfer on trust). Self-declarations are automatically constituted. Gifts: constitution = transfer to donee.</p></td></tr>\n<tr><td><p>What is the rule in Milroy v Lord?</p><
