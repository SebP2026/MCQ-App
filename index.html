    "Enforcement of Interests": [
      {
        "id": "enforcement-notes",
        "title": "W6: Enforcement of Interests",
        "content": "<p><span class=\"nt-txt-navy\"><strong>ENFORCEMENT OF INTERESTS \u2014 COMPREHENSIVE REVISION NOTES</strong></span></p>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>1. Structured Topic Overview</strong></span></h3>\n<p>Enforcement of third-party interests is split between registered and unregistered land, and between different categories of interest.</p>\n<p><span class=\"nt-txt-navy\"><strong>REGISTERED LAND \u2014 THREE CATEGORIES (LRA 2002)</strong></span></p>\n<ul class=\"notes-list\"><li>Registrable dispositions (s 27): must be registered to take legal effect \u2014 freehold/leasehold transfers, new leases &gt;7 yrs, express easements, legal mortgages, rights of entry</li><li>Interests protected by entry: equitable interests protected by notice (s 32, charges register) or restriction (s 40, proprietorship register)</li><li>Overriding interests (Sch 3): bind purchaser even without registration \u2014 Sch 3 para 1 (legal leases \u22647 yrs); para 2 (actual occupation); para 3 (implied legal easements)</li></ul>\n<p>Basic rule (s 28): interests take priority in order created \u2014 applies to donees. Exception (s 29): registrable disposition for valuable consideration takes priority over all pre-existing rights except protected/overriding interests.</p>\n<p><span class=\"nt-txt-navy\"><strong>OVERREACHING (registered and unregistered)</strong></span></p>\n<ul class=\"notes-list\"><li>Applies to trust interests only (LPA 1925 ss 2 and 27)</li><li>Purchase price paid to at least two trustees \u2192 equitable interest moves from land to money</li><li>Flegg: payment to two trustees overreaches even if beneficiaries in actual occupation</li><li>Boland: payment to only one trustee does NOT overreach \u2192 interest remains in land</li></ul>\n<p><span class=\"nt-txt-navy\"><strong>UNREGISTERED LAND</strong></span></p>\n<ul class=\"notes-list\"><li>Pre-1926: legal rights bind world; equitable rights subject to doctrine of notice (bona fide purchaser for value of legal estate without notice = &quot;equity&#x27;s darling&quot;)</li><li>Post-1926: most equitable interests protected by Land Charge (LCA 1972); unprotected = void against purchaser for value regardless of actual knowledge (Midland Bank v Green)</li><li>Cannot be protected by Land Charge: trust interests (overreaching); equitable easements/RCs created pre-1926 (doctrine of notice still applies)</li><li>Land charges registered against name of estate owner at time of creation; incorrect name = nullity (Diligent Finance v Alleyne)</li><li>On sale, unregistered land must be registered for first time (LRA 2002 s 4)</li></ul>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>2. Summary Revision Tables</strong></span></h3>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 1 \u2014 Three Categories of Interest in Registered Land (LRA 2002)</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Category</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Examples</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Registrable dispositions (s 27)</strong></span></p></td><td><p>Must be registered to take legal effect (s 27(1)); &quot;compulsory registration&quot;</p></td><td><p>Transfer of freehold/leasehold (s 27(2)(a)); new lease &gt;7 yrs (s 27(2)(b)); express easement (s 27(2)(d)); legal mortgage (s 27(2)(f)); right of entry/forfeiture (s 27(2)(e))</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Protected by entry \u2014 Notice (s 32)</strong></span></p></td><td class=\"nt-cell-blue\"><p>Entry on charges register; does not guarantee validity \u2014 only binds purchaser if interest validly created; appropriate for interests intended to bind future owners</p></td><td class=\"nt-cell-blue\"><p>Restrictive covenants (freehold); estate contracts; equitable easements; equitable leases; optional: legal leases 3\u20137 yrs</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Protected by entry \u2014 Restriction (s 40)</strong></span></p></td><td><p>Entry on proprietorship register; imposes conditions on registration of disposition; does not prevent disposition \u2014 only controls conditions</p></td><td><p>Trust of land interests; bankruptcy (trustee in bankruptcy&#x27;s consent required); overreaching trigger</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Overriding interests (Sch 3)</strong></span></p></td><td class=\"nt-cell-blue\"><p>Bind purchaser for value without any registration; retained in LRA 2002 in limited form</p></td><td class=\"nt-cell-blue\"><p>Legal leases \u22647 yrs (Sch 3 para 1); actual occupation (Sch 3 para 2); implied legal easements (Sch 3 para 3)</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 2 \u2014 Priority Rules: s 28 vs s 29 LRA 2002</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Rule</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>s 28 (Basic Rule)</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>s 29 (Exception)</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Applies to</strong></span></p></td><td><p>All interests; governs dispositions NOT for value (donee/gift/inheritance)</p></td><td><p>Registrable dispositions of registered estate for valuable consideration</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Effect</strong></span></p></td><td class=\"nt-cell-blue\"><p>Interests bind in order of creation \u2014 purchaser/donee takes subject to ALL pre-existing interests regardless of registration</p></td><td class=\"nt-cell-blue\"><p>Takes free of all pre-existing interests EXCEPT: (i) registered/protected interests; (ii) overriding interests</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Volunteer</strong></span></p></td><td><p>Always bound by any pre-existing equitable interest regardless of protection status</p></td><td><p>N/A \u2014 s 29 only applies to purchasers for valuable consideration</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 3 \u2014 Overriding Interests: Schedule 3 LRA 2002</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Para</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Key Notes / Cases</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Para 1: Legal leases \u22647 yrs</strong></span></p></td><td><p>Binding on new freeholder without registration; rationale: too many to register; unreasonable to expect registration by short-term tenants</p></td><td><p>Equitable leases do NOT fall under para 1 (may fall under para 2)</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Para 2: Actual occupation</strong></span></p></td><td class=\"nt-cell-blue\"><p>Equitable interest held by person in actual occupation at time of disposition (re: the land they occupy)</p></td><td class=\"nt-cell-blue\"><p>Link Lending v Bustard [2010]: multi-factor test \u2014 permanence; continuity; length/reason for absence; nature of property; personal circumstances</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Para 2 exception (b)</strong></span></p></td><td><p>No overriding interest if: inquiry was made of that person before disposition AND they failed to disclose when reasonably expected to do so</p></td><td><p>Protects purchasers from interests deliberately concealed</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Para 2 exception (c)</strong></span></p></td><td class=\"nt-cell-blue\"><p>No overriding interest if: occupation not obvious on reasonably careful inspection AND purchaser had no actual knowledge</p></td><td class=\"nt-cell-blue\"><p>Both conditions (i) AND (ii) must be met for exception to apply</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Para 3: Implied legal easements</strong></span></p></td><td><p>Overriding if: (a) known to new owner; OR (b) obvious on reasonable inspection; OR (c) exercised within 12 months before disposition</p></td><td><p>Wheeldon v Burrows; common intention; necessity; s 62 LPA 1925 easements all capable of being overriding</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 4 \u2014 &quot;Actual Occupation&quot;: Key Cases (Sch 3 Para 2)</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Case</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Principle</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Williams &amp; Glyn&#x27;s Bank v Boland [1981]</strong></span></p></td><td><p>&quot;Actual occupation&quot; has its plain meaning \u2014 involves a degree of physical permanence; not a legalistic concept</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Abbey National v </strong></span><span class=\"nt-txt-blue\"><strong>Cann</strong></span><span class=\"nt-txt-blue\"><strong> [1991]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Must be permanence and continuity \u2014 not a &quot;mere fleeting presence&quot; preparatory to moving in; presence of carpet layers and removal men insufficient</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Thompson v Foy [2010]</strong></span></p></td><td><p>Person must be in actual occupation at the time of the transfer deed, and possibly also at registration, to claim overriding interest</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Chhokar v Chhokar [1984]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Actual occupation not defeated by temporary absences (holidays, hospital stays, business trips) \u2014 presence of belongings can be sufficient</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Stockholm Finance v Garden Holdings [1995]</strong></span></p></td><td><p>Prolonged absence will defeat actual occupation \u2014 protracted periods of absence in a second home elsewhere goes beyond temporary absence</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Link Lending v Bustard [2010]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Multi-factor test: degree of permanence and continuity; intentions and wishes; length of absence; reason for absence; nature of property; personal circumstances</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 5 \u2014 Overreaching</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Issue</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule / Detail</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What it applies to</strong></span></p></td><td><p>Trust interests ONLY \u2014 the equitable beneficial interests of beneficiaries under a trust of land (LPA 1925 ss 2 and 27)</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Applies to</strong></span></p></td><td class=\"nt-cell-blue\"><p>Both registered and unregistered land equally</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>How to overreach</strong></span></p></td><td><p>Capital money (purchase price/mortgage proceeds) must be paid to at least two trustees (or a trust corporation); money must NOT be paid directly to beneficiaries unless they are also trustees</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Effect of overreaching</strong></span></p></td><td class=\"nt-cell-blue\"><p>Equitable interest is transferred from the land to the money paid; purchaser takes land free of the trust interest; trustees must account to beneficiaries for their share of the proceeds</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>How a restriction triggers overreaching</strong></span></p></td><td><p>Restriction on proprietorship register sets condition: purchaser/lender must pay to two trustees; compliance = overreaching occurs</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>City of London BS v Flegg [1987]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Beneficiaries in actual occupation were overreached because mortgage monies were paid to two trustees (M-Bs); payment to two trustees sufficient even where beneficiaries in occupation and unaware of mortgage</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Williams &amp; Glyn&#x27;s Bank v Boland [1981]</strong></span></p></td><td><p>Monies paid to only ONE trustee (husband sole legal owner); overreaching did NOT occur; wife&#x27;s interest remained in the land and was an overriding interest as she was in actual occupation</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 6 \u2014 Unregistered Land: Land Charges (LCA 1972)</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Class</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Interest Protected</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Effect of </strong><strong>Non-Registration</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Class C(I)</strong></span></p></td><td><p>Puisne mortgage (second legal mortgage)</p></td><td><p>Void against purchaser for value of legal estate</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Class C(IV)</strong></span></p></td><td class=\"nt-cell-blue\"><p>Estate contract (option, right of pre-emption, contract to convey)</p></td><td class=\"nt-cell-blue\"><p>Void against purchaser for money or money&#x27;s worth (Midland Bank v Green)</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Class D(II)</strong></span></p></td><td><p>Restrictive covenant created after 1925</p></td><td><p>Void against purchaser for value of legal estate</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Class D(III)</strong></span></p></td><td class=\"nt-cell-blue\"><p>Equitable easement created after 1925</p></td><td class=\"nt-cell-blue\"><p>Void against purchaser for value of legal estate</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Class F</strong></span></p></td><td><p>Spouse&#x27;s matrimonial right of occupation (Family Law Act 1996)</p></td><td><p>Void against purchaser for value</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>CANNOT be protected by Land Charge</strong></span></p></td><td class=\"nt-cell-blue\"><p>Trust interests (must be overreached); equitable easements and RCs created pre-1926 (doctrine of notice applies)</p></td><td class=\"nt-cell-blue\"><p>\u2014</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 7 \u2014 Doctrine of Notice (Unregistered Land): &quot;Equity&#x27;s Darling&quot;</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Element</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule / Detail</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Key Cases</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Bona fide</strong></span></p></td><td><p>Acting in good faith; no fraudulent conduct</p></td><td><p>General law</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Purchaser for value</strong></span></p></td><td class=\"nt-cell-blue\"><p>Pays consideration for the land; does not include donee/heir; nominal consideration counts (Midland Bank v Green)</p></td><td class=\"nt-cell-blue\"><p>Midland Bank Trust Co v Green [1981]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Legal estate</strong></span></p></td><td><p>Must acquire the legal estate (freehold or leasehold), not merely an equitable interest</p></td><td><p>General law</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Without notice \u2014 Actual</strong></span></p></td><td class=\"nt-cell-blue\"><p>Purchaser has direct knowledge of the equitable interest</p></td><td class=\"nt-cell-blue\"><p>\u2014</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Without notice \u2014 Imputed</strong></span></p></td><td><p>Agent&#x27;s notice (actual or constructive) is imputed to the purchaser \u2014 e.g. solicitor&#x27;s knowledge</p></td><td><p>Kingsnorth Finance v Tizard [1986]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Without notice \u2014 Constructive</strong></span></p></td><td class=\"nt-cell-blue\"><p>Purchaser failed to make enquiries that ought reasonably to have been made; must inspect land and enquire of occupiers</p></td><td class=\"nt-cell-blue\"><p>Hunt v Luck [1902]; Kingsnorth Finance v Tizard [1986]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Effect of being equity&#x27;s darling</strong></span></p></td><td><p>Takes land free of the equitable interest; interest is destroyed permanently \u2014 cannot revive against subsequent purchaser with notice</p></td><td><p>General law</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 8 \u2014 Key Cases </strong></span><span class=\"nt-txt-blue\"><strong>at a Glance</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Case</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Topic</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Core Principle</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>City of London BS v Flegg [1987]</strong></span></p></td><td><p>Overreaching</p></td><td><p>Payment to two trustees overreaches beneficiaries&#x27; interests even where they are in actual occupation and unaware of the mortgage</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Williams &amp; Glyn&#x27;s Bank v Boland [1981]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Overreaching / actual occupation</p></td><td class=\"nt-cell-blue\"><p>Payment to one trustee only = no overreaching; wife&#x27;s interest remained in land; overriding as she was in actual occupation</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Link Lending v Bustard [2010]</strong></span></p></td><td><p>Actual occupation</p></td><td><p>Multi-factor test for actual occupation; courts reluctant to impose single test</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Abbey National v </strong></span><span class=\"nt-txt-blue\"><strong>Cann</strong></span><span class=\"nt-txt-blue\"><strong> [1991]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Actual occupation</p></td><td class=\"nt-cell-blue\"><p>&quot;Mere fleeting presence&quot; preparatory to moving in insufficient for actual occupation</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Thompson v Foy [2010]</strong></span></p></td><td><p>Actual occupation (timing)</p></td><td><p>Must be in actual occupation at date of transfer deed (and possibly registration)</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Chhokar v Chhokar [1984]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Actual occupation</p></td><td class=\"nt-cell-blue\"><p>Temporary absences (hospital, holiday, business trip) do not defeat actual occupation</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Stockholm Finance v Garden Holdings [1995]</strong></span></p></td><td><p>Actual occupation</p></td><td><p>Prolonged absence (e.g. mainly living elsewhere) will defeat actual occupation</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Midland Bank Trust Co v Green [1981]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Land Charges / unregistered land</p></td><td class=\"nt-cell-blue\"><p>Entry (or non-entry) of land charge is conclusive as to notice \u2014 knowledge of the interest is irrelevant; unregistered option void even where purchaser knew of it</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Diligent Finance Co v Alleyne [1972]</strong></span></p></td><td><p>Land Charges \u2014 name requirement</p></td><td><p>Land charge registered against incorrect name (shortened name) is a nullity; must be against the full name as in the title deeds</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Hunt v Luck [1902]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Constructive notice</p></td><td class=\"nt-cell-blue\"><p>Presence of tenant on land fixes purchaser with constructive notice of tenant&#x27;s leasehold interest</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Kingsnorth Finance v Tizard [1986]</strong></span></p></td><td><p>Constructive / imputed notice</p></td><td><p>Surveyor&#x27;s failure to make further enquiries despite warning signs = constructive notice imputed to lender</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Mercer v Liverpool Railway [1903]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Legal rights in unregistered land</p></td><td class=\"nt-cell-blue\"><p>&quot;Legal rights bind the whole world&quot; \u2014 pre- and post-1926</p></td></tr></tbody></table></div>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>3. Flashcard Q&amp;A Pairs</strong></span></h3>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Question</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Answer</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What are the three categories of interests in registered land under LRA 2002?</strong></span></p></td><td><p>Registrable dispositions (s 27 \u2014 must register to take legal effect); interests protected by entry (notice s 32 or restriction s 40); overriding interests (Sch 3 \u2014 bind purchaser without registration).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What is the basic rule of priority (s 28 LRA 2002)?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Interests take priority in order of creation. Applies to dispositions not for value (donees/gifts/inheritance). A donee is always bound by ALL pre-existing interests regardless of registration.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What is the exception to the basic rule (s 29 LRA 2002)?</strong></span></p></td><td><p>A registrable disposition for valuable consideration takes priority over all pre-existing interests EXCEPT those which have been protected on the register (notice/restriction) or which are overriding interests.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What interests must be protected by notice (s 32 LRA 2002)?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Restrictive covenants affecting freehold land; estate contracts; equitable easements; equitable leases. Note: trust interests CANNOT be protected by notice (s 33) \u2014 use a restriction instead.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What is a restriction (s 40 LRA 2002) and when is it used?</strong></span></p></td><td><p>An entry on the proprietorship register imposing conditions on registration of any disposition. Used for trust interests to trigger overreaching \u2014 requires payment to two trustees before any disposition is registered.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What are the three categories of overriding interest under Sch 3 LRA 2002?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Para 1: legal leases of 7 years or less. Para 2: interests of persons in actual occupation. Para 3: implied legal easements and profits \u00e0 prendre (if known/obvious/exercised within 12 months).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What is the multi-factor test for actual occupation (Sch 3 para 2)?</strong></span></p></td><td><p>Link Lending v Bustard [2010]: degree of permanence and continuity; intentions and wishes; length and reason for absence; nature of property; personal circumstances. Courts refuse to apply a single rigid test.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What are the two exceptions to Sch 3 para 2 overriding interests?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Para 2(b): inquiry was made and the person failed to disclose when reasonably expected to. Para 2(c)(i)+(ii): occupation not obvious on reasonably careful inspection AND purchaser had no actual knowledge (both must be met).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>How does overreaching work and what does it apply to?</strong></span></p></td><td><p>Applies to trust interests ONLY (LPA 1925 ss 2 and 27). Capital money paid to at least two trustees \u2192 equitable interest moves from land to money. Works in both registered and unregistered land. Flegg: overreaching occurs even where beneficiaries in actual occupation.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Why did overreaching NOT occur in Boland?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Mortgage monies were paid to only one trustee (the husband as sole legal owner). Payment to fewer than two trustees does not overreach. Mrs Boland&#x27;s interest remained in the land and was overriding as she was in actual occupation.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What land charges protect which interests in unregistered land?</strong></span></p></td><td><p>Class C(I): puisne mortgage. Class C(IV): estate contract/option. Class D(II): restrictive covenant post-1925. Class D(III): equitable easement post-1925. Class F: spouse&#x27;s right of occupation.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What is the effect of failing to register a land charge?</strong></span></p></td><td class=\"nt-cell-blue\"><p>The interest is void against a purchaser for value of the land, regardless of the purchaser&#x27;s actual knowledge of the interest (Midland Bank v Green). The interest is NOT void against a donee/volunteer.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Who is &quot;equity&#x27;s darling&quot; and what are the five requirements?</strong></span></p></td><td><p>A bona fide purchaser for value of a legal estate without notice. All five elements must be satisfied: (1) bona fide; (2) purchaser; (3) for value; (4) legal estate; (5) without notice (actual, constructive or imputed).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What are the three types of notice in unregistered land?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Actual: direct knowledge. Constructive: would have known if proper enquiries made (inspect land; enquire of occupiers). Imputed: agent&#x27;s notice (actual or constructive) is attributed to the purchaser.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What is the consequence of the equitable interest being defeated by equity&#x27;s darling?</strong></span></p></td><td><p>The interest is permanently destroyed \u2014 it cannot be revived so as to bind a subsequent purchaser who does have notice.</p></td></tr></tbody></table></div>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>4. Common Exam Pitfalls &amp; Tricky Distinctions</strong></span></h3>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Pitfall / Distinction</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Explanation</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Trust interests CANNOT be protected by notice \u2014 use a restriction</strong></span></p></td><td><p>S 33 LRA 2002 expressly excludes beneficial interests under a trust of land from protection by notice. The correct mechanism is a restriction (s 40) on the proprietorship register, which triggers the overreaching requirement. A notice entered for a trust interest has no effect.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Overreaching and actual occupation: Flegg vs Boland</strong></span></p></td><td class=\"nt-cell-blue\"><p>The key distinction is whether capital money was paid to two trustees. Flegg: two trustees (M-Bs) = overreaching occurred, even though Fleggs were in actual occupation. Boland: only one trustee = no overreaching, interest remained in land, and Mrs Boland&#x27;s actual occupation made it overriding. The number of trustees is the critical factor.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Land charge registration is absolute \u2014 actual knowledge is irrelevant</strong></span></p></td><td><p>Midland Bank v Green: a land charge not registered is void against a purchaser for value even if the purchaser actually knew of the interest. Conversely, a registered land charge binds a purchaser regardless of whether they searched. Never argue that actual knowledge cures non-registration or that ignorance defeats a registered charge.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Land charges are registered against the owner&#x27;s NAME \u2014 not the land</strong></span></p></td><td class=\"nt-cell-blue\"><p>Unlike registered land (where entries are against the title number), land charges are registered against the full name of the estate owner at the time of creation (s 3(1) LCA 1972). An incorrect name (even a shortened version) makes the registration a nullity (Diligent Finance v Alleyne). Always check the name against the title deeds.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Equitable interests pre-1926: doctrine of notice still applies</strong></span></p></td><td><p>The Land Charges Act 1972 system only applies to interests created AFTER 1925. Equitable easements and restrictive covenants created before 1926 cannot be protected as land charges \u2014 the old doctrine of notice still governs them. This is a frequently overlooked exception.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Actual occupation: timing matters for para 2</strong></span></p></td><td class=\"nt-cell-blue\"><p>Thompson v Foy: the person must be in actual occupation at the time of the disposition (execution of transfer deed) and potentially also at the time of registration. A person who moves out between exchange and completion may lose their overriding interest. Always check the chronology.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>A notice on the register does not guarantee the interest is valid</strong></span></p></td><td><p>Entry of a notice under s 32 LRA 2002 does not confirm that the interest has been properly created or is valid. It only means that IF the interest has been validly created, it will bind a subsequent purchaser. The validity of the underlying interest must be assessed separately.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Sch 3 para 2 exceptions: both conditions of (c) must be met</strong></span></p></td><td class=\"nt-cell-blue\"><p>Para 2(c) exception requires BOTH: (i) occupation not obvious on reasonably careful inspection AND (ii) purchaser had no actual knowledge. If either condition fails, the exception does not apply and the interest remains overriding. Do not apply the exception on the basis of one condition alone.</p></td></tr></tbody></table></div>"
      }

    "Co-ownership": [
      {
        "id": "co-ownership-notes",
        "title": "W7: Co-ownership",
        "content": "<p><span class=\"nt-txt-navy\"><strong>CO-OWNERSHIP \u2014 COMPREHENSIVE REVISION NOTES</strong></span></p>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>1. Structured Topic Overview</strong></span></h3>\n<p>Co-ownership analysis follows a clear logical sequence in exam answers:</p>\n<p><span class=\"nt-txt-navy\"><strong>STAGE 1 \u2014 TRUST OF LAND</strong></span></p>\n<ul class=\"notes-list\"><li>Concurrent co-ownership always imposes a trust of land (TOLATA 1996 s 1)</li><li>Legal title: held by trustees; equitable/beneficial title: held by beneficiaries</li><li>Express trust: evidenced in writing, signed by declarant(s) (LPA 1925 s 53(1)(b))</li><li>Implied trust: no formalities (s 53(2) LPA) \u2014 resulting trust (financial contribution); constructive trust (unconscionability)</li></ul>\n<p><span class=\"nt-txt-navy\"><strong>STAGE 2 \u2014 JOINT TENANCY OR TENANCY IN COMMON?</strong></span></p>\n<ul class=\"notes-list\"><li>Legal title: ALWAYS joint tenancy (max 4 trustees, must be sui juris); cannot be severed (LPA 1925 s 36(2))</li><li>Equitable title: can be JT (four unities + no declaration of TiC) or TiC (any unity missing save possession; or express declaration; or presumption of TiC)</li><li>JT: right of survivorship; entire interest passes automatically on death \u2014 not affected by will or intestacy (Re Caines deceased [1978])</li><li>TiC: each has distinct but undivided share; survivorship does NOT apply; share passes under will or intestacy</li></ul>\n<p><span class=\"nt-txt-navy\"><strong>STAGE 3 \u2014 SEVERANCE (equitable JT \u2192 </strong></span><span class=\"nt-txt-navy\"><strong>TiC</strong></span><span class=\"nt-txt-navy\"><strong>)</strong></span></p>\n<ul class=\"notes-list\"><li>Must occur in lifetime (will has no effect: Re Caines)</li><li>(a) Notice in writing (s 36(2) LPA): must show unequivocal and immediate intention to sever; served when delivered, not when read (Kinch v Bullard)</li><li>(b) Other acts or things (Williams v Hensman modes): unilateral act (total/partial/involuntary alienation); mutual agreement; mutual conduct</li></ul>\n<p><span class=\"nt-txt-navy\"><strong>STAGE 4 \u2014 DISPUTES: TOLATA 1996</strong></span></p>\n<ul class=\"notes-list\"><li>S 14: anyone with interest may apply for order (sale; occupation; nature/extent of interest); court CANNOT order one beneficiary to buy out another</li><li>S 15: factors \u2014 (a) creators&#x27; intentions; (b) purpose of trust; (c) welfare of minors; (d) interests of secured creditors</li><li>Secured creditor interest (s 15(1)(d)) typically given greatest weight in practice (Bank of Ireland v Bell; Putnam v Taylor)</li><li>Court sale order = automatic overreaching event \u2014 trust interest moves to sale proceeds</li></ul>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>2. Summary Revision Tables</strong></span></h3>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 1 \u2014 Key Definitions</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Term</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Definition</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Source</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Co-ownership</strong></span></p></td><td><p>Two or more people own the same estate in the same piece of land at the same time; all entitled to possession of the whole (unity of possession)</p></td><td><p>TOLATA 1996</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Trust of land</strong></span></p></td><td class=\"nt-cell-blue\"><p>Imposed whenever land is co-owned; separates legal title (trustees) from equitable title (beneficiaries)</p></td><td class=\"nt-cell-blue\"><p>TOLATA 1996 s 1</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Joint tenancy (JT)</strong></span></p></td><td><p>All co-owners form one single entity; own the whole collectively; right of survivorship applies; requires all four unities</p></td><td><p>General law</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Tenancy in common (</strong></span><span class=\"nt-txt-blue\"><strong>TiC</strong></span><span class=\"nt-txt-blue\"><strong>)</strong></span></p></td><td class=\"nt-cell-blue\"><p>Each co-owner has distinct but undivided share; only unity of possession required; no right of survivorship; share passes under will/intestacy</p></td><td class=\"nt-cell-blue\"><p>General law</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Right of survivorship (ius </strong></span><span class=\"nt-txt-blue\"><strong>accrescendi</strong></span><span class=\"nt-txt-blue\"><strong>)</strong></span></p></td><td><p>On death of JT, their interest accrues automatically to surviving JTs; operates immediately on death; unaffected by will</p></td><td><p>Re Caines deceased [1978]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Sui juris</strong></span></p></td><td class=\"nt-cell-blue\"><p>Of full age (18+) and sound mind \u2014 legal title trustees must be sui juris</p></td><td class=\"nt-cell-blue\"><p>LPA 1925 ss 1(6) and 22</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Severance</strong></span></p></td><td><p>Converting an equitable JT interest into a TiC; does not end co-ownership; changes the basis on which equitable title is held; must occur in lifetime</p></td><td><p>LPA 1925 s 36(2)</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Curtain principle</strong></span></p></td><td class=\"nt-cell-blue\"><p>Names of equitable owners do not appear on the register of title; nature of equitable holding is private</p></td><td class=\"nt-cell-blue\"><p>Land Registration</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Aliquot share</strong></span></p></td><td><p>Equal share based on number of JTs at time of severance \u2014 not based on contributions (Goodman v Gallant [1986])</p></td><td><p>Goodman v Gallant [1986]</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 2 \u2014 Joint Tenancy vs Tenancy in Common</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Feature</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Joint Tenancy</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Tenancy in Common</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Unities required</strong></span></p></td><td><p>All four unities: possession, interest, time, title</p></td><td><p>Unity of possession only (others may exist)</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Nature of holding</strong></span></p></td><td class=\"nt-cell-blue\"><p>One single entity \u2014 own the whole collectively</p></td><td class=\"nt-cell-blue\"><p>Distinct but undivided shares; e.g. 25% each</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Right of survivorship</strong></span></p></td><td><p>YES \u2014 ius accrescendi; unaffected by will</p></td><td><p>NO \u2014 share passes under will or intestacy</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Can be severed?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Yes \u2014 equitable JT only; legal JT cannot be severed (LPA s 36(2))</p></td><td class=\"nt-cell-blue\"><p>N/A \u2014 already TiC</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Legal title</strong></span></p></td><td><p>Must ALWAYS be held as JT (LPA s 36(2))</p></td><td><p>Legal title CANNOT be held as TiC</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Equitable title</strong></span></p></td><td class=\"nt-cell-blue\"><p>Can be JT or TiC \u2014 by express declaration or circumstance</p></td><td class=\"nt-cell-blue\"><p>Can be equitable TiC if unities or declaration support it</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Presumption</strong></span></p></td><td><p>Default where four unities exist and no declaration or words of TiC</p></td><td><p>Presumed where: business asset (Lake v Craddock); unequal purchase price of non-domestic property (Bull v Bull)</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 3 \u2014 Four Unities of Title</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Unity</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Requirement</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Notes</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Possession</strong></span></p></td><td><p>All entitled to possession of the whole; no co-owner has exclusive use of any part; REQUIRED for all co-ownership</p></td><td><p>Absence of possession unity = separate ownership not co-ownership</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Interest</strong></span></p></td><td class=\"nt-cell-blue\"><p>Same nature and duration of interest for each co-owner</p></td><td class=\"nt-cell-blue\"><p>Leases: same length, same obligations</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Time</strong></span></p></td><td><p>All interests vest at the same time (need not sign or occupy at same time)</p></td><td><p>AG Securities: staggered start dates = no unity of time</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Title</strong></span></p></td><td class=\"nt-cell-blue\"><p>All interests derive from the same document, or separate documents that are identical and interdependent</p></td><td class=\"nt-cell-blue\"><p>Antoniades: separate but identical interdependent documents = unity of title satisfied</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Effect if unity missing</strong></span></p></td><td><p>Missing interest/time/title \u2192 no JT; if unity of possession also missing \u2192 no co-ownership; can only be TiC if possession present</p></td><td><p>LPA s 36(2)</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 4 \u2014 Severance: Methods and Rules</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Method</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Key Cases</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Notice in writing (s 36(2) LPA)</strong></span></p></td><td><p>Must show unequivocal and irrevocable intention to sever immediately; served when delivered (not when read); can sever even if written for another purpose</p></td><td><p>Re Draper&#x27;s Conveyance [1969]: divorce petition seeking immediate sale = sufficient. Harris v Goddard [1983]: &quot;such order as may be just&quot; = not sufficient (future, not immediate)</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Service of notice</strong></span></p></td><td class=\"nt-cell-blue\"><p>Must be served on ALL equitable JTs; can be personal or by post; if posted and not returned undelivered = deemed served (s 196(3)/(4) LPA)</p></td><td class=\"nt-cell-blue\"><p>Kinch v Bullard [1999]: notice served when delivered to home; destruction of letter had no effect</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Unilateral act \u2014 Total alienation</strong></span></p></td><td><p>Permanent disposal of equitable interest by sale or gift</p></td><td><p>Act itself severs; other JTs need not know or consent</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Unilateral act \u2014 Partial alienation</strong></span></p></td><td class=\"nt-cell-blue\"><p>Temporary disposal by mortgage or lease; interest returns unencumbered when paid off/expires</p></td><td class=\"nt-cell-blue\"><p>First National Security v Hegarty [1985]: forged mortgage = mortgage on husband&#x27;s equitable interest only; severs his share</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Unilateral act \u2014 Involuntary alienation</strong></span></p></td><td><p>Bankruptcy \u2014 declared by court against joint tenant&#x27;s will</p></td><td><p>Severs bankrupt&#x27;s equitable share</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Mutual agreement</strong></span></p></td><td class=\"nt-cell-blue\"><p>All equitable JTs agree one person&#x27;s interest is separate; need not be a specifically enforceable contract; significance is evidence of common intention to sever</p></td><td class=\"nt-cell-blue\"><p>Burgess v Rawnsley [1975]; Hunter v Babbage [1995]: draft agreement showing separate shares suffices</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Mutual conduct</strong></span></p></td><td><p>Course of dealing showing interests are mutually treated as separate; falls short of full agreement; difficult to prove</p></td><td><p>Davis v Smith [2011]; Dunbabin v Dunbabin [2022]: mirror wills inconsistent with survivorship = severance. Gore and Snell [1990]: negotiations alone insufficient</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Effect of severance</strong></span></p></td><td class=\"nt-cell-blue\"><p>Severing JT takes an equal aliquot share (1/n where n = number of JTs); other JTs continue as JTs with each other; only both affected if only two JTs</p></td><td class=\"nt-cell-blue\"><p>Goodman v Gallant [1986]</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 5 \u2014 TOLATA 1996 s 15 Factors for Dispute Resolution</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Factor</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule / Application</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Key Cases</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>s 15(1)(a): Creators&#x27; intentions</strong></span></p></td><td><p>Only applies to expressly created lifetime or will trusts; does NOT apply to everyday co-ownership situations</p></td><td><p>\u2014</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>s 15(1)(b): Purpose of trust</strong></span></p></td><td class=\"nt-cell-blue\"><p>Court assesses original purpose and whether it is continuing; if still being fulfilled \u2192 weighs AGAINST sale</p></td><td class=\"nt-cell-blue\"><p>Re Evers&#x27; Trust [1980]: family home still usable = refused sale. Jones v Challenger [1961]: wife moved out, joint purpose ended = sale ordered</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>s 15(1)(c): Welfare of minors</strong></span></p></td><td><p>Continuity of living arrangements for minors is a priority; more weight to younger children; less weight to older minors (e.g. 17 yr old)</p></td><td><p>Fred Perry v Genis [2015]: children&#x27;s education disrupted but sale still ordered</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>s 15(1)(d): Secured creditor interests</strong></span></p></td><td class=\"nt-cell-blue\"><p>Treated with greater weight than other factors in practice; no presumption for or against sale (Mortgage Corp v Shaire [2001]); recent cases favour creditor strongly</p></td><td class=\"nt-cell-blue\"><p>Bank of Ireland v Bell [2001]; Putnam v Taylor [2009]; Fred Perry v Genis [2015]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>s 15(3): Wishes of adult beneficiaries</strong></span></p></td><td><p>Court has regard to wishes of beneficiaries of full age; if dispute, majority view prevails (by value of combined interests); irrespective of value of interest</p></td><td><p>\u2014</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Court&#x27;s discretion</strong></span></p></td><td class=\"nt-cell-blue\"><p>All relevant factors must be considered equally; court cannot pick and choose; orders available: sale; postponed sale; occupation; nature/extent of interest; CANNOT order buy-out</p></td><td class=\"nt-cell-blue\"><p>TOLATA 1996 s 14</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 6 \u2014 Leading Cases </strong></span><span class=\"nt-txt-blue\"><strong>at a Glance</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Case</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Topic</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Core Principle</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Re Caines deceased [1978]</strong></span></p></td><td><p>Survivorship / will</p></td><td><p>Survivorship operates immediately on death; will has no effect on JT interest; any attempted testamentary provision of JT share = void</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Pink v Lawrence [1976]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Equitable title \u2014 express declaration</p></td><td class=\"nt-cell-blue\"><p>Express declaration of TiC prevails over the four unities \u2014 parties&#x27; express intention governs equitable holding</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Lake v Craddock [1732]</strong></span></p></td><td><p>Presumption of TiC</p></td><td><p>Where land is a business/commercial asset, rebuttable presumption of TiC in equity</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Bull v Bull [1955]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Presumption of TiC</p></td><td class=\"nt-cell-blue\"><p>Unequal contributions to purchase price of non-domestic property \u2192 presumption of TiC in equity</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Goodman v Gallant [1986]</strong></span></p></td><td><p>Effect of severance</p></td><td><p>Severance gives severing JT an equal aliquot share based on number of JTs at time of severance, not based on contributions</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Re Draper&#x27;s Conveyance [1969]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Severance by notice</p></td><td class=\"nt-cell-blue\"><p>Divorce petition seeking immediate sale = unequivocal intention to sever; severance occurred</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Harris v Goddard [1983]</strong></span></p></td><td><p>Severance by notice</p></td><td><p>&quot;Such order as may be just&quot; in divorce petition = not unequivocal; relates to future not immediate severance; no severance</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Kinch v Bullard [1999]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Service of notice</p></td><td class=\"nt-cell-blue\"><p>Notice served when delivered to home; subsequent destruction of letter had no effect; severance already occurred</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>First National Security v Hegarty [1985]</strong></span></p></td><td><p>Unilateral act \u2014 mortgage</p></td><td><p>Forged mortgage on entire property ineffective at law; treated as mortgage of husband&#x27;s equitable interest only; severed his share</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Burgess v Rawnsley [1975]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Mutual agreement / conduct</p></td><td class=\"nt-cell-blue\"><p>Agreement to sell one JT&#x27;s interest suffices; significance is evidence of common intention; does not need to be enforceable contract</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Hunter v Babbage [1995]</strong></span></p></td><td><p>Mutual agreement</p></td><td><p>Draft agreed consent order showing separate shares = severance by mutual agreement; need not be finalised</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Gore and Snell [1990]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Mutual conduct</p></td><td class=\"nt-cell-blue\"><p>Negotiations alone insufficient; there was never a point both parties treated interests as separate</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Davis v Smith [2011]</strong></span></p></td><td><p>Mutual conduct</p></td><td><p>Ongoing negotiations showing both parties treating interests as separate shares throughout = severance by mutual conduct</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Dunbabin</strong></span><span class=\"nt-txt-blue\"><strong> v </strong></span><span class=\"nt-txt-blue\"><strong>Dunbabin</strong></span><span class=\"nt-txt-blue\"><strong> [2022]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Mutual conduct</p></td><td class=\"nt-cell-blue\"><p>Making of mirror wills with provisions inconsistent with survivorship = mutual agreement/course of mutual conduct amounting to severance</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Re Evers&#x27; Trust [1980]</strong></span></p></td><td><p>TOLATA s 15(b)</p></td><td><p>Family home still capable of being used as one \u2014 purpose continuing; sale order refused</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Jones v Challenger [1961]</strong></span></p></td><td class=\"nt-cell-blue\"><p>TOLATA s 15(b)</p></td><td class=\"nt-cell-blue\"><p>Wife moved out; joint purpose of family home no longer continuing \u2014 sale ordered</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Bank of Ireland v Bell [2001]</strong></span></p></td><td><p>TOLATA s 15(1)(d)</p></td><td><p>Creditor owed \u00a3300k with no payments for 8 yrs; minor nearly 18; family home purpose minimal \u2014 sale ordered; creditor interest prevailed</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Putnam and Sons v Taylor [2009]</strong></span></p></td><td class=\"nt-cell-blue\"><p>TOLATA s 15(1)(d)</p></td><td class=\"nt-cell-blue\"><p>Family home purpose continuing but wife had enough equity to buy smaller property outright \u2014 sale ordered</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Fred Perry v Genis [2015]</strong></span></p></td><td><p>TOLATA s 15(1)(d)</p></td><td><p>Commercial interest took precedence over residential security; children&#x27;s school disrupted but sale still ordered (postponed one year)</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Mortgage Corp v </strong></span><span class=\"nt-txt-blue\"><strong>Shaire</strong></span><span class=\"nt-txt-blue\"><strong> [2001]</strong></span></p></td><td class=\"nt-cell-blue\"><p>TOLATA s 15(1)(d)</p></td><td class=\"nt-cell-blue\"><p>No presumption for or against sale at outset; all factors must be considered; creditor&#x27;s interest is just one factor</p></td></tr></tbody></table></div>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>3. Flashcard Q&amp;A Pairs</strong></span></h3>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Question</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Answer</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What is always imposed when land is co-owned?</strong></span></p></td><td><p>A trust of land (TOLATA 1996 s 1). Legal title held by trustees; equitable/beneficial title held by beneficiaries. Separate legal and equitable ownership.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What are the formalities for an express trust of land?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Must be evidenced in writing and signed by the declarant(s) (LPA 1925 s 53(1)(b)). Implied trusts (resulting/constructive) require no formalities (s 53(2) LPA).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What are the rules for legal title in co-ownership?</strong></span></p></td><td><p>Maximum four legal owners (Trustee Act 1925 s 34(2)); all must be sui juris (full age and sound mind); must always be held as a joint tenancy \u2014 cannot be severed (LPA 1925 s 36(2)).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What are the four unities required for a joint tenancy?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Possession (entitled to the whole); Interest (same nature and duration); Time (interests vest simultaneously); Title (same document, or identical and interdependent documents). All four must be present for a JT.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What is the right of survivorship and when does it operate?</strong></span></p></td><td><p>Ius accrescendi: on death of a JT, their interest accrues automatically to the surviving JTs. Operates immediately on death \u2014 before any will can take effect. A will CANNOT dispose of a JT interest (Re Caines deceased [1978]).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>When is there a rebuttable presumption of tenancy in common in equity?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Where the land is a business asset (Lake v Craddock [1732]); or where the purchase price of non-domestic property was paid in unequal shares (Bull v Bull [1955]).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What is severance and can it apply to the legal title?</strong></span></p></td><td><p>Severance converts an equitable JT into a TiC. It can ONLY apply to the equitable title \u2014 never to the legal title (LPA 1925 s 36(2)). Must occur during the JT&#x27;s lifetime (a will cannot sever).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What is the test for a valid notice of severance?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Must demonstrate an unequivocal and irrevocable intention to sever the equitable joint tenancy IMMEDIATELY (not in the future). Re Draper&#x27;s: immediate sale required = sufficient. Harris v Goddard: &quot;such order as may be just&quot; = not sufficient.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>When is a notice in writing deemed served?</strong></span></p></td><td><p>When delivered to the last known place of abode or business of the joint tenant \u2014 the notice does not need to have been read. Kinch v Bullard: destruction of letter after delivery had no effect; severance had already occurred.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What are the three Williams v Hensman modes of severance?</strong></span></p></td><td class=\"nt-cell-blue\"><p>(1) Unilateral act by one JT on their own share (total alienation/sale; partial alienation/mortgage; involuntary/bankruptcy). (2) Mutual agreement of all JTs (need not be enforceable contract). (3) Mutual conduct (course of dealing showing interests treated as separate).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What is the effect of severance on the severing party&#x27;s share?</strong></span></p></td><td><p>They take an equal aliquot share: 1/n of the total where n = the number of JTs at the time of severance \u2014 NOT based on contributions (Goodman v Gallant [1986]). The remaining JTs continue to hold as JTs between themselves.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What did </strong></span><span class=\"nt-txt-blue\"><strong>Dunbabin</strong></span><span class=\"nt-txt-blue\"><strong> v </strong></span><span class=\"nt-txt-blue\"><strong>Dunbabin</strong></span><span class=\"nt-txt-blue\"><strong> [2022] decide about mirror wills?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Making of mirror wills with provisions inconsistent with survivorship (e.g. leaving the JT share to someone other than the other JT) can amount to mutual agreement or a course of mutual conduct sufficient to sever the equitable joint tenancy.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What orders can a court make under TOLATA 1996 s 14?</strong></span></p></td><td><p>Order for sale (can be postponed); order as to who occupies; order as to nature/extent of a beneficiary&#x27;s interest. The court CANNOT order one beneficiary to buy out another.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What </strong></span><span class=\"nt-txt-blue\"><strong>are</strong></span><span class=\"nt-txt-blue\"><strong> the s 15(1) TOLATA factors and which carries the most weight?</strong></span></p></td><td class=\"nt-cell-blue\"><p>(a) Creators&#x27; intentions (expressly created trusts only \u2014 NOT everyday co-ownership); (b) purpose of trust (still continuing? \u2014 Re Evers vs Jones v Challenger); (c) welfare of minors; (d) secured creditor interests. (d) carries greatest weight in practice (Bank of Ireland v Bell; Putnam v Taylor).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What happens when a court orders sale of co-owned land?</strong></span></p></td><td><p>A court sale order under TOLATA s 14 is an automatic overreaching event \u2014 the beneficiaries&#x27; interests in the land are transferred to an interest in the money paid on sale.</p></td></tr></tbody></table></div>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>4. Common Exam Pitfalls &amp; Tricky Distinctions</strong></span></h3>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Pitfall / Distinction</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Explanation</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Legal title CANNOT be held as tenancy in common \u2014 ever</strong></span></p></td><td><p>LPA 1925 s 36(2) is absolute: the legal title in co-owned land MUST be held as a joint tenancy. It cannot be severed to create a legal TiC. This simplifies legal title and avoids complications on death. Only the equitable title can be a TiC.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>A will CANNOT dispose of a joint tenant&#x27;s interest</strong></span></p></td><td class=\"nt-cell-blue\"><p>Survivorship operates immediately on death (Re Caines deceased [1978]). By the time the will takes effect, the interest has already accrued to the surviving JTs. Any provision in a will purporting to pass a JT interest is void. The only way to pass the share under a will is to sever the JT during lifetime.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Severance only in lifetime \u2014 &quot;mutual conduct&quot; is hard to prove</strong></span></p></td><td><p>Severance must happen inter vivos. Making a will does not sever (Re Caines). Mutual conduct requires that both parties treated their interests as separate throughout \u2014 mere negotiations are insufficient (Gore and Snell). The threshold is high: both must have treated themselves as having distinct shares (Davis v Smith; Dunbabin v Dunbabin: mirror wills crossed the threshold).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Goodman v Gallant: severance gives equal, not proportionate, share</strong></span></p></td><td class=\"nt-cell-blue\"><p>The severing JT takes 1/n of the equitable interest (n = number of JTs) \u2014 regardless of how much they contributed to the purchase price. This can be very significant on facts where one party paid much more than the other. Do not apply a contributions-based analysis to the post-severance share.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>s 15(1)(a) does NOT apply to everyday co-ownership</strong></span></p></td><td><p>The &quot;creators&#x27; intentions&quot; factor under s 15(1)(a) TOLATA only applies to expressly created lifetime trusts or will trusts, not to the implied trusts that arise automatically when people co-own their home. Do not apply this factor to a standard co-ownership dispute.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>TOLATA s 14: court cannot order a buy-out</strong></span></p></td><td class=\"nt-cell-blue\"><p>The court can order sale, postpone sale, regulate occupation, or determine the extent of interests \u2014 but it cannot order one co-owner to buy out another. If the parties want a buy-out, they must agree it themselves or rely on the sale proceeds.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Secured creditor interest and the &quot;purpose&quot; factor tension</strong></span></p></td><td><p>Where a property is still being used as a family home (purpose continuing), that weighs against sale. But recent case law (Bank of Ireland v Bell; Putnam v Taylor; Fred Perry v Genis) shows courts give significant weight to secured creditor interests, often overriding the continuing purpose and even welfare of minors. Always apply all s 15 factors, but signal the priority creditor interests have received.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Forged mortgage </strong></span><span class=\"nt-txt-blue\"><strong>severes</strong></span><span class=\"nt-txt-blue\"><strong> the forger&#x27;s equitable interest</strong></span></p></td><td class=\"nt-cell-blue\"><p>Where one JT fraudulently mortgages or sells the entire property, the attempted disposition of the whole is ineffective at law \u2014 but it is treated as a disposition of only the fraudulent JT&#x27;s equitable interest (First National Security v Hegarty). This severs their equitable share, creating a TiC between them and the other JTs.</p></td></tr></tbody></table></div>"
      }
