/td><td><p>Equity will not perfect an imperfect gift or trust. Transferor must do &quot;everything necessary&quot; using the correct method. If they fail, equity will not perfect the disposition or treat them as having used another method.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>What is the Re Rose principle?</p></td><td class=\"nt-cell-blue\"><p>If the transferor has done &quot;everything in their power&quot; to vest legal title, and used the correct method, equity treats the equitable interest as having passed. Transferor holds legal title on constructive trust pending registration.</p></td></tr>\n<tr><td><p>How does Mascall v Mascall extend Re Rose?</p></td><td><p>Transfer is irrevocable if the transferor puts the matter &quot;beyond their own control&quot; \u2013 e.g. by handing documents to the intended transferee. Does not need to have been sent to the registrar.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>What is the Pennington v Waine exception?</p></td><td class=\"nt-cell-blue\"><p>Equity will perfect an imperfect gift wherever it would be unconscionable for the donor to resile from it, even if the Re Rose conditions are not strictly met.</p></td></tr>\n<tr><td><p>What are the three conditions for Strong v Bird to apply?</p></td><td><p>(1) Intention to make an IMMEDIATE gift; (2) Intention continues UNCHANGED until donor&#x27;s death; (3) Intended donee becomes executor (or administrator \u2013 Re James) of donor&#x27;s estate.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>What are the three conditions for a valid donatio mortis causa?</p></td><td class=\"nt-cell-blue\"><p>(1) Gift in contemplation of IMMINENT death from an identifiable cause; (2) Conditional on death (revocable if donor recovers); (3) Donor delivers or parts with dominion over the property.</p></td></tr>\n<tr><td><p>What is an automatic resulting trust?</p></td><td><p>Arises where a transfer on trust is made but the express trust fails. Beneficial interest automatically results back to the settlor (or their estate). No rebuttal available.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>What is a presumed resulting trust and how is it rebutted?</p></td><td class=\"nt-cell-blue\"><p>Arises by presumption where property is gratuitously transferred or purchase money paid without consideration. Rebutted by evidence that the transferor actually intended to make a gift.</p></td></tr>\n<tr><td><p>What is the presumption of advancement?</p></td><td><p>In certain relationships (husband to wife; parent to child; in loco parentis), a gratuitous transfer is presumed to be an outright gift, displacing the presumption of resulting trust. Can itself be rebutted by contrary intention.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>Can a failed gift be treated as a self-declaration of trust?</p></td><td class=\"nt-cell-blue\"><p>NO (Milroy v Lord; Jones v Lock; Richards v Delbridge). The donor did not intend to take on the obligations of trusteeship and will not be treated as having done so.</p></td></tr>\n<tr><td><p>What is the effect of an incomplete constitution on the trust?</p></td><td><p>The trust is void \u2013 trust property is not vested in the trustee so there is no trust. Equity will not compel the settlor to complete the transfer (equity will not assist a volunteer).</p></td></tr></tbody></table></div>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Common Exam Pitfalls</strong></span></h2>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Pitfall</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Correct Position</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Treating a failed gift as a self-declaration of trust</strong></span></p></td><td class=\"nt-cell-blue\"><p>Milroy v Lord prevents this. A donor who fails to gift property is NOT treated as a trustee. They did not intend to take on the onerous obligations of trusteeship.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Confusing Re Rose and Pennington v Waine</strong></span></p></td><td><p>Re Rose requires the correct method AND doing everything within the transferor&#x27;s power. Pennington goes further: sufficient that it would be unconscionable to withdraw, even without meeting Re Rose conditions strictly.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Confusing Strong v Bird with </strong></span><span class=\"nt-txt-blue\"><strong>donatio</strong></span><span class=\"nt-txt-blue\"><strong> mortis causa</strong></span></p></td><td class=\"nt-cell-blue\"><p>Strong v Bird: donee becomes executor; gift perfected on testator&#x27;s death. DMC: gift conditional on death; delivery of dominion while alive; does not require donee to be executor.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Forgetting that a future intention does not satisfy Strong v Bird</strong></span></p></td><td><p>&quot;An intention of giving, not an intention to give&quot; is required (Re Freeland). A promise to give in the future does not satisfy Strong v Bird.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Applying presumption of advancement to wife \u2192 husband transfers</strong></span></p></td><td class=\"nt-cell-blue\"><p>Presumption of advancement does NOT apply from wife to husband, only from HUSBAND to WIFE (and parent to child; in loco parentis to minor child).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Confusing automatic and presumed resulting trusts</strong></span></p></td><td><p>AUTOMATIC: no rebuttal; arises automatically when transfer on trust fails. PRESUMED: arises by presumption in gratuitous transfer/purchase money scenarios; CAN be rebutted by evidence of gift intention.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Failing to check which asset type is involved for constitution</strong></span></p></td><td class=\"nt-cell-blue\"><p>The correct method for constituting varies by asset. Using the wrong method = incomplete constitution and trust is void. E.g. simply handing over share certificates \u2260 valid transfer of legal title in shares (Milroy v Lord).</p></td></tr></tbody></table></div>"
      }

        "id": "nature-of-land",
        "title": "W1: The Nature of Land",
        "content": "<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>THE NATURE OF LAND — COMPREHENSIVE REVISION NOTES</strong></span></h2>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>1. Structured Topic Overview</strong></span></h2>\n<p>W1 provides the conceptual foundation for all of land law. An examiner expects command of six interconnected themes:</p>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>THEME 1 — WHAT IS LAND? (THE PHYSICAL EXTENT)</strong></span></h3>\n<ul class=\"notes-list\">\n<li>Statutory definition: s 205(1)(ix) LPA 1925 — surface; buildings/parts of buildings; corporeal hereditaments (fixtures); incorporeal hereditaments (proprietary rights with no physical substance)</li>\n<li>Maxim: cuius est solum eius est usque coelum et ad inferos — ownership extends upwards and downwards from the surface</li>\n<li>Airspace: upper (beyond ordinary use/enjoyment — Bernstein v Skyviews) vs lower (all structures that invade = trespass — Kelsen; Anchor Brewhouse)</li>\n<li>Ground below: everything beneath the surface passes with the land (Grigsby v Melville); exceptions: Crown owns gold/silver mines; Treasure Act 1996; Coal Act 1938; deep drilling >300m (Infrastructure Act 2015 s 43)</li>\n</ul>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>THEME 2 — FIXTURES AND CHATTELS</strong></span></h3>\n<ul class=\"notes-list\">\n<li>Maxim: quicquid plantatur solo, solo cedit — whatever is attached to the land becomes part of it</li>\n<li>Two-part Holland v Hodgson [1872] test: (1) degree of annexation; (2) purpose of annexation (purpose prevails — Berkley v Poulett)</li>\n<li>Purpose test: if annexed for better enjoyment of the chattel as a chattel → chattel; if to enhance the land/building → fixture</li>\n<li>Practical consequence: s 62 LPA 1925 — conveyance automatically passes all fixtures unless specifically excluded (s 62(4)); complete TA10 fixtures form to avoid disputes</li>\n</ul>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>THEME 3 — PROPRIETARY vs PERSONAL RIGHTS</strong></span></h3>\n<ul class=\"notes-list\">\n<li>Proprietary rights: enforceable in rem (recover use/possession); binding on third parties; fixed closed list</li>\n<li>Personal rights: enforce only in personam for damages against original grantor; cannot bind third parties (e.g. licence)</li>\n<li>Nature, creation and protection all determine whether a right is proprietary or merely personal</li>\n</ul>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>THEME 4 — LEGAL ESTATES AND INTERESTS (LPA 1925)</strong></span></h3>\n<ul class=\"notes-list\">\n<li>Two legal estates (s 1(1)): fee simple absolute in possession (freehold); term of years absolute (leasehold)</li>\n<li>Legal interests (s 1(2)): easements (correct duration); mortgages (s 1(2)(c)); rights of entry (s 1(2)(e))</li>\n<li>Equitable interests (s 1(3)): restrictive covenants; estate contracts; trust interests; easements for uncertain term</li>\n<li>Key distinction: legal interests give rights/damages as of right; equitable remedies are discretionary</li>\n</ul>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>THEME 5 — LAND CONTRACTS AND ESTATE CONTRACTS</strong></span></h3>\n<ul class=\"notes-list\">\n<li>Formalities: s 2 LP(MP)A 1989 — in writing; all expressly agreed terms; signed by both parties</li>\n<li>Variations must also comply with s 2 (McCausland v Duncan Lawrie Ltd [1997])</li>\n<li>Proprietary effect: Walsh v Lonsdale [1882] — binding contract + specific performance available = equitable interest in land</li>\n<li>Types: contract to buy land; option; right of pre-emption; failed legal estate/interest</li>\n<li>Equitable remedies: specific performance; injunction; damages — all discretionary (clean hands: Coatsworth v Johnson)</li>\n</ul>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>THEME 6 — LAND REGISTRATION: PRINCIPLES AND STRUCTURE</strong></span></h3>\n<ul class=\"notes-list\">\n<li>Key legislation: LPA 1925 (substantive rights); LRA 2002 (registration system); LP(MP)A 1989 (formalities)</li>\n<li>Three principles of registration: Mirror (register reflects all interests); Curtain (trust interests kept off title); Insurance (state indemnity for errors — Sch 8 para 1 LRA 2002)</li>\n<li>Three parts of a registered title: Property register (description, estate type, benefits); Proprietorship register (owner, restrictions, class of title); Charges register (burdens, mortgages, covenants)</li>\n<li>Transfer of freehold: 3 stages — exchange (s 2 LP(MP)A 1989); deed (s 52(1) LPA + s 1 LP(MP)A 1989); registration (s 27 LRA 2002 — title does not pass until registered)</li>\n<li>Compulsory first registration triggers (s 4 LRA): sale; mortgage; gift; assent; lease >7 yrs; assignment of unregistered lease >7 yrs to run</li>\n</ul>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>2. Summary Revision Tables</strong></span></h2>\n<h4 class=\"notes-h4\">TABLE 1 — Key Definitions & Statutory Provisions</h4>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\">\n<thead><tr>\n<th class=\"nt-hdr-blue\"><p><strong>Term</strong></p></th>\n<th class=\"nt-hdr-blue\"><p><strong>Definition / Provision</strong></p></th>\n<th class=\"nt-hdr-blue\"><p><strong>Source</strong></p></th>\n</tr></thead>\n<tbody>\n<tr>\n<td><p>Land (statutory definition)</p></td>\n<td><p>\\\"The surface, buildings or parts of buildings, other corporeal hereditaments (fixtures), and incorporeal hereditaments (the benefit of proprietary rights with no physical substance)\\\"</p></td>\n<td><p>LPA 1925 s 205(1)(ix)</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Corporeal hereditament</p></td>\n<td class=\"nt-cell-blue\"><p>Tangible physical objects fixed to land (fixtures); pass with the land on sale</p></td>\n<td class=\"nt-cell-blue\"><p>LPA 1925 s 205(1)(ix)</p></td>\n</tr>\n<tr>\n<td><p>Incorporeal hereditament</p></td>\n<td><p>Proprietary rights benefitting land with no physical substance; e.g. easements, covenants</p></td>\n<td><p>LPA 1925 s 205(1)(ix)</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Estate in land</p></td>\n<td class=\"nt-cell-blue\"><p>A proprietary right of possession; determines how long the right of possession can be enjoyed</p></td>\n<td class=\"nt-cell-blue\"><p>LPA 1925 s 1(1)</p></td>\n</tr>\n<tr>\n<td><p>Fee simple absolute in possession</p></td>\n<td><p>Freehold estate: highest possible estate; inheritable (\\\"fee\\\"); by any heir (\\\"simple\\\"); not determinable (\\\"absolute\\\"); current enjoyment (\\\"in possession\\\")</p></td>\n<td><p>LPA 1925 s 1(1)(a)</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Term of years absolute</p></td>\n<td class=\"nt-cell-blue\"><p>Leasehold estate: grant of possession for a certain defined duration; can be sublease of lesser duration</p></td>\n<td class=\"nt-cell-blue\"><p>LPA 1925 s 1(1)(b)</p></td>\n</tr>\n<tr>\n<td><p>Freehold reversion</p></td>\n<td><p>The residue of the freehold estate after the grant of a lease; reverts to freeholder on lease expiry</p></td>\n<td><p>General law</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Commonhold</p></td>\n<td class=\"nt-cell-blue\"><p>Created out of a freehold registered estate; designed for flat owners; managed by a commonhold association (the freehold owner); alternative to long lease</p></td>\n<td class=\"nt-cell-blue\"><p>Commonhold and Leasehold Reform Act 2002</p></td>\n</tr>\n<tr>\n<td><p>Proprietary right</p></td>\n<td><p>Enforceable in rem; can recover use/possession of land; binding on third parties; must satisfy nature, creation and protection requirements</p></td>\n<td><p>General law</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Personal right</p></td>\n<td class=\"nt-cell-blue\"><p>Enforceable in personam for damages only; cannot bind third parties; e.g. a licence</p></td>\n<td class=\"nt-cell-blue\"><p>General law</p></td>\n</tr>\n<tr>\n<td><p>Fixture</p></td>\n<td><p>Chattel annexed to land that becomes part of the land; passes automatically on sale under s 62 LPA 1925</p></td>\n<td><p>Holland v Hodgson [1872]</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Chattel</p></td>\n<td class=\"nt-cell-blue\"><p>Moveable item of personal property; does not pass with land on sale</p></td>\n<td class=\"nt-cell-blue\"><p>General law</p></td>\n</tr>\n<tr>\n<td><p>Bona vacantia</p></td>\n<td><p>Land that reverts to the Crown where the freehold owner dies without heirs and without a will</p></td>\n<td><p>General law</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Estate contract</p></td>\n<td class=\"nt-cell-blue\"><p>Equitable proprietary interest arising from a binding contract to create or transfer a legal estate or interest, where specific performance is available</p></td>\n<td class=\"nt-cell-blue\"><p>Walsh v Lonsdale [1882]</p></td>\n</tr>\n</tbody>\n</table></div>\n<h4 class=\"notes-h4\">TABLE 2 — Proprietary vs Personal Rights</h4>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\">\n<thead><tr>\n<th class=\"nt-hdr-blue\"><p><strong>Feature</strong></p></th>\n<th class=\"nt-hdr-blue\"><p><strong>Proprietary Right</strong></p></th>\n<th class=\"nt-hdr-blue\"><p><strong>Personal Right</strong></p></th>\n</tr></thead>\n<tbody>\n<tr>\n<td><p>Enforcement</p></td>\n<td><p>In rem — can recover use or possession of the land itself</p></td>\n<td><p>In personam — damages only for breach</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Third party binding?</p></td>\n<td class=\"nt-cell-blue\"><p>Yes — enforceable against new owners of burdened land (if properly protected)</p></td>\n<td class=\"nt-cell-blue\"><p>No — only against the original grantor</p></td>\n</tr>\n<tr>\n<td><p>Remedies</p></td>\n<td><p>Wide range including damages as of right; equitable remedies may also be available</p></td>\n<td><p>Damages only (as of right)</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Examples</p></td>\n<td class=\"nt-cell-blue\"><p>Freehold; leasehold; easement; mortgage; restrictive covenant; estate contract; trust interest</p></td>\n<td class=\"nt-cell-blue\"><p>Licence; contractual permission; purely personal agreement</p></td>\n</tr>\n<tr>\n<td><p>Determined by</p></td>\n<td><p>Nature of right; compliance with creation formalities; protection on the register</p></td>\n<td><p>Absence of any of the proprietary requirements</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Fixed list?</p></td>\n<td class=\"nt-cell-blue\"><p>Yes — closed list of recognised proprietary rights across statute and case law</p></td>\n<td class=\"nt-cell-blue\"><p>No — anything not on the list is personal</p></td>\n</tr>\n</tbody>\n</table></div>\n<h4 class=\"notes-h4\">TABLE 3 — Legal Estates and Interests: LPA 1925 s 1</h4>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\">\n<thead><tr>\n<th class=\"nt-hdr-blue\"><p><strong>Right</strong></p></th>\n<th class=\"nt-hdr-blue\"><p><strong>Rule / Detail</strong></p></th>\n<th class=\"nt-hdr-blue\"><p><strong>Statutory Basis</strong></p></th>\n</tr></thead>\n<tbody>\n<tr>\n<td><p>LEGAL ESTATES</p></td>\n<td><p></p></td>\n<td><p></p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Fee simple absolute in possession (freehold)</p></td>\n<td class=\"nt-cell-blue\"><p>Highest estate; inheritable by any heir; not determinable; current enjoyment; uncertain duration</p></td>\n<td class=\"nt-cell-blue\"><p>s 1(1)(a) LPA 1925</p></td>\n</tr>\n<tr>\n<td><p>Term of years absolute (leasehold)</p></td>\n<td><p>Fixed or periodic certain duration; can be daily, weekly, monthly, yearly or longer; sub-leases possible</p></td>\n<td><p>s 1(1)(b) LPA 1925</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>LEGAL INTERESTS</p></td>\n<td class=\"nt-cell-blue\"><p></p></td>\n<td class=\"nt-cell-blue\"><p></p></td>\n</tr>\n<tr>\n<td><p>Easement (legal)</p></td>\n<td><p>Proprietary right to use another's land; must be granted for equivalent of freehold or leasehold duration</p></td>\n<td><p>s 1(2)(a) LPA 1925</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Mortgage (legal)</p></td>\n<td class=\"nt-cell-blue\"><p>Bundle of rights over property as security for a loan; granted by borrower over legal estate; must be created by deed + registered</p></td>\n<td class=\"nt-cell-blue\"><p>s 1(2)(c) LPA 1925</p></td>\n</tr>\n<tr>\n<td><p>Right of entry</p></td>\n<td><p>Landlord's right to re-enter premises on tenant breach (forfeiture); or rentcharge owner's right to hold land if payment not made</p></td>\n<td><p>s 1(2)(e) LPA 1925</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>EQUITABLE INTERESTS (s 1(3))</p></td>\n<td class=\"nt-cell-blue\"><p>All other interests not listed in s 1(2); recognised proprietary rights but only in equity</p></td>\n<td class=\"nt-cell-blue\"><p>s 1(3) LPA 1925</p></td>\n</tr>\n<tr>\n<td><p>Restrictive covenant</p></td>\n<td><p>Promise not to do something on the burdened land; equitable interest; protects amenity of dominant land</p></td>\n<td><p>s 1(3) LPA 1925</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Estate contract</p></td>\n<td class=\"nt-cell-blue\"><p>Contractual right to a legal estate; specific performance + valid s 2 LP(MP)A 1989 document required</p></td>\n<td class=\"nt-cell-blue\"><p>Walsh v Lonsdale [1882]</p></td>\n</tr>\n<tr>\n<td><p>Trust interest</p></td>\n<td><p>Equitable beneficial interest; trustee holds legal title; beneficiary holds equitable interest; protected by restriction on register</p></td>\n<td><p>LPA 1925; TOLATA 1996</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Equitable easement</p></td>\n<td class=\"nt-cell-blue\"><p>Easement granted for an uncertain duration; or failed legal easement; equitable only</p></td>\n<td class=\"nt-cell-blue\"><p>s 1(3) LPA 1925</p></td>\n</tr>\n</tbody>\n</table></div>\n<h4 class=\"notes-h4\">TABLE 4 — Physical Extent of Land: Airspace and Ground Below</h4>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\">\n<thead><tr>\n<th class=\"nt-hdr-blue\"><p><strong>Area</strong></p></th>\n<th class=\"nt-hdr-blue\"><p><strong>Rule</strong></p></th>\n<th class=\"nt-hdr-blue\"><p><strong>Key Authority / Statute</strong></p></th>\n</tr></thead>\n<tbody>\n<tr>\n<td><p>General maxim</p></td>\n<td><p>Cuius est solum eius est usque coelum et ad inferos — ownership extends upward to the heavens and downward to the depths</p></td>\n<td><p>Latin maxim</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Upper airspace</p></td>\n<td class=\"nt-cell-blue\"><p>Owner has NO greater right than any member of the public; overflying aircraft does not constitute trespass; immunity from trespass for innocent aircraft flights</p></td>\n<td class=\"nt-cell-blue\"><p>Bernstein of Leigh v Skyviews [1978]; Civil Aviation Act 1982 s 76(1)</p></td>\n</tr>\n<tr>\n<td><p>Lower airspace</p></td>\n<td><p>That portion necessary for ordinary use and enjoyment of the land; ANY intrusion (even minor) = trespass regardless of whether damage caused</p></td>\n<td><p>Kelsen v Imperial Tobacco [1957]; Anchor Brewhouse v Berkley House [1987]; Laiqat v Majid [2005]</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Ground below — general rule</p></td>\n<td class=\"nt-cell-blue\"><p>Conveyance carries everything beneath the surface; cellar under claimant's property belongs to claimant even if accessed only from neighbour's land</p></td>\n<td class=\"nt-cell-blue\"><p>Grigsby v Melville [1974]</p></td>\n</tr>\n<tr>\n<td><p>Exception: minerals</p></td>\n<td><p>All mines of gold and silver belong to the Crown</p></td>\n<td><p>Prerogative rights / case law</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Exception: treasure</p></td>\n<td class=\"nt-cell-blue\"><p>Treasure (as defined) belongs to the Crown</p></td>\n<td class=\"nt-cell-blue\"><p>Treasure Act 1996</p></td>\n</tr>\n<tr>\n<td><p>Exception: coal</p></td>\n<td><p>Coal beneath land belongs to the Coal Authority</p></td>\n<td><p>Coal Act 1938</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Exception: deep drilling</p></td>\n<td class=\"nt-cell-blue\"><p>No trespass at depths below 300 metres; no consent of freehold owner required for deep-level drilling</p></td>\n<td class=\"nt-cell-blue\"><p>Infrastructure Act 2015 s 43</p></td>\n</tr>\n</tbody>\n</table></div>\n<h4 class=\"notes-h4\">TABLE 5 — Fixtures vs Chattels: Holland v Hodgson [1872] Test</h4>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\">\n<thead><tr>\n<th class=\"nt-hdr-blue\"><p><strong>Part of Test</strong></p></th>\n<th class=\"nt-hdr-blue\"><p><strong>Rule</strong></p></th>\n<th class=\"nt-hdr-blue\"><p><strong>Key Cases</strong></p></th>\n</tr></thead>\n<tbody>\n<tr>\n<td><p>1. Degree of annexation</p></td>\n<td><p>How firmly is the object fixed to the land or building? The more firmly fixed, the more likely it is a fixture — even if fairly easy to remove, character is prima facie a fixture</p></td>\n<td><p>Holland v Hodgson [1872]</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>2. Purpose of annexation (prevails)</p></td>\n<td class=\"nt-cell-blue\"><p>Was the annexation for the more convenient use or enjoyment of the chattel as a chattel, or to enhance the building or land? Purpose overrides degree of annexation</p></td>\n<td class=\"nt-cell-blue\"><p>Berkley v Poulett [1977]</p></td>\n</tr>\n<tr>\n<td><p>Purpose → chattel</p></td>\n<td><p>If annexed for better enjoyment of the chattel itself as a moveable object → remains a chattel</p></td>\n<td><p>Leigh v Taylor [1902]: tapestries on battens against wall = chattel</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Purpose → fixture</p></td>\n<td class=\"nt-cell-blue\"><p>If annexed to enhance the land or form part of the architectural design → fixture, even without firm fixing</p></td>\n<td class=\"nt-cell-blue\"><p>D'Eyncourt v Gregory [1866]: statues incorporated into architectural design = fixtures</p></td>\n</tr>\n<tr>\n<td><p>Cannot be removed without destruction</p></td>\n<td><p>If a chattel cannot be removed without destruction or demolition → deemed intended to form part of the land → fixture</p></td>\n<td><p>Elitestone Ltd v Morris [1997]</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Practical consequence — s 62 LPA 1925</p></td>\n<td class=\"nt-cell-blue\"><p>Conveyance of land automatically passes all fixtures; seller may not remove after exchange of contracts; use TA10 form to agree inclusions/exclusions</p></td>\n<td class=\"nt-cell-blue\"><p>LPA 1925 ss 62 and 62(4)</p></td>\n</tr>\n</tbody>\n</table></div>\n<h4 class=\"notes-h4\">TABLE 6 — Fixtures and Chattels: Cases at a Glance</h4>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\">\n<thead><tr>\n<th class=\"nt-hdr-blue\"><p><strong>Case</strong></p></th>\n<th class=\"nt-hdr-blue\"><p><strong>Outcome</strong></p></th>\n<th class=\"nt-hdr-blue\"><p><strong>Reason</strong></p></th>\n</tr></thead>\n<tbody>\n<tr>\n<td><p>Holland v Hodgson [1872]</p></td>\n<td><p>Looms = fixtures; loose blocks = chattels</p></td>\n<td><p>Looms bolted to floor of mill (degree + purpose: part of mill); individual blocks merely resting on ground with no particular purpose</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Berkley v Poulett [1977]</p></td>\n<td class=\"nt-cell-blue\"><p>Statute in grounds = chattel</p></td>\n<td class=\"nt-cell-blue\"><p>Purpose: enjoyed as a chattel in its own right; purpose prevails over degree of annexation even if embedded</p></td>\n</tr>\n<tr>\n<td><p>D'Eyncourt v Gregory [1866]</p></td>\n<td><p>Statues etc. = fixtures</p></td>\n<td><p>Incorporated into architectural design of building — part of architectural whole even without firm physical fixing</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Leigh v Taylor [1902]</p></td>\n<td class=\"nt-cell-blue\"><p>Tapestries = chattels</p></td>\n<td class=\"nt-cell-blue\"><p>Fixed to wall for better enjoyment as tapestries, not to enhance the building; purpose = chattel</p></td>\n</tr>\n<tr>\n<td><p>Elitestone Ltd v Morris [1997]</p></td>\n<td><p>Bungalow = fixture/part of land</p></td>\n<td><p>Could not be removed without demolition — deemed intended to form part of the land</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Botham v TSB Bank [1996]</p></td>\n<td class=\"nt-cell-blue\"><p>Carpets, light fittings etc. analysed</p></td>\n<td class=\"nt-cell-blue\"><p>Applied both limbs: method and degree of annexation; object and purpose of annexation — some fixtures, some chattels</p></td>\n</tr>\n</tbody>\n</table></div>\n<h4 class=\"notes-h4\">TABLE 7 — Transfer of a Freehold Estate: Three Stages</h4>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\">\n<thead><tr>\n<th class=\"nt-hdr-blue\"><p><strong>Stage</strong></p></th>\n<th class=\"nt-hdr-blue\"><p><strong>Requirements</strong></p></th>\n<th class=\"nt-hdr-blue\"><p><strong>Key Provisions / Effect</strong></p></th>\n</tr></thead>\n<tbody>\n<tr>\n<td><p>1. Exchange of contracts</p></td>\n<td><p>In writing; contains all expressly agreed terms; signed by both parties; usually deposit paid at this stage</p></td>\n<td><p>LP(MP)A 1989 s 2; parties are legally committed from this point; any variation of a material term must also comply with s 2 (McCausland v Duncan Lawrie [1997])</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>2. Completion — Deed</p></td>\n<td class=\"nt-cell-blue\"><p>Clear on face it is a deed; validly executed (individual: signed + witnessed; company: two directors / director + witness / director + secretary / company seal); delivered (by dating)</p></td>\n<td class=\"nt-cell-blue\"><p>LPA 1925 s 52(1): legal estate must be created/transferred by deed. LP(MP)A 1989 s 1. Unregistered land: legal title passes at this stage. Registered land: title does NOT pass until registration</p></td>\n</tr>\n<tr>\n<td><p>3. Registration</p></td>\n<td><p>Buyer submits completed deed (TR1) to Land Registry; Land Registry updates register</p></td>\n<td><p>LRA 2002 s 27(1): for registered land, legal title only transfers on registration. Unregistered land: must register within 2 months of completion (ss 4 and 6 LRA 2002) — failure = legal title reverts to seller</p></td>\n</tr>\n</tbody>\n</table></div>\n<h4 class=\"notes-h4\">TABLE 8 — Land Contracts and Estate Contracts</h4>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\">\n<thead><tr>\n<th class=\"nt-hdr-blue\"><p><strong>Issue</strong></p></th>\n<th class=\"nt-hdr-blue\"><p><strong>Rule / Detail</strong></p></th>\n</tr></thead>\n<tbody>\n<tr>\n<td><p>Formalities (s 2 LP(MP)A 1989)</p></td>\n<td><p>(1) In writing; (2) all expressly agreed terms included (can be by reference to another document); (3) signed by both parties. Cannot have oral contracts for land.</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Variations must comply with s 2</p></td>\n<td class=\"nt-cell-blue\"><p>Any variation to a material term in a land contract must comply with all three s 2 formalities; oral variation of a material term (e.g. completion date) is void (McCausland v Duncan Lawrie Ltd [1997])</p></td>\n</tr>\n<tr>\n<td><p>Proprietary effect (Walsh v Lonsdale)</p></td>\n<td><p>A binding land contract creates an equitable (proprietary) interest in the land — an estate contract — provided specific performance is available. \\\"Equity regards as done that which ought to be done.\\\"</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Contract to buy land</p></td>\n<td class=\"nt-cell-blue\"><p>Buyer acquires equitable interest (estate contract) between exchange and completion; seller cannot withdraw</p></td>\n</tr>\n<tr>\n<td><p>Option agreement</p></td>\n<td><p>Gives holder right to require seller to sell within option period; buyer not obliged to exercise; seller must sell if notice served during option period</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Right of pre-emption</p></td>\n<td class=\"nt-cell-blue\"><p>Right of first refusal if owner decides to sell; owner not obliged to sell; holder cannot force a sale</p></td>\n</tr>\n<tr>\n<td><p>Failed legal estate/interest</p></td>\n<td><p>If parties try to create a legal estate/interest but fail (e.g. no valid deed), equity recognises an equitable interest IF: valid s 2 LP(MP)A 1989 document + specific performance available</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Equitable remedies (discretionary)</p></td>\n<td class=\"nt-cell-blue\"><p>Specific performance (compel positive obligations); injunction (restrain breach e.g. sale to third party); damages. Must come with clean hands (Coatsworth v Johnson [1886–90]: tenant who breached lease terms denied equitable lease)</p></td>\n</tr>\n</tbody>\n</table></div>\n<h4 class=\"notes-h4\">TABLE 9 — Three Principles of Land Registration</h4>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\">\n<thead><tr>\n<th class=\"nt-hdr-blue\"><p><strong>Principle</strong></p></th>\n<th class=\"nt-hdr-blue\"><p><strong>Rule</strong></p></th>\n<th class=\"nt-hdr-blue\"><p><strong>Qualification / Note</strong></p></th>\n</tr></thead>\n<tbody>\n<tr>\n<td><p>Mirror principle</p></td>\n<td><p>The register should accurately reflect all interests that benefit and burden the land; purchaser should need only inspect the register</p></td>\n<td><p>Undermined by overriding interests (Sch 3 LRA 2002) — interests that bind purchasers without appearing on the register</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Curtain principle</p></td>\n<td class=\"nt-cell-blue\"><p>Trust interests (beneficial/equitable ownership) are kept off the title register; purchaser need not investigate what lies \\\"behind the curtain\\\"; simplifies conveyancing</p></td>\n<td class=\"nt-cell-blue\"><p>Achieved by restriction on proprietorship register, triggering overreaching requirement</p></td>\n</tr>\n<tr>\n<td><p>Insurance principle</p></td>\n<td><p>Accuracy of the register is guaranteed by the State; errors are corrected and losses are compensated by state indemnity</p></td>\n<td><p>LRA 2002 Sch 8 para 1: compensation (state indemnity) for loss caused by a mistake on the register</p></td>\n</tr>\n</tbody>\n</table></div>\n<h4 class=\"notes-h4\">TABLE 10 — Three Parts of a Registered Title</h4>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\">\n<thead><tr>\n<th class=\"nt-hdr-blue\"><p><strong>Register</strong></p></th>\n<th class=\"nt-hdr-blue\"><p><strong>Contents</strong></p></th>\n<th class=\"nt-hdr-blue\"><p><strong>Notes</strong></p></th>\n</tr></thead>\n<tbody>\n<tr>\n<td><p>Property register</p></td>\n<td><p>Description of land by reference to title plan; type of estate (freehold/leasehold); details of any rights benefitting the land (e.g. easements)</p></td>\n<td><p>Sets out what the land IS and what rights it has</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Proprietorship register</p></td>\n<td class=\"nt-cell-blue\"><p>Name and address of registered proprietor (owner); restrictions affecting ability to deal with land; CLASS OF TITLE</p></td>\n<td class=\"nt-cell-blue\"><p>Classes: Absolute (best — only bound by registered/overriding interests); Good Leasehold; Qualified; Possessory</p></td>\n</tr>\n<tr>\n<td><p>Charges register</p></td>\n<td><p>Interests burdening the land; leases the land is subject to; mortgages (registered charges); restrictive covenants; equitable easements noted here</p></td>\n<td><p>Purchaser must check this register for all encumbrances</p></td>\n</tr>\n</tbody>\n</table></div>\n<h4 class=\"notes-h4\">TABLE 11 — Classes of Registered Title</h4>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\">\n<thead><tr>\n<th class=\"nt-hdr-blue\"><p><strong>Class</strong></p></th>\n<th class=\"nt-hdr-blue\"><p><strong>When Granted</strong></p></th>\n<th class=\"nt-hdr-blue\"><p><strong>Effect / Limitation</strong></p></th>\n</tr></thead>\n<tbody>\n<tr>\n<td><p>Absolute</p></td>\n<td><p>Best form; Land Registry satisfied title is good; most common</p></td>\n<td><p>Land only bound by interests registered on title and overriding interests; fully guaranteed title</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Good Leasehold</p></td>\n<td class=\"nt-cell-blue\"><p>Satisfied as to leaseholder's title only, not the freeholder's; occurs where freehold title is unregistered and evidence not submitted</p></td>\n<td class=\"nt-cell-blue\"><p>May be subject to third party interests arising from defect in freehold title</p></td>\n</tr>\n<tr>\n<td><p>Qualified</p></td>\n<td><p>Land Registry has identified a defect in title, which is specified on the register; rare</p></td>\n<td><p>Title is subject to the specified defect; less certainty for purchaser</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Possessory</p></td>\n<td class=\"nt-cell-blue\"><p>Applicant is in possession or receiving rents/profits; no other class available; typically adverse possession (\\\"squatters' rights\\\"); title deeds lost or destroyed</p></td>\n<td class=\"nt-cell-blue\"><p>May be bound by third party interests created before date of first registration even if not noted on title</p></td>\n</tr>\n</tbody>\n</table></div>\n<h4 class=\"notes-h4\">TABLE 12 — Compulsory First Registration Triggers (s 4 LRA 2002)</h4>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\">\n<thead><tr>\n<th class=\"nt-hdr-blue\"><p><strong>Triggering Event</strong></p></th>\n<th class=\"nt-hdr-blue\"><p><strong>Notes</strong></p></th>\n</tr></thead>\n<tbody>\n<tr>\n<td><p>Transfer of freehold estate by sale, gift or court order</p></td>\n<td><p>Most common trigger; must register within 2 months or title reverts to seller</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Grant of a new lease for a term of more than 7 years</p></td>\n<td class=\"nt-cell-blue\"><p>Lease must be substantively registered (LRA 2002 s 27(2)(b))</p></td>\n</tr>\n<tr>\n<td><p>Assignment (transfer) of unregistered leasehold with more than 7 years remaining</p></td>\n<td><p>Leasehold title registered for the first time on transfer</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Assent, vesting assent or vesting deed — freehold or leasehold with >7 yrs remaining</p></td>\n<td class=\"nt-cell-blue\"><p>Inheritance/estate administration dispositions trigger first registration</p></td>\n</tr>\n<tr>\n<td><p>Grant of a lease to take effect in possession more than 3 months after date of grant</p></td>\n<td><p>Future lease triggers registration requirement</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>First legal mortgage of freehold or leasehold with more than 7 years to run</p></td>\n<td class=\"nt-cell-blue\"><p>Mortgage triggers first registration of the underlying title</p></td>\n</tr>\n</tbody>\n</table></div>\n<h4 class=\"notes-h4\">TABLE 13 — All Leading Cases at a Glance</h4>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\">\n<thead><tr>\n<th class=\"nt-hdr-blue\"><p><strong>Case</strong></p></th>\n<th class=\"nt-hdr-blue\"><p><strong>Topic</strong></p></th>\n<th class=\"nt-hdr-blue\"><p><strong>Core Principle</strong></p></th>\n</tr></thead>\n<tbody>\n<tr>\n<td><p>Bernstein of Leigh v Skyviews [1978]</p></td>\n<td><p>Airspace</p></td>\n<td><p>Landowner's rights in airspace limited to height necessary for ordinary use and enjoyment; upper airspace is free; aerial photography = no trespass</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Kelsen v Imperial Tobacco [1957]</p></td>\n<td class=\"nt-cell-blue\"><p>Lower airspace</p></td>\n<td class=\"nt-cell-blue\"><p>Advertising sign projecting inches into airspace above shop = trespass; injunction granted for removal</p></td>\n</tr>\n<tr>\n<td><p>Anchor Brewhouse v Berkley House [1987]</p></td>\n<td><p>Lower airspace</p></td>\n<td><p>Crane jib swinging over claimant's land = trespass in lower airspace; injunction granted</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Laiqat v Majid [2005]</p></td>\n<td class=\"nt-cell-blue\"><p>Lower airspace</p></td>\n<td class=\"nt-cell-blue\"><p>Extractor fan duct projecting into neighbour's airspace = trespass; lower airspace intrusion actionable</p></td>\n</tr>\n<tr>\n<td><p>Grigsby v Melville [1974]</p></td>\n<td><p>Ground below</p></td>\n<td><p>Cellar beneath claimant's house belongs to claimant even though only accessible from defendant's property; conveyance passes everything beneath the surface</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Holland v Hodgson [1872]</p></td>\n<td class=\"nt-cell-blue\"><p>Fixtures — test</p></td>\n<td class=\"nt-cell-blue\"><p>Two-part test: (1) degree of annexation; (2) purpose of annexation. Looms bolted to floor = fixtures; individual loose blocks = chattels</p></td>\n</tr>\n<tr>\n<td><p>Berkley v Poulett [1977]</p></td>\n<td><p>Fixtures — purpose prevails</p></td>\n<td><p>Purpose of annexation takes priority over degree; statue enjoyed as a chattel in its own right = chattel despite being embedded</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>D'Eyncourt v Gregory [1866]</p></td>\n<td class=\"nt-cell-blue\"><p>Fixtures — architectural design</p></td>\n<td class=\"nt-cell-blue\"><p>Items incorporated into architectural design of building = fixtures even without firm physical fixing</p></td>\n</tr>\n<tr>\n<td><p>Leigh v Taylor [1902]</p></td>\n<td><p>Fixtures — purpose = chattel</p></td>\n<td><p>Tapestries fixed to wall for their own enjoyment = chattels; purpose was to enjoy them as tapestries, not to enhance the building</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Elitestone Ltd v Morris [1997]</p></td>\n<td class=\"nt-cell-blue\"><p>Fixtures — destruction test</p></td>\n<td class=\"nt-cell-blue\"><p>Structure that cannot be removed without demolition = deemed intended to form part of the land; fixture</p></td>\n</tr>\n<tr>\n<td><p>Botham v TSB Bank [1996]</p></td>\n<td><p>Fixtures — practical application</p></td>\n<td><p>Mortgagee sold contents on repossession; applied both limbs of Holland v Hodgson to classify items as fixtures or chattels</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Walsh v Lonsdale [1882]</p></td>\n<td class=\"nt-cell-blue\"><p>Estate contracts</p></td>\n<td class=\"nt-cell-blue\"><p>Binding contract + specific performance = equitable (proprietary) interest in land; \\\"equity regards as done that which ought to be done\\\"</p></td>\n</tr>\n<tr>\n<td><p>McCausland v Duncan Lawrie [1997]</p></td>\n<td><p>Land contract variation</p></td>\n<td><p>Oral variation of a material term (completion date) void; any material variation must comply with all s 2 LP(MP)A 1989 formalities</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Coatsworth v Johnson [1886–90]</p></td>\n<td class=\"nt-cell-blue\"><p>Equitable remedies</p></td>\n<td class=\"nt-cell-blue\"><p>Tenant who breached contract terms denied specific performance and equitable lease; \\\"must come to equity with clean hands\\\"</p></td>\n</tr>\n</tbody>\n</table></div>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>3. Flashcard Q&A Pairs</strong></span></h2>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\">\n<thead><tr>\n<th class=\"nt-hdr-blue\"><p><strong>Question</strong></p></th>\n<th class=\"nt-hdr-blue\"><p><strong>Answer</strong></p></th>\n</tr></thead>\n<tbody>\n<tr>\n<td><p>What is the statutory definition of \\\"land\\\"?</p></td>\n<td><p>LPA 1925 s 205(1)(ix): the surface; buildings or parts of buildings; other corporeal hereditaments (fixtures); and incorporeal hereditaments (the benefit of proprietary rights with no physical substance such as easements).</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>What are the only two legal estates in English land law?</p></td>\n<td class=\"nt-cell-blue\"><p>Fee simple absolute in possession (freehold) — LPA 1925 s 1(1)(a); and term of years absolute (leasehold) — LPA 1925 s 1(1)(b). All other estates take effect only in equity.</p></td>\n</tr>\n<tr>\n<td><p>What does \\\"fee simple absolute in possession\\\" mean?</p></td>\n<td><p>\\\"Fee\\\" = inheritable. \\\"Simple\\\" = inheritable by any heir including distant relatives. \\\"Absolute\\\" = not determinable prematurely (no condition). \\\"In possession\\\" = current right to use and enjoyment (includes receiving rent if the land is let).</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>What is the difference between a proprietary right and a personal right?</p></td>\n<td class=\"nt-cell-blue\"><p>Proprietary: enforceable in rem — can recover use/possession; binds third parties (if protected). Personal: enforceable in personam — damages only; cannot bind third parties (e.g. a licence).</p></td>\n</tr>\n<tr>\n<td><p>What determines whether a right is proprietary or personal?</p></td>\n<td><p>Three factors: (1) Nature of the right — must be on the closed list; (2) Creation — must comply with correct formalities; (3) Protection — must be registered/protected to bind third parties.</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>What are the three legal interests capable of existing under LPA 1925 s 1(2)?</p></td>\n<td class=\"nt-cell-blue\"><p>Easements granted for equivalent of freehold/leasehold duration (s 1(2)(a)); mortgages (s 1(2)(c)); rights of entry/forfeiture (s 1(2)(e)).</p></td>\n</tr>\n<tr>\n<td><p>What is the maxim on the physical extent of land ownership and how is it qualified?</p></td>\n<td><p>\\\"Cuius est solum eius est usque coelum et ad inferos.\\\" Qualified for airspace: rights only extend to height necessary for ordinary use and enjoyment (Bernstein v Skyviews). Upper airspace is free. Qualified for ground: exceptions for Crown minerals, treasure (Treasure Act 1996), coal (Coal Act 1938) and deep drilling >300m (Infrastructure Act 2015 s 43).</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>What is the Holland v Hodgson two-part test for fixtures?</p></td>\n<td class=\"nt-cell-blue\"><p>(1) Degree of annexation — how firmly fixed; the more firmly, the more likely a fixture. (2) Purpose of annexation — if for the better enjoyment of the chattel as a chattel → chattel; if to enhance the land/building → fixture. Purpose prevails over degree (Berkley v Poulett [1977]).</p></td>\n</tr>\n<tr>\n<td><p>When does a chattel always become a fixture?</p></td>\n<td><p>When it cannot be removed from the land without destruction or demolition — it is deemed intended to form part of the land (Elitestone Ltd v Morris [1997]).</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>What are the formalities for a valid land contract under s 2 LP(MP)A 1989?</p></td>\n<td class=\"nt-cell-blue\"><p>(1) In writing; (2) contains all expressly agreed terms (can be by reference); (3) signed by both parties. Oral contracts for land are void. Material variations must also comply with all three requirements (McCausland v Duncan Lawrie [1997]).</p></td>\n</tr>\n<tr>\n<td><p>What is the proprietary effect of a binding land contract?</p></td>\n<td><p>It creates an equitable proprietary interest in the land — an estate contract. Equity regards as done that which ought to be done. Requires: valid s 2 LP(MP)A 1989 document + specific performance must be available (Walsh v Lonsdale [1882]).</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>What are the three types of estate contract?</p></td>\n<td class=\"nt-cell-blue\"><p>Contract to buy land (binds seller; buyer has equitable interest between exchange and completion); option agreement (buyer can require seller to sell; seller must sell if notice served in time); right of pre-emption (first refusal if owner decides to sell; owner not obliged to sell).</p></td>\n</tr>\n<tr>\n<td><p>What are the three stages of a freehold transfer and when does legal title pass?</p></td>\n<td><p>(1) Exchange of contracts (s 2 LP(MP)A 1989); (2) completion by deed (s 52(1) LPA 1925; s 1 LP(MP)A 1989); (3) registration (LRA 2002 s 27). For registered land: title passes only on registration. For unregistered land: title passes on completion; must register within 2 months or title reverts (ss 4 and 6 LRA 2002).</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>What are the three principles of land registration?</p></td>\n<td class=\"nt-cell-blue\"><p>Mirror (register reflects all interests — hindered by overriding interests); Curtain (trust interests kept off register — simplifies conveyancing; achieved by restriction); Insurance (state guarantees accuracy; Sch 8 para 1 LRA 2002 — state indemnity for errors).</p></td>\n</tr>\n<tr>\n<td><p>What are the three parts of a registered title?</p></td>\n<td><p>Property register: description, estate type, rights benefitting the land. Proprietorship register: owner's details, restrictions, class of title. Charges register: burdens, leases, mortgages, covenants, equitable easements.</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>What are the four classes of registered title and which is best?</p></td>\n<td class=\"nt-cell-blue\"><p>Absolute (best — only bound by registered/overriding interests; state guarantee); Good Leasehold (satisfied as to leasehold only — freehold title not verified); Qualified (defect identified — rare); Possessory (adverse possession or no title deeds — may be bound by pre-registration interests).</p></td>\n</tr>\n<tr>\n<td><p>Why does the mirror principle fail?</p></td>\n<td><p>Because of overriding interests (LRA 2002 Sch 3) — interests that bind a purchaser without appearing on the register at all, e.g. legal leases of 7 years or less (Sch 3 para 1) and interests of persons in actual occupation (Sch 3 para 2).</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>What is the clean hands rule in equity (Coatsworth v Johnson)?</p></td>\n<td class=\"nt-cell-blue\"><p>Equitable remedies (specific performance, injunction) are discretionary and will be refused where the claimant has acted improperly or breached their own obligations. A tenant who breached the terms of a lease contract was denied specific performance and an equitable lease.</p></td>\n</tr>\n</tbody>\n</table></div>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>4. Common Exam Pitfalls & Tricky Distinctions</strong></span></h2>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\">\n<thead><tr>\n<th class=\"nt-hdr-blue\"><p><strong>Pitfall / Distinction</strong></p></th>\n<th class=\"nt-hdr-blue\"><p><strong>Explanation</strong></p></th>\n</tr></thead>\n<tbody>\n<tr>\n<td><p>All physical land is owned by the Crown — not private owners</p></td>\n<td><p>A fundamental but easily forgotten point: in English law, all physical land is ultimately owned by the Crown. What private individuals own is an estate in land — a right to possess the land. This explains why land reverts to the Crown (bona vacantia) when a freehold owner dies without heirs or a will. Never say a private person \\\"owns the land\\\" — they own an estate in it.</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Purpose of annexation prevails over degree — Berkley v Poulett</p></td>\n<td class=\"nt-cell-blue\"><p>Students often overstate the degree of annexation limb. Berkley v Poulett confirms that purpose of annexation takes priority — a firmly embedded statue that is enjoyed as a chattel in its own right remains a chattel. Always move quickly to the purpose limb and make it the decisive factor. D'Eyncourt v Gregory shows the opposite: items loosely placed that form part of the architectural design = fixtures.</p></td>\n</tr>\n<tr>\n<td><p>Legal title in registered land passes on REGISTRATION — not completion</p></td>\n<td><p>For registered land, completing the deed does NOT transfer legal title. Title only passes once the buyer is registered as proprietor (LRA 2002 s 27(1)). Between completion and registration, the buyer has an equitable interest only. For unregistered land, title passes on completion of the deed — but must be registered within 2 months.</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Land contract variations: s 2 LP(MP)A 1989 applies to ALL material terms</p></td>\n<td class=\"nt-cell-blue\"><p>McCausland v Duncan Lawrie: it is not enough to comply with s 2 formalities for the original contract if a later variation of a material term is made orally or informally. Any material variation requires: writing, all agreed terms, and signature of both parties. A term is material if it is essential to the nature of the contract (e.g. completion date, price).</p></td>\n</tr>\n<tr>\n<td><p>Equitable remedies are discretionary — not available as of right</p></td>\n<td><p>Unlike common law damages (available as of right), specific performance and injunctions are equitable and discretionary. The court considers the conduct of both parties. The clean hands maxim applies: a party who has breached their own obligations (Coatsworth v Johnson) will be denied equitable relief even if they have a valid contractual claim. Always flag this in equity-based questions.</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Airspace: upper vs lower is the key distinction</p></td>\n<td class=\"nt-cell-blue\"><p>Bernstein v Skyviews only protects the owner's lower airspace — that portion necessary for the ordinary use and enjoyment of the land. Upper airspace (above that height) belongs to no one. The boundary is not fixed by height in metres — it depends on the \\\"reasonable enjoyment\\\" of the particular piece of land. Do not say that all overflying is a trespass.</p></td>\n</tr>\n<tr>\n<td><p>Lower airspace intrusion is trespass regardless of harm</p></td>\n<td><p>Once an object (sign, crane jib, duct) intrudes into the lower airspace of a property, it is a trespass — even if it causes no actual damage (Kelsen; Anchor Brewhouse; Laiqat v Majid). This contrasts with nuisance, which requires actual interference with enjoyment. An injunction can be obtained to compel removal even without proof of harm.</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>The mirror principle is imperfect — overriding interests are the key exception</p></td>\n<td class=\"nt-cell-blue\"><p>Do not state the mirror principle as an absolute truth. The register is supposed to reflect all interests, but overriding interests (LRA 2002 Sch 3) bind purchasers without appearing on it. The LRA 2002 retains overriding interests \\\"in limited form\\\" — mainly to protect those who cannot reasonably be expected to register (short-term tenants; people in actual occupation). Always acknowledge this qualification when discussing the mirror principle.</p></td>\n</tr>\n<tr>\n<td><p>A right of pre-emption is weaker than an option — do not conflate them</p></td>\n<td><p>An option gives the holder the right to compel the owner to sell at any time during the option period. A right of pre-emption only gives first refusal if the owner decides to sell — the owner is not obliged to sell at all. A right of pre-emption holder cannot force a sale; an option holder can. Both are estate contracts, but they confer very different powers.</p></td>\n</tr>\n<tr>\n<td class=\"nt-cell-blue\"><p>Fixtures pass automatically with the land under s 62 LPA 1925</p></td>\n<td class=\"nt-cell-blue\"><p>Once an item is classified as a fixture, it passes automatically with the land on sale by virtue of s 62 LPA 1925, unless it is specifically excluded under s 62(4). A seller cannot remove a fixture after exchange of contracts. The standard protection is to complete a TA10 fixtures and contents form to agree precisely which items are included or excluded. If the contract is silent, the fixture stays.</p></td>\n</tr>\n</tbody>\n</table></div>"}
