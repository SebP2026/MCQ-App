      {
        "id": "mortgages-notes",
        "title": "W2: Mortgages",
        "content": "<p><span class=\"nt-txt-navy\"><strong>MORTGAGES \u2014 COMPREHENSIVE REVISION NOTES</strong></span></p>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>1. Structured Topic Overview</strong></span></h3>\n<p>Mortgages analysis proceeds through five logical stages:</p>\n<p><span class=\"nt-txt-navy\"><strong>STAGE 1 \u2014 CREATION &amp; CLASSIFICATION</strong></span></p>\n<ul class=\"notes-list\"><li>Identify if the mortgage is legal or equitable</li><li>Legal: deed (LPA s 52; LP(MP)A 1989 s 1) + substantive registration (LRA 2002 s 27(2)(f))</li><li>Equitable: mortgage of equitable interest (LPA s 53(1)(c)); or defective legal mortgage treated as contract (LP(MP)A 1989 s 2)</li></ul>\n<p><span class=\"nt-txt-navy\"><strong>STAGE 2 \u2014 EQUITY OF REDEMPTION: BORROWER PROTECTIONS</strong></span></p>\n<ul class=\"notes-list\"><li>Right to redeem: no clog or fetter on the equity of redemption</li><li>Postponement of redemption date: void if makes mortgage effectively irredeemable (Fairclough); upheld if borrower gets real benefit and will recover full asset (Knightsbridge)</li><li>Options to purchase: generally void if granted simultaneously with mortgage (Samuel v Jarrah); may survive if genuinely independent transaction (Reeve v Lisle; Warnborough v Garmite)</li><li>Collateral advantages: struck out if unconscionable, penal, or repugnant to right to redeem; solus ties valid if they end within the mortgage term (Biggs v Hoddinott; Noakes v Rice)</li><li>Unconscionable terms: court strikes out if imposed in morally reprehensible manner (Multiservice test); high interest rate may be unconscionable (Cityland)</li></ul>\n<p><span class=\"nt-txt-navy\"><strong>STAGE 3 \u2014 UNDUE INFLUENCE</strong></span></p>\n<ul class=\"notes-list\"><li>Two types: overt coercion; or exploitation of trust/ascendancy (RBS v Etridge (No 2))</li><li>Relationship presumptions: irrebuttable (solicitor/client, doctor/patient etc); none for husband/wife or adult child \u2014 must prove</li><li>Risk to lender: mortgage unenforceable if undue influence proved (Barclays v O&#x27;Brien)</li><li>Bank put on inquiry in non-commercial surety situations; must follow Etridge guidelines to protect itself</li></ul>\n<p><span class=\"nt-txt-navy\"><strong>STAGE 4 \u2014 PRIORITY OF MORTGAGES (REGISTERED LAND)</strong></span></p>\n<ul class=\"notes-list\"><li>Legal: priority by order of registration (LRA 2002 s 48)</li><li>Equitable: priority by order of creation (s 28); protected by notice on charges register (s 32)</li><li>Unprotected equitable mortgage loses priority to subsequent registered disposition for value (s 29(1))</li><li>Priority can be altered by deed of priority / intercreditor deed (must be registered)</li></ul>\n<p><span class=\"nt-txt-navy\"><strong>STAGE 5 \u2014 LENDER&#x27;S REMEDIES</strong></span></p>\n<ul class=\"notes-list\"><li>Debt action (personal; used for shortfall / negative equity)</li><li>Possession: right arises on execution of mortgage deed (Four Maids); residential \u2014 court must consider AJA 1970 s 36 postponement; &quot;reasonable period&quot; = remainder of mortgage term (Cheltenham &amp; Gloucester v Norgan)</li><li>Sale: power arises when mortgage money due (LPA s 101(1)(i)); exercisable on any s 103 LPA criterion; duty to obtain true market value (Cuckmere); unfettered discretion as to timing (Silven Properties)</li><li>Receiver: agent of borrower (lender not liable for negligence); duty of due diligence subject to paying off debt</li><li>Foreclosure: rare; court usually orders sale in lieu; extinguishes other mortgages and contractual debt</li></ul>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>2. Summary Revision Tables</strong></span></h3>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 1 \u2014 Key Definitions &amp; Statutory Provisions</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Concept</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Definition / Provision</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Source</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Mortgage</strong></span></p></td><td><p>Security interest in land given by borrower (mortgagor) to lender (mortgagee) in exchange for a loan</p></td><td><p>General law</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Mortgagor</strong></span></p></td><td class=\"nt-cell-blue\"><p>The borrower who grants the mortgage over their land</p></td><td class=\"nt-cell-blue\"><p>General law</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Mortgagee</strong></span></p></td><td><p>The lender who receives the mortgage as security</p></td><td><p>General law</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Legal date of redemption</strong></span></p></td><td class=\"nt-cell-blue\"><p>Contractual date on which loan must be repaid in full (historically the one and only date)</p></td><td class=\"nt-cell-blue\"><p>Historical / general law</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Equitable right to redeem</strong></span></p></td><td><p>Equitable intervention: borrower may repay at any time after the legal date of redemption passes</p></td><td><p>Equity / Toomes v Conset [1745]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Equity of redemption</strong></span></p></td><td class=\"nt-cell-blue\"><p>Bundle of rights protecting the borrower as true owner of property; financial value = market value minus outstanding debt</p></td><td class=\"nt-cell-blue\"><p>Equity</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Clog/fetter</strong></span></p></td><td><p>Any term which prevents or unreasonably restricts the exercise of the equity of redemption</p></td><td><p>Equity</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Collateral advantage</strong></span></p></td><td class=\"nt-cell-blue\"><p>Extra benefit extracted by lender beyond repayment of capital and interest; potentially void if unconscionable</p></td><td class=\"nt-cell-blue\"><p>Equity</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Solus tie</strong></span></p></td><td><p>Condition requiring borrower to purchase all supplies from lender (e.g. brewery tie)</p></td><td><p>Noakes v Rice; Biggs v Hoddinott</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Power of sale</strong></span></p></td><td class=\"nt-cell-blue\"><p>Lender&#x27;s right to sell mortgaged property on borrower&#x27;s default</p></td><td class=\"nt-cell-blue\"><p>LPA 1925 s 101(1)(i)</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Receiver</strong></span></p></td><td><p>Agent appointed to manage mortgaged property and collect income towards debt; deemed agent of borrower</p></td><td><p>LPA 1925 s 101(1)(iii)</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Foreclosure</strong></span></p></td><td class=\"nt-cell-blue\"><p>Historic remedy: freehold vests in lender in satisfaction of debt; extinguishes other charges and contractual debt</p></td><td class=\"nt-cell-blue\"><p>General law</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 2 \u2014 Legal vs Equitable Mortgages</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Feature</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Legal Mortgage</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Equitable Mortgage</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Creation basis</strong></span></p></td><td><p>Granted over legal estate by legal owner</p></td><td><p>Mortgage of equitable interest; OR defective legal mortgage</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Formality requirement</strong></span></p></td><td class=\"nt-cell-blue\"><p>Deed (LPA s 52; LP(MP)A 1989 s 1)</p></td><td class=\"nt-cell-blue\"><p>Writing + signature (LPA s 53(1)(c)); OR s 2 LP(MP)A 1989 for defective legal mortgage</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Registration</strong></span></p></td><td><p>Must be substantively registered (LRA 2002 s 27(2)(f)) to take effect as legal mortgage</p></td><td><p>Protected by notice on charges register (LRA 2002 s 32)</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Effect of non-registration</strong></span></p></td><td class=\"nt-cell-blue\"><p>Does not take effect as legal mortgage (s 27(1)) but may be equitable</p></td><td class=\"nt-cell-blue\"><p>Unprotected equitable mortgage loses priority to subsequent registered disposition for value (s 29(1))</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Remedies available</strong></span></p></td><td><p>Debt action; possession; sale; receiver; foreclosure</p></td><td><p>Debt action; foreclosure; receiver; cannot generally possess or sell without court order</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Priority</strong></span></p></td><td class=\"nt-cell-blue\"><p>By order of registration (LRA 2002 s 48)</p></td><td class=\"nt-cell-blue\"><p>By order of creation (LRA 2002 s 28)</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Inherently equitable</strong></span></p></td><td><p>Cannot be \u2014 if term certain, it can be legal</p></td><td><p>Yes \u2014 where mortgage of equitable interest (LPA s 53(1)(c))</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 3 \u2014 Equity of Redemption: Borrower Protections</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Protection</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Key Cases</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>No clog/fetter on equity of redemption</strong></span></p></td><td><p>Core principle: a mortgage must always be redeemable; any term preventing redemption altogether is void</p></td><td><p>Toomes v Conset [1745]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Postponement of redemption \u2014 VOID</strong></span></p></td><td class=\"nt-cell-blue\"><p>Struck out where term effectively makes mortgage irredeemable (leasehold asset nearly exhausted; borrower recovers nothing of value)</p></td><td class=\"nt-cell-blue\"><p>Fairclough v Swan Brewery [1912]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Postponement of redemption \u2014 VALID</strong></span></p></td><td><p>Upheld where: freehold asset (enduring); borrower receives real benefit (e.g. low interest rate); borrower will recover full asset; freely agreed commercial bargain</p></td><td><p>Knightsbridge Estates v Byrne [1939]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Option to purchase \u2014 generally VOID</strong></span></p></td><td class=\"nt-cell-blue\"><p>Option granted simultaneously with mortgage usually invalid \u2014 prevents borrower recovering property free of debt</p></td><td class=\"nt-cell-blue\"><p>Samuel v Jarrah Timber [1904]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Option to purchase \u2014 may be VALID</strong></span></p></td><td><p>If granted in subsequent independent transaction, may be upheld; court looks at &quot;substance of transaction&quot;</p></td><td><p>Reeve v Lisle [1902]; Warnborough v Garmite [2003]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Collateral advantage \u2014 VOID</strong></span></p></td><td class=\"nt-cell-blue\"><p>Struck out if unconscionable, penal, or repugnant to equitable right to redeem, OR if it extends beyond the mortgage term</p></td><td class=\"nt-cell-blue\"><p>Noakes &amp; Co v Rice [1902]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Collateral advantage \u2014 VALID</strong></span></p></td><td><p>Upheld if it ends within the mortgage term and is not unconscionable or oppressive; lender may gain collateral advantage</p></td><td><p>Biggs v Hoddinott [1898]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Unconscionable terms</strong></span></p></td><td class=\"nt-cell-blue\"><p>Court strikes out if imposed in &quot;morally reprehensible manner&quot;; mere unfairness insufficient; imbalance of bargaining power and exploitation relevant</p></td><td class=\"nt-cell-blue\"><p>Cityland v Dabrah [1968]; Multiservice Bookbinding v Marden [1979]</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 4 \u2014 Unconscionable Interest Rate: Key Cases</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Case</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Outcome</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Principle</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Cityland</strong></span><span class=\"nt-txt-blue\"><strong> v </strong></span><span class=\"nt-txt-blue\"><strong>Dabrah</strong></span><span class=\"nt-txt-blue\"><strong> [1968]</strong></span></p></td><td><p>Void \u2014 reduced to 7%</p></td><td><p>Clear imbalance of bargaining power; borrower threatened with homelessness; ~38% effective rate including premium was unconscionable</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Multiservice Bookbinding v Marden [1979]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Valid \u2014 not unconscionable</p></td><td class=\"nt-cell-blue\"><p>Term linked to Swiss franc value; equality of bargaining power; borrower entered bad bargain with eyes open; no moral reprehensibility</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Falco Finance v Gough</strong></span></p></td><td><p>Void</p></td><td><p>Penalty interest on default far exceeding lender&#x27;s actual losses is void</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Davies v Directloans [1986]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Valid</p></td><td class=\"nt-cell-blue\"><p>Higher interest justified by poor credit history of borrower; lender not acting improperly</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Paragon Finance v Nash [2002]</strong></span></p></td><td><p>Valid (with limits)</p></td><td><p>Lender may charge higher rate due to own financial difficulties; must not exercise discretion for improper purpose</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 5 \u2014 Undue Influence</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Issue</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Two types (RBS v </strong></span><span class=\"nt-txt-blue\"><strong>Etridge</strong></span><span class=\"nt-txt-blue\"><strong> (No 2) [2002])</strong></span></p></td><td><p>Type 1: Overt improper pressure / coercion / unlawful threats. Type 2: One party has influence or ascendancy over the other, which is taken advantage of</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Irrebuttable presumption of influence</strong></span></p></td><td class=\"nt-cell-blue\"><p>Parent/child; guardian/ward; trustee/beneficiary; solicitor/client; doctor/patient</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>No presumption (must be proved)</strong></span></p></td><td><p>Husband and wife; parent and adult child \u2014 influence must be positively shown</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Proof required</strong></span></p></td><td class=\"nt-cell-blue\"><p>(1) Relationship of trust and confidence; (2) Transaction that calls for explanation \u2014 e.g. suspiciously high value or not in the surety&#x27;s interest</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Effect on mortgage</strong></span></p></td><td><p>Mortgage unenforceable against the party unduly influenced; their interest ranks above the lender&#x27;s (Barclays v O&#x27;Brien [1994])</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>When lender is put on inquiry</strong></span></p></td><td class=\"nt-cell-blue\"><p>Any non-commercial setting where one person stands as surety for another (RBS v Etridge)</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Exception: joint benefit</strong></span></p></td><td><p>Lender NOT put on inquiry if purpose of loan is for joint benefit of co-owners (CIBC Mortgages v Pitt [1994])</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Limits on equitable relief</strong></span></p></td><td class=\"nt-cell-blue\"><p>Delay defeats equity (claimant must act promptly); claimant must come with clean hands</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 6 \u2014 </strong></span><span class=\"nt-txt-blue\"><strong>Etridge</strong></span><span class=\"nt-txt-blue\"><strong> Guidelines (RBS v </strong></span><span class=\"nt-txt-blue\"><strong>Etridge</strong></span><span class=\"nt-txt-blue\"><strong> (No 2) [2002])</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Party</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Required Steps</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>The Bank</strong></span></p></td><td><p>(1) Write to the surety (not through the business owner) explaining it requires confirmation from an independent solicitor that the transaction has been explained; (2) ask the surety to nominate an independent solicitor and provide that solicitor with all relevant information; (3) do not proceed until it receives the solicitor&#x27;s certificate</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>The Independent Solicitor</strong></span></p></td><td class=\"nt-cell-blue\"><p>(1) Meet the surety face-to-face and alone (not with the business owner); (2) explain why they have come (to prevent future undue influence claim); (3) explain the documents and transaction in plain language; (4) point out the risks; (5) emphasise the surety has a choice; (6) keep detailed attendance note and confirm in writing; (7) send certificate to the bank</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 7 \u2014 Priority of Mortgages (Registered Land)</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Type</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Priority Rule</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Protection / Consequence</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Legal mortgage</strong></span></p></td><td><p>Priority by order of registration (LRA 2002 s 48) \u2014 not by order of execution of mortgage deeds</p></td><td><p>Must be substantively registered (s 27(2)(f)); simultaneous registration \u2014 application specifies order</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Equitable mortgage (protected)</strong></span></p></td><td class=\"nt-cell-blue\"><p>Priority by order of creation (LRA 2002 s 28) \u2014 notice does not change priority, only protects it</p></td><td class=\"nt-cell-blue\"><p>Enter notice on charges register (LRA 2002 s 32); binding on subsequent purchasers (s 29(2))</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Equitable mortgage (unprotected)</strong></span></p></td><td><p>Loses priority to any subsequent registrable disposition for value \u2014 including legal mortgage or transfer of legal estate</p></td><td><p>Not binding on purchaser for valuable consideration (s 29(1))</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Deed of priority</strong></span></p></td><td class=\"nt-cell-blue\"><p>Lenders may agree to alter the statutory priority position</p></td><td class=\"nt-cell-blue\"><p>Must be registered at Land Registry to be effective</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Occupier&#x27;s rights</strong></span></p></td><td><p>If occupier&#x27;s rights not postponed to lender&#x27;s interest, lender cannot take possession to exercise power of sale</p></td><td><p>Waiver/postponement clause required; important to enforce security</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 8 \u2014 Lender&#x27;s Remedies: Overview</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Remedy</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Legal / Equitable?</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Key Rule</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Key Authority</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Debt action</strong></span></p></td><td><p>Both</p></td><td><p>Personal contractual claim; rarely used in isolation; used for shortfall after sale (negative equity)</p></td><td><p>\u2014</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Possession</strong></span></p></td><td class=\"nt-cell-blue\"><p>Legal only as of right</p></td><td class=\"nt-cell-blue\"><p>Right arises on execution of mortgage deed (even before default); residential \u2014 court may postpone under AJA 1970 s 36</p></td><td class=\"nt-cell-blue\"><p>Four Maids v Dudley Marshall [1957]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Sale</strong></span></p></td><td><p>Legal only as of right (equitable needs court)</p></td><td><p>Power arises: mortgage money due (s 101(1)(i)); exercisable: one s 103 criterion met; surplus = trustee for borrower (s 105)</p></td><td><p>Cuckmere Brick v Mutual Finance [1971]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Receiver</strong></span></p></td><td class=\"nt-cell-blue\"><p>Both</p></td><td class=\"nt-cell-blue\"><p>Deemed agent of borrower; lender not liable for receiver&#x27;s negligence; duty of due diligence subject to paying off debt</p></td><td class=\"nt-cell-blue\"><p>LPA 1925 s 101(1)(iii)</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Foreclosure</strong></span></p></td><td><p>Both</p></td><td><p>Rare; court usually orders sale in lieu; extinguishes other charges and borrower&#x27;s contractual debt; borrower can re-open case</p></td><td><p>Law Commission recommends abolition</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 9 \u2014 Power of Sale: Arises vs Exercisable (LPA 1925)</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Stage</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Notes</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Power ARISES</strong></span></p></td><td><p>When mortgage money has become due (LPA s 101(1)(i))</p></td><td><p>Capital &amp; interest: as soon as one payment is due (Payne v Cardiff [1932]). Interest only: at legal redemption date (usually ~6 months from start)</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Power EXERCISABLE \u2014 s 103(</strong></span><span class=\"nt-txt-blue\"><strong>i</strong></span><span class=\"nt-txt-blue\"><strong>)</strong></span></p></td><td class=\"nt-cell-blue\"><p>Notice requiring repayment of whole loan served + default</p></td><td class=\"nt-cell-blue\"><p>Lender can demand full repayment at any time \u2014 no arrears required</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Power EXERCISABLE \u2014 s 103(ii)</strong></span></p></td><td><p>Interest in arrears for at least two months</p></td><td><p>Not two full months&#x27; worth \u2014 any interest outstanding for two months suffices</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Power EXERCISABLE \u2014 s 103(iii)</strong></span></p></td><td class=\"nt-cell-blue\"><p>Breach of another mortgage covenant (e.g. insure; keep in repair)</p></td><td class=\"nt-cell-blue\"><p>Must affect the value of the security</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Sale after power arises but before exercisable</strong></span></p></td><td><p>Sale to innocent purchaser is valid; lender is liable in damages to borrower</p></td><td><p>LPA 1925 s 104</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Equitable mortgagee&#x27;s power of sale</strong></span></p></td><td class=\"nt-cell-blue\"><p>No statutory power; must apply to court under TOLATA 1996 s 14</p></td><td class=\"nt-cell-blue\"><p>\u2014</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 10 \u2014 Lender&#x27;s Duties on Sale: Key Cases</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Case</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Facts (brief)</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Principle</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Cuckmere Brick v Mutual Finance [1971]</strong></span></p></td><td><p>Lender failed to disclose planning permission in sale particulars</p></td><td><p>Duty to take reasonable care to obtain &quot;true market value&quot; / &quot;proper price&quot;; damages = price difference</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Michael v Miller [2004]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Sale price within range \u00a31.6m-\u00a31.9m; received \u00a31.625m</p></td><td class=\"nt-cell-blue\"><p>Perfection of price not required; no liability if price within acceptable margin of error</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Tse Kwong Lam v Wong Chit Sen [1983]</strong></span></p></td><td><p>Lender sold to company owned by lender&#x27;s family via auction</p></td><td><p>Lender must take expert advice on sale method, marketing and reserve price; courts scrutinise sales to parties connected with the lender</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Silven Properties v RBS [2004]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Borrower argued lender should have delayed sale to improve property/await planning permission</p></td><td class=\"nt-cell-blue\"><p>Lender has &quot;unfettered discretion&quot; as to when to sell; no duty to delay sale or improve property before selling</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 11 \u2014 AJA 1970 s 36: Court&#x27;s Power to Postpone Possession</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Issue</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Scope</strong></span></p></td><td><p>Applies where property is wholly or partly residential (need not be borrower&#x27;s main home); only triggered by a court possession action</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Test for postponement</strong></span></p></td><td class=\"nt-cell-blue\"><p>Court must be satisfied borrower is likely to be able to repay sums due (or remedy default) within a &quot;reasonable period&quot;</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>&quot;Reasonable period&quot;</strong></span></p></td><td><p>Remainder of the mortgage term (Cheltenham &amp; Gloucester BS v Norgan [1996])</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What court can do</strong></span></p></td><td class=\"nt-cell-blue\"><p>Adjourn possession proceedings; stay or postpone execution of possession order; impose conditions on postponement</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What court CANNOT do</strong></span></p></td><td><p>Prevent lender exercising right to possess altogether; postpone where no court action brought (Ropaigelach v Barclays [2000]); prevent sale without court order (Horsham Properties v Clark [2009])</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>National &amp; Provincial BS v Lloyd [1996]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Borrower must present detailed financial plan showing how loan and arrears will be cleared before term expires</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Bristol &amp; West BS v Ellis [1996]</strong></span></p></td><td><p>Postponement to allow self-sale: estate agent&#x27;s optimistic estimate insufficient; court must see sale proceeds will cover debt</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Target Home Loans v Clothier [1994]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Short 3-month postponement granted where genuine offer received from estate agent</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Mortgage Services v Steele [1996]</strong></span></p></td><td><p>Court required firm evidence of imminent exchange; merely instructing solicitors insufficient; courts suspicious of delay tactics</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 12 \u2014 All Leading Cases </strong></span><span class=\"nt-txt-blue\"><strong>at a Glance</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Case</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Topic</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Core Principle</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Toomes v </strong></span><span class=\"nt-txt-blue\"><strong>Conset</strong></span><span class=\"nt-txt-blue\"><strong> [1745]</strong></span></p></td><td><p>Equity of redemption</p></td><td><p>Equity will not allow terms that prevent redemption altogether</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Fairclough v Swan Brewery [1912]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Postponement</p></td><td class=\"nt-cell-blue\"><p>Postponement rendering mortgage effectively irredeemable (leasehold nearly exhausted) is void</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Knightsbridge Estates v Byrne [1939]</strong></span></p></td><td><p>Postponement</p></td><td><p>40-year postponement on freehold upheld: borrower gets full asset back, received benefit (low interest), freely negotiated commercial deal</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Samuel v Jarrah Timber [1904]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Option to purchase</p></td><td class=\"nt-cell-blue\"><p>Option granted simultaneously with mortgage generally void</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Reeve v Lisle [1902]</strong></span></p></td><td><p>Option to purchase</p></td><td><p>Option in subsequent independent transaction may be upheld</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Warnborough</strong></span><span class=\"nt-txt-blue\"><strong> v </strong></span><span class=\"nt-txt-blue\"><strong>Garmite</strong></span><span class=\"nt-txt-blue\"><strong> [2003]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Option to purchase</p></td><td class=\"nt-cell-blue\"><p>Court looks at substance: same-day transactions can be genuinely separate; label irrelevant</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Noakes &amp; Co v Rice [1902]</strong></span></p></td><td><p>Collateral advantage</p></td><td><p>Solus tie extending beyond mortgage term void \u2014 borrower would not recover free asset</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Biggs v Hoddinott [1898]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Collateral advantage</p></td><td class=\"nt-cell-blue\"><p>Solus tie within mortgage term upheld \u2014 not unconscionable or oppressive</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Cityland</strong></span><span class=\"nt-txt-blue\"><strong> v </strong></span><span class=\"nt-txt-blue\"><strong>Dabrah</strong></span><span class=\"nt-txt-blue\"><strong> [1968]</strong></span></p></td><td><p>Unconscionable terms</p></td><td><p>Effective ~38% rate with exploitation of vulnerable borrower = unconscionable; reduced to 7%</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Multiservice Bookbinding v Marden [1979]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Unconscionable terms</p></td><td class=\"nt-cell-blue\"><p>Swiss franc indexation upheld: equality of bargaining power; morally reprehensible test not met</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>RBS v </strong></span><span class=\"nt-txt-blue\"><strong>Etridge</strong></span><span class=\"nt-txt-blue\"><strong> (No 2) [2002]</strong></span></p></td><td><p>Undue influence</p></td><td><p>Defines two types of UI; bank put on inquiry in non-commercial surety; sets out Etridge guidelines</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Barclays Bank v O&#x27;Brien [1994]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Undue influence</p></td><td class=\"nt-cell-blue\"><p>Successful UI claim renders mortgage unenforceable against surety; surety&#x27;s interest ranks above lender&#x27;s</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>CIBC Mortgages v Pitt [1994]</strong></span></p></td><td><p>Undue influence</p></td><td><p>No inquiry where loan for joint benefit of both co-owners</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Four Maids v Dudley Marshall [1957]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Possession</p></td><td class=\"nt-cell-blue\"><p>Right to possess arises immediately on execution of mortgage deed, &quot;before the ink is dry&quot;</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Ropaigelach</strong></span><span class=\"nt-txt-blue\"><strong> v Barclays [2000]</strong></span></p></td><td><p>Possession (AJA s 36)</p></td><td><p>AJA s 36 cannot be used where lender exercises right to possess without court proceedings</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Horsham Properties v Clark [2009]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Sale</p></td><td class=\"nt-cell-blue\"><p>Court cannot prevent lender from exercising power of sale without first obtaining a court order</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Cheltenham &amp; Gloucester BS v Norgan [1996]</strong></span></p></td><td><p>Possession / s 36</p></td><td><p>&quot;Reasonable period&quot; for AJA s 36 purposes = remainder of the mortgage term</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Cuckmere Brick v Mutual Finance [1971]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Duty on sale</p></td><td class=\"nt-cell-blue\"><p>Lender owes borrower duty to take reasonable care to obtain true market value / proper price</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Silven Properties v RBS [2004]</strong></span></p></td><td><p>Duty on sale</p></td><td><p>Lender has unfettered discretion as to when to sell; no duty to delay or improve property first</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Tse Kwong Lam v Wong Chit Sen [1983]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Duty on sale</p></td><td class=\"nt-cell-blue\"><p>Must take expert advice on sale method and reserve price; sale to connected party scrutinised closely</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Payne v Cardiff [1932]</strong></span></p></td><td><p>Power of sale arises</p></td><td><p>Capital &amp; interest mortgage: power of sale arises on first missed payment</p></td></tr></tbody></table></div>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>3. Flashcard Q&amp;A Pairs</strong></span></h3>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Question</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Answer</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What are the formalities for a legal mortgage?</strong></span></p></td><td><p>Deed complying with LP(MP)A 1989 s 1 (LPA s 52); substantively registered at Land Registry (LRA 2002 s 27(2)(f)).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>When does a mortgage arise as equitable only?</strong></span></p></td><td class=\"nt-cell-blue\"><p>(1) Mortgage of equitable interest (LPA s 53(1)(c): writing + signature); or (2) Defective legal mortgage treated as estate contract (s 2 LP(MP)A 1989: writing, all terms, signed by both parties).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What is the equity of redemption?</strong></span></p></td><td><p>Bundle of equitable rights protecting the borrower as true owner; prevents exploitation by lender; financial value = market value minus outstanding debt.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What is the test for an unconscionable mortgage term?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Was the term imposed in a &quot;morally reprehensible manner&quot; affecting the conscience of the party imposing it? (Multiservice Bookbinding v Marden) \u2014 mere unfairness or bad bargain is insufficient.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Fairclough vs Knightsbridge \u2014 why different outcomes on postponement?</strong></span></p></td><td><p>Fairclough: leasehold (depreciating asset), borrower recovered virtually worthless lease \u2014 effectively irredeemable \u2192 VOID. Knightsbridge: freehold (enduring), borrower got full asset back and benefited from low interest rate \u2192 UPHELD.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>When is a solus tie valid as a collateral advantage?</strong></span></p></td><td class=\"nt-cell-blue\"><p>When it ends within the mortgage term and is not unconscionable or oppressive (Biggs v Hoddinott). Void if it extends beyond the mortgage term (Noakes v Rice).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>When is an option to purchase in a mortgage void?</strong></span></p></td><td><p>If granted simultaneously with the mortgage (Samuel v Jarrah). May survive if it is a genuinely independent subsequent transaction (Reeve v Lisle). Court looks at substance, not label (Warnborough v Garmite).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What are the two types of undue influence in RBS v </strong></span><span class=\"nt-txt-blue\"><strong>Etridge</strong></span><span class=\"nt-txt-blue\"><strong>?</strong></span></p></td><td class=\"nt-cell-blue\"><p>(1) Overt improper pressure/coercion/unlawful threats. (2) Exploitation of trust and ascendancy in a relationship.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Is there a presumption of undue influence between husband and wife?</strong></span></p></td><td><p>No \u2014 influence must be positively proved. Contrast: solicitor/client, doctor/patient etc. \u2014 irrebuttable presumption.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>When is a bank put on inquiry of undue influence?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Any non-commercial setting where one party stands as surety for another (Etridge). NOT where loan is for joint benefit of co-owners (CIBC v Pitt).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What is the effect of a successful undue influence claim?</strong></span></p></td><td><p>Mortgage unenforceable against the surety \u2014 their interest ranks above the lender&#x27;s; lender cannot possess or sell to recover debt against that person (Barclays v O&#x27;Brien).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>How does a bank protect itself from undue influence claims?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Follow Etridge guidelines: write to surety directly; require independent solicitor to meet surety alone, explain transaction and risks, confirm in writing; receive solicitor&#x27;s certificate before proceeding.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>How is priority determined between legal mortgages on registered land?</strong></span></p></td><td><p>By order of registration (LRA 2002 s 48) \u2014 not by order of execution of mortgage deeds.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>How is priority determined between equitable mortgages?</strong></span></p></td><td class=\"nt-cell-blue\"><p>By order of creation (LRA 2002 s 28). Notice on charges register does not change priority \u2014 it only protects the mortgage against subsequent purchasers (s 29(2)).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>When does the statutory power of sale arise (LPA s 101)?</strong></span></p></td><td><p>When the mortgage money has become due. For capital &amp; interest mortgages: when first payment is due (Payne v Cardiff). For interest-only: at the legal redemption date.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What are the three s 103 LPA 1925 criteria making the power of sale exercisable?</strong></span></p></td><td class=\"nt-cell-blue\"><p>(i) Notice to repay served + default; (ii) interest in arrears for 2+ months; (iii) breach of another mortgage covenant (e.g. insurance, repair).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What happens if lender sells after power arises but before it is exercisable?</strong></span></p></td><td><p>Sale to innocent purchaser is valid (LPA s 104); lender is liable in damages to the borrower.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What duty does the lender owe when selling?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Duty to take reasonable care to obtain the true market value/proper price (Cuckmere Brick). Does not require perfection of price (Michael v Miller). Lender has unfettered discretion as to when to sell (Silven Properties).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What is the lender&#x27;s position regarding timing of sale?</strong></span></p></td><td><p>Unfettered discretion as to when to sell; no duty to delay sale, improve property, or await a better market (Silven Properties v RBS [2004]).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What does AJA 1970 s 36 allow the court to do?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Adjourn possession proceedings or postpone execution of possession order, if borrower likely to repay within a &quot;reasonable period&quot; (= remainder of mortgage term: Cheltenham &amp; Gloucester v Norgan). Applies only if lender brings a court action; cannot prevent sale.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What is a receiver and why does it benefit the lender?</strong></span></p></td><td><p>Manager of mortgaged property; power under LPA s 101(1)(iii); deemed agent of borrower \u2014 lender therefore not liable for the receiver&#x27;s negligence; receiver applies income to outstanding debt.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What are the advantages of foreclosure for the borrower?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Extinguishes all other mortgages on the property AND extinguishes the contractual debt \u2014 lender cannot sue for any shortfall exceeding property value.</p></td></tr></tbody></table></div>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>4. Common Exam Pitfalls &amp; Tricky Distinctions</strong></span></h3>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Pitfall / Distinction</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Explanation</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Conflating when power of sale ARISES vs when it is EXERCISABLE</strong></span></p></td><td><p>These are two distinct questions under LPA 1925. Arises: when mortgage money is due (s 101). Exercisable: only when a s 103 criterion is met. A sale after power has arisen but before exercisable is valid against an innocent purchaser (s 104) but the lender is liable in damages to the borrower. Never skip this two-stage analysis.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Fairclough vs Knightsbridge \u2014 do not over-generalise</strong></span></p></td><td class=\"nt-cell-blue\"><p>The key distinction is: leasehold (depreciating asset) vs freehold (enduring asset), and whether the borrower genuinely benefits and recovers the full asset. Do not treat all long postponements as void or all commercial deals as valid \u2014 always apply these specific factors.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Collateral advantages: the solus tie timing rule</strong></span></p></td><td><p>A solus tie within the mortgage term may be valid (Biggs v Hoddinott); one extending beyond the mortgage term is void (Noakes v Rice). Always check when the tie expires relative to the mortgage term \u2014 this is the critical distinction.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Options to purchase: label does not determine outcome</strong></span></p></td><td class=\"nt-cell-blue\"><p>Warnborough v Garmite: court looks at the &quot;substance of the transaction,&quot; not the label. A same-day option and mortgage can both survive if genuinely independent. Samuel v Jarrah: option given as part of mortgage deal = void. Do not assume that merely separating documents makes them independent.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Unconscionable terms \u2014 not mere unfairness</strong></span></p></td><td><p>Multiservice Bookbinding: the term must have been imposed in a &quot;morally reprehensible manner.&quot; A bad bargain freely entered by a party with equal bargaining power is not unconscionable. Cityland: the crucial factor was exploitation of a vulnerable borrower. High interest alone is not enough without examining the circumstances.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Undue influence: no presumption for spouses</strong></span></p></td><td class=\"nt-cell-blue\"><p>Husband and wife relationship carries NO presumption of undue influence \u2014 the party alleging UI must positively prove trust, confidence, and exploitation. Only the specific relationships listed (solicitor/client etc.) carry irrebuttable presumption.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>AJA 1970 s 36: cannot prevent sale; cannot help if no court action</strong></span></p></td><td><p>Ropaigelach: s 36 only applies if the lender brings a court possession action \u2014 a lender who physically takes possession or exercises power of sale without going to court sidesteps s 36 entirely. Horsham Properties: court cannot prevent lender from exercising power of sale without court order.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Priority: notice does not change order \u2014 it only protects</strong></span></p></td><td class=\"nt-cell-blue\"><p>For equitable mortgages, priority is determined by order of creation (s 28). Entering a notice on the charges register does not promote the equitable mortgage above an earlier one \u2014 it merely protects the mortgage from being defeated by a subsequent purchaser for value.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Receiver is agent of borrower, not lender</strong></span></p></td><td><p>This is the reason lenders prefer receivers to direct management: lender is not liable for the receiver&#x27;s negligence. Do not confuse this with the receiver acting in the lender&#x27;s interests \u2014 the receiver&#x27;s main duty is paying off the mortgage debt.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Equitable mortgagee&#x27;s remedies are narrower</strong></span></p></td><td class=\"nt-cell-blue\"><p>Equitable mortgagees generally cannot possess or sell as of right \u2014 they need a court order (apply under TOLATA 1996 s 14). Legal mortgagees have the statutory power of sale under LPA s 101. This distinction can be outcome-determinative on a problem question.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>The &quot;morally reprehensible&quot; test \u2014 apply the factors</strong></span></p></td><td><p>Courts look at: circumstances in which term was imposed; relative bargaining power; whether borrower was exploited or made an informed decision; whether the imposition &quot;affected the conscience&quot; of the party imposing it. Apply Cityland (unconscionable) and Multiservice (not unconscionable) as contrasting examples and always reach a reasoned conclusion.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Postponement of possession: standard of evidence required</strong></span></p></td><td class=\"nt-cell-blue\"><p>Courts are suspicious of borrowers using postponement applications to delay. National &amp; Provincial: detailed financial plan required. Bristol &amp; West: optimistic estate agent estimate insufficient. Target Home Loans: genuine offer acceptable for short postponement. Mortgage Services v Steele: imminent exchange of contracts required for sale-based postponement.</p></td></tr></tbody></table></div>"
      }
