    "Easements": [
      {
        "id": "easements-notes",
        "title": "W3/4: Easements",
        "content": "<p><span class=\"nt-txt-navy\"><strong>EASEMENTS \u2014 COMPREHENSIVE REVISION NOTES</strong></span></p>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>1. Structured Topic Overview</strong></span></h3>\n<p>Easements analysis follows a strict logical sequence. An examiner expects you to work through each stage in order:</p>\n<p><span class=\"nt-txt-navy\"><strong>STAGE 1 \u2014 NATURE &amp; CLASSIFICATION</strong></span></p>\n<ul class=\"notes-list\"><li>Define easement: proprietary right to use another&#x27;s land</li><li>Classify as legal (LPA s 1(2)(a): freehold/leasehold duration) or equitable (LPA s 1(3))</li><li>Identify positive vs negative; distinguish from licences, profits \u00e0 prendre, restrictive covenants, public rights, quasi-easements</li></ul>\n<p><span class=\"nt-txt-navy\"><strong>S</strong></span><span class=\"nt-txt-navy\"><strong>TAGE 2 \u2014 CAPABILITY: Re Ellenborough Park [1956] TEST</strong></span></p>\n<ul class=\"notes-list\"><li>(i) Dominant &amp; servient tenement must exist</li><li>(ii) Right must accommodate the dominant tenement</li><li>(iii) No common ownership of the two tenements</li><li>(iv) Right must lie in grant</li></ul>\n<p><strong>T</strong><strong>hen check the three DISQUALIFYING FACTORS:</strong></p>\n<ul class=\"notes-list\"><li>No exclusive possession (Batchelor v Marlow ouster test; Moncrieff possession &amp; control)</li><li>No additional expenditure required from servient owner</li><li>No ongoing permission required</li></ul>\n<p><span class=\"nt-txt-navy\"><strong>S</strong></span><span class=\"nt-txt-navy\"><strong>TAGE 3 \u2014 ACQUISITION</strong></span></p>\n<ul class=\"notes-list\"><li>Express: deed + registration (s 52 LPA; s 27(2)(d) LRA 2002)</li><li>Implied \u2014 Necessity (landlocked land only)</li><li>Implied \u2014 Common intention (specific purpose; Wong v Beaumont)</li><li>Implied \u2014 Wheeldon v Burrows (grant only; continuous &amp; apparent; necessary for reasonable enjoyment)</li><li>Implied \u2014 s 62 LPA 1925 (grant only; prior diversity OR continuous &amp; apparent)</li><li>Prescription \u2014 Common law / Lost Modern Grant / PA 1832 (20+ years; nec vi, nec clam, nec precario)</li></ul>\n<p><span class=\"nt-txt-navy\"><strong>S</strong></span><span class=\"nt-txt-navy\"><strong>TAGE 4 \u2014 ENFORCEABILITY</strong></span></p>\n<ul class=\"notes-list\"><li>Legal easements: registered land = substantive registration; unregistered = binds world</li><li>Implied legal: overriding under Sch 3 para 3 LRA 2002 (knowledge / obvious / exercised within 1 yr)</li><li>Equitable easements: registered = notice on charges register (s 32 LRA); unregistered = Class D(iii) Land Charge</li></ul>\n<p><span class=\"nt-txt-navy\"><strong>S</strong></span><span class=\"nt-txt-navy\"><strong>TAGE 5 \u2014 REMEDIES</strong></span></p>\n<ul class=\"notes-list\"><li>Prohibitory injunction; damages; mandatory injunction to remove obstruction</li></ul>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>2. Summary Revision Tables</strong></span></h3>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 1 \u2014 Key Definitions &amp; Statutory Provisions</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Concept</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Definition / Provision</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Source</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Easement</strong></span></p></td><td><p>Proprietary right to use land belonging to another</p></td><td><p>General law</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Dominant tenement</strong></span></p></td><td class=\"nt-cell-blue\"><p>Land benefitting from the easement</p></td><td class=\"nt-cell-blue\"><p>Re Ellenborough Park</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Servient tenement</strong></span></p></td><td><p>Land burdened by the easement</p></td><td><p>Re Ellenborough Park</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Grant</strong></span></p></td><td class=\"nt-cell-blue\"><p>Seller/landlord gives buyer/tenant an easement over retained land</p></td><td class=\"nt-cell-blue\"><p>General law</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Reservation</strong></span></p></td><td><p>Seller/landlord retains a right over the land sold/leased; strictly construed</p></td><td><p>Cordell v Second Clanfield [1969]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Quasi-easement</strong></span></p></td><td class=\"nt-cell-blue\"><p>Right exercised by owner over their own land \u2014 potential easement if land divided</p></td><td class=\"nt-cell-blue\"><p>General law</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Legal easement</strong></span></p></td><td><p>Duration equivalent to fee simple absolute or term of years absolute</p></td><td><p>LPA 1925 s 1(2)(a)</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Equitable easement</strong></span></p></td><td class=\"nt-cell-blue\"><p>All other easements \u2014 uncertain term or failed legal formalities</p></td><td class=\"nt-cell-blue\"><p>LPA 1925 s 1(3)</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Profit \u00e0 prendre</strong></span></p></td><td><p>Right to take produce/animals/minerals from servient land \u2014 distinct from easement</p></td><td><p>General law</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Licence</strong></span></p></td><td class=\"nt-cell-blue\"><p>Personal right to use land; not proprietary; not enforceable against third parties</p></td><td class=\"nt-cell-blue\"><p>General law</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 2 \u2014 Re Ellenborough Park [1956]: Capability Test</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Requirement</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule / Detail</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Key Authority</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>1. Dominant &amp; servient tenement</strong></span></p></td><td><p>Two identifiable pieces of land; easement cannot exist &quot;in gross&quot;</p></td><td><p>London &amp; Blenheim Estates v Ladbroke [1992]; Hawkins v Rutter [1892]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>2. Accommodates dominant tenement</strong></span></p></td><td class=\"nt-cell-blue\"><p>Direct beneficial impact on the land \u2014 not merely on the business carried on there (unless nexus between land and business)</p></td><td class=\"nt-cell-blue\"><p>Hill v Tupper [1863]; Moody v Steggles [1879]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>  Proximity</strong></span></p></td><td><p>Dominant &amp; servient need not adjoin but must be sufficiently proximate</p></td><td><p>Pugh v Savage [1970]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>3. No common ownership</strong></span></p></td><td class=\"nt-cell-blue\"><p>Must be owned by different persons; easement extinguished if land reunited in common ownership</p></td><td class=\"nt-cell-blue\"><p>Roe v Siddons [1888]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>4. Lies in grant</strong></span></p></td><td><p>(a) Capable grantor &amp; grantee (18+, owns legal estate; body must not fluctuate) (b) Reasonably exact description (c) Judicially recognised right</p></td><td><p>William Aldred&#x27;s Case [1610]; Dyce v Lady James Hay [1852]</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 3 \u2014 Disqualifying Factors</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Disqualifying Factor</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Key Authority</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Exclusive possession (ouster)</strong></span></p></td><td><p>Right disqualified if servient owner left with no reasonable use of the land</p></td><td><p>Batchelor v Marlow [2003]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Exclusive possession (possession &amp; control)</strong></span></p></td><td class=\"nt-cell-blue\"><p>Persuasive alternative: disqualified only if servient owner loses ultimate possession &amp; control (Scottish law)</p></td><td class=\"nt-cell-blue\"><p>Moncrieff v Jamieson [2007]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Applied test (English courts)</strong></span></p></td><td><p>Servient owner can do anything on land except interfere with the right \u2192 not disqualified</p></td><td><p>Kettel v Bloomfold Ltd [2012]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Additional expenditure</strong></span></p></td><td class=\"nt-cell-blue\"><p>Right disqualified if servient owner must spend money to enable enjoyment of the right; dominant owner may enter to carry out repairs at own expense</p></td><td class=\"nt-cell-blue\"><p>Jones v Pritchard [1908]; Regis Property v Redman [1956]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Permission</strong></span></p></td><td><p>If dominant owner must seek permission each time right is exercised \u2192 only a licence, not an easement</p></td><td><p>Green v Ashco Horticultural [1966]</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 4 \u2014 Judicially Recognised Easements (Non-Exhaustive List)</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Right</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Notes</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Authority</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Right of way</strong></span></p></td><td><p>Classic recognised easement</p></td><td><p>Borman v Griffiths [1930]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Drainage / pipelines</strong></span></p></td><td class=\"nt-cell-blue\"><p>Through pipes across servient land</p></td><td class=\"nt-cell-blue\"><p>Atwood v Bovis Homes [2001]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Support</strong></span></p></td><td><p>Right to have buildings supported by neighbouring land</p></td><td><p>Dalton v Angus &amp; Co [1881]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Storage</strong></span></p></td><td class=\"nt-cell-blue\"><p>Use of shed or storage space on servient land</p></td><td class=\"nt-cell-blue\"><p>Wright v Macadam [1949]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Parking</strong></span></p></td><td><p>Provided ouster test not breached</p></td><td><p>Kettel v Bloomfold Ltd [2012]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Sporting/leisure facilities</strong></span></p></td><td class=\"nt-cell-blue\"><p>Use of communal recreational facilities</p></td><td class=\"nt-cell-blue\"><p>Regency Villas v Diamond Resorts [2018]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Recreational use of park</strong></span></p></td><td><p>Foundation of Re Ellenborough Park itself</p></td><td><p>Re Ellenborough Park [1956]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>New rights</strong></span></p></td><td class=\"nt-cell-blue\"><p>List not closed \u2014 new easements possible if not negative in character</p></td><td class=\"nt-cell-blue\"><p>Dyce v Lady James Hay [1852]; Phipps v Pears [1965]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>NOT: scenic view</strong></span></p></td><td><p>Too vague; not capable of reasonably exact description</p></td><td><p>William Aldred&#x27;s Case [1610]</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 5 \u2014 Methods of Acquisition: Comparison</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Method</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Grant / Reservation</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Key Requirements</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Status Result</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Key Case</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Express</strong></span></p></td><td><p>Both</p></td><td><p>Deed (s 52 LPA); s 1 LP(MP)A 1989; registration s 27(2)(d) LRA 2002</p></td><td><p>Legal (if registered); Equitable if not</p></td><td><p>\u2014</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Necessity</strong></span></p></td><td class=\"nt-cell-blue\"><p>Both (reservation very rare)</p></td><td class=\"nt-cell-blue\"><p>Easement essential \u2014 landlocked land only; not merely advantageous</p></td><td class=\"nt-cell-blue\"><p>Same status as the document</p></td><td class=\"nt-cell-blue\"><p>Pryce v McGuinness [1966]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Common intention</strong></span></p></td><td><p>Both (heavy burden for reservation)</p></td><td><p>Specific intended purpose; easement necessary to achieve it</p></td><td><p>Same status as the document</p></td><td><p>Wong v Beaumont [1965]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Wheeldon v Burrows</strong></span></p></td><td class=\"nt-cell-blue\"><p>Grant only</p></td><td class=\"nt-cell-blue\"><p>Quasi-easement; continuous &amp; apparent; necessary for reasonable enjoyment; in use at date of transfer</p></td><td class=\"nt-cell-blue\"><p>Same status as document</p></td><td class=\"nt-cell-blue\"><p>Wheeler v JJ Saunders [1995]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>s 62 LPA 1925</strong></span></p></td><td><p>Grant only</p></td><td><p>Conveyance (deed only); prior diversity of occupation OR continuous &amp; apparent</p></td><td><p>Legal (operates on deeds)</p></td><td><p>Wright v Macadam [1949]; P&amp;S Platt v Crouch [2003]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Prescription</strong></span></p></td><td class=\"nt-cell-blue\"><p>Grant only (long use)</p></td><td class=\"nt-cell-blue\"><p>20+ years; nec vi, nec clam, nec precario; freeholder vs freeholder; continuous user</p></td><td class=\"nt-cell-blue\"><p>Legal</p></td><td class=\"nt-cell-blue\"><p>Mills v Silver [1991]</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 6 \u2014 Wheeldon v Burrows vs s 62 LPA 1925: Key Distinctions</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Feature</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Wheeldon v Burrows</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>s 62 LPA 1925</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Applies to</strong></span></p></td><td><p>Grant only (not reservation)</p></td><td><p>Grant only (not reservation)</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Document type</strong></span></p></td><td class=\"nt-cell-blue\"><p>Any transfer, lease or contract</p></td><td class=\"nt-cell-blue\"><p>Conveyance (deed) only \u2014 NOT a contract</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Prior use required</strong></span></p></td><td><p>Quasi-easement by common owner</p></td><td><p>Prior diversity of occupation (licence/permission) OR continuous &amp; apparent (P&amp;S Platt)</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Continuous &amp; apparent</strong></span></p></td><td class=\"nt-cell-blue\"><p>Always required</p></td><td class=\"nt-cell-blue\"><p>Required where no diversity of occupation</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Necessary for reasonable use</strong></span></p></td><td><p>Required</p></td><td><p>Not required</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Effect</strong></span></p></td><td class=\"nt-cell-blue\"><p>Implies quasi-easement into document</p></td><td class=\"nt-cell-blue\"><p>Upgrades informal licence/permission into full legal easement</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Key case</strong></span></p></td><td><p>Wheeler v JJ Saunders [1995]</p></td><td><p>Wright v Macadam [1949]; P&amp;S Platt v Crouch [2003]</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 7 \u2014 Prescription: Three Methods</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Method</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Key Rule</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Weakness / Note</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Common law</strong></span></p></td><td><p>Use since time immemorial (1189); rebuttable if shown to have been impossible at any point in history</p></td><td><p>Very rarely succeeds in practice</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Lost Modern Grant</strong></span></p></td><td class=\"nt-cell-blue\"><p>Court fictionally presumes a grant was made but lost; 20 years&#x27; use raises presumption</p></td><td class=\"nt-cell-blue\"><p>Servient owner may rebut \u2014 but cannot rebut merely by showing no grant was made</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Prescription Act 1832</strong></span></p></td><td><p>20 yrs (general rights) / 40 yrs (right to light); right becomes absolute after 40 yrs / 20 yrs (light)</p></td><td><p>Most commonly used in practice</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>All methods: nec vi</strong></span></p></td><td class=\"nt-cell-blue\"><p>No force; no ignoring signs/protests</p></td><td class=\"nt-cell-blue\"><p>Winterburn v Bennett [2017] \u2014 sign re-erected \u2192 use by force \u2192 no easement</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>All methods: nec clam</strong></span></p></td><td><p>Not secret; reasonable opportunity for servient owner to discover use</p></td><td><p>\u2014</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>All methods: nec </strong></span><span class=\"nt-txt-blue\"><strong>precario</strong></span></p></td><td class=\"nt-cell-blue\"><p>Not by permission; toleration \u2260 permission</p></td><td class=\"nt-cell-blue\"><p>Mills v Silver [1991]</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 8 \u2014 Enforceability against New Servient Owner</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Type of Easement</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Registered Land</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Unregistered Land</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Express legal</strong></span></p></td><td><p>Must be substantively registered (s 27(2)(d) LRA 2002) \u2014 then always binding</p></td><td><p>Binds world (legal interests bind the world); overrides on first registration (Sch 1 para 3 LRA 2002)</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Implied legal</strong></span></p></td><td class=\"nt-cell-blue\"><p>Overriding interest (Sch 3 para 3 LRA 2002) if: known to new owner; OR obvious on careful inspection; OR exercised within 1 yr before transfer</p></td><td class=\"nt-cell-blue\"><p>Binds world; overriding on first registration</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Express equitable</strong></span></p></td><td><p>Protect by notice on charges register (s 32 LRA 2002); if unprotected, not binding on purchaser for value (s 29(1)); volunteer always bound (s 28)</p></td><td><p>Register Class D(iii) Land Charge (LCA 1972 s 2(5)(iii)); if unregistered, void against purchaser for money&#x27;s worth of legal estate (s 4(6)); volunteer always bound</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Implied equitable</strong></span></p></td><td class=\"nt-cell-blue\"><p>Same rules as express equitable easement</p></td><td class=\"nt-cell-blue\"><p>Same rules as express equitable easement</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 9 \u2014 Leading Cases </strong></span><span class=\"nt-txt-blue\"><strong>at a Glance</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Case</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Topic</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Principle</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Re Ellenborough Park [1956]</strong></span></p></td><td><p>Capability</p></td><td><p>Four-part test for characteristics of an easement; recreational use can be an easement</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Hill v Tupper [1863]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Accommodation</p></td><td class=\"nt-cell-blue\"><p>Right benefiting business only (not land) cannot accommodate dominant tenement</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Moody v </strong></span><span class=\"nt-txt-blue\"><strong>Steggles</strong></span><span class=\"nt-txt-blue\"><strong> [1879]</strong></span></p></td><td><p>Accommodation</p></td><td><p>Nexus between land and business \u2192 right benefiting business also benefits land</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Pugh v Savage [1970]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Proximity</p></td><td class=\"nt-cell-blue\"><p>Tenements need not adjoin; sufficient proximity required</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Batchelor v Marlow [2003]</strong></span></p></td><td><p>Exclusive possession</p></td><td><p>Ouster principle: no reasonable use remaining for servient owner \u2192 disqualified</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Moncrieff v Jamieson [2007]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Exclusive possession</p></td><td class=\"nt-cell-blue\"><p>Scottish persuasive: test is whether servient owner retains possession &amp; control</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Kettel v </strong></span><span class=\"nt-txt-blue\"><strong>Bloomfold</strong></span><span class=\"nt-txt-blue\"><strong> [2012]</strong></span></p></td><td><p>Exclusive possession</p></td><td><p>Applied ouster test in Moncrieff way: parking easement valid; servient owner retained control</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Green v Ashco [1966]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Permission</p></td><td class=\"nt-cell-blue\"><p>Moving van on request = acknowledgement of permission not right; no easement</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Rance v Elvin [1985]</strong></span></p></td><td><p>Expenditure</p></td><td><p>Water supply easement upheld; quasi-contractual obligation on dominant owner to pay share of bills</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Mills v Silver [1991]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Prescription</p></td><td class=\"nt-cell-blue\"><p>&quot;Reasonably regular&quot; use without force, secrecy or permission sufficient for prescription</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Winterburn v Bennett [2017]</strong></span></p></td><td><p>Prescription</p></td><td><p>Ignoring repeatedly re-erected signs = use by force \u2192 no easement by prescription</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Cordell v Second </strong></span><span class=\"nt-txt-blue\"><strong>Clanfield</strong></span><span class=\"nt-txt-blue\"><strong> [1969]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Reservation</p></td><td class=\"nt-cell-blue\"><p>Reservations strictly construed against reserving party per transfer deed</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Wong v Beaumont [1965]</strong></span></p></td><td><p>Common intention</p></td><td><p>Ventilation duct implied \u2014 necessary for known specific purpose (restaurant use)</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Wheeler v JJ Saunders [1995]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Wheeldon v Burrows</p></td><td class=\"nt-cell-blue\"><p>Second means of access equally convenient \u2192 easement not necessary for reasonable enjoyment</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Wright v Macadam [1949]</strong></span></p></td><td><p>s 62 LPA 1925</p></td><td><p>Permissive use of shed upgraded to legal easement by s 62 on grant of new lease</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>P&amp;S Platt v Crouch [2003]</strong></span></p></td><td class=\"nt-cell-blue\"><p>s 62 LPA 1925</p></td><td class=\"nt-cell-blue\"><p>Prior diversity of occupation not required where right is continuous &amp; apparent</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Pryce v McGuinness [1966]</strong></span></p></td><td><p>Necessity</p></td><td><p>Drainage etc highly advantageous but not essential; only landlocked land qualifies</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Donovan v Rana [2014]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Common intention</p></td><td class=\"nt-cell-blue\"><p>Planning permission for dwelling = sufficient evidence of common intention to imply services easement</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Yeung v Patel [2014]</strong></span></p></td><td><p>Common intention reservation</p></td><td><p>Heavy burden for reservation by common intention; having exercised right openly insufficient</p></td></tr></tbody></table></div>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>3. Flashcard Q&amp;A Pairs</strong></span></h3>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Question</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Answer</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What is an easement?</strong></span></p></td><td><p>A proprietary right to use land belonging to someone else.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What are the two types of </strong></span><span class=\"nt-txt-blue\"><strong>easement</strong></span><span class=\"nt-txt-blue\"><strong> by legal status?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Legal (LPA s 1(2)(a) \u2014 freehold/leasehold duration; registered) and Equitable (s 1(3) \u2014 all others).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What are the four Re Ellenborough Park requirements?</strong></span></p></td><td><p>(i) Dominant &amp; servient tenement; (ii) accommodates dominant tenement; (iii) no common ownership; (iv) lies in grant.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>How does Hill v Tupper differ from Moody v </strong></span><span class=\"nt-txt-blue\"><strong>Steggles</strong></span><span class=\"nt-txt-blue\"><strong>?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Hill v Tupper: right only benefited the business, not the land \u2014 not an easement. Moody v Steggles: nexus between land and business \u2014 right benefiting business also benefits land.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What is the ouster principle?</strong></span></p></td><td><p>From Batchelor v Marlow: a right cannot be an easement if it leaves the servient owner with no reasonable use of the land.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What is the possession &amp; control test?</strong></span></p></td><td class=\"nt-cell-blue\"><p>From Moncrieff v Jamieson (persuasive, Scottish): disqualified only if servient owner loses ultimate possession and control; sole use for limited purpose is not inconsistent.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What does nec vi, nec clam, nec </strong></span><span class=\"nt-txt-blue\"><strong>precario</strong></span><span class=\"nt-txt-blue\"><strong> mean?</strong></span></p></td><td><p>Without force; without secrecy; without permission \u2014 the three requirements for use &quot;as of right&quot; in prescription.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What is the only right implied by necessity?</strong></span></p></td><td class=\"nt-cell-blue\"><p>A right of way to otherwise landlocked land (Pryce v McGuinness [1966]).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What must be shown for common intention implied easement?</strong></span></p></td><td><p>Specific intended use of the land; easement necessary to achieve that specific purpose (not merely a general intention: Pwllbach Colliery v Woodman).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What are the Wheeldon v Burrows requirements?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Grant only; quasi-easement by common owner; continuous &amp; apparent; necessary for reasonable enjoyment; in use at date of transfer.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What is the key distinction between Wheeldon v Burrows and s 62?</strong></span></p></td><td><p>W v B applies to any document (including contracts); s 62 applies only to conveyances (deeds). s 62 requires prior diversity of occupation OR continuous &amp; apparent (P&amp;S Platt). W v B requires reasonable necessity; s 62 does not.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What does s 62 LPA 1925 &quot;upgrade&quot; mean?</strong></span></p></td><td class=\"nt-cell-blue\"><p>An informal permission or licence existing before the grant is upgraded into a full legal easement when a conveyance is executed.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>How is an express legal easement protected in registered land?</strong></span></p></td><td><p>Substantive registration at Land Registry (s 27(2)(d) LRA 2002) \u2014 benefit noted on Property Register; burden on Charges Register.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>How is an implied legal easement enforced in registered land?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Overriding interest under Sch 3 para 3 LRA 2002 if: within new owner&#x27;s knowledge; OR obvious on careful inspection; OR exercised within 1 year before transfer.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>How is an equitable easement protected in registered land?</strong></span></p></td><td><p>Notice on the Charges Register of the servient title (s 32 LRA 2002); if unprotected, void against purchaser for value (s 29(1) LRA 2002).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>How is an equitable easement protected in unregistered land?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Class D(iii) Land Charge (LCA 1972 s 2(5)(iii)); if unregistered, void against purchaser for money or money&#x27;s worth of legal estate (s 4(6)).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>When does a reservation receive strict construction?</strong></span></p></td><td><p>Always: strictly construed against the reserving party per the transfer deed (Cordell v Second Clanfield [1969]).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Does a new type of right prevent it being an easement?</strong></span></p></td><td class=\"nt-cell-blue\"><p>No \u2014 the list is not exhaustive (Dyce v Lady James Hay [1852]), but a new easement must not be purely negative in character (Phipps v Pears [1965]).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What remedies are available for interference with an easement?</strong></span></p></td><td><p>Prohibitory injunction; damages (in lieu or addition); mandatory injunction to remove obstruction.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Can an easement exist &quot;in gross&quot;?</strong></span></p></td><td class=\"nt-cell-blue\"><p>No \u2014 it must benefit a dominant tenement; it cannot be held independently of land (Hawkins v Rutter [1892]).</p></td></tr></tbody></table></div>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>4. Common Exam Pitfalls &amp; Tricky Distinctions</strong></span></h3>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Pitfall / Distinction</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Explanation</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Easement vs licence confusion</strong></span></p></td><td><p>A licence is personal and cannot bind third parties. An easement is proprietary. Do not conclude an easement exists simply because someone has permission to use land \u2014 Green v Ashco: permission given each time \u2192 licence only.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Accommodation test \u2014 Hill v Tupper trap</strong></span></p></td><td class=\"nt-cell-blue\"><p>A right that only benefits a business carried on at the dominant land does NOT accommodate the tenement unless there is a nexus between the land and the business (Moody v Steggles). Always ask: does the right benefit the land itself, not just the owner personally?</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Necessity vs common intention \u2014 not interchangeable</strong></span></p></td><td><p>Necessity is confined strictly to landlocked land. Do not stretch it to drainage, electricity etc (Pryce v McGuinness). Use common intention (Wong v Beaumont) for specific purposes that go beyond landlocked access.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Wheeldon v Burrows only applies to grants</strong></span></p></td><td class=\"nt-cell-blue\"><p>W v B cannot imply a reservation. A seller/landlord claiming a right over land they have sold/leased must use necessity or common intention (and faces a heavy burden).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>s 62 requires a deed, not a contract</strong></span></p></td><td><p>S 62 only operates on a conveyance (deed). A contract for sale does NOT trigger the upgrade effect. Also: prior diversity of occupation is NOT always required after P&amp;S Platt v Crouch [2003] \u2014 if the right is continuous and apparent, s 62 can apply without it.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Ouster test \u2014 which case applies?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Batchelor v Marlow (ouster/no reasonable use) is binding English law. Moncrieff v Jamieson (possession &amp; control) is persuasive Scottish law. English courts (Kettel v Bloomfold) have applied the ouster test in a Moncrieff way \u2014 applying both in effect. Do not apply only Moncrieff.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Prescription \u2014 &quot;as of right&quot; vs toleration</strong></span></p></td><td><p>Toleration of use by the servient owner does NOT amount to permission. The servient owner must actively grant permission for use to be precario. Mills v Silver: use with the landowner&#x27;s knowledge but without express permission = valid.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Prescription \u2014 ignoring signs = force</strong></span></p></td><td class=\"nt-cell-blue\"><p>Winterburn v Bennett: repeatedly ignoring a sign saying land is private = use by force (vi) \u2192 no easement by prescription. Signs are critical.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Equitable easements in registered land \u2014 protection</strong></span></p></td><td><p>An equitable easement that is not protected by notice on the charges register is void against a purchaser for valuable consideration (s 29(1) LRA 2002). A donee/volunteer is always bound (s 28). Do not confuse with implied legal easements which can be overriding (Sch 3 para 3).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Reservation \u2014 strictly construed</strong></span></p></td><td class=\"nt-cell-blue\"><p>Cordell v Second Clanfield: any ambiguity in a reservation is resolved against the reserving party. Do not imply a wider reservation than the words of the deed allow.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>A term certain easement cannot be &quot;inherently equitable&quot;</strong></span></p></td><td><p>Only easements for an uncertain term are inherently equitable (e.g. &quot;until the car park is built&quot;). A term certain easement (freehold or fixed term lease) can be legal \u2014 it is only equitable if legal formalities fail.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Benefit always passes with dominant land</strong></span></p></td><td class=\"nt-cell-blue\"><p>Regardless of whether the easement is legal or equitable, the benefit passes automatically on transfer of the dominant land (s 205(ix) LPA 1925; s 62(1) LPA 1925). The enforceability question is about the burden against the new servient owner.</p></td></tr></tbody></table></div>"

      {
        "id": "covenants-notes",
        "title": "W5: Freehold Covenants",
        "content": "<p><span class=\"nt-txt-navy\"><strong>FREEHOLD COVENANTS \u2014 COMPREHENSIVE REVISION NOTES</strong></span></p>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>1. Structured Topic Overview</strong></span></h3>\n<p>Freehold covenants analysis follows a strict logical sequence:</p>\n<p><span class=\"nt-txt-navy\"><strong>STAGE 1 \u2014 IDENTIFY THE COVENANT</strong></span></p>\n<ul class=\"notes-list\"><li>Positive: promise to do something \u2014 not a proprietary right; &quot;hand in pocket&quot; test</li><li>Negative/restrictive: promise not to do something \u2014 equitable interest in land; recognised proprietary right</li><li>Mixed covenant: split into separate positive and negative covenants if possible; if not, characterise the substance as one overall obligation with a condition attached</li></ul>\n<p>Formalities: valid restrictive covenant must be in writing, signed by grantor (LPA 1925 s 53(1)(a))</p>\n<p><span class=\"nt-txt-navy\"><strong>STAGE 2 \u2014 IS IT BETWEEN THE ORIGINAL PARTIES?</strong></span></p>\n<ul class=\"notes-list\"><li>If so: fully enforceable in contract between covenantor and covenantee \u2014 no issue</li><li>Legal issue only arises on succession (sale of dominant or servient land)</li></ul>\n<p><span class=\"nt-txt-navy\"><strong>STAGE 3 \u2014 HAS THE BURDEN PASSED? (to enforce against successor covenantor)</strong></span></p>\n<ul class=\"notes-list\"><li>Common law: burden NEVER passes (Austerberry v Oldham; Rhone v Stephens)</li><li>Equity (Tulk v Moxhay): burden passes IF \u2014 (i) covenant is restrictive; (ii) accommodates dominant tenement; (iii) intention to run; (iv) notice (registered: notice on charges register s 32 LRA; unregistered: Class D(II) Land Charge)</li><li>Indirect enforcement (positive covenants): continuing liability of original covenantor (s 79 LPA); indemnity covenant chain; Halsall v Brizell mutual benefit &amp; burden</li></ul>\n<p><span class=\"nt-txt-navy\"><strong>STAGE 4 \u2014 HAS THE BENEFIT PASSED? (to enforce by successor covenantee)</strong></span></p>\n<ul class=\"notes-list\"><li>Must use SAME set of rules as burden (cannot mix equity and common law)</li><li>Equity: benefit must touch and concern land + pass by annexation (express or statutory s 78 LPA), assignment (s 53(1)(c) LPA), or building scheme (Ellison v Reacher)</li><li>Common law: implied assignment (P&amp;A Swift: touch &amp; concern + intention to run + covenantee/successor holds legal estate)</li></ul>\n<p><span class=\"nt-txt-navy\"><strong>STAGE 5 \u2014 REMEDIES AND DISCHARGE</strong></span></p>\n<ul class=\"notes-list\"><li>Remedies: injunction (prohibitory or mandatory); equitable damages in lieu (Wrotham Park \u2014 percentage of developer profits)</li><li>Discharge: merger (Re Tiltwood); express release by deed; implied release (acquiescence); s 84(1) LPA 1925 (Upper Tribunal \u2014 grounds: obsolete; impedes reasonable use; agreement; no injury)</li></ul>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>2. Summary Revision Tables</strong></span></h3>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 1 \u2014 Key Definitions</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Term</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Definition</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Source</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Covenant</strong></span></p></td><td><p>A promise, usually contained in a deed; a deed is not essential</p></td><td><p>General law</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Covenantee</strong></span></p></td><td class=\"nt-cell-blue\"><p>Receives the benefit; can sue on breach; holds dominant land</p></td><td class=\"nt-cell-blue\"><p>General law</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Covenantor</strong></span></p></td><td><p>Makes the promise; can be sued on breach; holds servient land</p></td><td><p>General law</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Dominant land</strong></span></p></td><td class=\"nt-cell-blue\"><p>Land benefitted by the covenant</p></td><td class=\"nt-cell-blue\"><p>General law</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Servient land</strong></span></p></td><td><p>Land burdened by the covenant</p></td><td><p>General law</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Positive covenant</strong></span></p></td><td class=\"nt-cell-blue\"><p>Promise to do something; &quot;hand in pocket&quot; test; not a proprietary right; burden does not pass at common law or equity</p></td><td class=\"nt-cell-blue\"><p>Haywood v Brunswick PBBS [1881]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Restrictive covenant</strong></span></p></td><td><p>Promise not to do something; equitable interest; burden can pass in equity (Tulk v Moxhay)</p></td><td><p>Rhone v Stephens [1994]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Successor covenantee</strong></span></p></td><td class=\"nt-cell-blue\"><p>New owner of the dominant land</p></td><td class=\"nt-cell-blue\"><p>General law</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Successor covenantor</strong></span></p></td><td><p>New owner of the servient land</p></td><td><p>General law</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Annexation</strong></span></p></td><td class=\"nt-cell-blue\"><p>Benefit becomes permanently part of dominant land \u2014 passes automatically on sale without mention in transfer deed</p></td><td class=\"nt-cell-blue\"><p>Rogers v Hosegood [1900]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Building scheme</strong></span></p></td><td><p>Set of mutually enforceable covenants over a defined estate; treated as by-laws enforceable by/against all owners</p></td><td><p>Ellison v Reacher [1908]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Indemnity covenant</strong></span></p></td><td class=\"nt-cell-blue\"><p>Primary obligation by successor to compensate original covenantor for losses caused by successor&#x27;s breach</p></td><td class=\"nt-cell-blue\"><p>General law</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 2 \u2014 Positive vs Restrictive Covenants</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Feature</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Positive Covenant</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Restrictive Covenant</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Definition</strong></span></p></td><td><p>Promise to do something</p></td><td><p>Promise not to do something</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Test</strong></span></p></td><td class=\"nt-cell-blue\"><p>&quot;Hand in pocket&quot; test: requires expenditure of money, effort or time</p></td><td class=\"nt-cell-blue\"><p>Substance is prohibitory \u2014 look at the essence of the obligation</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Proprietary right?</strong></span></p></td><td><p>No \u2014 not a recognised proprietary interest</p></td><td><p>Yes \u2014 equitable interest in land</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Burden passes at common law?</strong></span></p></td><td class=\"nt-cell-blue\"><p>No (Austerberry; Rhone v Stephens)</p></td><td class=\"nt-cell-blue\"><p>No \u2014 but equity intervenes</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Burden passes in equity?</strong></span></p></td><td><p>No \u2014 equity will not enforce positive covenants against successors (Haywood v Brunswick)</p></td><td><p>Yes \u2014 if Tulk v Moxhay conditions met</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Enforcement against successor</strong></span></p></td><td class=\"nt-cell-blue\"><p>Indirect only: original covenantor liability (s 79 LPA); indemnity chain; Halsall v Brizell; long lease</p></td><td class=\"nt-cell-blue\"><p>Direct if Tulk v Moxhay conditions met + benefit passed</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 3 \u2014 Tulk v </strong></span><span class=\"nt-txt-blue\"><strong>Moxhay</strong></span><span class=\"nt-txt-blue\"><strong> [1848]: Equitable Burden Test</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Requirement</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule / Detail</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Key Authority</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>1. Covenant must be restrictive</strong></span></p></td><td><p>Substance must be prohibitory; positive covenants cannot bind successors in equity</p></td><td><p>Rhone v Stephens [1994]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>2. Must accommodate dominant tenement</strong></span></p></td><td class=\"nt-cell-blue\"><p>Covenantee must hold dominant land at creation and enforcement; covenant must touch and concern the land (affect nature, quality, use or value); dominant and servient must be sufficiently proximate</p></td><td class=\"nt-cell-blue\"><p>LCC v Allen [1914]; P&amp;A Swift [1989]; Bailey v Stephens [1862]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>3. Intention for burden to run</strong></span></p></td><td><p>Express wording OR implied by s 79 LPA 1925 (deemed made by covenantor on behalf of successors unless contrary intention expressed)</p></td><td><p>LPA 1925 s 79</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>4. Notice \u2014 Registered land</strong></span></p></td><td class=\"nt-cell-blue\"><p>Notice on charges register of servient title (LRA 2002 s 32); unprotected covenant void against purchaser for value</p></td><td class=\"nt-cell-blue\"><p>LRA 2002 s 32</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>4. Notice \u2014 Unregistered land</strong></span></p></td><td><p>Class D(II) Land Charge (LCA 1972); unprotected covenant void against purchaser for value regardless of actual knowledge</p></td><td><p>LCA 1972</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 4 \u2014 Passing the Benefit in Equity (</strong></span><span class=\"nt-txt-blue\"><strong>Renals</strong></span><span class=\"nt-txt-blue\"><strong> v Cowlishaw Methods)</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Method</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule / Detail</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Key Authority</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Express annexation</strong></span></p></td><td><p>Words of covenant make clear benefit is intended to attach to dominant land (not merely to person of covenantee); &quot;for the benefit of [named land] and its successors in title&quot;</p></td><td><p>Rogers v Hosegood [1900]; Renals v Cowlishaw [1878]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Statutory annexation (s 78 LPA 1925)</strong></span></p></td><td class=\"nt-cell-blue\"><p>A covenant relating to land is deemed to be made with the covenantee and successors in title to the land intended to benefit; annexation is automatic unless excluded expressly or impliedly by alternative provision</p></td><td class=\"nt-cell-blue\"><p>Federated Homes v Mill Lodge [1980]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Assignment</strong></span></p></td><td><p>Benefit not annexed at outset; must be expressly assigned each time land is transferred; must comply with s 53(1)(c) LPA (in writing, signed by person transferring benefit); treated as separate interest</p></td><td><p>LPA 1925 s 53(1)(c)</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Building scheme</strong></span></p></td><td class=\"nt-cell-blue\"><p>All buyers from same seller; estate divided into plots; covenants intended to benefit all plots; each buyer knows covenants benefit all plots. Enforced as mutual set of by-laws \u2014 no need to specifically trace benefit</p></td><td class=\"nt-cell-blue\"><p>Ellison v Reacher [1908]</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 5 \u2014 Common Law: Benefit (Implied Assignment \u2014 P&amp;A Swift Test)</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Requirement</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Covenant must touch and concern the land</strong></span></p></td><td><p>Benefits dominant land itself: affects nature, quality, use or value; not personal; only benefits dominant owner for the time being; ceases to benefit if severed from land</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Intention that </strong></span><span class=\"nt-txt-blue\"><strong>benefit</strong></span><span class=\"nt-txt-blue\"><strong> runs</strong></span></p></td><td class=\"nt-cell-blue\"><p>Express or implied (s 78 LPA 1925)</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Legal estate at creation and enforcement</strong></span></p></td><td><p>Original covenantee must have held a legal estate when covenant was made; successor must hold legal estate at time of enforcement; estates need not be of same nature (Smith and Snipes Hall Farm Ltd v River Douglas [1949])</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 6 \u2014 Indirect Enforcement of Positive Covenants</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Method</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>How It Works</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Limitation</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Continuing liability of original covenantor (s 79 LPA)</strong></span></p></td><td><p>Original covenantor liable for own AND successors&#x27; breaches; remedy = damages only (no longer in possession)</p></td><td><p>Damages only; cannot compel performance</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Indemnity covenant chain</strong></span></p></td><td class=\"nt-cell-blue\"><p>Each sale of burdened land requires successor to enter IC promising to comply and indemnify; creates chain back to original covenantor; original covenantor can sue direct successor only</p></td><td class=\"nt-cell-blue\"><p>Chain fails if any link in chain dies or becomes bankrupt</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Halsall v </strong></span><span class=\"nt-txt-blue\"><strong>Brizell</strong></span><span class=\"nt-txt-blue\"><strong> / Mutual benefit &amp; burden</strong></span></p></td><td><p>Burden passes where: (i) clear link between burden and benefit; (ii) genuine choice to take or reject benefit; (iii) benefit and burden conferred in same transaction</p></td><td><p>Rhone v Stephens: no general principle; Thamesmead v Allotey: must be genuine choice</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Long lease</strong></span></p></td><td class=\"nt-cell-blue\"><p>Dispose of land by long lease instead of freehold sale; all covenants (except personal) enforceable by/against successors via privity of estate</p></td><td class=\"nt-cell-blue\"><p>Not always commercially appropriate</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 7 \u2014 Discharge and Modification of Restrictive Covenants</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Method</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Key Authority / Note</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Merger</strong></span></p></td><td><p>Covenant discharged when same person becomes owner of both dominant and servient land</p></td><td><p>Re Tiltwood, Sussex [1978]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Express release</strong></span></p></td><td class=\"nt-cell-blue\"><p>Dominant owner agrees to discharge covenant, usually for payment; must be by deed</p></td><td class=\"nt-cell-blue\"><p>General law</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Implied release</strong></span></p></td><td><p>Dominant owner does nothing when covenant is openly being breached over time \u2014 acquiescence</p></td><td><p>General law</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>s 84(1)(a) LPA 1925</strong></span></p></td><td class=\"nt-cell-blue\"><p>Upper Tribunal: obsolete due to changes in character of property or neighbourhood</p></td><td class=\"nt-cell-blue\"><p>Only applies to restrictive covenants</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>s 84(</strong></span><span class=\"nt-txt-blue\"><strong>1)(</strong></span><span class=\"nt-txt-blue\"><strong>aa) LPA 1925</strong></span></p></td><td><p>Continued existence impedes reasonable use for public or private purposes; covenant confers no practical value or contrary to public interest; financial compensation must be adequate</p></td><td><p>Upper Tribunal discretion</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>s 84(1)(b) LPA 1925</strong></span></p></td><td class=\"nt-cell-blue\"><p>Dominant owners expressly or impliedly agree to discharge</p></td><td class=\"nt-cell-blue\"><p>Upper Tribunal</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>s 84(1)(c) LPA 1925</strong></span></p></td><td><p>Dominant owners will not suffer injury; tribunal can override frivolous objections; must have regard to social/economic concerns</p></td><td><p>Upper Tribunal</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 8 \u2014 Leading Cases </strong></span><span class=\"nt-txt-blue\"><strong>at a Glance</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Case</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Topic</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Core Principle</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Haywood v Brunswick PBBS [1881]</strong></span></p></td><td><p>Positive covenants</p></td><td><p>&quot;Hand in pocket&quot; test; positive covenants will not be enforced against successor covenantors in equity</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Austerberry v Oldham Corp [1885]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Burden at common law</p></td><td class=\"nt-cell-blue\"><p>Burden of a covenant does not pass at common law; confirmed in Rhone v Stephens</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Rhone v Stephens [1994]</strong></span></p></td><td><p>Burden; positive v restrictive</p></td><td><p>No general principle burden passes at common law; substance of covenant must be restrictive to be enforced in equity</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Tulk v </strong></span><span class=\"nt-txt-blue\"><strong>Moxhay</strong></span><span class=\"nt-txt-blue\"><strong> [1848]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Equitable burden</p></td><td class=\"nt-cell-blue\"><p>Equitable exception: restrictive covenant passes in equity if four conditions met</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>LCC v Allen [1914]</strong></span></p></td><td><p>Accommodation</p></td><td><p>Covenantee and successors must retain interest in dominant land at creation and enforcement</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>P&amp;A Swift Investments v CES [1989]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Touch and concern</p></td><td class=\"nt-cell-blue\"><p>Covenant must benefit dominant owner only whilst owning dominant land; affect nature/quality/use/value; not personal</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Bailey v Stephens [1862]</strong></span></p></td><td><p>Proximity</p></td><td><p>Dominant and servient land must be in sufficient proximity (need not share boundary)</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Rogers v </strong></span><span class=\"nt-txt-blue\"><strong>Hosegood</strong></span><span class=\"nt-txt-blue\"><strong> [1900]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Express annexation</p></td><td class=\"nt-cell-blue\"><p>Covenant &quot;for benefit of owners and successors in title&quot; to named land = express annexation</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Renals</strong></span><span class=\"nt-txt-blue\"><strong> v Cowlishaw [1878]</strong></span></p></td><td><p>Express annexation</p></td><td><p>Covenant stated for benefit of &quot;heirs, executors and assignees&quot; (people not land) = not annexed</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Federated Homes v Mill Lodge [1980]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Statutory annexation</p></td><td class=\"nt-cell-blue\"><p>S 78 LPA 1925 makes annexation automatic unless excluded</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Ellison v Reacher [1908]</strong></span></p></td><td><p>Building scheme</p></td><td><p>Conditions for a valid building scheme; treated as guidelines not strict requirements; mutual enforceability</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Halsall v </strong></span><span class=\"nt-txt-blue\"><strong>Brizell</strong></span><span class=\"nt-txt-blue\"><strong> [1957]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Mutual benefit &amp; burden</p></td><td class=\"nt-cell-blue\"><p>Positive covenant burden passes where clear link between burden and benefit, genuine choice, same transaction</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Rhone v Stephens [1994]</strong></span></p></td><td><p>Mutual benefit &amp; burden</p></td><td><p>No general principle of benefit = burden; conditions must be strictly met</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Thamesmead Town v Allotey [1998]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Mutual benefit &amp; burden</p></td><td class=\"nt-cell-blue\"><p>No genuine choice to reject benefit = normal rule applies; burden does not pass</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Davies v Jones [2009]</strong></span></p></td><td><p>Mutual benefit &amp; burden</p></td><td><p>Benefit and burden must be conferred in the same transaction</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Wrotham Park Estate v Parkside Homes [1974]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Remedies</p></td><td class=\"nt-cell-blue\"><p>Mandatory injunction refused (waste of houses); equitable damages awarded as % of developer&#x27;s profits</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Re </strong></span><span class=\"nt-txt-blue\"><strong>Tiltwood</strong></span><span class=\"nt-txt-blue\"><strong>, Sussex [1978]</strong></span></p></td><td><p>Discharge</p></td><td><p>Covenant discharged by merger when dominant and servient land come under common ownership</p></td></tr></tbody></table></div>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>3. Flashcard Q&amp;A Pairs</strong></span></h3>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Question</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Answer</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What is the &quot;hand in pocket&quot; test?</strong></span></p></td><td><p>If the covenantor must spend money, effort or time to comply, the covenant is positive. Look at the substance/essence of the obligation, not the form of words.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Does the burden of a covenant pass at common law?</strong></span></p></td><td class=\"nt-cell-blue\"><p>No \u2014 never. Austerberry v Oldham Corporation [1885], confirmed in Rhone v Stephens [1994]. The covenant remains enforceable only against the original covenantor.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What are the four Tulk v </strong></span><span class=\"nt-txt-blue\"><strong>Moxhay</strong></span><span class=\"nt-txt-blue\"><strong> conditions for equitable burden?</strong></span></p></td><td><p>(1) Covenant must be restrictive; (2) must accommodate dominant tenement (touch and concern + proximity); (3) intention to run (express or s 79 LPA); (4) notice (registered: notice on charges register; unregistered: Class D(II) Land Charge).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Can the burden of a positive covenant EVER pass to a successor?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Not directly. Indirect methods: (1) continuing liability of original covenantor (s 79 LPA); (2) chain of indemnity covenants; (3) Halsall v Brizell mutual benefit &amp; burden (three conditions); (4) grant of long lease instead of freehold.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What are the three </strong></span><span class=\"nt-txt-blue\"><strong>Renals</strong></span><span class=\"nt-txt-blue\"><strong> v Cowlishaw methods for passing the benefit in equity?</strong></span></p></td><td><p>Annexation (express or statutory s 78 LPA); Assignment (s 53(1)(c) LPA \u2014 in writing, signed); Building scheme (Ellison v Reacher conditions).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What did Federated Homes v Mill Lodge Properties [1980] establish?</strong></span></p></td><td class=\"nt-cell-blue\"><p>S 78 LPA 1925 makes annexation of benefit automatic \u2014 unless expressly excluded or an alternative method for passing the benefit is provided in the transfer deed.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What is the effect of s 79 LPA 1925?</strong></span></p></td><td><p>Implied intention that the burden of a covenant runs with the land \u2014 covenant is deemed made by the covenantor on behalf of successors in title, unless a contrary intention is expressed.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What distinguishes Rogers v </strong></span><span class=\"nt-txt-blue\"><strong>Hosegood</strong></span><span class=\"nt-txt-blue\"><strong> from </strong></span><span class=\"nt-txt-blue\"><strong>Renals</strong></span><span class=\"nt-txt-blue\"><strong> v Cowlishaw on express annexation?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Rogers: covenant for benefit of &quot;owners and successors in title&quot; to named land = annexed to the land. Renals: covenant for benefit of &quot;heirs, executors and assignees&quot; (people not land) = not annexed.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What are the Ellison v Reacher building scheme conditions?</strong></span></p></td><td><p>All buyers buy from same seller; seller divided estate into plots; covenants intended to benefit all plots; each buyer knows this. Treated as guidelines \u2014 court must be satisfied of mutual intention to create enforceable obligations.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What are the three Halsall v </strong></span><span class=\"nt-txt-blue\"><strong>Brizell</strong></span><span class=\"nt-txt-blue\"><strong> conditions for mutual benefit and burden?</strong></span></p></td><td class=\"nt-cell-blue\"><p>(1) Clear link between the specific burden and the specific benefit; (2) genuine choice whether to take the benefit; (3) benefit and burden conferred in the same transaction.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What remedies are available for breach of a restrictive covenant?</strong></span></p></td><td><p>Prohibitory injunction (prevent ongoing/threatened breach); mandatory injunction (remedy completed breach); equitable damages in lieu of injunction (Wrotham Park: % of developer&#x27;s profits if mandatory injunction would be oppressive).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What happened in Wrotham Park and why is it significant?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Mandatory injunction refused to demolish houses built in breach of restrictive covenant (&quot;unpardonable waste of much needed houses&quot;). Equitable damages awarded as a percentage of developer profits \u2014 what dominant owner could have charged for release.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What </strong></span><span class=\"nt-txt-blue\"><strong>are</strong></span><span class=\"nt-txt-blue\"><strong> the s 84(1) LPA 1925 grounds for Upper Tribunal discharge/modification?</strong></span></p></td><td><p>(a) Obsolete due to change in character; (aa) impedes reasonable use, no practical benefit or contrary to public interest, financial compensation adequate; (b) agreement (express or implied); (c) no injury to dominant owner. Only applies to restrictive covenants.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>How is a restrictive covenant protected in registered land?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Entry of a notice on the charges register of the servient title (LRA 2002 s 32). If unprotected, the covenant is not binding on a purchaser for value (though a volunteer/donee is always bound).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>How is a restrictive covenant protected in unregistered land?</strong></span></p></td><td><p>Entry of a Class D(II) Land Charge (LCA 1972). If unprotected, void against a purchaser for value regardless of actual knowledge (Midland Bank v Green principle applies by analogy).</p></td></tr></tbody></table></div>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>4. Common Exam Pitfalls &amp; Tricky Distinctions</strong></span></h3>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Pitfall / Distinction</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Explanation</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Cannot mix equitable and common law rules</strong></span></p></td><td><p>To enforce a covenant, you must use either the equitable rules OR the common law rules throughout \u2014 you cannot mix them. If burden has passed in equity (Tulk v Moxhay), the benefit must also have passed in equity (annexation/assignment/building scheme). Never apply a common law benefit rule to an equitable burden case.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Positive covenants: burden NEVER passes directly</strong></span></p></td><td class=\"nt-cell-blue\"><p>No matter how the covenant is worded, the burden of a positive covenant cannot be made to pass to a successor covenantor either at common law or in equity (Rhone v Stephens). The only remedies are indirect: original covenantor liability, indemnity chain, or Halsall v Brizell. Never say a positive covenant binds a successor directly.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Halsall v </strong></span><span class=\"nt-txt-blue\"><strong>Brizell</strong></span><span class=\"nt-txt-blue\"><strong>: three conditions are strict</strong></span></p></td><td><p>The mutual benefit and burden doctrine is not a general principle (Rhone v Stephens). All three conditions must be met: (1) clear link; (2) genuine choice (Thamesmead v Allotey: if there is no real choice but to take the benefit, the rule does not apply); (3) same transaction (Davies v Jones). Test each condition carefully.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>S 78 annexation is automatic \u2014 but can be excluded</strong></span></p></td><td class=\"nt-cell-blue\"><p>Federated Homes makes s 78 LPA 1925 operate automatically for all covenants relating to land, unless: (i) the covenant expressly excludes it; or (ii) an alternative method of passing the benefit (such as assignment) is provided in the deed. Look for exclusion language before assuming automatic annexation applies.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Renals</strong></span><span class=\"nt-txt-blue\"><strong> v Cowlishaw: benefit to persons \u2260 benefit to land</strong></span></p></td><td><p>Express annexation requires the benefit to be expressed as attaching to the land, not just to the people of the covenantee. &quot;For the benefit of the named land and its successors in title&quot; = annexed. &quot;For the benefit of the covenantee, their heirs, executors and assignees&quot; = NOT annexed (Renals v Cowlishaw \u2014 people, not land).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Assignment must occur every transfer \u2014 it does not run automatically</strong></span></p></td><td class=\"nt-cell-blue\"><p>Unlike annexation (which permanently attaches to the land), assignment of the benefit must take place expressly each time the dominant land is sold. If even one transfer occurs without assignment, the chain is broken and the benefit is lost to all subsequent owners. This is a key distinction from annexation.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Touch and concern: personal covenants do not pass</strong></span></p></td><td><p>A covenant that is &quot;expressed to be personal&quot; or that only benefits the covenantee in a personal capacity (not as landowner) does not touch and concern the land and cannot pass to successors. P&amp;A Swift: must benefit the dominant owner only whilst they own the land, and affect the nature/quality/use/value of the land.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Wrotham Park damages: based on profits, not loss</strong></span></p></td><td class=\"nt-cell-blue\"><p>Equitable damages in lieu of a mandatory injunction for a covenant breach are not calculated on the diminution in value of the dominant land (which may be nominal). They are based on a percentage of the profits made by the person in breach \u2014 what the dominant owner could reasonably have charged for release of the covenant.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>s 84(1) Upper Tribunal: only applies to restrictive covenants</strong></span></p></td><td><p>The power to discharge or modify under s 84(1) LPA 1925 applies ONLY to restrictive covenants \u2014 not to positive covenants. Positive covenants cannot be modified or discharged by the Upper Tribunal under this provision.</p></td></tr></tbody></table></div>"
      }
