      {
        "id": "leases-essential",
        "title": "W8: Essential Requirements of a Lease",
        "content": "<p><span class=\"nt-txt-navy\"><strong>ESSENTIAL REQUIREMENTS OF A LEASE \u2014 REVISION NOTES</strong></span></p>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>1. Structured Topic Overview</strong></span></h3>\n<p>Lease analysis follows a clear logical sequence. An examiner expects you to address each stage in order:</p>\n<p><span class=\"nt-txt-navy\"><strong>STAGE 1 \u2014 LEASE OR LICENCE?</strong></span></p>\n<ul class=\"notes-list\"><li>Identify whether the arrangement is a lease (proprietary) or a licence (personal)</li><li>Look at substance, not the label: Street v Mountford [1985]</li><li>Key distinction: leases are enforceable <em>in rem</em> (against the world); licences are enforceable <em>in personam</em> (against the grantor only)</li><li>Rent is NOT essential for a lease: LPA 1925 s 205(1)(xxvii); confirmed in Ashburn Anstalt v Arnold [1989]</li></ul>\n<p><span class=\"nt-txt-navy\"><strong>STAGE 2 \u2014 CERTAINTY OF TERM</strong></span></p>\n<ul class=\"notes-list\"><li>Lease must be for a certain, ascertainable duration: either fixed or periodic</li><li>Fixed term: maximum duration known from the outset; neither party can end it early without a break clause</li><li>Periodic tenancy: runs from period to period; terminates on notice to quit; can be express or implied</li><li>Implied periodic tenancy: arises from possession + payment/acceptance of rent by reference to a period (Prudential Assurance v London Residuary Body [1992])</li><li>Uncertain duration = not a lease: Lace v Chantler [1944] (&quot;for the duration of the war&quot; \u2014 void for uncertainty)</li></ul>\n<p><span class=\"nt-txt-navy\"><strong>STAGE 3 \u2014 EXCLUSIVE POSSESSION</strong></span></p>\n<ul class=\"notes-list\"><li>Right to exclude all others, including the landlord</li><li>Question of fact: courts examine the substance and reality of the arrangement</li><li>Sham clauses designed to defeat exclusive possession are disregarded</li><li>Indicators AGAINST exclusive possession: landlord retains key (with unrestricted access); landlord provides services (lodger); sharing clauses (if genuine); right to relocate</li><li>Sharing clause analysis (AG Securities v Vaughan; Antoniades v Villiers [1990]): size/nature of accommodation; relationship between occupiers; width of clause; whether clause has been exercised</li><li>Business tenancies: degree of physical control retained by landlord is a key factor (Esso v Fumegrange [1994])</li></ul>\n<p><span class=\"nt-txt-navy\"><strong>STAGE 4 \u2014 MULTIPLE OCCUPIERS: JOINT TENANCY OR LICENCE?</strong></span></p>\n<ul class=\"notes-list\"><li>Multiple occupiers can hold a joint tenancy if together they can exclude all others including the landlord</li><li>Four unities must all be present: Possession, Interest, Time, Title (AG Securities v Vaughan [1990])</li><li>If any unity is missing: no joint tenancy; if no individual tenancy either \u2192 only individual licensees</li><li>Separate documents can satisfy unity of title if they are identical and interdependent (Antoniades v Villiers)</li></ul>\n<p><span class=\"nt-txt-navy\"><strong>STAGE 5 \u2014 FACTORS DEFEATING A LEASE</strong></span></p>\n<ul class=\"notes-list\"><li>Even if certainty of term and exclusive possession are present, a lease can be defeated by:</li><li>No intention to create legal relations (ICLR): family arrangement; act of friendship; act of generosity \u2014 but market rent or formality can rebut this (Facchini v Bryson [1952])</li><li>Service occupancy: occupier must reside there for better performance of employment duties; rent may still be paid (Norris v Checksfield [1991])</li></ul>\n<p><span class=\"nt-txt-navy\"><strong>STAGE 6 \u2014 FORMALITIES TO CREATE A LEGAL LEASE</strong></span></p>\n<ul class=\"notes-list\"><li>General rule: deed required (LPA 1925 s 52; LP(MP)A 1989 s 1)</li><li>Over 7 years: deed + compulsory registration (LRA 2002 s 27(2)(b)(i)); failure to register = no legal leasehold estate (s 27(1))</li><li>7 years or less: deed required, no registration needed; overriding interest binding new owner (LRA 2002 Sch 3 para 1)</li><li>Short lease exception (s 54(2) LPA 1925): 3 years or less, in possession, at best rent, no fine/premium \u2014 no deed required (parol lease)</li><li>Equitable lease: arises where legal lease fails but there is a valid s 2 LP(MP)A 1989 document + specific performance available (Walsh v Lonsdale [1882])</li></ul>\n<p><span class=\"nt-txt-navy\"><strong>STAGE </strong></span><span class=\"nt-txt-navy\"><strong>7</strong></span><span class=\"nt-txt-navy\"><strong> \u2014 </strong></span><span class=\"nt-txt-navy\"><strong>IF THERE IS A LEASE, IS IT ENFORCEABLE AGAINST A NEW OWNER?</strong></span></p>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>2. Summary Revision Tables</strong></span></h3>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 1 \u2014 Key Definitions &amp; Statutory Provisions</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Concept</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Definition / Provision</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Source</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Lease / tenancy</strong></span></p></td><td><p>Grant of a temporary right to use and enjoy land exclusively; a &quot;term of years absolute&quot;</p></td><td><p>LPA 1925 s 1(1)(b)</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Sublease / underlease</strong></span></p></td><td class=\"nt-cell-blue\"><p>A lease granted out of a superior lease (not out of the freehold)</p></td><td class=\"nt-cell-blue\"><p>General law</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Licence</strong></span></p></td><td><p>Personal permission to be on another&#x27;s land; not proprietary; only enforceable against the grantor</p></td><td><p>General law</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Security of tenure</strong></span></p></td><td class=\"nt-cell-blue\"><p>Right of occupants to remain after the formal arrangement ends and request a new lease</p></td><td class=\"nt-cell-blue\"><p>General law</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Rent</strong></span></p></td><td><p>NOT essential for a lease</p></td><td><p>LPA 1925 s 205(1)(xxvii); Ashburn Anstalt v Arnold [1989]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Certainty of term</strong></span></p></td><td class=\"nt-cell-blue\"><p>The lease must be granted for a certain, ascertainable duration \u2014 either fixed or periodic</p></td><td class=\"nt-cell-blue\"><p>Street v Mountford [1985]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Exclusive possession</strong></span></p></td><td><p>The right to exclude all others from the property, including the landlord</p></td><td><p>Street v Mountford [1985]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Fixed term</strong></span></p></td><td class=\"nt-cell-blue\"><p>Maximum duration of the arrangement known from outset; cannot be unilaterally ended early without a break clause</p></td><td class=\"nt-cell-blue\"><p>General law</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Periodic tenancy</strong></span></p></td><td><p>Lease for one period (e.g. weekly/monthly/yearly); extends automatically until notice to quit is given</p></td><td><p>General law</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Break clause</strong></span></p></td><td class=\"nt-cell-blue\"><p>Right for either/both parties to terminate lease early; may be conditional; requires notice</p></td><td class=\"nt-cell-blue\"><p>General law</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Parol lease</strong></span></p></td><td><p>Short lease created without a deed under LPA 1925 s 54(2); does not require registration</p></td><td><p>LPA 1925 s 54(2)</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Service occupancy</strong></span></p></td><td class=\"nt-cell-blue\"><p>Occupation by an employee required for better performance of their duties; not a tenancy even if rent is paid</p></td><td class=\"nt-cell-blue\"><p>Norris v Checksfield [1991]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Lodger</strong></span></p></td><td><p>Occupier whose landlord provides services (cleaning, linen etc.); never has exclusive possession</p></td><td><p>Marchant v Charters [1977]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Joint tenancy (lease)</strong></span></p></td><td class=\"nt-cell-blue\"><p>Multiple occupiers who together can exclude all others; must hold the four unities</p></td><td class=\"nt-cell-blue\"><p>AG Securities v Vaughan [1990]</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 2 \u2014 Lease vs Licence: Key Distinctions</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Feature</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Lease</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Licence</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Nature of right</strong></span></p></td><td><p>Proprietary right in land</p></td><td><p>Personal permission only</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Enforceability</strong></span></p></td><td class=\"nt-cell-blue\"><p>Enforceable in rem \u2014 against third parties</p></td><td class=\"nt-cell-blue\"><p>Enforceable in personam \u2014 against grantor only</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Nuisance / trespass</strong></span></p></td><td><p>Tenant can sue third parties</p></td><td><p>Licensee cannot sue third parties</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Security of tenure</strong></span></p></td><td class=\"nt-cell-blue\"><p>Tenant may have statutory security of tenure</p></td><td class=\"nt-cell-blue\"><p>No security of tenure</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Statutory protection</strong></span></p></td><td><p>Various statutory protections for tenants</p></td><td><p>No statutory protection for licensees</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Test (since 1985)</strong></span></p></td><td class=\"nt-cell-blue\"><p>Substance of arrangement: certain term + exclusive possession (Street v Mountford)</p></td><td class=\"nt-cell-blue\"><p>Absence of certain term and/or exclusive possession</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Label / name</strong></span></p></td><td><p>Irrelevant \u2014 courts look at substance not label</p></td><td><p>Cannot create a licence by calling it one</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 3 \u2014 Certainty of Term</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Type</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule / Detail</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Key Authority</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>General requirement</strong></span></p></td><td><p>Must be known from the outset when the arrangement will end; cannot be uncertain</p></td><td><p>Lace v Chantler [1944]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Lace v Chantler [1944]</strong></span></p></td><td class=\"nt-cell-blue\"><p>&quot;For the duration of the war&quot; was void for uncertainty; term not ascertainable at the outset</p></td><td class=\"nt-cell-blue\"><p>Lace v Chantler [1944]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Fixed term</strong></span></p></td><td><p>Maximum duration known from outset; neither party can end it unilaterally without a break clause</p></td><td><p>General law</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Break clause</strong></span></p></td><td class=\"nt-cell-blue\"><p>Right to end lease early; may be conditional; usually requires notice to be served on the other party</p></td><td class=\"nt-cell-blue\"><p>General law</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Periodic tenancy (general)</strong></span></p></td><td><p>One period at a time (weekly, monthly, quarterly, yearly); extends automatically; ends on notice to quit</p></td><td><p>General law</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Implied periodic tenancy</strong></span></p></td><td class=\"nt-cell-blue\"><p>Arises from possession + payment/acceptance of rent; period determined by how rent is calculated (not how often paid)</p></td><td class=\"nt-cell-blue\"><p>Prudential Assurance v London Residuary Body [1992]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Prudential Assurance [1992]</strong></span></p></td><td><p>Lease &quot;until land needed for road widening&quot;  was an uncertain period but held to be yearly periodic tenancy arising from possession and rent paid by reference to a year</p></td><td><p>Prudential Assurance v London Residuary Body [1992]</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 4 \u2014 Exclusive Possession: Indicators </strong></span><span class=\"nt-txt-blue\"><strong>For</strong></span><span class=\"nt-txt-blue\"><strong> and Against</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Indicator</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Key Authority</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>FOR \u2014 Restricted landlord access</strong></span></p></td><td><p>Landlord&#x27;s access limited to specific purpose (e.g. repairs only) = evidence of exclusive possession</p></td><td><p>Street v Mountford [1985]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>AGAINST \u2014 Key retention (unrestricted)</strong></span></p></td><td class=\"nt-cell-blue\"><p>Landlord retains key + unrestricted access = against exclusive possession; purpose of key retention is the key factor</p></td><td class=\"nt-cell-blue\"><p>Aslan v Murphy [1990]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>AGAINST \u2014 Landlord provides services</strong></span></p></td><td><p>Attendance or services (cleaning, linen etc.) = licence not tenancy; occupier is a &quot;lodger&quot;</p></td><td><p>Marchant v Charters [1977]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>AGAINST \u2014 Sharing clause (genuine)</strong></span></p></td><td class=\"nt-cell-blue\"><p>Right to share or introduce others defeats exclusive possession only if clause is genuine (not a sham)</p></td><td class=\"nt-cell-blue\"><p>AG Securities v Vaughan [1990]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>AGAINST \u2014 Right to relocate (genuine)</strong></span></p></td><td><p>Right to move tenant to alternative accommodation defeats exclusive possession</p></td><td><p>Dresden Estates v Collinson [1988]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Sham clauses disregarded</strong></span></p></td><td class=\"nt-cell-blue\"><p>Courts disregard clauses inserted only to make a lease look like a licence; examine the reality and substance</p></td><td class=\"nt-cell-blue\"><p>Antoniades v Villiers [1990]</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 5 \u2014 Sharing Clause Analysis: Genuine vs Sham (Antoniades Test)</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Factor</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>How Courts Assess It</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Size and nature of accommodation</strong></span></p></td><td><p>Would it be physically feasible for the landlord to introduce others to share? (A very small room \u2014 unlikely to be genuine)</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Relationship between occupiers</strong></span></p></td><td class=\"nt-cell-blue\"><p>Would it be appropriate/realistic to introduce a stranger given the existing relationship between the occupiers? (Couple sharing \u2014 sharing clause likely a sham)</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Width of the clause</strong></span></p></td><td><p>Broadly drafted clauses (e.g. right to introduce &quot;anyone&quot;) are more likely to be treated as shams; narrow/specific clauses are more credible</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Whether the clause has been exercised</strong></span></p></td><td class=\"nt-cell-blue\"><p>If never exercised, this is evidence it was never intended to be used \u2014 i.e. it is a sham clause</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 6 \u2014 AG Securities v Vaughan vs Antoniades v Villiers [1990]: Contrast</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Feature</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>AG Securities v Vaughan</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Antoniades v Villiers</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Occupiers</strong></span></p></td><td><p>4 unrelated occupiers</p></td><td><p>Couple in a relationship</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Agreements</strong></span></p></td><td class=\"nt-cell-blue\"><p>Separate agreements at different times; different rents</p></td><td class=\"nt-cell-blue\"><p>Separate but identical and interdependent agreements signed on the same day</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Sharing clause</strong></span></p></td><td><p>Genuine \u2014 only 1 of 4 rooms; other occupiers genuinely introduced at different times</p></td><td><p>Sham \u2014 one-bedroom flat; not feasible to introduce a stranger to share with a couple</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Four unities present?</strong></span></p></td><td class=\"nt-cell-blue\"><p>No \u2014 time and title missing (different times, different terms)</p></td><td class=\"nt-cell-blue\"><p>Yes \u2014 identical and interdependent documents treated as one</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Outcome</strong></span></p></td><td><p>Individual licences only \u2014 no joint tenancy</p></td><td><p>Joint tenancy \u2014 lease</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Key principle</strong></span></p></td><td class=\"nt-cell-blue\"><p>Separate agreements at different times can break unity of time/title</p></td><td class=\"nt-cell-blue\"><p>Separate documents treated as one if identical and interdependent; sharing clause disregarded as sham</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 7 \u2014 Four Unities of Joint Tenancy</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Unity</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Requirement</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Note</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Possession</strong></span></p></td><td><p>Each occupier entitled to occupy the whole premises; no-one has exclusive use of any part</p></td><td><p>If each has exclusive possession of a defined part \u2192 possible individual leases instead</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Interest</strong></span></p></td><td class=\"nt-cell-blue\"><p>Same leasehold interest, same term, same conditions, jointly liable for whole rent</p></td><td class=\"nt-cell-blue\"><p>Joint liability: if one leaves, remaining occupiers liable for all the rent, not just their share</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Time</strong></span></p></td><td><p>All occupiers&#x27; interests must begin at the same time</p></td><td><p>AG Securities: different start dates = no unity of time \u2192 no joint tenancy</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Title</strong></span></p></td><td class=\"nt-cell-blue\"><p>All interests derive from the same document, or separate documents that are identical and interdependent</p></td><td class=\"nt-cell-blue\"><p>Antoniades: identical and interdependent documents satisfy this even if technically separate</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Missing unity</strong></span></p></td><td><p>If any one of the four unities is absent: no joint tenancy; if no individual tenancy either \u2192 individual licensees sharing</p></td><td><p>AG Securities v Vaughan [1990]</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 8 \u2014 Factors That Defeat a Lease (Even if Requirements Met)</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Defeating Factor</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Key Authority</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>No intention to create legal relations (ICLR)</strong></span></p></td><td><p>No ICLR where: family arrangement; act of friendship; act of generosity. BUT market rent and/or formality of agreement evidences ICLR even between family/friends</p></td><td><p>Facchini v Bryson [1952]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Service occupancy</strong></span></p></td><td class=\"nt-cell-blue\"><p>Where employee must occupy premises for better performance of duties \u2014 not a tenancy even if rent paid. Test: is occupation necessary for the job, or merely a perk of the job?</p></td><td class=\"nt-cell-blue\"><p>Norris v Checksfield [1991]; Royal Philanthropic v County [1985]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Norris v Checksfield [1991]</strong></span></p></td><td><p>Lorry driver required premises to perform job duties \u2192 service occupancy; no lease</p></td><td><p>Norris v Checksfield [1991]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Royal Philanthropic v County [1985]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Teacher&#x27;s house near school was a perk of the job, not necessary for duties \u2192 lease (no service occupancy)</p></td><td class=\"nt-cell-blue\"><p>Royal Philanthropic v County [1985]</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 9 \u2014 Formalities to Create a Lease</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Type of Lease</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Formality Requirement</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Key Provision / Effect</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>General rule (all legal leases)</strong></span></p></td><td><p>Deed (LPA 1925 s 52) complying with LP(MP)A 1989 s 1: in writing; clear it is a deed; signed and witnessed</p></td><td><p>LP(MP)A 1989 s 1; LPA 1925 s 52</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Over 7 years</strong></span></p></td><td class=\"nt-cell-blue\"><p>Deed + compulsory substantive registration at Land Registry (LRA 2002 s 27(2)(b)(i))</p></td><td class=\"nt-cell-blue\"><p>Failure to register = no legal leasehold estate created (LRA 2002 s 27(1))</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>7 years or less</strong></span></p></td><td><p>Deed required; no registration needed</p></td><td><p>Binding on new freehold owner as overriding interest (LRA 2002 Sch 3 para 1)</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Short lease exception \u2014 3 years or less (s 54(2) LPA 1925)</strong></span></p></td><td class=\"nt-cell-blue\"><p>No deed required provided: (i) takes effect in possession; (ii) granted at best rent (market rent); (iii) no fine or premium</p></td><td class=\"nt-cell-blue\"><p>Known as &quot;parol leases&quot;; no registration needed; still legal leases</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Parol leases (types)</strong></span></p></td><td><p>Short fixed-term leases; express periodic tenancies; implied periodic tenancies (where individual period is 3 years or less)</p></td><td><p>LPA 1925 s 54(2)</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Equitable lease</strong></span></p></td><td class=\"nt-cell-blue\"><p>Arises where: (i) legal lease fails (no valid deed / not registered); AND (ii) valid s 2 LP(MP)A 1989 document exists + specific performance available</p></td><td class=\"nt-cell-blue\"><p>Walsh v Lonsdale [1882]: equity prevails over common law where conflict</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 10 \u2014 Business Tenancies: Lease vs Licence</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Point</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule / Detail</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Street v Mountford applies</strong></span></p></td><td><p>The Street v Mountford test (certain term + exclusive possession) applies equally to non-residential/business tenancies</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Importance</strong></span></p></td><td class=\"nt-cell-blue\"><p>Business tenants may be protected by the Landlord and Tenant Act 1954 \u2014 entitles them to remain and request a new lease at end of term; only applies to tenants, not licensees</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Key factor in business context</strong></span></p></td><td><p>Degree of physical control the landlord retains over the property and the conduct of the business \u2014 more control = less likely to be exclusive possession</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Label more readily accepted</strong></span></p></td><td class=\"nt-cell-blue\"><p>Courts more willing to accept a &quot;licence&quot; label in commercial contexts due to greater equality of bargaining power between parties</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Esso v Fumegrange [1994]</strong></span></p></td><td><p>Esso retained control: could alter premises, change shop layout \u2192 Fumegrange did not have exclusive possession of the service stations \u2192 licence, not lease</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 11 \u2014 All Leading Cases </strong></span><span class=\"nt-txt-blue\"><strong>at a Glance</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Case</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Topic</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Core Principle</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Street v Mountford [1985]</strong></span></p></td><td><p>Lease or licence; exclusive possession</p></td><td><p>Substance not label; for a lease: certain term + exclusive possession; HoL overruled label-based approach</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Ashburn Anstalt v Arnold [1989]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Rent</p></td><td class=\"nt-cell-blue\"><p>Rent is NOT essential for a lease (confirming LPA 1925 s 205(1)(xxvii))</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Lace v Chantler [1944]</strong></span></p></td><td><p>Certainty of term</p></td><td><p>&quot;For the duration of the war&quot; \u2014 void for uncertainty of term; fails certainty requirement</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Prudential Assurance v London Residuary Body [1992]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Certainty of term / implied periodic tenancy</p></td><td class=\"nt-cell-blue\"><p>Lease to last until &quot;land needed for road widening&quot; void for uncertainty; yearly periodic tenancy arose from possession + rent calculated by year</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Aslan v Murphy [1990]</strong></span></p></td><td><p>Exclusive possession \u2014 key retention</p></td><td><p>Purpose of key retention is the key factor; emergency-only or arranged access \u2192 exclusive possession may still exist</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Marchant v Charters [1977]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Exclusive possession \u2014 services</p></td><td class=\"nt-cell-blue\"><p>Landlord providing services (cleaning, linen) = licence, not tenancy; occupier is a lodger</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Dresden Estates v Collinson [1988]</strong></span></p></td><td><p>Exclusive possession \u2014 relocation</p></td><td><p>Right to relocate tenant defeats exclusive possession; sham relocation clauses are disregarded</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>AG Securities v Vaughan [1990]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Multiple occupiers / four unities</p></td><td class=\"nt-cell-blue\"><p>4 unrelated occupiers on separate staggered agreements at different rents \u2192 no unity of time/title \u2192 individual licensees, not joint tenants</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Antoniades v Villiers [1990]</strong></span></p></td><td><p>Multiple occupiers / sham clauses</p></td><td><p>Couple; separate but identical interdependent agreements \u2192 unity of title satisfied; sharing clause a sham (one-bedroom flat) \u2192 joint tenancy</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Facchini v Bryson [1952]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Defeating a lease \u2014 no ICLR</p></td><td class=\"nt-cell-blue\"><p>No ICLR: family arrangements, acts of friendship/generosity; rebutted by market rent and/or formality of agreement</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Norris v Checksfield [1991]</strong></span></p></td><td><p>Defeating a lease \u2014 service occupancy</p></td><td><p>Lorry driver required premises to perform duties \u2192 service occupancy; no tenancy</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Royal Philanthropic v County [1985]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Defeating a lease \u2014 service occupancy</p></td><td class=\"nt-cell-blue\"><p>Teacher&#x27;s accommodation near school was a perk, not necessary for duties \u2192 tenancy, not service occupancy</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Esso Petroleum v Fumegrange [1994]</strong></span></p></td><td><p>Business tenancies / exclusive possession</p></td><td><p>Esso retained physical control over premises and business \u2192 no exclusive possession \u2192 licence</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Walsh v Lonsdale [1882]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Equitable lease</p></td><td class=\"nt-cell-blue\"><p>Where legal lease fails but valid s 2 LP(MP)A 1989 document + specific performance available \u2192 equitable lease; equity prevails over common law</p></td></tr></tbody></table></div>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>3. Flashcard Q&amp;A Pairs</strong></span></h3>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Question</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Answer</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What are the two essential requirements for a lease under Street v Mountford [1985]?</strong></span></p></td><td><p>Certainty of term; and exclusive possession. Rent is NOT essential (LPA 1925 s 205(1)(xxvii); Ashburn Anstalt v Arnold).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>How do courts distinguish a lease from a licence since Street v Mountford?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Look at the substance, not the label. Parties cannot change the effect of an arrangement by calling it a licence \u2014 if certain term and exclusive possession are present, it is a lease.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What are the two ways certainty of term can be satisfied?</strong></span></p></td><td><p>Fixed term (maximum duration known from outset) or periodic tenancy (runs period-to-period; terminates on notice to quit).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>How does an implied periodic tenancy arise?</strong></span></p></td><td class=\"nt-cell-blue\"><p>From possession + payment and acceptance of rent; the period of the tenancy is determined by reference to how the rent is calculated, not how often it is paid (Prudential Assurance v London Residuary Body [1992]).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Why did the arrangement in Lace v Chantler [1944] fail?</strong></span></p></td><td><p>The lease was &quot;for the duration of the war&quot; \u2014 this was not a certain term because the maximum duration was not known from the outset.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What does exclusive possession mean?</strong></span></p></td><td class=\"nt-cell-blue\"><p>The right to exclude all others from the property, including the landlord.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Is a landlord retaining a key fatal to exclusive possession?</strong></span></p></td><td><p>Not automatically \u2014 Aslan v Murphy [1990]: the purpose for which the key is retained is the key factor. Emergency-only or arranged use of the key is consistent with exclusive possession.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>When does a landlord providing services defeat exclusive possession?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Where the landlord provides attendance or services such as cleaning and changing linen (Marchant v Charters [1977]). The occupier is a &quot;lodger&quot; and never has exclusive possession.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What are the four factors used to assess whether a sharing clause is a sham?</strong></span></p></td><td><p>(1) Size and nature of the accommodation \u2014 would sharing be feasible? (2) Relationship between occupiers \u2014 would introducing others be appropriate? (3) Width of the clause. (4) Whether the clause has ever been exercised.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What right does a right to relocate confer on the landlord, and what is its effect?</strong></span></p></td><td class=\"nt-cell-blue\"><p>The right to move the tenant to alternative accommodation defeats exclusive possession (Dresden Estates v Collinson [1988]); if the clause is a sham, it is disregarded.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What are the four unities required for a joint tenancy?</strong></span></p></td><td><p>Possession (each entitled to the whole); Interest (same term, conditions, jointly liable for all rent); Time (interests start together); Title (same document or identical and interdependent documents).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>If one of the four unities is missing, what is the consequence?</strong></span></p></td><td class=\"nt-cell-blue\"><p>No joint tenancy. If there is also no individual tenancy of any part, the occupiers can only be individual licensees sharing with each other (AG Securities v Vaughan [1990]).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>How did the court distinguish AG Securities v Vaughan from Antoniades v Villiers?</strong></span></p></td><td><p>AG Securities: 4 unrelated people, staggered agreements at different times and rents \u2014 no unity of time or title \u2014 individual licences. Antoniades: couple, identical and interdependent agreements signed the same day \u2014 unity of title satisfied; sharing clause was a sham \u2014 joint tenancy.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What two factors can defeat a lease even where certain term and exclusive possession are both present?</strong></span></p></td><td class=\"nt-cell-blue\"><p>(1) No intention to create legal relations (family/friendship/generosity arrangements \u2014 rebutted by market rent or formality). (2) Service occupancy (employee must live there for better performance of duties).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What is the test for a service occupancy?</strong></span></p></td><td><p>The occupier must be required to occupy the premises for the better performance of their employment duties \u2014 not merely as a perk of the job (Norris v Checksfield vs Royal Philanthropic v County).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What are the formality requirements for a legal lease over 7 years?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Deed complying with LP(MP)A 1989 s 1 (in writing; clearly a deed; signed and witnessed) + compulsory substantive registration at Land Registry (LRA 2002 s 27(2)(b)(i)). Failure to register = no legal leasehold estate.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What are the three conditions for the short lease exception under LPA 1925 s 54(2)?</strong></span></p></td><td><p>(1) Lease for 3 years or less; (2) takes effect in possession (immediately); (3) at best/market rent; (4) no fine or premium. If all met: no deed required; still a legal lease.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>How does an equitable lease arise?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Where a legal lease fails (no valid deed, or not registered), but a valid s 2 LP(MP)A 1989 document exists and specific performance is available \u2192 equitable lease on same terms (Walsh v Lonsdale [1882]).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What is the significance of LRA 2002 Sch 3 para 1 for leases of 7 years or less?</strong></span></p></td><td><p>Leases of 7 years or less that are not registered still take effect as legal leases and are binding on a new freehold owner as overriding interests.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>How does the business tenancy context modify the Street v Mountford approach?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Certain term and exclusive possession still required; but courts focus on degree of physical control the landlord retains over the property and business; courts more willing to accept a licence label due to equality of bargaining power (Esso v Fumegrange [1994]).</p></td></tr></tbody></table></div>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>4. Common Exam Pitfalls &amp; Tricky Distinctions</strong></span></h3>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Pitfall / Distinction</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Explanation</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Rent is NOT essential \u2014 do not assume it is</strong></span></p></td><td><p>A very common error: students assume rent is a third requirement for a lease. It is not. LPA 1925 s 205(1)(xxvii) is explicit, and Ashburn Anstalt v Arnold [1989] confirms it. Only certainty of term and exclusive possession are the two essential requirements from Street v Mountford.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Label of the agreement is irrelevant</strong></span></p></td><td class=\"nt-cell-blue\"><p>Parties cannot create a licence simply by calling their arrangement a licence (Street v Mountford). The court will always look at substance. A &quot;licence fee&quot; is still rent; a &quot;licence&quot; that grants certain term + exclusive possession is still a lease. Never accept the label at face value in a problem question.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Period of implied tenancy: how rent is calculated, not how it is paid</strong></span></p></td><td><p>The period of an implied periodic tenancy depends on how rent is calculated, not the intervals at which it is physically paid. Monthly payments may give rise to a yearly periodic tenancy if the rent is expressed as an annual sum. Always check how the rent is expressed, not just when it is collected.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Sham clauses must be identified and disregarded</strong></span></p></td><td class=\"nt-cell-blue\"><p>A sharing clause or relocation clause that exists only to make a lease look like a licence will be disregarded by the court (Antoniades v Villiers). Apply the four-factor sham analysis: size of accommodation; relationship between occupiers; width of drafting; whether ever exercised. Do not automatically accept such clauses at face value.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Key retention: purpose matters, not mere fact</strong></span></p></td><td><p>The fact that a landlord retains a key does not automatically defeat exclusive possession (Aslan v Murphy [1990]). The question is why the key is retained and what access it confers \u2014 unrestricted access defeats exclusive possession; access only in emergencies or by arrangement is consistent with it.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Four unities: all four must be present</strong></span></p></td><td class=\"nt-cell-blue\"><p>For a joint tenancy, all four unities must be present \u2014 miss any one and there is no joint tenancy. AG Securities v Vaughan failed on time and title because the occupiers entered into separate agreements at different times and at different rents. Carefully check each unity before concluding a joint tenancy exists.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Separate documents can still satisfy unity of title</strong></span></p></td><td><p>Do not assume that separate documents automatically destroy unity of title. If the documents are identical and interdependent, the court will treat them as one (Antoniades v Villiers). The question is whether the documents were intended to operate together as a single arrangement.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Service occupancy: necessity, not mere benefit</strong></span></p></td><td class=\"nt-cell-blue\"><p>The test is not whether the employee benefits from living on the premises \u2014 it is whether occupation is necessary for the better performance of their duties (Norris v Checksfield). A perk of the job (Royal Philanthropic v County) is insufficient: the teacher could have performed duties without living nearby. Apply this distinction carefully.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Formalities: the s 54(2) exception has three strict conditions</strong></span></p></td><td><p>The short lease exception applies only if all three conditions are met: 3 years or less; takes effect in possession (not in the future); at best/market rent; no fine or premium. If any condition fails, the exception does not apply and a deed is required. &quot;Best rent&quot; means market rent \u2014 a concessionary rent will not qualify.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Equitable lease vs no lease at all</strong></span></p></td><td class=\"nt-cell-blue\"><p>A failed legal lease does not automatically become an equitable lease. Two further requirements must be met: (1) there must be a valid s 2 LP(MP)A 1989 document (in writing, all terms, signed by both parties); and (2) specific performance must be available as a remedy. Without both, there is no equitable lease \u2014 only, at best, a periodic tenancy arising from possession and payment of rent.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Business tenancy: Street v Mountford still applies</strong></span></p></td><td><p>Do not overlook the fact that Street v Mountford applies equally to non-residential leases. The same two-stage analysis (certain term; exclusive possession) must be carried out. The only modification is that courts give more weight to the label in commercial contexts due to equality of bargaining power \u2014 but this is not determinative.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>No ICLR: family/friendship relationship does not automatically defeat lease</strong></span></p></td><td class=\"nt-cell-blue\"><p>A family or friendly relationship between the parties does not automatically mean there is no ICLR. Where the agreement has a degree of formality or where market rent is paid, ICLR can still be found (Facchini v Bryson). Do not conclude &quot;no lease&quot; simply because the parties are related.</p></td></tr></tbody></table></div>"
