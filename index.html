      {
        "id": "trusts-w3",
        "title": "W3: Trustees and Their Duties",
        "content": "<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Trusts Law \u2013 W3: Trustees and their Duties</strong></span></h2>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Topic Overview</strong></span></h2>\n<p>1. Role of trustee: voluntary, usually unpaid; joint office; must act unanimously; active role required</p>\n<p>2. Appointment of trustees: inter vivos (self-declaration / transfer on trust); testamentary trusts; subsisting trusts</p>\n<p>3. Statutory powers to appoint: s 36 TA 1925 (replacement/additional); s 19 TLATA (beneficiaries); s 41 TA 1925 (court)</p>\n<p>4. Administrative powers (s 3 TA 2000 \u2013 general power of investment; s 4 \u2013 standard investment criteria; s 5 \u2013 advice; s 8 \u2013 land; s 11 \u2013 delegation)</p>\n<p>5. Statutory duty of care (s 1 TA 2000): reasonable care and skill; higher standard for professionals</p>\n<p>6. Breach of trust: acting outside powers OR failing to comply with duties</p>\n<p>7. Loss assessment: falsification (misapplication) vs surcharging (other breaches); Target Holdings / AIB Group</p>\n<p>8. Defences: exemption clauses (Armitage v Nurse); consent / instigation / acquiescence; limitation (s 31 LA 1980); laches; s 61 TA 1925</p>\n<p>9. Apportionment: CLCA 1978; full indemnity (Re Partington; Head v Gould)</p>\n<p>10. Protection: ouster clauses; exemption clauses; trustee insurance; Benjamin orders; s 27 TA 1925 notices; s 63 TA 1925 payment into court</p>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Summary Revision Tables</strong></span></h2>\n<p><span class=\"nt-txt-blue\"><strong>Table 1: Appointment of Trustees \u2013 Powers and Sources</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Power / Mechanism</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rules</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Statute / Authority</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Express power to appoint</strong></span></p></td><td class=\"nt-cell-blue\"><p>Trust instrument may contain an express power to appoint (and remove) trustees. Settlor can reserve this for themselves.</p></td><td class=\"nt-cell-blue\"><p>Trust instrument</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Replacement of existing trustees (s 36(1) TA 1925)</strong></span></p></td><td><p>Power lies with: named person in will/trust; if none, continuing trustees or PR of last survivor. Exercisable: on death, absence abroad &gt;1yr, minority/incapacity, retirement, refusal, unfitness. Must be in writing.</p></td><td><p>s 36(1) TA 1925</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Additional trustees (s 36(6) TA 1925)</strong></span></p></td><td class=\"nt-cell-blue\"><p>Power lies with: named person; if none, current trustees. Cannot exceed 4 (unless expressly permitted). Must be in writing.</p></td><td class=\"nt-cell-blue\"><p>s 36(6) TA 1925</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Appointment by beneficiaries (s 19 TLATA)</strong></span></p></td><td><p>All beneficiaries with S v V rights can direct trustees to appoint a new trustee. Must be in writing. Cannot be used where trust instrument contains express power to appoint.</p></td><td><p>s 19 TLATA 1996</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Appointment by court (s 41 TA 1925)</strong></span></p></td><td class=\"nt-cell-blue\"><p>Court of last resort. Applies where no one is authorised, able or willing to appoint. Court considers settlor&#x27;s wishes, beneficiary disputes, effect on administration. Charity Commission can appoint for charities.</p></td><td class=\"nt-cell-blue\"><p>s 41 TA 1925; s 69(1)(b) Charities Act 2011</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Disclaiming trustee (s 36(8) TA 1925)</strong></span></p></td><td><p>Trustee who declines role treated as &quot;refusing&quot; trustee; can appoint own replacement if willing. If not, PR or court steps in.</p></td><td><p>s 36(8) TA 1925</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 2: Administrative Powers and Duties (TA 2000)</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Power / Duty</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Content</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Statute</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>General power of investment (s 3)</strong></span></p></td><td class=\"nt-cell-blue\"><p>Trustee can make any kind of investment as if absolutely entitled to assets. Subject to standard investment criteria and advice requirements.</p></td><td class=\"nt-cell-blue\"><p>s 3 TA 2000</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Standard investment criteria (s 4)</strong></span></p></td><td><p>Must consider: (1) SUITABILITY \u2013 general suitability of the type AND specific suitability of the particular investment; (2) DIVERSIFICATION \u2013 need to diversify the portfolio. Must review investments regularly. Balances preservation of assets vs income/capital growth (duty of even-handedness).</p></td><td><p>s 4 TA 2000; Cowan v Scargill [1985]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Obligation to take advice (s 5)</strong></span></p></td><td class=\"nt-cell-blue\"><p>Must obtain and consider &quot;proper advice&quot; before exercising investment powers and when reviewing. Advice from person with ability and practical experience in financial matters. May dispense with if reasonably concludes unnecessary (eg cost outweighs benefit; trustee has sufficient expertise).</p></td><td class=\"nt-cell-blue\"><p>s 5 TA 2000</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Acquisition of land (s 8)</strong></span></p></td><td><p>Statutory power to acquire freehold or leasehold UK land (not overseas). For investment OR occupation of beneficiary. When for investment: ss 4 and 5 apply. Statutory duty of care applies to all land acquisition.</p></td><td><p>s 8 TA 2000</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Delegation (s 11)</strong></span></p></td><td class=\"nt-cell-blue\"><p>Broad power to delegate investment and land acquisition powers. Cannot delegate distributive obligations. Cannot delegate to a beneficiary (even if also trustee) (s 12). Must be by written agreement with policy statement (s 15). Trustees must select appropriate agent, review regularly. If duties met, no vicarious liability for agent&#x27;s negligence.</p></td><td class=\"nt-cell-blue\"><p>ss 11-15 TA 2000</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 3: Statutory Duty of Care (s 1 TA 2000)</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Category</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Standard</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Notes</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Lay trustee</strong></span></p></td><td class=\"nt-cell-blue\"><p>Exercise such care and skill as is reasonable in the circumstances, having regard to any special knowledge or experience the trustee has OR holds themselves out as having.</p></td><td class=\"nt-cell-blue\"><p>Only applies to acts listed in Sch 1 TA 2000.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Professional trustee</strong></span></p></td><td><p>Higher standard \u2013 assessed on the special knowledge or experience that is reasonable to expect of a person acting in that PROFESSIONAL capacity.</p></td><td><p>Higher standard regardless of individual expertise.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Common law duty of care</strong></span></p></td><td class=\"nt-cell-blue\"><p>Exercise of diligence and care expected of an ordinary prudent businessperson.</p></td><td class=\"nt-cell-blue\"><p>Separate from statutory duty.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Cowan v Scargill [1985]</strong></span></p></td><td><p>Obligation to act in BEST FINANCIAL interest of beneficiaries. Personal views of trustee irrelevant. Cannot refuse investments on principled grounds if it reduces fund. Trustees not bound by advice but cannot ignore it without reasonable justification.</p></td><td><p>Key principles for investment standard.</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 4: Breach of Trust \u2013 Liability and Loss Assessment</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Issue</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Authority</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What constitutes breach</strong></span></p></td><td class=\"nt-cell-blue\"><p>Acting outside powers (misapplication/misappropriation of trust funds; unauthorised investments) OR complying with powers but breaching associated duties (failure to consider investment criteria; failure to monitor; failure to act in beneficiaries&#x27; best interests).</p></td><td class=\"nt-cell-blue\"><p>\u2014</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Co-trustee liability</strong></span></p></td><td><p>Co-trustees are jointly and severally liable. All must take an active role. Trustees are only liable for their OWN breaches but failure to be active = own breach.</p></td><td><p>\u2014</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Pre-appointment breach</strong></span></p></td><td class=\"nt-cell-blue\"><p>Trustee not liable for breach before appointment. On appointment, must commence proceedings against former trustee; failure = own breach.</p></td><td class=\"nt-cell-blue\"><p>Re Strahan [1856]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Post-retirement liability</strong></span></p></td><td><p>Still liable for breaches during trusteeship. Only liable for post-retirement breaches if retired to FACILITATE the breach OR parted with trust property without due regard (Head v Gould).</p></td><td><p>Head v Gould [1898]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Falsification (misapplication)</strong></span></p></td><td class=\"nt-cell-blue\"><p>Court &quot;falsifies&quot; account; trustees must reconstitute fund to position it would have been in but for the breach. Trustees pay equitable compensation if same property cannot be restored.</p></td><td class=\"nt-cell-blue\"><p>Pre-Target Holdings traditional approach; still applies to traditional trusts</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Surcharging (other breaches)</strong></span></p></td><td><p>Court assesses expected value of trust if breach not occurred. Trustees pay equitable compensation for loss of which breach is &quot;but for&quot; cause (reparation claim). Assessed against what prudent trustees would have done.</p></td><td><p>\u2014</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Bare commercial trusts</strong></span></p></td><td class=\"nt-cell-blue\"><p>Target Holdings approach: &quot;but for&quot; causation only; no obligation to reconstitute fund once underlying commercial transaction completed. Endorsed by SC.</p></td><td class=\"nt-cell-blue\"><p>Target Holdings v Redferns [1996]; AIB Group v Redler [2014]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Offsetting losses against gains</strong></span></p></td><td><p>Generally CANNOT offset losses on one investment against gains on another. Can offset where arising from the SAME transaction or course of dealing.</p></td><td><p>Bartlett v Barclays Bank [1980]</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 5: Defences to Breach of Trust</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Defence</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rules</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Authority</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Exemption clause</strong></span></p></td><td class=\"nt-cell-blue\"><p>Can exclude liability for any breach EXCEPT fraudulent. Does not protect against dishonest breaches.</p></td><td class=\"nt-cell-blue\"><p>Armitage v Nurse [1998]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Fully informed consent</strong></span></p></td><td><p>Trustees not liable if received fully informed consent of ALL beneficiaries. Where only some consent: partial defence against those beneficiaries only. Subsequent affirmation = acquiescence.</p></td><td><p>\u2014</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Impounding beneficiary&#x27;s interest</strong></span></p></td><td class=\"nt-cell-blue\"><p>Where beneficiary instigates breach: court can impound their interest to indemnify trustees. Statutory power (s 62 TA 1925): no requirement for beneficiary to benefit from breach; consent need not be in writing. Common law: must benefit from breach; consent not required in writing.</p></td><td class=\"nt-cell-blue\"><p>s 62 TA 1925</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Statutory limitation (s 21 LA 1980)</strong></span></p></td><td><p>6 years from breach for claims by beneficiaries with interests vested in possession. Future interest: runs from when interest vests in possession. Does NOT apply to fraudulent breaches or proprietary claims.</p></td><td><p>s 21(3) LA 1980</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Laches (equitable)</strong></span></p></td><td class=\"nt-cell-blue\"><p>Even within limitation period, trustees can argue beneficiary knew of breach but delayed unacceptably, making it unconscionable to assert beneficial interest. Fact-specific.</p></td><td class=\"nt-cell-blue\"><p>\u2014</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Section 61 TA 1925</strong></span></p></td><td><p>Court may excuse trustee if acted (1) honestly, (2) reasonably, AND (3) ought fairly to be excused. All three elements required. Court has wide discretion; not used lightly. Easier for lay trustees; helpful if legal advice sought first (Re Evans).</p></td><td><p>s 61 TA 1925; Re Evans [1999]</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 6: Protection of Trustees During Administration</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Mechanism</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>How It Works</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Notes / Cases</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Legal advice on interpretation</strong></span></p></td><td class=\"nt-cell-blue\"><p>Trustees can seek legal advice and act on it; does not automatically prevent liability if wrong. Lawyer should advise on certainty and further steps.</p></td><td class=\"nt-cell-blue\"><p>Not a guaranteed defence</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Seeking court directions</strong></span></p></td><td><p>Safest option. Trustees acting on court directions will never be liable even if subsequent claim. Expensive.</p></td><td><p>\u2014</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>s 48 AJA 1985</strong></span></p></td><td class=\"nt-cell-blue\"><p>Step 1: obtain written legal opinion from barrister or solicitor with 10+ years&#x27; experience. Step 2: apply to High Court for authorisation to rely on it. HC grants order without argument unless there is a dispute.</p></td><td class=\"nt-cell-blue\"><p>s 71 Courts and Legal Services Act 1990</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Surrendering discretion to court</strong></span></p></td><td><p>Where trustees are in disagreement, court makes the decision. Only available for a specific problem \u2013 cannot abdicate ongoing administration.</p></td><td><p>\u2014</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Benjamin orders (missing beneficiaries)</strong></span></p></td><td class=\"nt-cell-blue\"><p>Court permits distribution on a stated assumption (usually that missing beneficiary is dead). Requires full enquiries. Relieves personal liability; does not defeat claims against recipients.</p></td><td class=\"nt-cell-blue\"><p>Re Benjamin [1902]; Re Green&#x27;s Will Trusts [1985]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>s 27 TA 1925 notice (unknown beneficiaries)</strong></span></p></td><td><p>Publish notice of intention to distribute (London Gazette + appropriate newspapers). Two months&#x27; notice. After two months: can distribute to known beneficiaries without personal liability to unknowns.</p></td><td><p>s 27 TA 1925</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Payment into court (s 63 TA 1925)</strong></span></p></td><td class=\"nt-cell-blue\"><p>Where genuine doubt as to location of beneficiaries and all realistic options have failed. Court gets legal control; trustees effectively retire.</p></td><td class=\"nt-cell-blue\"><p>s 63 TA 1925; last resort</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 7: Apportionment of Liability \u2013 CLCA 1978 and Indemnity</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Scenario</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Authority</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>General contribution</strong></span></p></td><td class=\"nt-cell-blue\"><p>Court can require just and equitable contribution from co-trustees under s 1-2 CLCA 1978. Presumes equal responsibility but can depart based on culpability/expertise differences.</p></td><td class=\"nt-cell-blue\"><p>CLCA 1978</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Full indemnity</strong></span></p></td><td><p>Court may award full indemnity where: (1) particular trustee is morally culpable; (2) trustee is also a beneficiary; (3) trustee-solicitor whose breach was committed in reliance on their advice.</p></td><td><p>Re Partington [1857]; Head v Gould [1898]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Re Partington \u2013 solicitor trustee</strong></span></p></td><td class=\"nt-cell-blue\"><p>Solicitor took sole responsibility, failed to inform widow co-trustee, made unauthorised investment. Full indemnity for widow: reasonable to rely on solicitor&#x27;s advice.</p></td><td class=\"nt-cell-blue\"><p>Re Partington [1857]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Head v Gould \u2013 no indemnity</strong></span></p></td><td><p>Lay trustee took an active role in the breach. No controlling influence of solicitor trustee. Indemnity inappropriate.</p></td><td><p>Head v Gould [1898]</p></td></tr></tbody></table></div>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Flashcard Q&amp;A</strong></span></h2>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Question</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Answer</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p>What is the irreducible core of trusteeship?</p></td><td class=\"nt-cell-blue\"><p>A general duty to act honestly and in good faith for the benefit of the beneficiaries. Cannot be removed; must exist for a trust to be enforceable.</p></td></tr>\n<tr><td><p>Who can appoint replacement trustees under s 36(1) TA 1925?</p></td><td><p>Named person in will/trust deed; if none, the continuing trustees; or the PR of the last surviving trustee.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>What are the standard investment criteria under s 4 TA 2000?</p></td><td class=\"nt-cell-blue\"><p>(1) Suitability (general and specific); (2) Need for diversification. Must consider both when making and reviewing investments.</p></td></tr>\n<tr><td><p>What does s 5 TA 2000 require?</p></td><td><p>Trustees must obtain and consider proper advice before exercising investment powers and when reviewing investments. May dispense if reasonably concludes unnecessary.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>What acts are covered by the statutory duty of care (s 1 TA 2000)?</p></td><td class=\"nt-cell-blue\"><p>Acts listed in Schedule 1 TA 2000, including: exercising powers of investment; acquiring land; delegating; acting in relation to nominees and custodians.</p></td></tr>\n<tr><td><p>Can a trustee offset losses on one investment against gains on another?</p></td><td><p>Generally NO. Exception: where losses and gains arise from the SAME transaction or course of dealing (Bartlett v Barclays Bank).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>What is the distinction between falsification and surcharging?</p></td><td class=\"nt-cell-blue\"><p>Falsification: misapplication \u2013 restore trust to pre-breach position. Surcharging: other breaches \u2013 equitable compensation for &quot;but for&quot; loss assessed against what prudent trustees would have done.</p></td></tr>\n<tr><td><p>What did Target Holdings establish?</p></td><td><p>For bare commercial trusts (only subsisting during an underlying commercial transaction), &quot;but for&quot; causation applies; trustee has no ongoing obligation to reconstitute the fund once the transaction is complete.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>What are the requirements for s 61 TA 1925 relief?</p></td><td class=\"nt-cell-blue\"><p>Must show: (1) acted honestly; (2) acted reasonably; (3) ought fairly to be excused. All three required; court has wide discretion.</p></td></tr>\n<tr><td><p>What is the effect of Armitage v Nurse on exemption clauses?</p></td><td><p>An exemption clause can exclude liability for any breach of trust EXCEPT fraudulent breach. A trustee who acts dishonestly cannot rely on an exemption clause.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>What is a Benjamin order?</p></td><td class=\"nt-cell-blue\"><p>A court order permitting trustees to distribute on the basis of a stated assumption (typically that a missing beneficiary is presumed dead) after full enquiries have failed to locate them.</p></td></tr>\n<tr><td><p>What is the effect of a s 27 TA 1925 notice?</p></td><td><p>After two months from publishing notice in London Gazette and appropriate newspapers, trustees can distribute to known beneficiaries without personal liability to unknown beneficiaries who subsequently emerge.</p></td></tr></tbody></table></div>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Common Exam Pitfalls</strong></span></h2>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Pitfall</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Correct Position</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Thinking all breaches use &quot;but for&quot; causation after Target Holdings</strong></span></p></td><td class=\"nt-cell-blue\"><p>Target Holdings only applies to BARE COMMERCIAL trusts. For traditional express trusts, the traditional falsification/surcharging approach still applies.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Forgetting that professionals are held to a higher standard</strong></span></p></td><td><p>s 1(1)(b) TA 2000: professional trustees are assessed on the special knowledge and experience reasonably expected of a person in that professional capacity \u2013 a higher bar than lay trustees.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Allowing trustees to offset unrelated gains against losses</strong></span></p></td><td class=\"nt-cell-blue\"><p>Cannot set off profits from other investments against a loss from a breach. Offset only possible where arising from the SAME transaction (Bartlett).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Misapplying s 61 TA 1925 too easily</strong></span></p></td><td><p>All three elements (honesty + reasonableness + fairness to excuse) are required. The court uses s 61 sparingly; denying a remedy to beneficiaries is a serious step.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Thinking consent is a complete defence where only some beneficiaries consent</strong></span></p></td><td class=\"nt-cell-blue\"><p>Only a PARTIAL defence \u2013 operates against those beneficiaries who consented. Non-consenting beneficiaries can still claim.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Treating personal liability and impounding as equivalent</strong></span></p></td><td><p>Impounding reduces or eliminates the instigating beneficiary&#x27;s own share. It is a reduction of their interest, not a claim against them personally.</p></td></tr></tbody></table></div>"
      }

      {
        "id": "trusts-w4",
        "title": "W4: Fiduciaries and Accessory Liability",
        "content": "<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Trusts Law \u2013 W4: Fiduciaries and Accessory Liability</strong></span></h2>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Topic Overview</strong></span></h2>\n<p>1. Fiduciary relationships: single-minded loyalty; two core duties: no-conflict and no-profit</p>\n<p>2. Accessory liability (dishonest assistance): four requirements (Group Seven v Nasir); fault = dishonesty</p>\n<p>3. Dishonesty test: Ivey v Genting \u2013 (1) ascertain subjective knowledge/belief; (2) apply objective standard of ordinary decent people</p>\n<p>4. Assistance: planning, committing, or covering up breach; must be more than minimal; procuring/instigating also sufficient</p>\n<p>5. Remedies for dishonest assistance: loss caused by breach; also profits (Novoship \u2013 &quot;real or effective&quot; cause; court has discretion)</p>\n<p>6. Knowing receipt (recipient liability): four requirements (El Ajou); fault = knowledge making retention unconscionable</p>\n<p>7. Beneficial receipt requirement: must be in own right (Trustor v Smallbone); ministerial receipt insufficient (Agip)</p>\n<p>8. Persistence of equitable proprietary interest requirement: Byers v Saudi National Bank</p>\n<p>9. Knowledge test: BCCI v Akindele \u2013 unconscionability; Baden scale types 1\u20135; Armstrong DLW applied</p>\n<p>10. Claims can be run in the alternative; different remedies: dishonest assistance may yield greater remedy</p>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Summary Revision Tables</strong></span></h2>\n<p><span class=\"nt-txt-blue\"><strong>Table 1: Fiduciary Duties \u2013 Core Rules</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Duty</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Content and Scope</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Fiduciary relationship</strong></span></p></td><td class=\"nt-cell-blue\"><p>One party owes a duty of single-minded loyalty to the other. Arises in established categories (trustee-beneficiary, solicitor-client, director-company, agent-principal) and can arise on facts.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>No-conflict rule</strong></span></p></td><td><p>A fiduciary must not put themselves in a position where their personal interests conflict with their duties to the principal. Applies regardless of whether any harm results to the principal.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>No-profit rule</strong></span></p></td><td class=\"nt-cell-blue\"><p>A fiduciary must not obtain an unauthorised benefit (for themselves or a third party) as a result of their position. Applies even where the profit does not harm the principal.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Breach without loss</strong></span></p></td><td><p>A trustee may breach fiduciary duties even if the trust has not suffered a financial loss \u2014 e.g. making an authorised, profitable investment while secretly taking a commission (unauthorised personal profit).</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 2: Accessory Liability (Dishonest Assistance) \u2013 Requirements</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Element</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Authority</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>(1) Trust in existence</strong></span></p></td><td class=\"nt-cell-blue\"><p>Must be a trust (or fiduciary duty) in existence at the material time.</p></td><td class=\"nt-cell-blue\"><p>Group Seven Ltd v Nasir [2019]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>(2) Breach by trustee/fiduciary</strong></span></p></td><td><p>The trustee or fiduciary must have committed a breach of that trust or fiduciary duty.</p></td><td><p>Group Seven [2019]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>(3) Assistance by defendant</strong></span></p></td><td class=\"nt-cell-blue\"><p>D must assist in planning, committing, or covering up the breach. Must be MORE than minimal and must have made commission/concealment easier. Also sufficient: D procures or instigates the breach (Eaves v Hickson). D cannot avoid liability by showing breach would have occurred without their help.</p></td><td class=\"nt-cell-blue\"><p>Group Seven [2019]; Ultraframe v Fielding [2005]; Eaves v Hickson [1861]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>(4) D&#x27;s assistance was dishonest</strong></span></p></td><td><p>Dishonesty is required (not mere negligence). Two-stage test: (1) ascertain D&#x27;s actual knowledge/belief as to the facts (SUBJECTIVE); (2) apply the objective standard of ordinary decent people to those facts (OBJECTIVE). Dishonesty is not a requirement for knowing receipt.</p></td><td><p>Royal Brunei Airlines v Tan [1995]; Ivey v Genting Casinos [2017]</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 3: Accessory Liability \u2013 Key Cases</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Case</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Facts / Held</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Principle</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Royal Brunei Airlines v Tan [1995]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Airline&#x27;s ticket agent held proceeds on trust; MD caused company to misapply them. Company went insolvent. MD held personally liable.</p></td><td class=\"nt-cell-blue\"><p>Established dishonesty as the fault requirement for accessory liability. Trustee need not be dishonest.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Ivey v Genting Casinos [2017]</strong></span></p></td><td><p>SC reformulated dishonesty test. Two-stage: (1) subjective knowledge of facts; (2) objective assessment of conduct against standard of ordinary decent people.</p></td><td><p>Replaces prior Ghosh test for civil and criminal dishonesty.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Starglade</strong></span><span class=\"nt-txt-blue\"><strong> Properties v Nash [2010]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Nash caused company to misapply trust property dishonestly. Held liable. Irrelevant that Nash did not know a trust existed.</p></td><td class=\"nt-cell-blue\"><p>Knowledge of the existence of a trust is NOT a prerequisite for liability.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Group Seven v Nasir [2019]</strong></span></p></td><td><p>Reformulated requirements. On causation: must show D&#x27;s conduct assisted the breach AND that but for the breach the loss would not have occurred.</p></td><td><p>Leading authority on requirements and causation for dishonest assistance.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Novoship</strong></span><span class=\"nt-txt-blue\"><strong> (UK) v </strong></span><span class=\"nt-txt-blue\"><strong>Mikhaylyuk</strong></span><span class=\"nt-txt-blue\"><strong> [2014]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Dishonest assistant also potentially liable for profits acquired by reason of participation in breach. Must show participation was the &quot;real or effective&quot; cause. &quot;But for&quot; insufficient. Court has discretion; remedy withheld if disproportionate.</p></td><td class=\"nt-cell-blue\"><p>Extends remedy to account of profits in appropriate cases.</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 4: Knowing Receipt (Recipient Liability) \u2013 Requirements</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Element</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Authority</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>(1) Misapplication of trust property</strong></span></p></td><td class=\"nt-cell-blue\"><p>Misapplication of trust property or property held in another fiduciary capacity.</p></td><td class=\"nt-cell-blue\"><p>El Ajou v Dollar Land Holdings [1994]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>(2) Beneficial receipt</strong></span></p></td><td><p>D must receive the property &quot;for their own benefit or in their own right in the sense of setting up a title of their own.&quot; Receipt in a MINISTERIAL capacity is INSUFFICIENT (e.g. agent receiving for principal).</p></td><td><p>Trustor AB v Smallbone (No 2) [2001]; Agip (Africa) v Jackson [1990]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Bank receipt \u2013 in credit</strong></span></p></td><td class=\"nt-cell-blue\"><p>Where money is paid to a bank and credited to an IN CREDIT account: bank does NOT receive beneficially (creates debtor-creditor relationship).</p></td><td class=\"nt-cell-blue\"><p>Agip (Africa) v Jackson [1990]; Polly Peck v Nadir (No 2) [1992]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Bank receipt \u2013 overdrawn</strong></span></p></td><td><p>Where money is paid to a bank and credited to an OVERDRAWN account: bank DOES receive beneficially to the extent the payment reduces/discharges indebtedness.</p></td><td><p>Uzinterimpex JSC v Standard Bank [2008]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>(3) Persistence of equitable proprietary interest</strong></span></p></td><td class=\"nt-cell-blue\"><p>If the transfer to D extinguishes the claimant&#x27;s equitable proprietary interest, no knowing receipt claim lies. Example: overreaching under s 2 LPA 1925 extinguishes beneficiaries&#x27; interest when land sold to purchaser paying purchase money to two trustees.</p></td><td class=\"nt-cell-blue\"><p>Byers v Saudi National Bank [2022]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>(4) Knowledge making retention unconscionable</strong></span></p></td><td><p>Recipient&#x27;s state of knowledge must make it unconscionable to retain the benefit. Dishonesty NOT required. If recipient disposes/dissipates before acquiring knowledge: no personal liability. Once knowledge acquired: must restore or face personal liability.</p></td><td><p>BCCI v Akindele [2001]; Re Montagu&#x27;s Settlement [1987]</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 5: Baden Scale of Knowledge</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Type</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Description</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Effect (Armstrong DLW v Winnington [2012])</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>1</strong></span></p></td><td class=\"nt-cell-blue\"><p>Actual knowledge.</p></td><td class=\"nt-cell-blue\"><p>Renders receipt unconscionable. D is liable in knowing receipt.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>2</strong></span></p></td><td><p>Wilfully shutting one&#x27;s eyes to the obvious.</p></td><td><p>Renders receipt unconscionable. D is liable in knowing receipt.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>3</strong></span></p></td><td class=\"nt-cell-blue\"><p>Wilfully and recklessly failing to make enquiries that an honest and reasonable person would make.</p></td><td class=\"nt-cell-blue\"><p>Renders receipt unconscionable. D is liable in knowing receipt.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>4</strong></span></p></td><td><p>Knowledge of circumstances which would indicate the facts to an honest and reasonable person.</p></td><td><p>Only renders receipt unconscionable if a reasonable person would have (a) appreciated the transfer was probably in breach of trust AND (b) made enquiries or sought advice which would have revealed the probability.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>5</strong></span></p></td><td class=\"nt-cell-blue\"><p>Knowledge of circumstances which would put an honest and reasonable person on inquiry.</p></td><td class=\"nt-cell-blue\"><p>Same as Type 4 \u2013 higher threshold; must also show the reasonable person would have followed through with enquiries.</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 6: Dishonest Assistance vs Knowing Receipt \u2013 Comparison</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Feature</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Dishonest Assistance</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Knowing Receipt</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Fault requirement</strong></span></p></td><td class=\"nt-cell-blue\"><p>DISHONESTY (Ivey v Genting two-stage test).</p></td><td class=\"nt-cell-blue\"><p>KNOWLEDGE making retention unconscionable (BCCI v Akindele). Dishonesty NOT required.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Need to receive property?</strong></span></p></td><td><p>NO \u2013 liability based on assistance, not receipt.</p></td><td><p>YES \u2013 must beneficially receive the misapplied property or traceable proceeds.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Remedy</strong></span></p></td><td class=\"nt-cell-blue\"><p>Personal liability for the LOSS CAUSED by the breach (regardless of whether D personally profited). Plus possible account of profits (Novoship \u2013 &quot;real or effective&quot; cause; court&#x27;s discretion).</p></td><td class=\"nt-cell-blue\"><p>Personal liability limited to the VALUE of what was BENEFICIALLY RECEIVED. Plus possible proprietary claim if D still holds the property.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Basis of liability</strong></span></p></td><td><p>Secondary/accessory liability. D assists primary wrongdoer.</p></td><td><p>Primary liability. D has received trust property and retained it unconscionably.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Can claims be combined?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Yes \u2013 both claims can be pleaded in the alternative against the same defendant.</p></td><td class=\"nt-cell-blue\"><p>Yes \u2013 same defendant may face both claims; different requirements mean one may succeed where other fails.</p></td></tr></tbody></table></div>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Liability Structures</strong></span></h2>\n<p>The following structures set out the analytical steps for each potential claim. Work through each stage in order when answering a problem question.</p>\n<p><span class=\"nt-txt-blue\"><strong>Structure 1: Fiduciary Duty / Breach of Fiduciary Duty</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>1</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Is there a fiduciary relationship?</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-cream\"></td><td class=\"nt-cell-cream\"><p>Identify a recognised fiduciary relationship (e.g. trustee-beneficiary, solicitor-client, director-company, agent-principal) or establish one on the facts. The core obligation is single-minded loyalty.</p></td></tr>\n<tr><th class=\"nt-hdr-blue\"><p><strong>2</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Has the fiduciary breached their fiduciary duty?</strong></p></th></tr>\n<tr><td class=\"nt-cell-cream\"></td><td class=\"nt-cell-cream\"><p>Consider which duty has been breached. There are two:</p>\n<p><strong>     (A) Unauthorised profit (no-profit rule):</strong> the fiduciary has obtained a personal benefit from their position without authorisation.</p>\n<p><strong>     (B) No-conflict rule:</strong> the fiduciary has placed themselves in a position where their personal interest conflicts with their duty to the principal.</p>\n<p><em>Note: a breach can occur even where the trust fund has not suffered a financial loss and even where the transaction was otherwise beneficial.</em></p></td></tr>\n<tr><th class=\"nt-hdr-blue\"><p><strong>3</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Remedy?</strong></p></th></tr>\n<tr><td class=\"nt-cell-cream\"></td><td class=\"nt-cell-cream\"><p>The remedy depends on which duty was breached:</p>\n<p><strong>     (A) Unauthorised profit:</strong> Account of profits (personal remedy) or constructive trust over the profit (proprietary remedy). The constructive trust is preferable where the fiduciary is insolvent or the profit has appreciated in value.</p>\n<p><strong>     (B) No-conflict rule:</strong> Equitable compensation (personal remedy) for any loss caused to the principal by the conflict.</p></td></tr>\n<tr><th class=\"nt-hdr-blue\"><p><strong>4</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Defences?</strong></p></th></tr>\n<tr><td class=\"nt-cell-cream\"></td><td class=\"nt-cell-cream\"><p>Consider whether any defences are available: fully informed consent of the beneficiaries/principal; authorisation in the trust instrument or by the court; statutory relief (s 61 TA 1925 for trustee-fiduciaries). Note: no defence available for fraudulent breach.</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Structure 2: Accessory Liability (Dishonest Assistance)</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>1</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Trust / fiduciary relationship</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-cream\"></td><td class=\"nt-cell-cream\"><p>There must be a trust or fiduciary duty in existence at the material time (Group Seven Ltd v Nasir [2019]). Identify the trust or fiduciary relationship and confirm it existed when the defendant assisted.</p></td></tr>\n<tr><th class=\"nt-hdr-blue\"><p><strong>2</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Breach of trust / fiduciary duty</strong></p></th></tr>\n<tr><td class=\"nt-cell-cream\"></td><td class=\"nt-cell-cream\"><p>The trustee or fiduciary must have committed a breach of that trust or fiduciary duty. The trustee/fiduciary does NOT need to have acted dishonestly (Royal Brunei Airlines v Tan [1995]).</p></td></tr>\n<tr><th class=\"nt-hdr-blue\"><p><strong>3</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Assistance</strong></p></th></tr>\n<tr><td class=\"nt-cell-cream\"></td><td class=\"nt-cell-cream\"><p>The defendant must have assisted the trustee/fiduciary in planning, committing, or covering up the breach. Also sufficient to procure or instigate the breach (Eaves v Hickson [1861]). The assistance must be more than minimal and must have made commission or concealment easier (Ultraframe v Fielding [2005]; Group Seven). It is no defence that the breach would have occurred without the assistance.</p></td></tr>\n<tr><th class=\"nt-hdr-blue\"><p><strong>4</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Dishonest \u2014 two-stage test (Ivey v Genting Casinos [2017])</strong></p></th></tr>\n<tr><td class=\"nt-cell-cream\"></td><td class=\"nt-cell-cream\"><p><strong>     Stage 1 \u2014 Subjective knowledge:</strong> ascertain the defendant&#x27;s actual state of knowledge or belief as to the facts (subjective inquiry).</p>\n<p><strong>     Stage 2 \u2014 Objective standard:</strong> applying those facts, was the defendant&#x27;s conduct dishonest by the standards of ordinary decent people (objective inquiry)? The defendant does not need to know that a trust legally exists \u2014 knowledge of the relevant facts is sufficient (Starglade v Nash [2010]).</p></td></tr>\n<tr><th class=\"nt-hdr-blue\"><p><strong>5</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Extent of liability</strong></p></th></tr>\n<tr><td class=\"nt-cell-cream\"></td><td class=\"nt-cell-cream\"><p><strong>     Losses:</strong> the dishonest assistant is personally liable for the full loss occasioned by the breach which they assisted. The claimant must show that D&#x27;s conduct assisted the breach AND that but for the breach the loss would not have occurred (Group Seven).</p>\n<p><strong>     Profits:</strong> D may also be liable to account for any profits they personally acquired as a result of their participation in the breach, provided their participation was the real or effective cause of the profit. The court has a discretion to grant or withhold this remedy where it would be disproportionate (Novoship v Mikhaylyuk [2014]).</p></td></tr></tbody></table></div>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Flashcard Q&amp;A</strong></span></h2>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Question</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Answer</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p>What are the two core fiduciary duties?</p></td><td class=\"nt-cell-blue\"><p>(1) No-conflict: must not place personal interests in conflict with duties to principal. (2) No-profit: must not obtain unauthorised benefit from their fiduciary position.</p></td></tr>\n<tr><td><p>What are the four requirements for dishonest assistance?</p></td><td><p>(1) Trust in existence; (2) trustee committed a breach; (3) D assisted that breach; (4) D&#x27;s assistance was dishonest. (Group Seven v Nasir)</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>What is the dishonesty test after Ivey v Genting?</p></td><td class=\"nt-cell-blue\"><p>(1) Ascertain D&#x27;s ACTUAL subjective knowledge/belief as to the facts; (2) Ask whether conduct was dishonest by the objective standard of ordinary decent people.</p></td></tr>\n<tr><td><p>Can a defendant escape liability by showing the breach would have occurred anyway?</p></td><td><p>No. Any assistance, however small above minimal, creates liability. D cannot avoid liability by showing the breach would have occurred without their help.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>Is dishonesty required for knowing receipt?</p></td><td class=\"nt-cell-blue\"><p>NO. Knowing receipt requires only knowledge making it unconscionable to retain the receipt (BCCI v Akindele).</p></td></tr>\n<tr><td><p>What is &quot;ministerial receipt&quot; and why does it not found a knowing receipt claim?</p></td><td><p>Receipt by an agent on behalf of a principal \u2013 the agent does not receive the property in their own right; they hold it for the principal. No beneficial receipt (Agip v Jackson).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>When does a bank beneficially receive money paid into a customer&#x27;s account?</p></td><td class=\"nt-cell-blue\"><p>Only when the account is OVERDRAWN \u2013 to the extent the payment reduces/discharges the customer&#x27;s indebtedness. An in-credit account creates only a debtor-creditor relationship.</p></td></tr>\n<tr><td><p>What did Byers v Saudi National Bank establish?</p></td><td><p>If the transfer of the misapplied property to D extinguishes the claimant&#x27;s equitable proprietary interest (e.g. by overreaching), no knowing receipt claim will lie.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>What is the effect of Baden Types 1\u20133 vs Types 4\u20135?</p></td><td class=\"nt-cell-blue\"><p>Types 1\u20133 automatically render receipt unconscionable. Types 4\u20135 only do so if a reasonable person would also have appreciated the breach was probable AND made further enquiries (Armstrong DLW).</p></td></tr>\n<tr><td><p>What is the remedy for dishonest assistance vs knowing receipt?</p></td><td><p>Dishonest assistance: full loss caused by the breach (not limited to personal gain). Knowing receipt: value of what was beneficially received.</p></td></tr></tbody></table></div>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Common Exam Pitfalls</strong></span></h2>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Pitfall</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Correct Position</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Requiring dishonesty for knowing receipt</strong></span></p></td><td class=\"nt-cell-blue\"><p>WRONG. Knowing receipt only requires knowledge making retention unconscionable (BCCI v Akindele). Dishonesty is the requirement for DISHONEST ASSISTANCE, not knowing receipt.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Requiring the trustee to be dishonest for accessory liability</strong></span></p></td><td><p>The trustee need NOT be dishonest. It is the ASSISTANT&#x27;s dishonesty that matters (Royal Brunei v Tan).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Thinking D must know a trust exists for dishonest assistance</strong></span></p></td><td class=\"nt-cell-blue\"><p>Knowledge that a trust exists is NOT a prerequisite. D need only act dishonestly in assisting the breach (Starglade v Nash).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Confusing ministerial and beneficial receipt</strong></span></p></td><td><p>An agent receiving property for a principal receives ministerially \u2013 NOT beneficially. No knowing receipt claim unless agent receives in their own right.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Treating in-credit bank accounts as beneficial receipt</strong></span></p></td><td class=\"nt-cell-blue\"><p>Bank credited to an IN CREDIT account does NOT receive beneficially \u2013 only creates a debt. Only OVERDRAWN accounts can give rise to beneficial receipt by the bank.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Mixing up the remedies for the two claims</strong></span></p></td><td><p>Dishonest assistance: liability for full LOSS caused by breach (can exceed what D received). Knowing receipt: limited to VALUE BENEFICIALLY RECEIVED by D.</p></td></tr></tbody></table></div>"
      }

        "id": "trusts-w5",
        "title": "W5: Proprietary Interests & Tracing",
        "content": "<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Trusts Law \u2013 W5: Proprietary Interest, Tracing and Equitable Remedies</strong></span></h2>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Topic Overview</strong></span></h2>\n<p>1. Equitable remedies: discretionary; personal (equitable compensation) vs proprietary; advantages of proprietary claims</p>\n<p>2. Following: tracking same asset as it moves from hand to hand (Foskett)</p>\n<p>3. Tracing: identifying a new asset as the substitute for the old (Foskett); requires series of direct substitutions (Relfo)</p>\n<p>4. Claiming: assertion of personal or proprietary right in the misapplied property or traceable proceeds</p>\n<p>5. Conditions for following/tracing (Re Diplock): (1) equity recognised right of property; (2) fiduciary relationship with claimant</p>\n<p>6. Simple case (unmixed funds): beneficial ownership or equitable lien</p>\n<p>7. Wrongful mixtures: Re Hallett (dissipations = trustee&#x27;s own money); Re Oatway (identifiable asset = trust); cherry-picking (Shalson)</p>\n<p>8. Innocent mixtures: ratable sharing (Re Diplock). Current accounts: Clayton&#x27;s Case (FIFO, readily displaced); pari passu ex post facto; rolling charge method</p>\n<p>9. Proprietary claims: unmixed \u2192 beneficial ownership or lien; wrongful mixture \u2192 proportionate share or lien (trustee subordinated); innocent mixture \u2192 proportionate share only</p>\n<p>10. Subrogation: Boscawen v Bajwa \u2013 where trust money pays off a secured debt</p>\n<p>11. Defence: bona fide purchaser of legal interest without notice</p>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Summary Revision Tables</strong></span></h2>\n<p><span class=\"nt-txt-blue\"><strong>Table 1: Following, Tracing and Claiming \u2013 Definitions</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Concept</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Definition (Foskett v McKeown [2001])</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Key Point</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Following</strong></span></p></td><td class=\"nt-cell-blue\"><p>The process of following the same asset as it moves from hand to hand.</p></td><td class=\"nt-cell-blue\"><p>Locates the misapplied trust property itself.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Tracing</strong></span></p></td><td><p>The process of identifying a new asset as the substitute for the old. General rule: one asset is the traceable proceed of another if there is &quot;a series of direct substitutions between them&quot; (Relfo v Varsani [2014]).</p></td><td><p>Identifies a substitute asset when original has been exchanged.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Claiming</strong></span></p></td><td class=\"nt-cell-blue\"><p>The assertion of a personal or proprietary right in relation to misapplied trust property or its traceable proceeds.</p></td><td class=\"nt-cell-blue\"><p>The remedy-seeking step after following/tracing.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Conditions (Re Diplock [1948])</strong></span></p></td><td><p>(1) Claimant had a &quot;right of property recognised by equity&quot; in the asset; AND (2) asset held by person in a FIDUCIARY relationship with the claimant. Applied liberally: extends to executor/director misapplications.</p></td><td><p>Easily satisfied for express trusts. Diplock applied liberally.</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 2: Benefits of Proprietary vs Personal Claims</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Proprietary Claim \u2013 Advantages</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Limits / Notes</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p>Not affected by D&#x27;s bankruptcy or insolvency \u2013 beneficiary ranks ahead of unsecured creditors.</p></td><td class=\"nt-cell-blue\"><p>Must identify a specific asset representing the proceeds of the breach.</p></td></tr>\n<tr><td><p>Captures increases in value of traceable proceeds.</p></td><td><p>Cannot make proprietary claim against bona fide purchaser of legal interest without notice.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>Does not depend on fault \u2013 can be maintained against innocent recipients.</p></td><td class=\"nt-cell-blue\"><p>Tracing rules must first be satisfied to identify the asset.</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 3: Tracing Rules \u2013 Mixed Funds in Bank Accounts</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Scenario</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Simple / unmixed</strong></span></p></td><td class=\"nt-cell-blue\"><p>Asset acquired exclusively with misapplied trust money. Beneficiary can assert beneficial ownership OR enforce equitable lien (preferred where asset has fallen in value).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Wrongful mixture \u2013 dissipations (Re Hallett [1880])</strong></span></p></td><td><p>Trustee&#x27;s dissipations attributed to TRUSTEE&#x27;s money first. Trust money treated as remaining balance. He cannot take trust money when he has the right to take his own.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Wrongful mixture \u2013 identifiable asset later (Re Oatway [1903])</strong></span></p></td><td class=\"nt-cell-blue\"><p>Cannot use Hallett to claim identifiable asset when trust money later dissipated. Order of withdrawals NOT determinative \u2013 identifiable asset attributed to the trust.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Cherry-picking (Shalson v Russo [2003])</strong></span></p></td><td><p>In a two-party dispute (beneficiary vs trustee only): beneficiary can attribute MOST PROFITABLE applications to trust. Cannot cherry-pick where it would prejudice innocent third parties.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Innocent mixtures \u2013 general (Re Diplock)</strong></span></p></td><td class=\"nt-cell-blue\"><p>Withdrawals attributed RATEABLY to contributors. All innocent parties share rateably; cannot prefer one over another (Foskett).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Innocent mixtures \u2013 current accounts (Clayton&#x27;s Case [1816])</strong></span></p></td><td><p>FIRST IN FIRST OUT (FIFO). First money in is deemed first money out. Readily displaced where contrary to parties&#x27; intentions, impracticable, or unfair (Barlow Clowes [1992]). Disapplied in every case since Barlow Clowes.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Pari passu ex post facto</strong></span></p></td><td class=\"nt-cell-blue\"><p>Identify all amounts contributed; attribute ALL withdrawals and remaining balance fractionally to all contributors regardless of order. Single calculation after the event.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Rolling charge method (preferred)</strong></span></p></td><td><p>Each individual withdrawal attributed fractionally to contributors immediately BEFORE that withdrawal. Fractional contribution recalculated every time money is credited. Generally preferred over pari passu (Barlow Clowes; Shalson).</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 4: Proprietary Claims \u2013 Type of Claim Available by Mixture Type</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Asset Type</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Available Claim(s)</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Notes</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Unmixed \u2013 trust property followed</strong></span></p></td><td class=\"nt-cell-blue\"><p>Assert equitable proprietary interest; holder must restore to fund (Re Diplock).</p></td><td class=\"nt-cell-blue\"><p>\u2014</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Unmixed \u2013 asset acquired exclusively with misapplied trust money</strong></span></p></td><td><p>(1) Assert BENEFICIAL OWNERSHIP of asset; OR (2) Enforce EQUITABLE LIEN over asset to secure personal claim against trustee.</p></td><td><p>Choose lien where asset has decreased in value \u2013 converts personal claim into a secured one.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Wrongful mixture (trust + trustee&#x27;s own money)</strong></span></p></td><td class=\"nt-cell-blue\"><p>(1) Claim PROPORTIONATE SHARE of asset (captures increases in value); OR (2) Enforce EQUITABLE LIEN for amount misapplied.</p></td><td class=\"nt-cell-blue\"><p>Trustee&#x27;s interest SUBORDINATED to beneficiary&#x27;s \u2013 trustee cannot claim share until beneficiary fully satisfied.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Innocent mixture (trust money + innocent third party)</strong></span></p></td><td><p>PROPORTIONATE SHARE only (Diplock; Foskett). Cannot assert lien over innocent party&#x27;s share.</p></td><td><p>All innocent contributors treated equally; share rateably.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Subrogation (Boscawen v Bajwa [1996])</strong></span></p></td><td class=\"nt-cell-blue\"><p>Where misapplied trust money pays off a secured debt, beneficiary is subrogated to creditor&#x27;s security rights.</p></td><td class=\"nt-cell-blue\"><p>Steps into creditor&#x27;s shoes; asserts equivalent security.</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 5: Key Tracing Cases</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Case</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Key Rule</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Scenario</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Foskett v McKeown [2001]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Defines following, tracing, claiming. Innocent mixtures: share rateably. Tracing extends to physical mixtures of fungible goods.</p></td><td class=\"nt-cell-blue\"><p>Life insurance premiums paid with misapplied trust money; beneficiaries traced into payout.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Re Hallett&#x27;s Estate [1880]</strong></span></p></td><td><p>Trustee&#x27;s dissipations attributed to trustee&#x27;s OWN money, preserving trust money as remaining balance.</p></td><td><p>Wrongful mixture in solicitor&#x27;s bank account.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Re Oatway [1903]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Cannot use Hallett to claim identifiable asset when trust money later dissipated. Order of withdrawals NOT determinative.</p></td><td class=\"nt-cell-blue\"><p>Trustee bought shares and later dissipated remainder.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Shalson v Russo [2003]</strong></span></p></td><td><p>Beneficiary can cherry-pick most profitable applications in two-party dispute. Cannot cherry-pick where third parties prejudiced.</p></td><td><p>Wrongful mixture; various applications of mixed fund.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Barlow Clowes v Vaughn [1992]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Clayton&#x27;s Case disapplied where contrary to parties&#x27; intentions, impracticable, or unfair. Disapplied in every subsequent case.</p></td><td class=\"nt-cell-blue\"><p>Investment fraud; multiple innocent contributors.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Re Diplock [1948]</strong></span></p></td><td><p>Conditions for following/tracing; ratable sharing for innocent mixtures.</p></td><td><p>Executors paid wrong charities; estate sought remedy.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Boscawen v Bajwa [1996]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Subrogation available where trust money used to pay off a secured debt.</p></td><td class=\"nt-cell-blue\"><p>Mortgage paid off with misapplied funds.</p></td></tr></tbody></table></div>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Worked Examples</strong></span></h2>\n<p>The following examples illustrate how the tracing rules and proprietary claims operate in practice. All figures are chosen for clarity of calculation.</p>\n<h4 class=\"notes-h4\"><span class=\"nt-txt-blue\"><strong>Example 1 \u2013 Simple Case (Unmixed Funds)</strong></span></h4>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><tbody><tr><td class=\"nt-cell-cream\"><p><span class=\"nt-txt-gold\"><strong>Facts</strong></span></p>\n<p>T is the trustee of a trust fund containing \u00a320,000.</p>\n<p>T withdraws the entire \u00a320,000 from the trust account and uses it to purchase shares (now worth \u00a325,000).</p>\n<p>T keeps no money of their own in the account \u2014 the shares are purchased EXCLUSIVELY with trust money.</p>\n<p>The trust has been misapplied. The beneficiaries wish to make a claim.</p></td></tr></tbody></table></div>\n<h4 class=\"notes-h4\"><span class=\"nt-txt-navy\"><strong>Step 1 \u2014 Can the beneficiaries follow or trace?</strong></span></h4>\n<p>Following: The \u00a320,000 was held in the trust account under an express trust (Re Diplock conditions satisfied). The beneficiaries can follow the cash as it left the trust account.</p>\n<p>Tracing: The shares are the direct substitute for the \u00a320,000 \u2014 a single direct substitution (Relfo v Varsani). The shares are the traceable proceeds of the misapplied trust money.</p>\n<h4 class=\"notes-h4\"><span class=\"nt-txt-navy\"><strong>Step 2 \u2014 What proprietary claim is available?</strong></span></h4>\n<p>Because the shares were acquired EXCLUSIVELY with trust money (unmixed), the beneficiaries can choose between two claims:</p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Option</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Outcome and When to Use It</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>(A) Assert beneficial ownership of the shares</strong></span></p></td><td class=\"nt-cell-blue\"><p>Beneficiaries claim they are the true owners of the shares. Since shares have risen from \u00a320,000 \u2192 \u00a325,000, they capture the \u00a35,000 increase in value. This is the better option where the asset has appreciated.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>(B) Enforce an equitable lien for \u00a320,000</strong></span></p></td><td><p>Beneficiaries secure their \u00a320,000 personal claim against the trustee over the shares as an asset. The lien makes the personal claim secured rather than unsecured \u2014 useful if T is insolvent. Better if the shares have FALLEN in value (e.g. to \u00a315,000) \u2014 claiming ownership would crystallise a loss, but a lien secures the full \u00a320,000.</p></td></tr></tbody></table></div>\n<p><em>Key point: Where the asset has INCREASED in value \u2192 assert beneficial ownership to capture the gain. Where it has DECREASED \u2192 equitable lien secures the original sum as a priority claim.</em></p>\n<h4 class=\"notes-h4\"><span class=\"nt-txt-blue\"><strong>Example 2 \u2013 Wrongful Mixture: Re Hallett Principle (Dissipation)</strong></span></h4>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><tbody><tr><td class=\"nt-cell-cream\"><p><span class=\"nt-txt-gold\"><strong>Facts</strong></span></p>\n<p>T is trustee of a trust. T mixes \u00a310,000 of trust money and \u00a310,000 of T&#x27;s own money in one bank account (balance: \u00a320,000).</p>\n<p>T then withdraws \u00a310,000 and spends it on a holiday (dissipation \u2014 no traceable proceeds).</p>\n<p>The remaining balance is \u00a310,000.</p>\n<p>T claims the remaining \u00a310,000 is trust money that was &quot;spent first&quot; since it went in first.</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-navy\"><strong>Applying Re Hallett&#x27;s Estate [1880]</strong></span></p>\n<p>T&#x27;s argument fails. A trustee &quot;cannot be heard to say that he took away the trust money when he had a right to take away his own money.&quot; The dissipation is attributed to T&#x27;s OWN money, not the trust money.</p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-slate\"><p><strong>Event</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>Trustee&#x27;s \u00a3</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>Trust \u00a3</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>Balance \u00a3</strong></p></th></tr></thead><tbody>\n<tr><td><p>Opening balance</p></td><td><p>0</p></td><td><p>0</p></td><td><p>0</p></td></tr>\n<tr><td><p>T pays in \u00a310k trust money</p></td><td><p>0</p></td><td><p>10,000</p></td><td><p>10,000</p></td></tr>\n<tr><td><p>T pays in \u00a310k own money</p></td><td><p>10,000</p></td><td><p>10,000</p></td><td><p>20,000</p></td></tr>\n<tr><td><p>T withdraws \u00a310k (holiday \u2014 dissipated)</p></td><td><p>DISSIPATION attributed here</p></td><td><p>\u2014</p></td><td><p>10,000</p></td></tr>\n<tr><td><p>Remaining balance</p></td><td><p>0</p></td><td><p>10,000</p></td><td><p>10,000</p></td></tr></tbody></table></div>\n<p><em>Result: The remaining \u00a310,000 is entirely traceable to the trust. The beneficiaries can assert beneficial ownership of the \u00a310,000 balance, OR enforce an equitable lien over it.</em></p>\n<h4 class=\"notes-h4\"><span class=\"nt-txt-blue\"><strong>Example 3 \u2013 Wrongful Mixture: Re Oatway Principle (Asset + Later Dissipation)</strong></span></h4>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><tbody><tr><td class=\"nt-cell-cream\"><p><span class=\"nt-txt-gold\"><strong>Facts</strong></span></p>\n<p>T is trustee of a trust. T mixes \u00a310,000 of trust money and \u00a310,000 of T&#x27;s own money in one account (balance: \u00a320,000).</p>\n<p>T withdraws \u00a310,000 FIRST and uses it to buy shares (now worth \u00a315,000).</p>\n<p>T then withdraws the remaining \u00a310,000 and dissipates it on a holiday.</p>\n<p>T argues (using Hallett) that since the trust money &quot;went in first&quot;, the shares should be attributed to the trust \u2014 so the balance (which T now claims was &quot;T&#x27;s money&quot;) is dissipated, and the shares belong to T.</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-navy\"><strong>Applying Re Oatway [1903]</strong></span></p>\n<p>T&#x27;s argument fails. Per Oatway: identifiable asset attributed to trust; dissipation attributed to trustee&#x27;s own money. Order is not determinative.</p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-slate\"><p><strong>Event</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>Trustee&#x27;s \u00a3</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>Trust \u00a3</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>Balance \u00a3</strong></p></th></tr></thead><tbody>\n<tr><td><p>Opening balance</p></td><td><p>0</p></td><td><p>0</p></td><td><p>0</p></td></tr>\n<tr><td><p>T pays in \u00a310k trust money</p></td><td><p>0</p></td><td><p>10,000</p></td><td><p>10,000</p></td></tr>\n<tr><td><p>T pays in \u00a310k own money</p></td><td><p>10,000</p></td><td><p>10,000</p></td><td><p>20,000</p></td></tr>\n<tr><td><p>T withdraws \u00a310k \u2192 buys shares</p></td><td><p>DISSIPATION attributed here</p></td><td><p>10,000 \u2192 shares</p></td><td><p>10,000</p></td></tr>\n<tr><td><p>T withdraws remaining \u00a310k (holiday)</p></td><td><p>0</p></td><td><p>0</p></td><td><p>0</p></td></tr>\n<tr><td><p>Result</p></td><td><p>\u2014</p></td><td><p>Shares = traceable trust asset</p></td><td><p>\u2014</p></td></tr></tbody></table></div>\n<p><em>Result: The shares (value \u00a315,000) are the traceable proceeds of the trust money. Beneficiaries claim beneficial ownership of the shares and capture the \u00a35,000 gain. T&#x27;s dissipation is treated as having come from T&#x27;s own money.</em></p>\n<h4 class=\"notes-h4\"><span class=\"nt-txt-blue\"><strong>Example 4 \u2013 Wrongful Mixture: Cherry-Picking (Shalson v Russo)</strong></span></h4>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><tbody><tr><td class=\"nt-cell-cream\"><p><span class=\"nt-txt-gold\"><strong>Facts</strong></span></p>\n<p>T is trustee of a trust. T mixes \u00a320,000 of trust money and \u00a320,000 of T&#x27;s own money in one account (balance: \u00a340,000).</p>\n<p>T withdraws \u00a320,000 and buys Company A shares (now worth \u00a340,000 \u2014 doubled in value).</p>\n<p>T withdraws the other \u00a320,000 and buys Company B shares (now worth \u00a310,000 \u2014 halved in value).</p>\n<p>No money has been dissipated. T argues the trust money should be allocated to Company B (the less profitable use).</p>\n<p>This is a two-party dispute: beneficiary vs trustee only.</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-navy\"><strong>Applying Shalson v Russo [2003] \u2014 Cherry-Picking</strong></span></p>\n<p>Since this is a two-party dispute (trustee vs beneficiary only), the beneficiary may attribute the MOST PROFITABLE application to the trust money.</p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-slate\"><p><strong>Withdrawal</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>Application</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>Current value</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>Attributed to</strong></p></th></tr></thead><tbody>\n<tr><td><p>\u00a320,000 (first withdrawal)</p></td><td><p>Company A shares</p></td><td><p>\u00a340,000</p></td><td><p>TRUST (beneficial ownership claimed)</p></td></tr>\n<tr><td><p>\u00a320,000 (second withdrawal)</p></td><td><p>Company B shares</p></td><td><p>\u00a310,000</p></td><td><p>TRUSTEE&#x27;s own money</p></td></tr></tbody></table></div>\n<p><em>Result: Beneficiaries claim beneficial ownership of Company A shares (worth \u00a340,000) capturing the \u00a320,000 gain. They would never choose Company B. Cherry-picking is NOT available where innocent third parties (e.g. creditors of a bankrupt trustee) would be prejudiced by it.</em></p>\n<h4 class=\"notes-h4\"><span class=\"nt-txt-blue\"><strong>Example 5 \u2013 Innocent Mixture: Ratable Sharing (Non-Current Account)</strong></span></h4>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><tbody><tr><td class=\"nt-cell-cream\"><p><span class=\"nt-txt-gold\"><strong>Facts</strong></span></p>\n<p>T is trustee of both Trust A (\u00a330,000) and Trust B (\u00a310,000).</p>\n<p>T wrongly mixes the two trust funds into one account (balance: \u00a340,000).</p>\n<p>T uses the entire \u00a340,000 to purchase a portfolio of investments (now worth \u00a360,000).</p>\n<p>The mixture is INNOCENT from both trust beneficiaries&#x27; perspectives \u2014 T is the wrongdoer.</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-navy\"><strong>Applying Re Diplock \u2014 Ratable Sharing</strong></span></p>\n<p>Withdrawals from an innocent mixture are attributed rateably to contributors. All innocent parties must share rateably \u2014 one cannot be preferred over another (Foskett).</p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-slate\"><p><strong>Contributor</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>Amount in</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>Fraction</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>Portfolio share (\u00a360k)</strong></p></th><th class=\"nt-hdr-slate\"><p><strong>Gain captured</strong></p></th></tr></thead><tbody>\n<tr><td><p>Trust A</p></td><td><p>\u00a330,000</p></td><td><p>30/40 = 3/4</p></td><td><p>\u00a345,000</p></td><td><p>\u00a315,000</p></td></tr>\n<tr><td><p>Trust B</p></td><td><p>\u00a310,000</p></td><td><p>10/40 = 1/4</p></td><td><p>\u00a315,000</p></td><td><p>\u00a35,000</p></td></tr>\n<tr><td><p>TOTAL</p></td><td><p>\u00a340,000</p></td><td><p>\u2014</p></td><td><p>\u00a360,000</p></td><td><p>\u00a320,000</p></td></tr></tbody></table></div>\n<p><em>Result: Each trust claims a proportionate share of the portfolio in proportion to its contribution. Both trusts capture their share of the appreciation. Neither can assert a lien over the other&#x27;s share.</em></p>\n<h4 class=\"notes-h4\"><span class=\"nt-txt-blue\"><strong>Example 6 \u2013 Innocent Mixture in a Current Account: All Three Methods Compared</strong></span></h4>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><tbody><tr><td class=\"nt-cell-cream\"><p><span class=\"nt-txt-gold\"><strong>Facts (from your exemplar notes)</strong></span></p>\n<p>The account begins with a zero balance.</p>\n<p>Monday:    T pays \u00a310 from Trust A into the account.</p>\n<p>Tuesday:   T pays \u00a310 from Trust B into the account.</p>\n<p>Wednesday: T withdraws \u00a310 and purchases a PAINTING.</p>\n<p>Thursday:  T pays \u00a310 from Trust C into the account.</p>\n<p>Fr
