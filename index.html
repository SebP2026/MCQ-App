<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPP PGDL — MCQ Practice</title>
<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f0f4f9;color:#111;min-height:100vh;padding:1.5rem 1rem 4rem}
#app{max-width:760px;margin:0 auto}
.hdr{display:flex;align-items:center;gap:12px;background:#fff;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem;border:1px solid rgba(0,0,0,0.08)}
.ico{width:38px;height:38px;background:#185FA5;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ico svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2}
.ht{font-size:15px;font-weight:600;color:#111}.hs{font-size:11px;color:#666;margin-top:2px}
.bb{margin-left:auto;padding:6px 12px;font-size:12px;border:1px solid rgba(0,0,0,0.18);border-radius:7px;background:none;cursor:pointer;color:#555}
.bb:hover{background:#eef3f9}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
.st{background:#fff;border-radius:9px;padding:10px 8px;text-align:center;border:1px solid rgba(0,0,0,0.08)}
.sn{font-size:22px;font-weight:600;color:#185FA5}
.sl{font-size:11px;color:#666;margin-top:2px}
.sn.g{color:#1a7a3a}.sn.a{color:#b06800}.sn.r{color:#c0392b}
.tl{font-size:11px;color:#666;margin-bottom:4px;font-weight:500}
select{width:100%;padding:9px 12px;border:1px solid rgba(0,0,0,0.18);border-radius:8px;font-size:13px;background:#fff;color:#111;cursor:pointer;margin-bottom:1.25rem}
.qcard{background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:12px;padding:1.5rem;margin-bottom:1rem}
.qtag{font-size:10px;font-weight:600;color:#185FA5;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:12px}
.scenario{background:#f0f4f9;border-left:3px solid #185FA5;border-radius:0 8px 8px 0;padding:1rem 1.1rem;margin-bottom:1.1rem;font-size:13px;line-height:1.7;color:#222}
.stem{font-size:14px;font-weight:500;line-height:1.65;color:#111}
.opts{display:flex;flex-direction:column;gap:9px;margin-top:1.1rem}
.op{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border:1px solid rgba(0,0,0,0.15);border-radius:9px;background:#fff;cursor:pointer;text-align:left;width:100%;transition:border-color 0.12s,background 0.12s}
.op:hover:not([disabled]){border-color:#185FA5;background:#eef5ff}
.op[disabled]{cursor:default}
.ol{width:24px;height:24px;border-radius:50%;border:1.5px solid rgba(0,0,0,0.2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;color:#666;margin-top:1px}
.ot{font-size:13px;line-height:1.55;color:#111}
.op.cor{border-color:#1a7a3a;background:#f0faf4}.op.cor .ol{background:#1a7a3a;border-color:#1a7a3a;color:#fff}
.op.inc{border-color:#c0392b;background:#fff5f5}.op.inc .ol{background:#c0392b;border-color:#c0392b;color:#fff}
.expl{border-radius:10px;padding:1.25rem;margin-bottom:1rem;font-size:13px;line-height:1.7}
.expl.c{background:#f0faf4;border:1px solid #1a7a3a}
.expl.i{background:#fff5f5;border:1px solid #c0392b}
.exh{font-size:12px;font-weight:600;margin-bottom:8px}
.exh.c{color:#1a7a3a}.exh.i{color:#c0392b}
.nb{width:100%;padding:13px;background:#185FA5;border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.nb:hover{background:#0C447C}.nb:disabled{opacity:0.3;cursor:not-allowed}
.sc{background:#fff;border-radius:12px;padding:2.5rem 2rem;text-align:center;border:1px solid rgba(0,0,0,0.08)}
.sc h2{font-size:20px;font-weight:600;margin-bottom:10px}
.sc p{font-size:14px;color:#555;line-height:1.7;max-width:480px;margin:0 auto 1.5rem}
.sb{padding:13px 40px;background:#185FA5;border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.sb:hover{background:#0C447C}
.badge{display:inline-block;background:#E6F1FB;color:#0C447C;font-size:11px;padding:3px 10px;border-radius:20px;margin-bottom:14px;font-weight:500}
.pbar-wrap{height:4px;background:#e0eaf5;border-radius:2px;margin-bottom:1.25rem}
.pbar{height:100%;background:#185FA5;border-radius:2px;transition:width 0.3s}

/* ── multi-module extras ── */
.mod-tabs{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.mod-tab{padding:8px 18px;border-radius:8px;border:1px solid rgba(0,0,0,0.15);background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#555;transition:all 0.12s}
.mod-tab.active{background:#185FA5;color:#fff;border-color:#185FA5}
.mod-tab:hover:not(.active){background:#eef3f9;border-color:#185FA5;color:#185FA5}
.topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.5rem}
.topic-tile{border-radius:9px;padding:10px 12px;cursor:pointer;border:1px solid rgba(0,0,0,0.1);transition:opacity 0.12s}
.topic-tile:hover{opacity:0.85}
.topic-tile-name{font-size:12px;font-weight:600;line-height:1.4;margin-bottom:3px}
.topic-tile-score{font-size:11px;opacity:0.85}
.pill-strip{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem}
.pill{border-radius:20px;padding:3px 10px;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;border:1px solid}

/* ── NOTES PANEL ─────────────────────────────── */
.notes-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:500;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
.notes-panel{background:#fff;border-radius:14px;width:100%;max-width:860px;display:flex;flex-direction:column;max-height:90vh;position:relative;overflow:hidden}
.notes-header{display:flex;align-items:center;gap:12px;padding:1.1rem 1.5rem;border-bottom:1px solid rgba(0,0,0,0.08);flex-shrink:0}
.notes-back{background:none;border:1px solid rgba(0,0,0,0.18);border-radius:7px;padding:5px 12px;font-size:12px;cursor:pointer;color:#555}
.notes-back:hover{background:#f0f4f9}
.notes-mod-label{font-size:11px;font-weight:600;color:#185FA5;text-transform:uppercase;letter-spacing:0.5px}
.notes-title{font-size:16px;font-weight:600;color:#111;margin:0}
.notes-close{margin-left:auto;background:none;border:none;font-size:22px;cursor:pointer;color:#888;line-height:1;padding:0 4px}
.notes-sidebar{display:flex;flex-shrink:0}
.notes-nav{width:200px;border-right:1px solid rgba(0,0,0,0.08);padding:1rem 0;overflow-y:auto;flex-shrink:0;transition:width 0.2s,padding 0.2s,opacity 0.2s}
.notes-nav.collapsed{width:0;padding:0;opacity:0;overflow:hidden;border:none}
.notes-toggle{position:absolute;top:8px;left:8px;z-index:10;background:#fff;border:1px solid rgba(0,0,0,0.15);border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;color:#555;display:flex;align-items:center;gap:4px;transition:background 0.12s}
.notes-toggle:hover{background:#eef3f9;color:#185FA5}
.notes-toggle svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.notes-nav-mod{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.6px;padding:8px 16px 4px}
.notes-nav-topic{font-size:12px;font-weight:600;color:#333;padding:5px 16px 2px;margin-top:4px}
.notes-nav-doc{display:block;width:100%;text-align:left;background:none;border:none;font-size:12px;color:#555;padding:5px 16px 5px 24px;cursor:pointer;border-radius:0;transition:background 0.1s}
.notes-nav-doc:hover{background:#f0f4f9;color:#185FA5}
.notes-nav-doc.active{background:#E6F1FB;color:#185FA5;font-weight:600}
.notes-body{flex:1;overflow-y:auto;padding:1.5rem 1.75rem;min-width:0}
/* ── Notes content styles ── */
.notes-body .notes-h2{font-size:17px;font-weight:700;color:#111;margin:0 0 14px;padding-bottom:8px;border-bottom:2px solid #185FA5}
.notes-body .notes-h3{font-size:14px;font-weight:700;color:#185FA5;margin:20px 0 8px;text-transform:uppercase;letter-spacing:0.4px}
.notes-body .notes-h4{font-size:13px;font-weight:700;color:#333;margin:16px 0 8px}
.notes-body p,.notes-body .notes-p{font-size:13px;line-height:1.7;color:#333;margin:0 0 8px}
.notes-body .notes-list{font-size:13px;line-height:1.7;color:#333;margin:0 0 10px;padding-left:1.25rem}
.notes-body .notes-list li{margin-bottom:4px}
.notes-table-wrap{overflow-x:auto;margin:12px 0}
.notes-table{width:100%;border-collapse:collapse;font-size:12px;line-height:1.55}
.notes-table th{background:#185FA5;color:#fff;font-weight:600;padding:8px 10px;text-align:left;vertical-align:top}.notes-table th *{color:#fff !important}
.notes-table td{padding:7px 10px;border-bottom:1px solid rgba(0,0,0,0.08);vertical-align:top;color:#333}
.notes-table tbody tr:nth-child(even) td{background:#f5f8ff}
/* ── Home screen Notes button ── */
.notes-home-btn{display:inline-flex;align-items:center;gap:8px;padding:11px 24px;background:none;border:1.5px solid #185FA5;border-radius:10px;color:#185FA5;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.12s}
.notes-home-btn:hover{background:#E6F1FB}
.notes-home-btn svg{width:16px;height:16px;stroke:#185FA5;fill:none;stroke-width:2;flex-shrink:0}

/* ── Notes colour classes (from original docx) ── */
.nt-hdr-blue  { background:#2E5496; color:#fff; }
.nt-hdr-slate { background:#37474F; color:#fff; font-family:'Courier New',monospace; font-size:11px; }
.nt-cell-blue { background:#EEF4FA; }
.nt-cell-cream{ background:#FFFDF0; border-left:4px solid #C9A227; }
.nt-txt-navy  { color:#1F3864; }
.nt-txt-blue  { color:#2E5496; }
.nt-txt-gold  { color:#8B6914; }
/* Force white text on ALL content inside dark header cells */
.notes-table th,
.notes-table th *,
.notes-table th.nt-hdr-blue,
.notes-table th.nt-hdr-blue *,
.notes-table th.nt-hdr-slate,
.notes-table th.nt-hdr-slate *,
.notes-table td.nt-hdr-slate,
.notes-table td.nt-hdr-slate * { color:#fff !important; }
/* Slate header td (calc tables use td not th for headers) */
.notes-table td.nt-hdr-slate { background:#37474F; font-family:'Courier New',monospace; }
/* Cream and light blue cell text */
.notes-table td.nt-cell-cream p,
.notes-table td.nt-cell-cream li { color:#333; }

/* ── Timer ── */
.timer-bar{display:flex;align-items:center;justify-content:flex-end;margin-bottom:8px;padding:0 2px}
.qtimer{font-size:19px;font-weight:700;color:#185FA5;letter-spacing:1px;font-variant-numeric:tabular-nums}
.qtimer.over{color:#c0392b;animation:pulse-red 1s ease-in-out infinite}
@keyframes pulse-red{0%,100%{opacity:1}50%{opacity:0.55}}

/* ── View Notes button (after answer) ── */
.notes-link-btn{display:inline-flex;align-items:center;gap:7px;padding:13px 18px;background:none;border:1.5px solid #185FA5;border-radius:10px;color:#185FA5;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background 0.12s}
.notes-link-btn:hover{background:#E6F1FB}
.notes-link-btn svg{width:15px;height:15px;stroke:#185FA5;fill:none;stroke-width:2;flex-shrink:0}

/* ── Notes search ── */
.notes-search-wrap{flex:1;position:relative;margin:0 12px}
.notes-search-input{width:100%;padding:7px 28px 7px 12px;border:1px solid rgba(0,0,0,0.18);border-radius:7px;font-size:12px;color:#111;background:#f8fafc;outline:none}
.notes-search-input:focus{border-color:#185FA5;background:#fff}
.notes-search-clear{position:absolute;right:7px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:15px;cursor:pointer;color:#aaa;line-height:1;padding:0}
.notes-search-clear:hover{color:#555}
.notes-search-results{padding:1rem 1.75rem}
.notes-search-result-item{padding:10px 12px;border-radius:8px;border:1px solid rgba(0,0,0,0.1);margin-bottom:8px;cursor:pointer;transition:background 0.1s}
.notes-search-result-item:hover{background:#f0f4f9;border-color:#185FA5}
.notes-search-result-title{font-size:12px;font-weight:600;color:#185FA5;margin-bottom:4px}
.notes-search-result-snippet{font-size:12px;color:#555;line-height:1.55}
.notes-search-result-snippet mark{background:#fff3cd;border-radius:2px;padding:0 2px;font-style:normal}
</style>
</head>
<body>
<div id="app"></div>
<script src="data/notes/trusts-notes.js"></script>
<script src="data/notes/land-notes.js"></script>
<script src="data/notes/public-notes.js"></script>
<script>

/* ══════════════════════════════════════════════════════════
   QUESTION BANKS
══════════════════════════════════════════════════════════ */
var QB = [];
var QB_LOADED = {};  /* tracks which modules have been fetched */

/* Map of module IDs to their JSON file paths */
var MODULE_FILES = {
  "Trusts Law": "data/trusts.json",
  "Land Law": "data/land.json",
  "Public Law II": "data/public.json"
};

/**
 * Load questions for a module from its JSON file.
 * Returns a Promise that resolves when questions are added to QB.
 */
function loadQuestions(moduleName) {
  if (QB_LOADED[moduleName]) return Promise.resolve();
  var filePath = MODULE_FILES[moduleName];
  if (!filePath) return Promise.reject("Unknown module: " + moduleName);

  return fetch(filePath)
    .then(function(res) {
      if (!res.ok) throw new Error("Failed to load " + filePath + ": " + res.status);
      return res.json();
    })
    .then(function(data) {
      data.questions.forEach(function(q) {
        QB.push({
          mod: data.module,
          tp: q.topic,
          tg: q.tag,
          sc: q.scenario || "",
          st: q.stem,
          o: q.options,
          c: q.correct,
          ex: q.explanation
        });
      });
      QB_LOADED[moduleName] = true;
    });
}

/**
 * Load all module question banks, then initialise the app.
 */
function loadAllQuestions() {
  var promises = Object.keys(MODULE_FILES).map(function(mod) {
    return loadQuestions(mod);
  });
  return Promise.all(promises);
}



/* ══════════════════════════════════════════════════════════
   MODULE & TOPIC DEFINITIONS
══════════════════════════════════════════════════════════ */
var MODULES = [
  {
    id: "Trusts Law",
    label: "Trusts Law",
    topics: [
      {id:"all",lb:"All Topics"},
      {id:"Trust Relationship",lb:"Trust Relationship & Three Certainties"},
      {id:"Formalities",lb:"Formalities & Constitution"},
      {id:"Purpose Trusts",lb:"Beneficiary Principle & Purpose Trusts"},
      {id:"Trustees",lb:"Trustees & Their Duties"},
      {id:"Fiduciaries",lb:"Fiduciary Duties & Accessory Liability"},
      {id:"Resulting Trusts",lb:"Resulting Trusts"},
      {id:"Constructive Trusts",lb:"Constructive Trusts"},
      {id:"Breach of Trust",lb:"Breach of Trust & Personal Remedies"},
      {id:"Tracing",lb:"Proprietary Remedies & Tracing"},
      {id:"Mixed Topics",lb:"Mixed Topics — Application"}
    ]
  },
  {
    id: "Land Law",
    label: "Land Law",
    topics: [
      {id:"all",lb:"All Topics"},
      {id:"Nature of Land",lb:"Nature of Land"},
      {id:"Mortgages",lb:"Mortgages"},
      {id:"Leases",lb:"Leases"},
      {id:"Easements",lb:"Easements"},
      {id:"Freehold Covenants",lb:"Freehold Covenants"},
      {id:"Co-ownership",lb:"Co-ownership"},
      {id:"Enforcement of Interests",lb:"Enforcement of Interests"}
    ]
  },
  {
    id: "Public Law II",
    label: "Public Law II",
    topics: [
      {id:"all",lb:"All Topics"},
      {id:"Judicial Review",lb:"Judicial Review"},
      {id:"Illegality",lb:"Illegality"},
      {id:"Unreasonableness",lb:"Unreasonableness & Proportionality"},
      {id:"Procedural Impropriety",lb:"Procedural Impropriety"},
      {id:"Legitimate Expectation",lb:"Legitimate Expectation"},
      {id:"Human Rights Act",lb:"Human Rights Act"},
      {id:"ECHR Articles",lb:"ECHR Articles"}
    ]
  }

];

/* ══════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════ */
var S = {
  view: "start",       /* start | quiz */
  mod:  "Trusts Law",  /* active module id */
  topic:"all",         /* active topic id */
  q: null, sel: null,
  att: 0, cor: 0, qn: 0, used: [],
  /* {modId: {topicId: {att,cor}}} */
  stats: {}
};

/* Initialise stats for every module/topic */
MODULES.forEach(function(m){
  S.stats[m.id] = {};
  m.topics.forEach(function(t){
    if(t.id !== "all") S.stats[m.id][t.id] = {att:0, cor:0};
  });
});


/* ══════════════════════════════════════════════════════════
   TIMER
══════════════════════════════════════════════════════════ */
var timerInterval = null;
var timerElapsed  = 0;

function startTimer() {
  stopTimer();
  timerElapsed = 0;
  updateTimerDisplay();
  timerInterval = setInterval(function() { timerElapsed++; updateTimerDisplay(); }, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function updateTimerDisplay() {
  var el = document.getElementById('qtimer');
  if (!el) return;
  var rem = 120 - timerElapsed;
  if (rem >= 0) {
    el.textContent = Math.floor(rem/60) + ':' + (rem%60 < 10 ? '0' : '') + rem%60;
    el.className = 'qtimer';
  } else {
    var ov = -rem;
    el.textContent = '+' + Math.floor(ov/60) + ':' + (ov%60 < 10 ? '0' : '') + ov%60;
    el.className = 'qtimer over';
  }
}

/* ══════════════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════════════ */
function modTopics(){
  var m = MODULES.find(function(m){return m.id===S.mod;});
  return m ? m.topics : [];
}

function poolFor(mod, topic){
  return QB.filter(function(q){
    return q.mod === mod && (topic==="all" || q.tp === topic);
  });
}

function topicStat(mod, tid){
  return (S.stats[mod] && S.stats[mod][tid]) || {att:0, cor:0};
}

function topicColor(mod, tid){
  var ts = topicStat(mod, tid);
  if(!ts || ts.att===0) return {bg:"#f5f5f5", tc:"#555", bc:"rgba(0,0,0,0.1)"};
  var p = ts.cor/ts.att;
  if(p>=0.7)  return {bg:"#d4edda", tc:"#155724", bc:"#a3cfb5"};
  if(p>=0.4)  return {bg:"#fff3cd", tc:"#856404", bc:"#ffc107"};
  return       {bg:"#f8d7da", tc:"#721c24", bc:"#f1aeb5"};
}

/* ══════════════════════════════════════════════════════════
   QUESTION LOGIC
══════════════════════════════════════════════════════════ */
function getQ(){
  var pool = poolFor(S.mod, S.topic);
  if(!pool.length){ alert("No questions for this selection."); return null; }
  var unused = pool.filter(function(q){ return S.used.indexOf(q)===-1; });
  if(!unused.length){ S.used=[]; unused=pool; }
  var pick = unused[Math.floor(Math.random()*unused.length)];
  S.used.push(pick);
  return pick;
}

function next(){ var q=getQ(); if(!q)return; S.q=q; S.sel=null; S.qn++; paint(); startTimer(); }

function answer(o){
  if(S.sel) return;
  stopTimer();
  S.sel = o;
  S.att++;
  var ok = (o === S.q.c);
  if(ok) S.cor++;
  var tid = S.q.tp;
  if(S.stats[S.mod] && S.stats[S.mod][tid]){
    S.stats[S.mod][tid].att++;
    if(ok) S.stats[S.mod][tid].cor++;
  }
  paint();
}

function startQuiz(mod, topic){
  S.mod   = mod   || S.mod;
  S.topic = topic || "all";
  S.view  = "quiz";
  S.used  = [];
  next();
}

function closeSummary(){var el=document.getElementById('summodal');if(el)el.remove();}

/* ══════════════════════════════════════════════════════════
   SUMMARY MODAL
══════════════════════════════════════════════════════════ */
function showSummary(){
  var modTopicList = modTopics().filter(function(t){return t.id!=="all";});
  var attempted = modTopicList.filter(function(t){return topicStat(S.mod,t.id).att>0;});
  var weak      = attempted.filter(function(t){var s=topicStat(S.mod,t.id);return s.cor/s.att<0.4;});
  var ok        = attempted.filter(function(t){var s=topicStat(S.mod,t.id);var p=s.cor/s.att;return p>=0.4&&p<0.7;});
  var strong    = attempted.filter(function(t){var s=topicStat(S.mod,t.id);return s.cor/s.att>=0.7;});
  var untouched = modTopicList.filter(function(t){return topicStat(S.mod,t.id).att===0;});

  /* per-topic rows */
  var rows = "";
  modTopicList.forEach(function(t){
    var ts=topicStat(S.mod,t.id);
    var pct=ts.att>0?Math.round(ts.cor/ts.att*100):null;
    var col=topicColor(S.mod,t.id);
    rows+='<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;border:1px solid '+col.bc+';background:'+col.bg+';margin-bottom:6px">'
      +'<span style="flex:1;font-size:13px;color:'+col.tc+';font-weight:500">'+t.lb+'</span>'
      +'<span style="font-size:12px;color:'+col.tc+'">'+(ts.att>0?ts.cor+'/'+ts.att+' ('+pct+'%)':"Not started")+'</span>'
      +'</div>';
  });

  /* action plan */
  var recs="";
  var modAtt=attempted.length>0;
  if(!modAtt){
    recs='<p style="font-size:13px;color:#555">Complete some questions in this module first to get personalised recommendations.</p>';
  } else {
    if(weak.length)   recs+='<div style="margin-bottom:10px"><div style="font-size:12px;font-weight:600;color:#721c24;margin-bottom:4px">Needs work</div>'    +weak.map(function(t){return'<div style="font-size:13px;color:#555;padding:2px 0">• '+t.lb+'</div>';}).join('')+'</div>';
    if(ok.length)     recs+='<div style="margin-bottom:10px"><div style="font-size:12px;font-weight:600;color:#856404;margin-bottom:4px">Keep practising</div>'+ok.map(function(t){return'<div style="font-size:13px;color:#555;padding:2px 0">• '+t.lb+'</div>';}).join('')+'</div>';
    if(strong.length) recs+='<div style="margin-bottom:10px"><div style="font-size:12px;font-weight:600;color:#155724;margin-bottom:4px">Strong</div>'         +strong.map(function(t){return'<div style="font-size:13px;color:#555;padding:2px 0">• '+t.lb+'</div>';}).join('')+'</div>';
    if(untouched.length) recs+='<div><div style="font-size:12px;font-weight:600;color:#555;margin-bottom:4px">Not yet attempted</div>'+untouched.map(function(t){return'<div style="font-size:13px;color:#999;padding:2px 0">• '+t.lb+'</div>';}).join('')+'</div>';
  }

  /* overall advice */
  var modStats = S.stats[S.mod]||{};
  var modTot=0,modCor=0;

  var overall=modTot>0?Math.round(modCor/modTot*100):0;
  var advice;
  if(modTot===0)           advice="Start answering questions in this module to receive feedback.";
  else if(overall>=70)     advice="Strong overall performance in "+S.mod+". Focus on consolidating any yellow or red topics before your exam.";
  else if(overall>=50)     advice="Good progress. Prioritise the topics marked red — revisit your notes and re-test in those areas.";
  else                     advice="Keep going — the more questions you attempt the better. Focus first on the topics marked red and re-read those sections of your notes.";

  var modal='<div id="summodal" style="position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:flex-start;justify-content:center;z-index:999;padding:2rem 1rem;overflow-y:auto">'

    +'<div style="font-size:18px;font-weight:600;margin-bottom:4px">Your results so far</div>'
    +'<div style="font-size:13px;color:#555;margin-bottom:1.25rem">'+modTot+' questions attempted · '+modCor+' correct'+(modTot>0?' · '+overall+'% accuracy':'')+'</div>'
    +'<div style="background:#f5f8ff;border-radius:8px;padding:10px 14px;margin-bottom:1.25rem;font-size:13px;color:#333;line-height:1.6"><strong>Recommendation:</strong> '+advice+'</div>'
    +'<div style="font-size:12px;font-weight:600;color:#333;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.4px">By Topic</div>'
    +rows
    +'<div style="margin-top:1.25rem;padding-top:1rem;border-top:1px solid rgba(0,0,0,0.08)"><div style="font-size:12px;font-weight:600;color:#333;margin-bottom:8px">Action plan</div>'+recs+'</div>'

function paint(){
  var topics   = modTopics();
  var pool     = poolFor(S.mod, S.topic);
  var acc      = S.att>0 ? Math.round(S.cor/S.att*100) : null;
  var ac       = acc===null?"":acc>=70?"g":acc>=50?"a":"r";

  /* compute per-module totals for the module tabs */
  function modTotal(mid){
    var st=S.stats[mid]||{};
    var tot=0,cor=0;

  }

  /* ── HEADER ── */
  var h='<div class="hdr">'
    +'<div class="ico"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>'

  /* ── MODULE TABS (always visible) ── */
  h+='<div class="mod-tabs">';
  MODULES.forEach(function(m){

    var badge=mt.att>0?' <span style="font-size:10px;opacity:0.75">('+mt.cor+'/'+mt.att+')</span>':'';
    h+='<button class="mod-tab'+(S.mod===m.id?' active':'')+'" " data-mid="'+m.id+'" onclick="switchMod(this)">'+m.label+badge+'</button>';
  });

  if(S.view==="start"){

    var grid='<div class="topic-grid">';
    moduleTopics.forEach(function(t){
      var ts=topicStat(S.mod,t.id);
      var pct=ts.att>0?Math.round(ts.cor/ts.att*100):null;
      var col=topicColor(S.mod,t.id);
      var score=ts.att>0?ts.cor+'/'+ts.att+' · '+pct+'%':"Not started";

        +'<div class="topic-tile-score" style="color:'+col.tc+'">'+score+'</div>'
        +'</div>';
    });
    grid+='</div>';

    var modStats2=modTotal(S.mod);
    var hasProgress=modStats2.att>0;

    h+='<div class="sc">'
      +'<div class="badge">'+totalQ+' questions · '+moduleTopics.length+' topics</div>'
      +'<h2>'+S.mod+'</h2>'
      +'<p style="margin-bottom:1.25rem">Select a topic to practise, or start a mixed session across all topics. Progress is tracked per topic and shown below.</p>'
      +grid
      +'<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">'
      +'<button class="sb" onclick="startAll()">All Topics</button>'
      +(hasProgress?'<button onclick="showSummary()" style="padding:13px 24px;background:none;border:1px solid rgba(0,0,0,0.2);border-radius:10px;color:#185FA5;font-size:14px;font-weight:600;cursor:pointer">My Progress ↗</button>':'')
      +'<button class="notes-home-btn" onclick="openNotes(S.mod)"><svg viewBox=\"0 0 24 24\"><path d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"/></svg>Revision Notes</button>'
      +'</div>'
      +'</div>';

  } else {
    /* ── QUIZ SCREEN ── */
    var pct2=pool.length>0?Math.min(100,Math.round(S.used.length/pool.length*100)):0;
    h+='<div class="pbar-wrap"><div class="pbar" style="width:'+pct2+'%"></div></div>';

    h+='<div class="stats">'
      +'<div class="st"><div class="sn">'+S.qn+'</div><div class="sl">Questions</div></div>'
      +'<div class="st"><div class="sn">'+S.att+'</div><div class="sl">Attempted</div></div>'
      +'<div class="st"><div class="sn g">'+S.cor+'</div><div class="sl">Correct</div></div>'
      +'<div class="st"><div class="sn '+ac+'">'+(acc!==null?acc+'%':'—')+'</div><div class="sl">Accuracy</div></div>'
      +'</div>';

    /* topic selector + progress button */
    h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:1rem">'
      +'<select id="ts" style="flex:1;margin-bottom:0">'
      +topics.map(function(t){return'<option value="'+t.id+'"'+(S.topic===t.id?' selected':'')+'>'+t.lb+'</option>';}).join('')
      +'</select>'
      +'<button onclick="showSummary()" style="flex-shrink:0;padding:9px 13px;background:none;border:1px solid rgba(0,0,0,0.2);border-radius:8px;color:#185FA5;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap">My Progress</button>'
      +'</div>';

    /* topic colour pill strip */
    h+='<div class="pill-strip">';
    topics.filter(function(t){return t.id!=="all";}).forEach(function(t){
      var ts=topicStat(S.mod,t.id);
      var col=topicColor(S.mod,t.id);
      var score=ts.att>0?(ts.cor+'/'+ts.att):"";
      var shortLabel=t.lb.length>22?t.lb.substring(0,20)+"…":t.lb;
      h+='<div class="pill" style="background:'+col.bg+';border-color:'+col.bc+';color:'+col.tc+'" " data-tid="'+t.id+'" onclick="switchPill(this)">'+shortLabel+(score?' · '+score:'')+'</div>';
    });
    h+='</div>';

    /* timer */
    h+='<div class="timer-bar"><span id="qtimer" class="qtimer">2:00</span></div>';

    /* question card */
    if(S.q){
      var q=S.q;
      h+='<div class="qcard"><div class="qtag">Q'+S.qn+' · '+q.tg+'</div>';
      if(q.sc)h+='<div class="scenario">'+q.sc+'</div>';
      h+='<div class="stem">'+q.st+'</div><div class="opts">';
      ['A','B','C','D','E'].forEach(function(o){
        var cl='op';
        if(S.sel){if(o===q.c)cl+=' cor';else if(o===S.sel&&o!==q.c)cl+=' inc';}
        h+='<button class="'+cl+'" " data-opt="'+o+'" onclick="answerBtn(this)" '+(S.sel?'disabled':'')+'>'
          +'<span class="ol">'+o+'</span><span class="ot">'+q.o[o]+'</span></button>';
      });
      h+='</div></div>';

      if(S.sel){
        var isOk=S.sel===q.c;
        h+='<div class="expl '+(isOk?'c':'i')+'">'

          +q.ex+'</div>';

        h+='<div style="display:flex;gap:8px;margin-bottom:0">'
          +'<button class="nb" style="flex:1" onclick="next()">Next question →</button>'
          +nb2+'</div>';
      } else {
        h+='<button class="nb" disabled>Select an answer to continue</button>';
      }
    }
  }

  document.getElementById("app").innerHTML = h;
  var ts=document.getElementById("ts");
  if(ts) ts.addEventListener("change",function(e){S.topic=e.target.value; S.used=[]; });
}

var NOTES = {};
var NOTES_LOADED = {};
var notesState = { activeDoc: null };

var NOTES_FILES = {
  "Trusts Law": "data/notes/trusts-notes.json",
  "Land Law": "data/notes/land-notes.json",
  "Public Law II": "data/notes/public-notes.json"
};

function loadNotes(moduleName) {
  if (NOTES_LOADED[moduleName]) return Promise.resolve();

  /* 1. Try pre-loaded data from <script> tags (works with file://) */
  if (window.NOTES_PRELOAD && window.NOTES_PRELOAD[moduleName]) {
    NOTES[moduleName] = window.NOTES_PRELOAD[moduleName];
    NOTES_LOADED[moduleName] = true;
    return Promise.resolve();
  }

  /* 2. Fallback to fetch (works when served over http) */
  var filePath = NOTES_FILES[moduleName];
  if (!filePath) return Promise.resolve();

  return fetch(filePath)
    .then(function(res) {
      if (!res.ok) throw new Error("Failed to load " + filePath + ": " + res.status);
      return res.json();
    })
    .then(function(data) {
      NOTES[data.module] = data.notes || {};
      NOTES_LOADED[moduleName] = true;
    })
    .catch(function(err) {
      console.warn("Could not load notes for " + moduleName + ": " + err);
      NOTES[moduleName] = {};
      NOTES_LOADED[moduleName] = true;
    });
}

function loadAllNotes() {
  var promises = Object.keys(NOTES_FILES).map(function(mod) {
    return loadNotes(mod);
  });
  return Promise.all(promises);
}



function openNotes(mod, topic, docId) {
  notesState.activeDoc = docId || null;
  renderNotesOverlay(mod, topic);
}

function closeNotes() {
  var el = document.getElementById('notes-overlay');
  if (el) el.remove();
}

function renderNotesOverlay(mod, topic) {
  closeNotes();

  // Scope to the active module — do NOT fall back to another module
  var activeMod = mod || S.mod;
  notesState.activeMod = activeMod;
  var modNotes = (NOTES[activeMod] && Object.keys(NOTES[activeMod]).length > 0) ? NOTES[activeMod] : null;

  // If this module has no notes, show placeholder
  if (!modNotes) {
    var overlay = document.createElement('div');
    overlay.id = 'notes-overlay';
    overlay.className = 'notes-overlay';
    overlay.innerHTML =
      '<div class="notes-panel">' +
        '<div class="notes-header">' +
          '<div>' +
            '<div class="notes-mod-label">Revision Notes</div>' +
            '<div class="notes-title">' + activeMod + '</div>' +
          '</div>' +
          '<button class="notes-close" onclick="closeNotes()">×</button>' +
        '</div>' +
        '<div style="display:flex;flex:1;min-height:0;overflow:hidden;align-items:center;justify-content:center">' +
          '<div style="text-align:center;padding:3rem 2rem">' +
            '<div style="font-size:36px;margin-bottom:1rem;opacity:0.3">📝</div>' +
            '<div style="font-size:16px;font-weight:600;color:#333;margin-bottom:8px">Notes coming soon</div>' +
            '<div style="font-size:13px;color:#666;line-height:1.6;max-width:360px">Revision notes for ' + activeMod + ' are not yet available. Check back after they have been added to the <code>data/notes/</code> folder.</div>' +
          '</div>' +
        '</div>' +
      '</div>';
    overlay.addEventListener('click', function(e) {
      if (e.target === overlay) closeNotes();
    });
    document.body.appendChild(overlay);
    return;
  }

  // Build nav tree — only topics for the active module
  var navHtml = '<div class="notes-nav-mod">' + activeMod + '</div>';
  Object.keys(modNotes).forEach(function(t) {
    navHtml += '<div class="notes-nav-topic">' + t + '</div>';
    modNotes[t].forEach(function(doc) {
      var active = doc.id === notesState.activeDoc ? ' active' : '';
      navHtml += '<button class="notes-nav-doc' + active + '" data-mod="' + activeMod + '" data-topic="' + t + '" data-doc="' + doc.id + '" onclick="selectNotesDoc(this)">' + doc.title + '</button>';
    });
  });

  // Determine content to show
  var bodyHtml = '';
  var panelTitle = 'Revision Notes';
  if (notesState.activeDoc) {
    // Check if activeDoc belongs to this module; if not, reset it
    var found = false;
    Object.keys(modNotes).forEach(function(t) {
      modNotes[t].forEach(function(doc) {
        if (doc.id === notesState.activeDoc) {
          bodyHtml = doc.content;
          panelTitle = doc.title;
          found = true;
        }
      });
    });
    if (!found) notesState.activeDoc = null;
  }
  if (!notesState.activeDoc) {
    // Show first doc in this module
    var first = null;
    for (var t in modNotes) {
      if (modNotes[t].length > 0) { first = modNotes[t][0]; break; }
    }
    if (first) { bodyHtml = first.content; panelTitle = first.title; notesState.activeDoc = first.id; }
  }

  var overlay = document.createElement('div');
  overlay.id = 'notes-overlay';
  overlay.className = 'notes-overlay';
  overlay.innerHTML =
    '<div class="notes-panel">' +
      '<div class="notes-header">' +
        '<div>' +
          '<div class="notes-mod-label">Revision Notes</div>' +
          '<div class="notes-title" id="notes-panel-title">' + panelTitle + '</div>' +
        '</div>' +
        '<div class="notes-search-wrap">' +
          '<input type="text" class="notes-search-input" id="notes-search" placeholder="Search notes\u2026" oninput="onNotesSearch(this)" autocomplete="off">' +
          '<button class="notes-search-clear" onclick="clearNotesSearch()" title="Clear">\u00d7</button>' +
        '</div>' +
        '<button class="notes-close" onclick="closeNotes()">\u00d7</button>' +
      '</div>' +
      '<div style="display:flex;flex:1;min-height:0;overflow:hidden;position:relative">' +
        '<button class="notes-toggle" onclick="toggleNotesSidebar()" id="notes-toggle-btn"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>' +
        '<div class="notes-nav" id="notes-nav">' + navHtml + '</div>' +
        '<div class="notes-body" id="notes-body">' + bodyHtml + '</div>' +
      '</div>' +
    '</div>';

  // Close on overlay click (not panel)
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) closeNotes();
  });

  document.body.appendChild(overlay);
}

function selectNotesDoc(btn) {
  notesState.activeDoc = btn.getAttribute('data-doc');
  // Update active state
  document.querySelectorAll('.notes-nav-doc').forEach(function(b) {
    b.classList.toggle('active', b === btn);
  });
  // Update body content + title
  var m = btn.getAttribute('data-mod');
  var t = btn.getAttribute('data-topic');
  var docId = btn.getAttribute('data-doc');
  var docs = NOTES[m] && NOTES[m][t] ? NOTES[m][t] : [];
  var doc = docs.find(function(d) { return d.id === docId; });
  if (doc) {
    var nb = document.getElementById('notes-body');
    nb.innerHTML = doc.content;
    nb.scrollTop = 0;
    var titleEl = document.getElementById('notes-panel-title') || document.querySelector('.notes-title');
    if (titleEl) titleEl.textContent = doc.title;
  }
}

function toggleNotesSidebar() {
  var nav = document.getElementById('notes-nav');
  var btn = document.getElementById('notes-toggle-btn');
  nav.classList.toggle('collapsed');
  var isCollapsed = nav.classList.contains('collapsed');
  btn.querySelector('svg').innerHTML = isCollapsed
    ? '<path d="M5 12h14M12 5l7 7-7 7"/>'
    : '<path d="M19 12H5M12 19l-7-7 7-7"/>';
}


/* ══════════════════════════════════════════════════════════
   NOTES — QUESTION LINK
══════════════════════════════════════════════════════════ */
function findNotesDocForTopic(mod, topicId) {
  var modNotes = NOTES[mod];
  if (!modNotes) return null;
  var tid = topicId ? topicId.toLowerCase() : '';
  /* 1. Exact key match */
  if (modNotes[topicId] && modNotes[topicId].length > 0)
    return { topicKey: topicId, doc: modNotes[topicId][0] };
  /* 2. Notes key contains topicId */
  for (var tk in modNotes) {
    if (tk.toLowerCase().indexOf(tid) !== -1 && modNotes[tk].length > 0)
      return { topicKey: tk, doc: modNotes[tk][0] };
  }
  /* 3. topicId first word in notes key */
  var firstWord = tid.split(/\s+/)[0];
  if (firstWord.length > 2) {
    for (var tk in modNotes) {
      if (tk.toLowerCase().indexOf(firstWord) !== -1 && modNotes[tk].length > 0)
        return { topicKey: tk, doc: modNotes[tk][0] };
    }
  }
  return null;
}

function openNotesFromQ(btn) {
  var mod   = btn.getAttribute('data-mod');
  var docId = btn.getAttribute('data-doc');
  openNotes(mod, null, docId);
}

/* ══════════════════════════════════════════════════════════
   NOTES — SEARCH
══════════════════════════════════════════════════════════ */
function stripHtml(html) {
  return html.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
}

function onNotesSearch(inputEl) {
  var q = inputEl.value.trim();
  var body = document.getElementById('notes-body');
  if (!body) return;
  if (!q) { clearNotesSearch(); return; }
  var modNotes = NOTES[notesState.activeMod];
  if (!modNotes) return;
  /* escape regex special chars */
  var escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  var re = new RegExp(escaped, 'gi');
  var results = [];
  Object.keys(modNotes).forEach(function(t) {
    modNotes[t].forEach(function(doc) {
      var text = stripHtml(doc.content);
      var matches = text.match(re);
      if (matches) {
        var idx = text.toLowerCase().indexOf(q.toLowerCase());
        var raw = text.substring(Math.max(0, idx - 60), idx + 120);
        var snippet = raw.replace(re, function(m) { return '<mark>' + m + '</mark>'; });
        results.push({ doc: doc, topic: t, snippet: snippet, count: matches.length });
      }
    });
  });
  /* render */
  var html2 = '';
  if (!results.length) {
    html2 = '<div style="padding:2rem;text-align:center;color:#888;font-size:13px">No results found for <strong>' + q + '</strong></div>';
  } else {
    html2 = '<div style="font-size:11px;color:#888;margin-bottom:10px">' + results.length + ' result' + (results.length > 1 ? 's' : '') + ' for <strong>' + q + '</strong></div>';
    results.forEach(function(r) {
      html2 += '<div class="notes-search-result-item" onclick="selectNotesDocById(\'' + r.doc.id + '\')">'
        + '<div class="notes-search-result-title">📄 ' + r.doc.title
        + ' <span style="font-size:10px;color:#888;font-weight:400">(' + r.count + ' match' + (r.count > 1 ? 'es' : '') + ')</span></div>'
        + '<div class="notes-search-result-snippet">…' + r.snippet + '…</div>'
        + '</div>';
    });
  }
  body.innerHTML = '<div class="notes-search-results">' + html2 + '</div>';
}

function clearNotesSearch() {
  var input = document.getElementById('notes-search');
  if (input) input.value = '';
  var body = document.getElementById('notes-body');
  if (!body) return;
  var modNotes = NOTES[notesState.activeMod];
  if (!modNotes || !notesState.activeDoc) return;
  var docContent = null, docTitle = null;
  Object.keys(modNotes).forEach(function(t) {
    modNotes[t].forEach(function(doc) {
      if (doc.id === notesState.activeDoc) { docContent = doc.content; docTitle = doc.title; }
    });
  });
  if (docContent !== null) {
    body.innerHTML = docContent;
    body.scrollTop = 0;
    var titleEl = document.getElementById('notes-panel-title');
    if (titleEl && docTitle) titleEl.textContent = docTitle;
  }
}

function selectNotesDocById(docId) {
  var input = document.getElementById('notes-search');
  if (input) input.value = '';
  var btn = document.querySelector('.notes-nav-doc[data-doc="' + docId + '"]');
  if (btn) selectNotesDoc(btn);
}

/* ── Boot: load all questions then paint ── */
Promise.all([loadAllQuestions(), loadAllNotes()]).then(function() {
  paint();
}).catch(function(err) {
  document.getElementById("app").innerHTML =
    '<div style="padding:2rem;text-align:center;color:#c00">' +
    '<h2>Failed to load data</h2>' +
    '<p>' + err + '</p>' +
    '<p style="font-size:13px;color:#666;margin-top:1rem">Make sure the /data/ folder with JSON files is in the same directory as index.html</p>' +
    '</div>';
});

</script>
</body>
</html>
