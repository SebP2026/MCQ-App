        "id": "leases-covenants-notes",
        "title": "W9: Leasehold Covenants",
        "content": "<p><span class=\"nt-txt-navy\"><strong>COVENANTS IN LEASES \u2014 COMPREHENSIVE REVISION NOTES</strong></span></p>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>1. Structured Topic Overview</strong></span></h3>\n<p>Leasehold covenants analysis requires identifying: (i) the type of covenant; (ii) whether the lease is old or new; (iii) who is seeking to enforce; (iv) the applicable rules on privity and transmission.</p>\n<p><span class=\"nt-txt-navy\"><strong>STAGE 1 \u2014 THE FOUR MAIN LEASEHOLD COVENANTS</strong></span></p>\n<ul class=\"notes-list\"><li>Repair: tenant must keep premises in condition a reasonably minded owner would, having regard to character/type/age of premises and express wording (Proudfoot v Hart [1890])</li><li>Alterations: structural vs non-structural; absolute/qualified/fully qualified covenant distinction</li><li>User: restricts use to specified purpose; landlord controls occupation type</li><li>Alienation: assignment (transfer of lease by deed); subletting (new underlease); parting with possession; charging</li></ul>\n<p><span class=\"nt-txt-navy\"><strong>STAGE 2 \u2014 COVENANT TYPE: ABSOLUTE / QUALIFIED / FULLY QUALIFIED</strong></span></p>\n<ul class=\"notes-list\"><li>Absolute: tenant completely prohibited; landlord can refuse any request; no duty to consider</li><li>Qualified: tenant may request consent; landlord has no obligation to give consent</li><li>Fully qualified: landlord&#x27;s consent not to be unreasonably withheld; test of reasonableness applies (International Drilling Fluids v Louisville [1986])</li></ul>\n<p><span class=\"nt-txt-navy\"><strong>STAGE 3 \u2014 PRIVITY OF CONTRACT AND ESTATE (OLD LEASES \u2014 pre-1 Jan 1996)</strong></span></p>\n<ul class=\"notes-list\"><li>Privity of contract: original L and T liable for the full duration of the lease \u2014 even after assignment</li><li>Privity of estate: covenants that &quot;touch and concern&quot; the land enforceable between current L and T</li><li>&quot;Touch and concern&quot;: relates to L/T relationship; benefits parties in their capacity as L/T; personal covenants do not pass</li></ul>\n<p><span class=\"nt-txt-navy\"><strong>STAGE 4 \u2014 LTCA 1995 (NEW LEASES \u2014 on/after 1 Jan 1996)</strong></span></p>\n<ul class=\"notes-list\"><li>S 3: automatic transmission of benefit AND burden of ALL covenants (except personal) to assignee of lease AND reversioner</li><li>S 5: automatic release of outgoing tenant on assignment (unless excluded assignment under s 11)</li><li>No automatic release for landlord (s 6): must apply to tenant; if refused, apply to court (s 8)</li><li>AGA (s 16): condition of landlord&#x27;s consent to assignment; outgoing T guarantees immediate assignee&#x27;s obligations only</li><li>S 17: landlord must serve notice of fixed charge claim on former tenant within 6 months of charge becoming due</li><li>S 18: former tenants/guarantors not liable for unanticipated lease variations</li><li>S 19: former tenant sued under s 17 may request overriding lease (becomes immediate landlord of defaulting party)</li></ul>\n<p><span class=\"nt-txt-navy\"><strong>STAGE 5 \u2014 SUBLEASES</strong></span></p>\n<ul class=\"notes-list\"><li>No direct relationship between head landlord and subtenant</li><li>S 3(5) LTCA 1995: restrictive covenants in new leases enforceable against any owner or occupier (but NOT positive covenants)</li><li>Head landlord forfeiting head lease = automatic termination of sublease (subject to relief claim)</li></ul>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>2. Summary Revision Tables</strong></span></h3>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 1 \u2014 Key Definitions</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Term</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Definition</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Source</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Leasehold covenant</strong></span></p></td><td><p>Promise contained in a lease given by a landlord or tenant</p></td><td><p>General law</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Privity of contract</strong></span></p></td><td class=\"nt-cell-blue\"><p>Legal relationship between original contracting parties; original L and T liable for full lease term under old rules</p></td><td class=\"nt-cell-blue\"><p>Contract law</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Privity of estate</strong></span></p></td><td><p>Relationship between current L and current T while each holds their respective legal estate; allows covenants touching and concerning the land to be enforced</p></td><td><p>General law</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Touch and concern</strong></span></p></td><td class=\"nt-cell-blue\"><p>Covenants relating to the L/T relationship; benefit parties in their capacity as L/T; personal covenants do not touch and concern</p></td><td class=\"nt-cell-blue\"><p>General law (old leases)</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Old lease</strong></span></p></td><td><p>Lease granted before 1 January 1996; governed by privity of contract and estate rules</p></td><td><p>Pre-LTCA 1995</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>New lease</strong></span></p></td><td class=\"nt-cell-blue\"><p>Lease granted on or after 1 January 1996; governed by LTCA 1995</p></td><td class=\"nt-cell-blue\"><p>LTCA 1995</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Authorised guarantee agreement (AGA)</strong></span></p></td><td><p>Guarantee by outgoing tenant of the immediate assignee&#x27;s obligations only; condition of landlord&#x27;s consent to assignment under new lease</p></td><td><p>LTCA 1995 s 16</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Excluded assignment</strong></span></p></td><td class=\"nt-cell-blue\"><p>Assignment in breach of alienation covenant (e.g. without landlord&#x27;s consent); no automatic release under s 5 LTCA</p></td><td class=\"nt-cell-blue\"><p>LTCA 1995 s 11</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Overriding lease (s 19)</strong></span></p></td><td><p>Lease granted to a former tenant who has been required to pay a fixed charge under s 17; makes the former tenant the immediate landlord of the defaulting assignee</p></td><td><p>LTCA 1995 s 19</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Alienation</strong></span></p></td><td class=\"nt-cell-blue\"><p>Disposing of the whole or part of a leasehold interest: assignment, subletting, parting with possession, charging/mortgaging, surrendering</p></td><td class=\"nt-cell-blue\"><p>General law</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Underlease / sublease</strong></span></p></td><td><p>Lease granted by a tenant out of their own lease; headlease remains; tenant remains responsible to head landlord</p></td><td><p>General law</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Headlease</strong></span></p></td><td class=\"nt-cell-blue\"><p>The superior lease out of which the underlease is granted</p></td><td class=\"nt-cell-blue\"><p>General law</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Fixed charge (s 17)</strong></span></p></td><td><p>Arrears of rent, service charges, insurance premiums; NOT unascertained liabilities or damages requiring court order</p></td><td><p>LTCA 1995 s 17</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 2 \u2014 The Four Main Leasehold Covenants</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Covenant</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Key Rule</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Key Authority</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Repair</strong></span></p></td><td><p>Tenant must keep premises in condition a reasonably minded owner would, having regard to: (i) character/type at commencement of lease; (ii) age; (iii) express wording. Does not increase or decrease with change in neighbourhood. Obligation to put in repair first if in disrepair at commencement. Repair \u2260 renewal of substantially the whole</p></td><td><p>Proudfoot v Hart [1890]; Lurcott v Wakely [1911]; Brew Brothers v Snax [1970]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Alterations</strong></span></p></td><td class=\"nt-cell-blue\"><p>Unless lease says otherwise: tenant free to alter subject to doctrine of waste (no devaluing alterations). Structural/non-structural distinction common. Often subject to absolute/qualified/fully qualified covenant</p></td><td class=\"nt-cell-blue\"><p>General law; International Drilling Fluids [1986]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>User</strong></span></p></td><td><p>Restricts use of premises to specified purpose. Landlord controls what type of occupation is permitted. Often subject to absolute/qualified/fully qualified covenant</p></td><td><p>General law</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Alienation</strong></span></p></td><td class=\"nt-cell-blue\"><p>Restricts assignment, subletting, parting with possession, charging. If lease silent: benefit of lease freely assignable. Covenant construed in tenant&#x27;s favour: anti-assignment \u2260 anti-subletting (Church v Brown [1808]); anti-subletting of whole \u2260 anti-subletting of part (Wilson v Rosenthal [1906])</p></td><td class=\"nt-cell-blue\"><p>Church v Brown [1808]; Wilson v Rosenthal [1906]</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 3 \u2014 Absolute, Qualified and Fully Qualified Covenants</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Type</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Example Wording</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Absolute</strong></span></p></td><td><p>Tenant completely prohibited; landlord can refuse at will with no reason required; landlord can even ignore requests</p></td><td><p>&quot;The Tenant shall not underlet any part of the Premises&quot;</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Qualified</strong></span></p></td><td class=\"nt-cell-blue\"><p>Tenant may request consent; landlord NOT obliged to give consent; no duty of reasonableness</p></td><td class=\"nt-cell-blue\"><p>&quot;The Tenant shall not make any alterations without the consent of the Landlord&quot;</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Fully qualified</strong></span></p></td><td><p>Landlord must not unreasonably withhold consent; test of reasonableness applies; landlord cannot refuse on grounds unrelated to L/T relationship</p></td><td><p>&quot;...without the consent of the Landlord, such consent not to be unreasonably withheld&quot;</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Reasonableness test</strong></span></p></td><td class=\"nt-cell-blue\"><p>International Drilling Fluids [1986]: landlord NOT entitled to refuse on grounds unrelated to landlord and tenant relationship. E.g. disliking assignee personally, or supporting different football team = unreasonable. Ability to pay rent, references = reasonable grounds</p></td><td class=\"nt-cell-blue\"><p>International Drilling Fluids v Louisville [1986]</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 4 \u2014 Repair: Key Distinctions</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Issue</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Key Case</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Standard of repair</strong></span></p></td><td><p>Condition a reasonably minded owner would maintain; having regard to: character/type of premises at lease commencement; age; express covenant wording</p></td><td><p>Proudfoot v Hart [1890]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Disrepair at commencement</strong></span></p></td><td class=\"nt-cell-blue\"><p>Obligation to PUT premises in repair first, then keep them in repair \u2014 can be very onerous if premises are in disrepair when lease begins</p></td><td class=\"nt-cell-blue\"><p>General law</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Schedule of condition</strong></span></p></td><td><p>Limits obligation: tenant under no obligation to put premises in better state of repair than evidenced by annexed schedule of condition (photographs + description)</p></td><td><p>General law</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Repair vs renewal</strong></span></p></td><td class=\"nt-cell-blue\"><p>Question of degree: &quot;repair is restoration by renewal or replacement of subsidiary parts; renewal is reconstruction of the entirety&quot; \u2014 rebuilding substantially the whole = renewal not repair; falls outside repairing covenant</p></td><td class=\"nt-cell-blue\"><p>Lurcott v Wakely [1911]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Cost vs value test</strong></span></p></td><td><p>Where cost of works approximates to value of premises, works may be classed as renewal not repair \u2014 outside covenant</p></td><td><p>Brew Brothers v Snax (Ross) [1970]</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 5 \u2014 Old Leases vs New Leases: Enforceability of Covenants</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Feature</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Old Lease (pre-1 Jan 1996)</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>New Lease (on/after 1 Jan 1996 \u2014 LTCA 1995)</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Governing law</strong></span></p></td><td><p>Privity of contract and privity of estate</p></td><td><p>LTCA 1995</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Original tenant liability after assignment</strong></span></p></td><td class=\"nt-cell-blue\"><p>CONTINUES for full lease duration \u2014 liable for own and assignee&#x27;s breaches; greatest hardship</p></td><td class=\"nt-cell-blue\"><p>ENDS on assignment (s 5 LTCA automatic release); remains liable only for breaches during own period of occupation (s 23(1))</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Original landlord liability after assignment</strong></span></p></td><td><p>CONTINUES for full lease duration</p></td><td><p>No automatic release; must apply to tenant (s 6); if refused, apply to court (s 8)</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Covenants that run with lease</strong></span></p></td><td class=\"nt-cell-blue\"><p>&quot;Touch and concern&quot; the land; personal covenants do not pass</p></td><td class=\"nt-cell-blue\"><p>ALL covenants (except those &quot;expressed to be personal to any person&quot;) pass automatically under s 3 LTCA</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Running to new tenant (assignee)</strong></span></p></td><td><p>Touch and concern covenants run under privity of estate</p></td><td><p>Benefit and burden of ALL covenants pass automatically under s 3</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Running to new landlord (reversioner)</strong></span></p></td><td class=\"nt-cell-blue\"><p>Touch and concern covenants run under privity of estate</p></td><td class=\"nt-cell-blue\"><p>Benefit and burden of ALL covenants pass automatically under s 3</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Excluded assignment</strong></span></p></td><td><p>N/A</p></td><td><p>Assignment in breach of alienation covenant; s 5 automatic release does NOT apply; tenant remains liable</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>AGA</strong></span></p></td><td class=\"nt-cell-blue\"><p>Direct covenant from assignee to landlord commonly required</p></td><td class=\"nt-cell-blue\"><p>Condition of consent; guarantees immediate assignee&#x27;s obligations only; further AGA required on subsequent assignment (s 16 LTCA)</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 6 \u2014 LTCA 1995 Retrospective Provisions (Apply to ALL Leases)</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Provision</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Notes</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>S 17: Tenant default notice</strong></span></p></td><td><p>Landlord must notify former tenant of fixed charge claim within 6 months of the charge becoming due; failure to serve = precluded from claiming</p></td><td><p>Fixed charge: rent arrears; service charges; insurance premiums. NOT unascertained/damages-requiring-court-order liabilities</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>S 18: Liability for variations</strong></span></p></td><td class=\"nt-cell-blue\"><p>Former tenants and guarantors NOT liable for additional amounts arising from lease variations made after assignment that could not have been anticipated at the time the lease was entered into</p></td><td class=\"nt-cell-blue\"><p>Anticipated variation example: rent review pursuant to clause in original lease = still liable</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>S 19: Overriding lease</strong></span></p></td><td><p>Former tenant required to pay under s 17 may request an overriding lease from landlord; landlord must grant within reasonable time; former tenant becomes immediate landlord of defaulting assignee</p></td><td><p>Term = remaining term + 3 days; same covenants (excluding personal ones); enables former tenant to manage, forfeit, or re-let</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 7 \u2014 Subleases: Enforcement and Key Rules</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Issue</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Direct relationship</strong></span></p></td><td><p>No privity of contract or estate between head landlord and subtenant; head landlord cannot directly enforce covenants against subtenant as a general rule</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>S 3(5) LTCA 1995</strong></span></p></td><td class=\"nt-cell-blue\"><p>Restrictive covenants in new leases may be enforced against any owner or occupier of the premises \u2014 including a subtenant; positive covenants cannot be enforced directly against a subtenant</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Tenant&#x27;s protection</strong></span></p></td><td><p>Tenant (head lessee) remains responsible to head landlord for subtenant&#x27;s breaches; typically includes subtenant covenant to observe headlease obligations in underlease</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Forfeiture of headlease</strong></span></p></td><td class=\"nt-cell-blue\"><p>If head landlord forfeits the headlease, the sublease is automatically terminated; threat of this incentivises subtenant compliance with head lease covenants</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Landlord&#x27;s protection</strong></span></p></td><td><p>Prudent head landlord conditions consent to subletting on subtenant entering direct covenants with head landlord to observe all headlease covenants; creates direct contractual enforcement right</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>TABLE 8 \u2014 All Leading Cases </strong></span><span class=\"nt-txt-blue\"><strong>at a Glance</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Case</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Topic</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Core Principle</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Proudfoot v Hart [1890]</strong></span></p></td><td><p>Repair standard</p></td><td><p>Standard of repair: reasonably minded owner, having regard to character/type of premises at commencement, age, and express wording</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Lurcott</strong></span><span class=\"nt-txt-blue\"><strong> v Wakely [1911]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Repair vs renewal</p></td><td class=\"nt-cell-blue\"><p>&quot;Repair is restoration by renewal of subsidiary parts; renewal is reconstruction of the entirety&quot; \u2014 whole or substantially whole must be replaced to be renewal</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Brew Brothers v Snax (Ross) [1970]</strong></span></p></td><td><p>Repair vs renewal</p></td><td><p>Where cost of works \u2248 value of premises \u2192 works are renewal not repair; outside tenant&#x27;s repairing covenant</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Church v Brown [1808]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Alienation \u2014 construction</p></td><td class=\"nt-cell-blue\"><p>Covenant against assignment does not prohibit subletting of the whole or part; covenant construed in tenant&#x27;s favour</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Wilson v Rosenthal [1906]</strong></span></p></td><td><p>Alienation \u2014 construction</p></td><td><p>Covenant against subletting the whole does not prohibit subletting of part</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>International Drilling Fluids v Louisville Investments [1986]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Fully qualified covenant \u2014 reasonableness</p></td><td class=\"nt-cell-blue\"><p>Landlord cannot refuse consent on grounds unrelated to the landlord and tenant relationship; sets out basic principles of reasonableness</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Owen v Gadd [1956]</strong></span></p></td><td><p>Quiet enjoyment</p></td><td><p>Erection of scaffolding hindering access = breach of landlord&#x27;s covenant for quiet enjoyment</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Kenny v Preen [1963]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Quiet enjoyment</p></td><td class=\"nt-cell-blue\"><p>Persistent intimidation of tenant to induce them to leave = breach of covenant for quiet enjoyment</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Moule v Garrett [1872]</strong></span></p></td><td><p>Indemnity (old lease)</p></td><td><p>Former tenant compelled to pay by legal default of another may recover from the defaulting party; quasi-contractual right</p></td></tr></tbody></table></div>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>3. Flashcard Q&amp;A Pairs</strong></span></h3>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Question</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Answer</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What are the four main leasehold covenants?</strong></span></p></td><td><p>Repair; alterations; user; alienation. These are found in most residential and commercial leases.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What is the standard of repair under Proudfoot v Hart [1890]?</strong></span></p></td><td class=\"nt-cell-blue\"><p>The condition a reasonably minded owner would keep the premises in, having regard to: (i) character and type of premises at start of lease; (ii) age of premises; (iii) express wording of the covenant. Does not change with the character of the neighbourhood.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What is the distinction between repair and renewal?</strong></span></p></td><td><p>Lurcott v Wakely [1911]: &quot;repair is restoration by renewal or replacement of subsidiary parts; renewal is reconstruction of the entirety.&quot; If the whole or substantially the whole needs to be replaced, it is renewal not repair \u2014 outside the tenant&#x27;s covenant.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What are the three types of leasehold covenant and how do they differ?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Absolute: tenant completely prohibited; landlord need not consider any request. Qualified: tenant may request consent; landlord not obliged to grant. Fully qualified: landlord&#x27;s consent not to be unreasonably withheld; reasonableness test applies (International Drilling Fluids [1986]).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What is the test of reasonableness for a fully qualified covenant?</strong></span></p></td><td><p>International Drilling Fluids v Louisville [1986]: landlord not entitled to refuse consent on grounds that have nothing to do with the landlord and tenant relationship (e.g. personal dislike of assignee). Must be a genuine L/T reason: ability to pay rent, creditworthiness, bad references.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What is the difference between privity of contract and privity of estate?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Privity of contract: original L and T; binding for full lease duration (old leases). Privity of estate: current L and current T; exists only while each holds their respective estate; allows &quot;touch and concern&quot; covenants to be enforced between current parties.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What covenants &quot;touch and concern&quot; the land in an old lease?</strong></span></p></td><td><p>Covenants relating to the landlord and tenant relationship; benefit parties in their capacity as L/T; must not be personal. Personal covenants do not touch and concern and do not pass.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What is the original tenant&#x27;s position on assignment under an OLD lease?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Privity of contract continues for the full lease duration \u2014 original tenant remains liable for their own AND assignees&#x27; breaches throughout the entire lease term, even after assignment. This can cause hardship.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What is the original tenant&#x27;s position on assignment under a NEW lease (LTCA 1995)?</strong></span></p></td><td><p>Automatic release on assignment under s 5 LTCA, unless it is an &quot;excluded assignment&quot; (i.e. in breach of alienation covenant under s 11). After release, only liable for breaches during own period of occupation (s 23(1)).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What is an AGA and what does it cover?</strong></span></p></td><td class=\"nt-cell-blue\"><p>Authorised guarantee agreement (LTCA 1995 s 16): condition of landlord&#x27;s consent to assignment of a new lease; outgoing tenant guarantees performance of the IMMEDIATE assignee&#x27;s obligations only. On any further assignment, a new AGA is required. Landlord only ever has the current and immediately prior tenant &quot;on the hook.&quot;</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What does LTCA 1995 s 3 provide for new leases?</strong></span></p></td><td><p>Automatic transmission of the benefit AND burden of ALL covenants in the lease to the assignee of the lease and to the new reversioner on assignment \u2014 except covenants &quot;expressed to be personal to any person.&quot;</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Is there automatic release of the landlord on assignment under LTCA 1995?</strong></span></p></td><td class=\"nt-cell-blue\"><p>No \u2014 unlike tenants (s 5), there is no automatic release for landlords. The outgoing landlord must apply to the tenant for release (s 6). If refused, they may apply to court (s 8).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>What is the s 17 LTCA tenant default notice requirement?</strong></span></p></td><td><p>The landlord must serve notice of a fixed charge claim on any former tenant who remains liable within 6 months of the charge becoming due. Failure to notify within 6 months = landlord is precluded from claiming. Applies to ALL leases.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What is an overriding lease under s 19 LTCA 1995?</strong></span></p></td><td class=\"nt-cell-blue\"><p>If a former tenant is required to pay under s 17, they may request an overriding lease \u2014 making them the immediate landlord of the defaulting assignee. Term = remaining term + 3 days; same covenants; allows former tenant to manage, forfeit, or re-let to a more reliable tenant.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Can head landlord enforce covenants against a subtenant?</strong></span></p></td><td><p>No direct relationship exists. S 3(5) LTCA 1995: restrictive covenants in new leases may be enforced against any owner/occupier (including subtenant). Positive covenants cannot be enforced directly against subtenants. Landlord&#x27;s best protection is to require direct covenants from the subtenant as a condition of consent to subletting.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>What happens to a sublease if the headlease is forfeited?</strong></span></p></td><td class=\"nt-cell-blue\"><p>The sublease is automatically terminated if the headlease is forfeited \u2014 subject to the subtenant&#x27;s right to apply for relief against forfeiture. This is a strong incentive for the subtenant to comply with the headlease covenants.</p></td></tr></tbody></table></div>\n<h3 class=\"notes-h3\"><span class=\"nt-txt-blue\"><strong>4. Common Exam Pitfalls &amp; Tricky Distinctions</strong></span></h3>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Pitfall / Distinction</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Explanation</strong></p></th></tr></thead><tbody>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Always identify old vs new lease first</strong></span></p></td><td><p>The entire enforceability analysis depends on whether the lease was granted before or on/after 1 January 1996. Old leases: privity of contract continues for original parties throughout. New leases: LTCA 1995 governs; automatic transmission under s 3; automatic tenant release under s 5. Never apply old lease rules to a new lease or vice versa.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Excluded assignments: s 5 release does NOT apply</strong></span></p></td><td class=\"nt-cell-blue\"><p>An &quot;excluded assignment&quot; (assignment in breach of an alienation covenant, e.g. without landlord&#x27;s consent) does not trigger the s 5 automatic release. The outgoing tenant remains liable. This catches students who assume all assignments lead to automatic release under LTCA 1995.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>AGA only guarantees the IMMEDIATE assignee</strong></span></p></td><td><p>The AGA covers only the obligations of the party to whom the lease is directly assigned. On any subsequent assignment, a new AGA is required. The landlord can only ever look to the current tenant and the one immediately before. Do not say the original tenant is perpetually on the hook via an AGA \u2014 that is the old lease position.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>S 17 LTCA applies to ALL leases \u2014 not just new ones</strong></span></p></td><td class=\"nt-cell-blue\"><p>Section 17 (and ss 18 and 19) of LTCA 1995 are retrospective provisions that apply to both old and new leases. Failure to serve a s 17 notice within 6 months of the fixed charge becoming due permanently bars the landlord from claiming it from the former tenant. Always check this on facts involving former tenants.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Personal covenants do not pass \u2014 even under new leases</strong></span></p></td><td><p>Under LTCA 1995 s 3(6), covenants &quot;expressed to be personal to any person&quot; are excluded from automatic transmission. This is narrow \u2014 the covenant must be expressly stated to be between two named parties. Do not assume all covenants pass; check for personal wording.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Repair covenant: disrepair at commencement = very onerous</strong></span></p></td><td class=\"nt-cell-blue\"><p>A covenant to &quot;keep in repair&quot; includes an obligation to first PUT in repair if the premises are in disrepair at commencement. This can be extremely onerous. The correct drafting tool to limit this is a schedule of condition. Always check whether there is one; if not, the tenant may be responsible for putting the property in good repair from day one.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Repair vs renewal: cost alone is not determinative</strong></span></p></td><td><p>Brew Brothers v Snax: where the cost of works approximates the value of the premises, this can indicate renewal rather than repair. But the question is always one of degree \u2014 whether the whole or substantially the whole is being replaced. Lurcott v Wakely: replacing only the front external wall of a 200-year-old house = repair. Always apply the &quot;subsidiary parts vs entirety&quot; test first.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Anti-assignment covenant does not restrict subletting</strong></span></p></td><td class=\"nt-cell-blue\"><p>Church v Brown [1808]: a covenant against assignment is construed narrowly in the tenant&#x27;s favour. It does not prevent subletting. Similarly, a covenant against subletting the whole does not prohibit subletting of part (Wilson v Rosenthal [1906]). Always read the precise wording of the alienation covenant and apply this narrow construction.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>No direct enforcement against subtenants of positive covenants</strong></span></p></td><td><p>S 3(5) LTCA 1995 only allows restrictive covenants to be enforced against subtenants and occupiers. Positive covenants (repair, pay service charge etc.) cannot be enforced directly by the head landlord against the subtenant. The tenant remains the responsible party and must control the subtenant through the underlease terms.</p></td></tr></tbody></table></div>"
      }
    ]
  }
};





/* ── NOTES SYSTEM ─────────────────────────────────────────────── */
var notesState = { activeDoc: null };

function openNotes(mod, topic, docId) {
  notesState.activeDoc = docId || null;
  renderNotesOverlay(mod, topic);
}

function closeNotes() {
  var el = document.getElementById('notes-overlay');
  if (el) el.remove();
}

function renderNotesOverlay(mod, topic) {
  closeNotes();

  // Scope to the active module; fall back to first available module
  var activeMod = (mod && NOTES[mod]) ? mod : Object.keys(NOTES)[0];
  var modNotes = NOTES[activeMod] || {};

  // Build nav tree — only topics for the active module
  var navHtml = '<div class="notes-nav-mod">' + activeMod + '</div>';
  Object.keys(modNotes).forEach(function(t) {
    navHtml += '<div class="notes-nav-topic">' + t + '</div>';
    modNotes[t].forEach(function(doc) {
      var active = doc.id === notesState.activeDoc ? ' active' : '';
      navHtml += '<button class="notes-nav-doc' + active + '" data-mod="' + activeMod + '" data-topic="' + t + '" data-doc="' + doc.id + '" onclick="selectNotesDoc(this)">' + doc.title + '</button>';
    });
  });

  // Determine content to show
  var bodyHtml = '';
  var panelTitle = 'Revision Notes';
  if (notesState.activeDoc) {
    // Check if activeDoc belongs to this module; if not, reset it
    var found = false;
    Object.keys(modNotes).forEach(function(t) {
      modNotes[t].forEach(function(doc) {
        if (doc.id === notesState.activeDoc) {
          bodyHtml = doc.content;
          panelTitle = doc.title;
          found = true;
        }
      });
    });
    if (!found) notesState.activeDoc = null;
  }
  if (!notesState.activeDoc) {
    // Show first doc in this module
    var first = null;
    for (var t in modNotes) {
      if (modNotes[t].length > 0) { first = modNotes[t][0]; break; }
    }
    if (first) { bodyHtml = first.content; panelTitle = first.title; notesState.activeDoc = first.id; }
  }

  var overlay = document.createElement('div');
  overlay.id = 'notes-overlay';
  overlay.className = 'notes-overlay';
  overlay.innerHTML =
    '<div class="notes-panel">' +
      '<div class="notes-header">' +
        '<div>' +
          '<div class="notes-mod-label">Revision Notes</div>' +
          '<div class="notes-title">' + panelTitle + '</div>' +
        '</div>' +
        '<button class="notes-close" onclick="closeNotes()">×</button>' +
      '</div>' +
      '<div style="display:flex;flex:1;min-height:0;overflow:hidden;position:relative">' +
        '<button class="notes-toggle" onclick="toggleNotesSidebar()" id="notes-toggle-btn"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>' +
        '<div class="notes-nav" id="notes-nav">' + navHtml + '</div>' +
        '<div class="notes-body" id="notes-body">' + bodyHtml + '</div>' +
      '</div>' +
    '</div>';

  // Close on overlay click (not panel)
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) closeNotes();
  });

  document.body.appendChild(overlay);
}

function selectNotesDoc(btn) {
  notesState.activeDoc = btn.getAttribute('data-doc');
  // Update active state
  document.querySelectorAll('.notes-nav-doc').forEach(function(b) {
    b.classList.toggle('active', b === btn);
  });
  // Update body content + title
  var m = btn.getAttribute('data-mod');
  var t = btn.getAttribute('data-topic');
  var docId = btn.getAttribute('data-doc');
  var docs = NOTES[m] && NOTES[m][t] ? NOTES[m][t] : [];
  var doc = docs.find(function(d) { return d.id === docId; });
  if (doc) {
    var nb = document.getElementById('notes-body');
    nb.innerHTML = doc.content;
    nb.scrollTop = 0;
    document.querySelector('.notes-title').textContent = doc.title;
  }
}

function toggleNotesSidebar() {
  var nav = document.getElementById('notes-nav');
  var btn = document.getElementById('notes-toggle-btn');
  nav.classList.toggle('collapsed');
  var isCollapsed = nav.classList.contains('collapsed');
  btn.querySelector('svg').innerHTML = isCollapsed
    ? '<path d="M5 12h14M12 5l7 7-7 7"/>'
    : '<path d="M19 12H5M12 19l-7-7 7-7"/>';
}

/* ── Boot: load all questions then paint ── */
loadAllQuestions().then(function() {
  paint();
}).catch(function(err) {
  document.getElementById("app").innerHTML =
    '<div style="padding:2rem;text-align:center;color:#c00">' +
    '<h2>Failed to load questions</h2>' +
    '<p>' + err + '</p>' +
    '<p style="font-size:13px;color:#666;margin-top:1rem">Make sure the /data/ folder with JSON files is in the same directory as index.html</p>' +
    '</div>';
});

</script>
