<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPP PGDL — MCQ Practice</title>
<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f0f4f9;color:#111;min-height:100vh;padding:1.5rem 1rem 4rem}
#app{max-width:760px;margin:0 auto}
.hdr{display:flex;align-items:center;gap:12px;background:#fff;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem;border:1px solid rgba(0,0,0,0.08)}
.ico{width:38px;height:38px;background:#185FA5;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ico svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2}
.ht{font-size:15px;font-weight:600;color:#111}.hs{font-size:11px;color:#666;margin-top:2px}
.bb{margin-left:auto;padding:6px 12px;font-size:12px;border:1px solid rgba(0,0,0,0.18);border-radius:7px;background:none;cursor:pointer;color:#555}
.bb:hover{background:#eef3f9}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
.st{background:#fff;border-radius:9px;padding:10px 8px;text-align:center;border:1px solid rgba(0,0,0,0.08)}
.sn{font-size:22px;font-weight:600;color:#185FA5}
.sl{font-size:11px;color:#666;margin-top:2px}
.sn.g{color:#1a7a3a}.sn.a{color:#b06800}.sn.r{color:#c0392b}
.tl{font-size:11px;color:#666;margin-bottom:4px;font-weight:500}
select{width:100%;padding:9px 12px;border:1px solid rgba(0,0,0,0.18);border-radius:8px;font-size:13px;background:#fff;color:#111;cursor:pointer;margin-bottom:1.25rem}
.qcard{background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:12px;padding:1.5rem;margin-bottom:1rem}
.qtag{font-size:10px;font-weight:600;color:#185FA5;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:12px}
.scenario{background:#f0f4f9;border-left:3px solid #185FA5;border-radius:0 8px 8px 0;padding:1rem 1.1rem;margin-bottom:1.1rem;font-size:13px;line-height:1.7;color:#222}
.stem{font-size:14px;font-weight:500;line-height:1.65;color:#111}
.opts{display:flex;flex-direction:column;gap:9px;margin-top:1.1rem}
.op{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border:1px solid rgba(0,0,0,0.15);border-radius:9px;background:#fff;cursor:pointer;text-align:left;width:100%;transition:border-color 0.12s,background 0.12s}
.op:hover:not([disabled]){border-color:#185FA5;background:#eef5ff}
.op[disabled]{cursor:default}
.ol{width:24px;height:24px;border-radius:50%;border:1.5px solid rgba(0,0,0,0.2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;color:#666;margin-top:1px}
.ot{font-size:13px;line-height:1.55;color:#111}
.op.cor{border-color:#1a7a3a;background:#f0faf4}.op.cor .ol{background:#1a7a3a;border-color:#1a7a3a;color:#fff}
.op.inc{border-color:#c0392b;background:#fff5f5}.op.inc .ol{background:#c0392b;border-color:#c0392b;color:#fff}
.expl{border-radius:10px;padding:1.25rem;margin-bottom:1rem;font-size:13px;line-height:1.7}
.expl.c{background:#f0faf4;border:1px solid #1a7a3a}
.expl.i{background:#fff5f5;border:1px solid #c0392b}
.exh{font-size:12px;font-weight:600;margin-bottom:8px}
.exh.c{color:#1a7a3a}.exh.i{color:#c0392b}
.nb{width:100%;padding:13px;background:#185FA5;border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.nb:hover{background:#0C447C}.nb:disabled{opacity:0.3;cursor:not-allowed}
.sc{background:#fff;border-radius:12px;padding:2.5rem 2rem;text-align:center;border:1px solid rgba(0,0,0,0.08)}
.sc h2{font-size:20px;font-weight:600;margin-bottom:10px}
.sc p{font-size:14px;color:#555;line-height:1.7;max-width:480px;margin:0 auto 1.5rem}
.sb{padding:13px 40px;background:#185FA5;border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.sb:hover{background:#0C447C}
.badge{display:inline-block;background:#E6F1FB;color:#0C447C;font-size:11px;padding:3px 10px;border-radius:20px;margin-bottom:14px;font-weight:500}
.pbar-wrap{height:4px;background:#e0eaf5;border-radius:2px;margin-bottom:1.25rem}
.pbar{height:100%;background:#185FA5;border-radius:2px;transition:width 0.3s}

/* ── multi-module extras ── */
.mod-tabs{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap}
.mod-tab{padding:8px 18px;border-radius:8px;border:1px solid rgba(0,0,0,0.15);background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#555;transition:all 0.12s}
.mod-tab.active{background:#185FA5;color:#fff;border-color:#185FA5}
.mod-tab:hover:not(.active){background:#eef3f9;border-color:#185FA5;color:#185FA5}
.topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.5rem}
.topic-tile{border-radius:9px;padding:10px 12px;cursor:pointer;border:1px solid rgba(0,0,0,0.1);transition:opacity 0.12s}
.topic-tile:hover{opacity:0.85}
.topic-tile-name{font-size:12px;font-weight:600;line-height:1.4;margin-bottom:3px}
.topic-tile-score{font-size:11px;opacity:0.85}
.pill-strip{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem}
.pill{border-radius:20px;padding:3px 10px;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;border:1px solid}

/* ── NOTES PANEL ─────────────────────────────── */
.notes-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:500;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
.notes-panel{background:#fff;border-radius:14px;width:100%;max-width:860px;display:flex;flex-direction:column;max-height:90vh;position:relative;overflow:hidden}
.notes-header{display:flex;align-items:center;gap:12px;padding:1.1rem 1.5rem;border-bottom:1px solid rgba(0,0,0,0.08);flex-shrink:0}
.notes-back{background:none;border:1px solid rgba(0,0,0,0.18);border-radius:7px;padding:5px 12px;font-size:12px;cursor:pointer;color:#555}
.notes-back:hover{background:#f0f4f9}
.notes-mod-label{font-size:11px;font-weight:600;color:#185FA5;text-transform:uppercase;letter-spacing:0.5px}
.notes-title{font-size:16px;font-weight:600;color:#111;margin:0}
.notes-close{margin-left:auto;background:none;border:none;font-size:22px;cursor:pointer;color:#888;line-height:1;padding:0 4px}
.notes-sidebar{display:flex;flex-shrink:0}
.notes-nav{width:200px;border-right:1px solid rgba(0,0,0,0.08);padding:1rem 0;overflow-y:auto;flex-shrink:0;transition:width 0.2s,padding 0.2s,opacity 0.2s}
.notes-nav.collapsed{width:0;padding:0;opacity:0;overflow:hidden;border:none}
.notes-toggle{position:absolute;top:8px;left:8px;z-index:10;background:#fff;border:1px solid rgba(0,0,0,0.15);border-radius:6px;padding:4px 8px;font-size:11px;cursor:pointer;color:#555;display:flex;align-items:center;gap:4px;transition:background 0.12s}
.notes-toggle:hover{background:#eef3f9;color:#185FA5}
.notes-toggle svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.notes-nav-mod{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.6px;padding:8px 16px 4px}
.notes-nav-topic{font-size:12px;font-weight:600;color:#333;padding:5px 16px 2px;margin-top:4px}
.notes-nav-doc{display:block;width:100%;text-align:left;background:none;border:none;font-size:12px;color:#555;padding:5px 16px 5px 24px;cursor:pointer;border-radius:0;transition:background 0.1s}
.notes-nav-doc:hover{background:#f0f4f9;color:#185FA5}
.notes-nav-doc.active{background:#E6F1FB;color:#185FA5;font-weight:600}
.notes-body{flex:1;overflow-y:auto;padding:1.5rem 1.75rem;min-width:0}
/* ── Notes content styles ── */
.notes-body .notes-h2{font-size:17px;font-weight:700;color:#111;margin:0 0 14px;padding-bottom:8px;border-bottom:2px solid #185FA5}
.notes-body .notes-h3{font-size:14px;font-weight:700;color:#185FA5;margin:20px 0 8px;text-transform:uppercase;letter-spacing:0.4px}
.notes-body .notes-h4{font-size:13px;font-weight:700;color:#333;margin:16px 0 8px}
.notes-body p,.notes-body .notes-p{font-size:13px;line-height:1.7;color:#333;margin:0 0 8px}
.notes-body .notes-list{font-size:13px;line-height:1.7;color:#333;margin:0 0 10px;padding-left:1.25rem}
.notes-body .notes-list li{margin-bottom:4px}
.notes-table-wrap{overflow-x:auto;margin:12px 0}
.notes-table{width:100%;border-collapse:collapse;font-size:12px;line-height:1.55}
.notes-table th{background:#185FA5;color:#fff;font-weight:600;padding:8px 10px;text-align:left;vertical-align:top}.notes-table th *{color:#fff !important}
.notes-table td{padding:7px 10px;border-bottom:1px solid rgba(0,0,0,0.08);vertical-align:top;color:#333}
.notes-table tbody tr:nth-child(even) td{background:#f5f8ff}
/* ── Home screen Notes button ── */
.notes-home-btn{display:inline-flex;align-items:center;gap:8px;padding:11px 24px;background:none;border:1.5px solid #185FA5;border-radius:10px;color:#185FA5;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.12s}
.notes-home-btn:hover{background:#E6F1FB}
.notes-home-btn svg{width:16px;height:16px;stroke:#185FA5;fill:none;stroke-width:2;flex-shrink:0}

/* ── Notes colour classes (from original docx) ── */
.nt-hdr-blue  { background:#2E5496; color:#fff; }
.nt-hdr-slate { background:#37474F; color:#fff; font-family:'Courier New',monospace; font-size:11px; }
.nt-cell-blue { background:#EEF4FA; }
.nt-cell-cream{ background:#FFFDF0; border-left:4px solid #C9A227; }
.nt-txt-navy  { color:#1F3864; }
.nt-txt-blue  { color:#2E5496; }
.nt-txt-gold  { color:#8B6914; }
/* Force white text on ALL content inside dark header cells */
.notes-table th,
.notes-table th *,
.notes-table th.nt-hdr-blue,
.notes-table th.nt-hdr-blue *,
.notes-table th.nt-hdr-slate,
.notes-table th.nt-hdr-slate *,
.notes-table td.nt-hdr-slate,
.notes-table td.nt-hdr-slate * { color:#fff !important; }
/* Slate header td (calc tables use td not th for headers) */
.notes-table td.nt-hdr-slate { background:#37474F; font-family:'Courier New',monospace; }
/* Cream and light blue cell text */
.notes-table td.nt-cell-cream p,
.notes-table td.nt-cell-cream li { color:#333; }
</style>
</head>
<body>
<div id="app"></div>
<script>

/* ══════════════════════════════════════════════════════════
   QUESTION BANKS
══════════════════════════════════════════════════════════ */
var QB = [];
var QB_LOADED = {};  /* tracks which modules have been fetched */

/* Map of module IDs to their JSON file paths */
var MODULE_FILES = {
  "Trusts Law": "data/trusts.json",
  "Land Law": "data/land.json",
  "Public Law II": "data/public.json"
};

/**
 * Load questions for a module from its JSON file.
 * Returns a Promise that resolves when questions are added to QB.
 */
function loadQuestions(moduleName) {
  if (QB_LOADED[moduleName]) return Promise.resolve();
  var filePath = MODULE_FILES[moduleName];
  if (!filePath) return Promise.reject("Unknown module: " + moduleName);

  return fetch(filePath)
    .then(function(res) {
      if (!res.ok) throw new Error("Failed to load " + filePath + ": " + res.status);
      return res.json();
    })
    .then(function(data) {
      data.questions.forEach(function(q) {
        QB.push({
          mod: data.module,
          tp: q.topic,
          tg: q.tag,
          sc: q.scenario || "",
          st: q.stem,
          o: q.options,
          c: q.correct,
          ex: q.explanation
        });
      });
      QB_LOADED[moduleName] = true;
    });
}

/**
 * Load all module question banks, then initialise the app.
 */
function loadAllQuestions() {
  var promises = Object.keys(MODULE_FILES).map(function(mod) {
    return loadQuestions(mod);
  });
  return Promise.all(promises);
}



/* ══════════════════════════════════════════════════════════
   MODULE & TOPIC DEFINITIONS
══════════════════════════════════════════════════════════ */
var MODULES = [
  {
    id: "Trusts Law",
    label: "Trusts Law",
    topics: [
      {id:"all",lb:"All Topics"},
      {id:"Trust Relationship",lb:"Trust Relationship & Three Certainties"},
      {id:"Formalities",lb:"Formalities & Constitution"},
      {id:"Purpose Trusts",lb:"Beneficiary Principle & Purpose Trusts"},
      {id:"Trustees",lb:"Trustees & Their Duties"},
      {id:"Fiduciaries",lb:"Fiduciary Duties & Accessory Liability"},
      {id:"Resulting Trusts",lb:"Resulting Trusts"},
      {id:"Constructive Trusts",lb:"Constructive Trusts"},
      {id:"Breach of Trust",lb:"Breach of Trust & Personal Remedies"},
      {id:"Tracing",lb:"Proprietary Remedies & Tracing"},
      {id:"Mixed Topics",lb:"Mixed Topics — Application"}
    ]
  },
  {
    id: "Land Law",
    label: "Land Law",
    topics: [
      {id:"all",lb:"All Topics"},
      {id:"Nature of Land",lb:"Nature of Land"},
      {id:"Mortgages",lb:"Mortgages"},
      {id:"Leases",lb:"Leases"},
      {id:"Easements",lb:"Easements"},
      {id:"Freehold Covenants",lb:"Freehold Covenants"},
      {id:"Co-ownership",lb:"Co-ownership"},
      {id:"Enforcement of Interests",lb:"Enforcement of Interests"}
    ]
  },
  {
    id: "Public Law II",
    label: "Public Law II",
    topics: [
      {id:"all",lb:"All Topics"},
      {id:"Judicial Review",lb:"Judicial Review"},
      {id:"Illegality",lb:"Illegality"},
      {id:"Unreasonableness",lb:"Unreasonableness & Proportionality"},
      {id:"Procedural Impropriety",lb:"Procedural Impropriety"},
      {id:"Legitimate Expectation",lb:"Legitimate Expectation"},
      {id:"Human Rights Act",lb:"Human Rights Act"},
      {id:"ECHR Articles",lb:"ECHR Articles"}
    ]
  }

];

/* ══════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════ */
var S = {
  view: "start",       /* start | quiz */
  mod:  "Trusts Law",  /* active module id */
  topic:"all",         /* active topic id */
  q: null, sel: null,
  att: 0, cor: 0, qn: 0, used: [],
  /* {modId: {topicId: {att,cor}}} */
  stats: {}
};

/* Initialise stats for every module/topic */
MODULES.forEach(function(m){
  S.stats[m.id] = {};
  m.topics.forEach(function(t){
    if(t.id !== "all") S.stats[m.id][t.id] = {att:0, cor:0};
  });
});

/* ══════════════════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════════════════ */
function modTopics(){
  var m = MODULES.find(function(m){return m.id===S.mod;});
  return m ? m.topics : [];
}

function poolFor(mod, topic){
  return QB.filter(function(q){
    return q.mod === mod && (topic==="all" || q.tp === topic);
  });
}

function topicStat(mod, tid){
  return (S.stats[mod] && S.stats[mod][tid]) || {att:0, cor:0};
}

function topicColor(mod, tid){
  var ts = topicStat(mod, tid);
  if(!ts || ts.att===0) return {bg:"#f5f5f5", tc:"#555", bc:"rgba(0,0,0,0.1)"};
  var p = ts.cor/ts.att;
  if(p>=0.7)  return {bg:"#d4edda", tc:"#155724", bc:"#a3cfb5"};
  if(p>=0.4)  return {bg:"#fff3cd", tc:"#856404", bc:"#ffc107"};
  return       {bg:"#f8d7da", tc:"#721c24", bc:"#f1aeb5"};
}

/* ══════════════════════════════════════════════════════════
   QUESTION LOGIC
══════════════════════════════════════════════════════════ */
function getQ(){
  var pool = poolFor(S.mod, S.topic);
  if(!pool.length){ alert("No questions for this selection."); return null; }
  var unused = pool.filter(function(q){ return S.used.indexOf(q)===-1; });
  if(!unused.length){ S.used=[]; unused=pool; }
  var pick = unused[Math.floor(Math.random()*unused.length)];
  S.used.push(pick);
  return pick;
}

function next(){ var q=getQ(); if(!q)return; S.q=q; S.sel=null; S.qn++; paint(); }

function answer(o){
  if(S.sel) return;
  S.sel = o;
  S.att++;
  var ok = (o === S.q.c);
  if(ok) S.cor++;
  var tid = S.q.tp;
  if(S.stats[S.mod] && S.stats[S.mod][tid]){
    S.stats[S.mod][tid].att++;
    if(ok) S.stats[S.mod][tid].cor++;
  }
  paint();
}

function startQuiz(mod, topic){
  S.mod   = mod   || S.mod;
  S.topic = topic || "all";
  S.view  = "quiz";
  S.used  = [];
  next();
}

function closeSummary(){var el=document.getElementById('summodal');if(el)el.remove();}

/* ══════════════════════════════════════════════════════════
   SUMMARY MODAL
══════════════════════════════════════════════════════════ */
function showSummary(){
  var modTopicList = modTopics().filter(function(t){return t.id!=="all";});
  var attempted = modTopicList.filter(function(t){return topicStat(S.mod,t.id).att>0;});
  var weak      = attempted.filter(function(t){var s=topicStat(S.mod,t.id);return s.cor/s.att<0.4;});
  var ok        = attempted.filter(function(t){var s=topicStat(S.mod,t.id);var p=s.cor/s.att;return p>=0.4&&p<0.7;});
  var strong    = attempted.filter(function(t){var s=topicStat(S.mod,t.id);return s.cor/s.att>=0.7;});
  var untouched = modTopicList.filter(function(t){return topicStat(S.mod,t.id).att===0;});

  /* per-topic rows */
  var rows = "";
  modTopicList.forEach(function(t){
    var ts=topicStat(S.mod,t.id);
    var pct=ts.att>0?Math.round(ts.cor/ts.att*100):null;
    var col=topicColor(S.mod,t.id);
    rows+='<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;border:1px solid '+col.bc+';background:'+col.bg+';margin-bottom:6px">'
      +'<span style="flex:1;font-size:13px;color:'+col.tc+';font-weight:500">'+t.lb+'</span>'
      +'<span style="font-size:12px;color:'+col.tc+'">'+(ts.att>0?ts.cor+'/'+ts.att+' ('+pct+'%)':"Not started")+'</span>'
      +'</div>';
  });

  /* action plan */
  var recs="";
  var modAtt=attempted.length>0;
  if(!modAtt){
    recs='<p style="font-size:13px;color:#555">Complete some questions in this module first to get personalised recommendations.</p>';
  } else {
    if(weak.length)   recs+='<div style="margin-bottom:10px"><div style="font-size:12px;font-weight:600;color:#721c24;margin-bottom:4px">Needs work</div>'    +weak.map(function(t){return'<div style="font-size:13px;color:#555;padding:2px 0">• '+t.lb+'</div>';}).join('')+'</div>';
    if(ok.length)     recs+='<div style="margin-bottom:10px"><div style="font-size:12px;font-weight:600;color:#856404;margin-bottom:4px">Keep practising</div>'+ok.map(function(t){return'<div style="font-size:13px;color:#555;padding:2px 0">• '+t.lb+'</div>';}).join('')+'</div>';
    if(strong.length) recs+='<div style="margin-bottom:10px"><div style="font-size:12px;font-weight:600;color:#155724;margin-bottom:4px">Strong</div>'         +strong.map(function(t){return'<div style="font-size:13px;color:#555;padding:2px 0">• '+t.lb+'</div>';}).join('')+'</div>';
    if(untouched.length) recs+='<div><div style="font-size:12px;font-weight:600;color:#555;margin-bottom:4px">Not yet attempted</div>'+untouched.map(function(t){return'<div style="font-size:13px;color:#999;padding:2px 0">• '+t.lb+'</div>';}).join('')+'</div>';
  }

  /* overall advice */
  var modStats = S.stats[S.mod]||{};
  var modTot=0,modCor=0;
  Object.values(modStats).forEach(function(s){modTot+=s.att;modCor+=s.cor;});
  var overall=modTot>0?Math.round(modCor/modTot*100):0;
  var advice;
  if(modTot===0)           advice="Start answering questions in this module to receive feedback.";
  else if(overall>=70)     advice="Strong overall performance in "+S.mod+". Focus on consolidating any yellow or red topics before your exam.";
  else if(overall>=50)     advice="Good progress. Prioritise the topics marked red — revisit your notes and re-test in those areas.";
  else                     advice="Keep going — the more questions you attempt the better. Focus first on the topics marked red and re-read those sections of your notes.";

  var modal='<div id="summodal" style="position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:flex-start;justify-content:center;z-index:999;padding:2rem 1rem;overflow-y:auto">'
    +'<div style="background:#fff;border-radius:14px;padding:1.75rem;max-width:580px;width:100%;position:relative">'
    +'<button onclick="closeSummary()" style="position:absolute;top:14px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:#888;line-height:1">×</button>'
    +'<div style="font-size:11px;font-weight:600;color:#185FA5;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:6px">'+S.mod+' — Progress Summary</div>'
    +'<div style="font-size:18px;font-weight:600;margin-bottom:4px">Your results so far</div>'
    +'<div style="font-size:13px;color:#555;margin-bottom:1.25rem">'+modTot+' questions attempted · '+modCor+' correct'+(modTot>0?' · '+overall+'% accuracy':'')+'</div>'
    +'<div style="background:#f5f8ff;border-radius:8px;padding:10px 14px;margin-bottom:1.25rem;font-size:13px;color:#333;line-height:1.6"><strong>Recommendation:</strong> '+advice+'</div>'
    +'<div style="font-size:12px;font-weight:600;color:#333;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.4px">By Topic</div>'
    +rows
    +'<div style="margin-top:1.25rem;padding-top:1rem;border-top:1px solid rgba(0,0,0,0.08)"><div style="font-size:12px;font-weight:600;color:#333;margin-bottom:8px">Action plan</div>'+recs+'</div>'
    +'<button onclick="closeSummary()" style="margin-top:1.25rem;width:100%;padding:11px;background:#185FA5;border:none;border-radius:9px;color:#fff;font-size:13px;font-weight:600;cursor:pointer">Close</button>'
    +'</div></div>';

  document.body.insertAdjacentHTML("beforeend", modal);
}

function tcg(mod,tid){return topicColor(mod,tid).bg;}

/* ══════════════════════════════════════════════════════════
   PAINT
══════════════════════════════════════════════════════════ */
function paint(){
  var topics   = modTopics();
  var pool     = poolFor(S.mod, S.topic);
  var acc      = S.att>0 ? Math.round(S.cor/S.att*100) : null;
  var ac       = acc===null?"":acc>=70?"g":acc>=50?"a":"r";

  /* compute per-module totals for the module tabs */
  function modTotal(mid){
    var st=S.stats[mid]||{};
    var tot=0,cor=0;
    Object.values(st).forEach(function(s){tot+=s.att;cor+=s.cor;});
    return {att:tot,cor:cor};
  }

  /* ── HEADER ── */
  var h='<div class="hdr">'
    +'<div class="ico"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>'
    +'<div><div class="ht">BPP PGDL — MCQ Practice</div><div class="hs">Scenario-based · Exam-level</div></div>'
    +(S.view==="quiz"?'<button class="bb" onclick="goHome()">Home</button>':'')
    +'</div>';

  /* ── MODULE TABS (always visible) ── */
  h+='<div class="mod-tabs">';
  MODULES.forEach(function(m){
    var mt=modTotal(m.id);
    var badge=mt.att>0?' <span style="font-size:10px;opacity:0.75">('+mt.cor+'/'+mt.att+')</span>':'';
    h+='<button class="mod-tab'+(S.mod===m.id?' active':'')+'" " data-mid="'+m.id+'" onclick="switchMod(this)">'+m.label+badge+'</button>';
  });
  h+='</div>';

  if(S.view==="start"){
    /* ── START SCREEN ── */
    var moduleTopics = topics.filter(function(t){return t.id!=="all";});
    var totalQ = poolFor(S.mod,"all").length;

    var grid='<div class="topic-grid">';
    moduleTopics.forEach(function(t){
      var ts=topicStat(S.mod,t.id);
      var pct=ts.att>0?Math.round(ts.cor/ts.att*100):null;
      var col=topicColor(S.mod,t.id);
      var score=ts.att>0?ts.cor+'/'+ts.att+' · '+pct+'%':"Not started";
      grid+='<div class="topic-tile" style="background:'+col.bg+';border-color:'+col.bc+'" " data-tid="'+t.id+'" onclick="startQuizTile(this)">'
        +'<div class="topic-tile-name" style="color:'+col.tc+'">'+t.lb+'</div>'
        +'<div class="topic-tile-score" style="color:'+col.tc+'">'+score+'</div>'
        +'</div>';
    });
    grid+='</div>';

    var modStats2=modTotal(S.mod);
    var hasProgress=modStats2.att>0;

    h+='<div class="sc">'
      +'<div class="badge">'+totalQ+' questions · '+moduleTopics.length+' topics</div>'
      +'<h2>'+S.mod+'</h2>'
      +'<p style="margin-bottom:1.25rem">Select a topic to practise, or start a mixed session across all topics. Progress is tracked per topic and shown below.</p>'
      +grid
      +'<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">'
      +'<button class="sb" onclick="startAll()">All Topics</button>'
      +(hasProgress?'<button onclick="showSummary()" style="padding:13px 24px;background:none;border:1px solid rgba(0,0,0,0.2);border-radius:10px;color:#185FA5;font-size:14px;font-weight:600;cursor:pointer">My Progress ↗</button>':'')
      +'<button class="notes-home-btn" onclick="openNotes(S.mod)"><svg viewBox=\"0 0 24 24\"><path d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"/></svg>Revision Notes</button>'
      +'</div>'
      +'</div>';

  } else {
    /* ── QUIZ SCREEN ── */
    var pct2=pool.length>0?Math.min(100,Math.round(S.used.length/pool.length*100)):0;
    h+='<div class="pbar-wrap"><div class="pbar" style="width:'+pct2+'%"></div></div>';

    h+='<div class="stats">'
      +'<div class="st"><div class="sn">'+S.qn+'</div><div class="sl">Questions</div></div>'
      +'<div class="st"><div class="sn">'+S.att+'</div><div class="sl">Attempted</div></div>'
      +'<div class="st"><div class="sn g">'+S.cor+'</div><div class="sl">Correct</div></div>'
      +'<div class="st"><div class="sn '+ac+'">'+(acc!==null?acc+'%':'—')+'</div><div class="sl">Accuracy</div></div>'
      +'</div>';

    /* topic selector + progress button */
    h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:1rem">'
      +'<select id="ts" style="flex:1;margin-bottom:0">'
      +topics.map(function(t){return'<option value="'+t.id+'"'+(S.topic===t.id?' selected':'')+'>'+t.lb+'</option>';}).join('')
      +'</select>'
      +'<button onclick="showSummary()" style="flex-shrink:0;padding:9px 13px;background:none;border:1px solid rgba(0,0,0,0.2);border-radius:8px;color:#185FA5;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap">My Progress</button>'
      +'</div>';

    /* topic colour pill strip */
    h+='<div class="pill-strip">';
    topics.filter(function(t){return t.id!=="all";}).forEach(function(t){
      var ts=topicStat(S.mod,t.id);
      var col=topicColor(S.mod,t.id);
      var score=ts.att>0?(ts.cor+'/'+ts.att):"";
      var shortLabel=t.lb.length>22?t.lb.substring(0,20)+"…":t.lb;
      h+='<div class="pill" style="background:'+col.bg+';border-color:'+col.bc+';color:'+col.tc+'" " data-tid="'+t.id+'" onclick="switchPill(this)">'+shortLabel+(score?' · '+score:'')+'</div>';
    });
    h+='</div>';

    /* question card */
    if(S.q){
      var q=S.q;
      h+='<div class="qcard"><div class="qtag">Q'+S.qn+' · '+q.tg+'</div>';
      if(q.sc)h+='<div class="scenario">'+q.sc+'</div>';
      h+='<div class="stem">'+q.st+'</div><div class="opts">';
      ['A','B','C','D','E'].forEach(function(o){
        var cl='op';
        if(S.sel){if(o===q.c)cl+=' cor';else if(o===S.sel&&o!==q.c)cl+=' inc';}
        h+='<button class="'+cl+'" " data-opt="'+o+'" onclick="answerBtn(this)" '+(S.sel?'disabled':'')+'>'
          +'<span class="ol">'+o+'</span><span class="ot">'+q.o[o]+'</span></button>';
      });
      h+='</div></div>';

      if(S.sel){
        var isOk=S.sel===q.c;
        h+='<div class="expl '+(isOk?'c':'i')+'">'
          +'<div class="exh '+(isOk?'c':'i')+'">'+(isOk?'Correct — well done.':'Incorrect — the correct answer is '+q.c+'.')+'</div>'
          +q.ex+'</div>';
      }

      h+='<button class="nb" onclick="next()" '+(S.sel?'':'disabled')+'>'
        +(S.sel?'Next question →':'Select an answer to continue')+'</button>';
    }
  }

  document.getElementById("app").innerHTML = h;
  var ts=document.getElementById("ts");
  if(ts) ts.addEventListener("change",function(e){S.topic=e.target.value; S.used=[]; });
}

/* ── named handlers (avoid quote conflicts in onclick attributes) ── */
function goHome(){ S.view='start'; paint(); }
function switchMod(el){ S.mod=el.getAttribute('data-mid'); S.topic='all'; S.view='start'; paint(); }
function startQuizTile(el){ startQuiz(S.mod, el.getAttribute('data-tid')); }
function startAll(){ startQuiz(S.mod,'all'); }
function switchPill(el){
  var tid=el.getAttribute('data-tid');
  S.topic=tid;
  var ts=document.getElementById('ts');
  if(ts) ts.value=tid;
  S.used=[];
  next();
}
function answerBtn(el){ answer(el.getAttribute('data-opt')); }


var NOTES = {
  "Trusts Law": {
    "Trust Relationship": [
      {
        "id": "trusts-w1",
        "title": "W1: The Trust Relationship & Three Certainties",
        "content": "<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Trusts Law \u2013 W1: The Trust Relationship</strong></span></h2>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Topic Overview</strong></span></h2>\n<p><strong>Logical exam order:</strong></p>\n<p>1. Define a trust: equitable duty relating to property; two components (property + obligation)</p>\n<p>2. Split of ownership: legal interest (trustee) vs equitable/beneficial interest (beneficiary)</p>\n<p>3. Comparisons: trust vs contract, debt, charge, agency, bailment, company, estate administration</p>\n<p>4. Benefits of trusts: 8 key benefits (separation, expertise, protection, flexibility, control, ring-fencing, tracing, tax)</p>\n<p>5. Categories: express / resulting / constructive; testamentary / inter vivos; fixed / discretionary; charitable purpose trusts; bare trusts</p>\n<p>6. Creation of express trusts: self-declaration vs transfer on trust</p>\n<p>7. Three certainties: intention, subject matter, objects</p>\n<p>8. Certainty of intention: key cases \u2013 Lyell v Kennedy; Paul v Constance; Re Kayford; Re Lehman Brothers; Modelboard; Re Oldfield; Mussoorie Bank</p>\n<p>9. Certainty of subject matter: trust property requirement + beneficial entitlement requirement; tangible vs intangible; Hunter v Moss</p>\n<p>10. Quistclose trusts: debt + trust combined; Barclays v Quistclose; Twinsectra; Farepak</p>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Summary Revision Tables</strong></span></h2>\n<p><span class=\"nt-txt-blue\"><strong>Table 1: Key Definitions</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Term / Concept</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Definition / Rule</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Trust</strong></span></p></td><td class=\"nt-cell-blue\"><p>An equitable duty relating to property; mechanism for dividing ownership and management of property between two parties.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Trust Property</strong></span></p></td><td><p>An essential and fundamental requirement of a trust; must be identifiable (Lord Browne-Wilkinson). A trust ceases if property is destroyed through no fault of the trustee.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Legal Interest</strong></span></p></td><td class=\"nt-cell-blue\"><p>Held by the trustee; at common law the trustee is the owner and has all rights of legal ownership.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Equitable / Beneficial Interest</strong></span></p></td><td><p>Held by the beneficiary; a recognised proprietary interest in equity. Can be given away or sold by the beneficiary. Beneficiary is the &quot;true owner&quot; in effect.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Chattel</strong></span></p></td><td class=\"nt-cell-blue\"><p>Tangible personal property other than land (Lord Shaw in Lord Strathcona).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Chose in action</strong></span></p></td><td><p>An intangible right such as a debt or company share. Can be held on trust.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Express Trust</strong></span></p></td><td class=\"nt-cell-blue\"><p>A trust deliberately created in response to a person&#x27;s intention.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Resulting Trust</strong></span></p></td><td><p>Arises by operation of law where equity recognises the transferor should retain or regain the beneficial interest. Automatic or presumed.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Constructive Trust</strong></span></p></td><td class=\"nt-cell-blue\"><p>Arises to correct unconscionability; imposed automatically on a qualifying event (institutional), or as a remedy following proprietary estoppel / breach of fiduciary duty.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Fixed Trust</strong></span></p></td><td><p>Trustee has no discretion; must distribute exactly as directed by the settlor.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Discretionary Trust</strong></span></p></td><td class=\"nt-cell-blue\"><p>Trustee has distributive discretion; settlor determines potential beneficiaries (objects), trustees determine who benefits and in what shares.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Bare Trust</strong></span></p></td><td><p>Trustee holds legal title for sole beneficiary with vested interest; no discretion, no active management duties; must follow beneficiary&#x27;s instructions.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Power of Appointment</strong></span></p></td><td class=\"nt-cell-blue\"><p>A right to choose who, from a specified class of objects, receives property. Donor confers; donee exercises. Fiduciary (given to trustee) or personal (given to non-trustee).</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 2: Trusts Distinguished from Similar Concepts</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Concept</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Key Distinction from Trust</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Authority / Note</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Contract</strong></span></p></td><td class=\"nt-cell-blue\"><p>Arises from agreement between parties (common law); both parties owe obligations. Trust arises from settlor&#x27;s intention alone; only trustee owes obligation.</p></td><td class=\"nt-cell-blue\"><p>\u2014</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Debt</strong></span></p></td><td><p>Creditor has personal right to repayment; cannot compel application of specific assets. Beneficiary has equitable proprietary interest. A debt and trust can co-exist.</p></td><td><p>Foley v Hill [1848]; Barclays v Quistclose [1970]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Charge</strong></span></p></td><td class=\"nt-cell-blue\"><p>Chargor can still use charged property. Chargee&#x27;s interest limited to debt amount. Chargor has right of redemption. No right for beneficiary to &quot;redeem&quot; equivalent.</p></td><td class=\"nt-cell-blue\"><p>\u2014</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Agency</strong></span></p></td><td><p>Agent can bind principal to third-party contracts; trustee acts as principal. Both may owe fiduciary duties. Agent may become trustee of property received for principal.</p></td><td><p>Fact-specific inquiry</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Bailment</strong></span></p></td><td class=\"nt-cell-blue\"><p>Only chattels; bailor retains legal title; transfer of possession only. Trust can cover any asset; settlor completely divests interest. Trustee can transfer legal ownership.</p></td><td class=\"nt-cell-blue\"><p>\u2014</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Company</strong></span></p></td><td><p>Company has legal personality; trust does not. Shareholders have no proprietary interest in company assets. Directors owe duties to company, not shareholders directly.</p></td><td><p>\u2014</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Estate Administration</strong></span></p></td><td class=\"nt-cell-blue\"><p>PRs must administer and distribute as quickly as practicable (ideally within 1 year). Beneficiary of estate has no equitable proprietary interest in assets\u2014only personal right against PR.</p></td><td class=\"nt-cell-blue\"><p>\u2014</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 3: Quistclose Trusts \u2013 Key Rules and Cases</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Principle</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Authority</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Bank as debtor, not trustee</strong></span></p></td><td class=\"nt-cell-blue\"><p>Money deposited with a bank becomes the bank&#x27;s money; bank is a debtor, not trustee.</p></td><td class=\"nt-cell-blue\"><p>Foley v Hill [1848]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Debt + Trust can co-exist</strong></span></p></td><td><p>A Quistclose trust combines a debt and a trust. Money loaned for a specific purpose and NOT at free disposal of borrower generates a trust in favour of lender.</p></td><td><p>Barclays v Quistclose [1970]; Twinsectra v Yardley [2002]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Key requirement: not at free disposal</strong></span></p></td><td class=\"nt-cell-blue\"><p>Must show MUTUAL intention that money can only be applied for the stated purpose and is NOT at free disposal of borrower. Merely paying for a purpose is insufficient.</p></td><td class=\"nt-cell-blue\"><p>Twinsectra v Yardley [2002]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Certainty of purpose</strong></span></p></td><td><p>Purpose must be sufficiently certain: must be possible to determine whether any given application of the money falls within it. If uncertain, borrower holds entirely on trust for lender.</p></td><td><p>Twinsectra [2002]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Operation of Quistclose trust</strong></span></p></td><td class=\"nt-cell-blue\"><p>(1) On advance: borrower holds on trust for lender, with power to use for specified purpose. (2) Money used for purpose: lender&#x27;s equitable interest extinguished; relationship becomes debtor-creditor. (3) Misapplication: breach of trust; lender can assert equitable proprietary interest. (4) Impossible to apply: borrower must return money.</p></td><td class=\"nt-cell-blue\"><p>Twinsectra [2002]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Farepak \u2013 no Quistclose</strong></span></p></td><td><p>Christmas savings scheme: money NOT held on Quistclose trust because it did not make sense for Farepak to set aside money in a separate account from January to November \u2013 it was at free disposal.</p></td><td><p>Re Farepak [2006]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Extension beyond loans</strong></span></p></td><td class=\"nt-cell-blue\"><p>Quistclose trusts not restricted to loan contexts. Arise in any situation where property is transferred for a restricted purpose and is not at free disposal of the transferee.</p></td><td class=\"nt-cell-blue\"><p>Ali v Dinc [2020]</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 4: Certainty of Intention \u2013 Key Cases</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Case</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Facts / Held</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Principle</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Re Oldfield [1904]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Testator expressed a &quot;desire&quot; that daughters should make provision for her son. Held: no trust.</p></td><td class=\"nt-cell-blue\"><p>&quot;A desire carries no obligation except a moral one.&quot; Precatory words insufficient.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Lyell v Kennedy [1889]</strong></span></p></td><td><p>Kennedy collected rent, paid into a separate account, told others it belonged to the heir. Held: trust for heir.</p></td><td><p>Separate bank account is &quot;indicative of some sort of trust&quot;; not indicative of a personal right or interest.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Paul v Constance [1977]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Dennis repeated &quot;this money is as much yours as mine.&quot; Account used jointly for bingo winnings. Held: trust declared for Dennis and Doreen jointly.</p></td><td class=\"nt-cell-blue\"><p>Objective assessment; unsophisticated person need not use legal terminology. Repeated informal words can evidence intention.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Re Kayford [1975]</strong></span></p></td><td><p>Mail order company opened &quot;Customers&#x27; Trust Deposit Account&quot; on insolvency advice. Held: trust for customers.</p></td><td><p>Trust created without the word &quot;trust&quot;. Sufficient intention shown in substance. Separate account is good indicator but not necessary or conclusive.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Re Lehman Brothers [2009]</strong></span></p></td><td class=\"nt-cell-blue\"><p>Clause 5.2 gave Lehman &quot;full ownership&quot; of post-administration receipts. Held: implied term that Lehman held post-admin receipts on trust for clients.</p></td><td class=\"nt-cell-blue\"><p>Trust can arise from implied contractual terms. Involuntary conversion of beneficiary to unsecured creditor inconsistent with agreement.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Modelboard v Outer Box [1993]</strong></span></p></td><td><p>Contract stated defendant would hold &quot;proceeds in trust.&quot; Held: NOT a trust \u2013 it was a charge; plaintiff was a secured creditor.</p></td><td><p>Characterisation by parties as &quot;trust&quot; is not conclusive. Court looks at substance.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Mussoorie Bank v Raynor [1882]</strong></span></p></td><td class=\"nt-cell-blue\"><p>&quot;Feeling confident she will act justly to our children.&quot; Held: no trust.</p></td><td class=\"nt-cell-blue\"><p>Uncertainty of subject matter / objects can have &quot;reflex action&quot; showing no intention to create a trust.</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 5: Certainty of Subject Matter \u2013 Rules and Cases</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Requirement</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Key Authority</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Trust property requirement</strong></span></p></td><td class=\"nt-cell-blue\"><p>Must be possible to identify the trust property. Trust fails if property cannot be identified from the description.</p></td><td class=\"nt-cell-blue\"><p>Palmer v Simmonds [1854] \u2013 &quot;bulk&quot; of residuary estate; Wilkinson v North [2018] \u2013 &quot;net assets&quot;</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Tangible assets from a larger bulk</strong></span></p></td><td><p>CANNOT declare a trust of a specified number of tangible assets (fungible or non-fungible) from a larger bulk without identifying the specific items.</p></td><td><p>Re London Wine [1986]; Re Goldcorp [1995]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Intangible assets from a larger bulk</strong></span></p></td><td class=\"nt-cell-blue\"><p>CAN declare a trust of a specified number of intangible, fungible assets from a larger bulk WITHOUT identifying the specific assets. All are identical.</p></td><td class=\"nt-cell-blue\"><p>Hunter v Moss [1993] (50 out of 950 shares valid); Re Harvard Securities [1997]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Reconceptualisation in Lehman</strong></span></p></td><td><p>Briggs J: trust of intangibles works by creating beneficial co-ownership (fractional interest in all assets), not identification of specific assets.</p></td><td><p>Re Lehman Brothers [2009] EWHC 2914</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Beneficial entitlement requirement</strong></span></p></td><td class=\"nt-cell-blue\"><p>Must be possible to ascertain the beneficiary&#x27;s interest in the trust property. Where a power to determine entitlement is given to C and C dies without exercising it, the trust fails.</p></td><td class=\"nt-cell-blue\"><p>Boyce v Boyce [1849]; Re Golay&#x27;s Will Trusts [1965] \u2013 &quot;reasonable income&quot; = valid objective yardstick</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 6: The Three Certainties \u2013 At a Glance</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Certainty</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Test / Requirement</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Consequence of Failure</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Intention</strong></span></p></td><td class=\"nt-cell-blue\"><p>Objective intention to impose/assume duty characteristic of a trust. Assessed from words and conduct. Use of word &quot;trust&quot; neither necessary nor conclusive.</p></td><td class=\"nt-cell-blue\"><p>No trust arises; property may pass as gift or result back to transferor.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Subject Matter</strong></span></p></td><td><p>(1) Trust property identifiable; (2) Beneficiary&#x27;s interest in it ascertainable.</p></td><td><p>Trust fails; automatic resulting trust if property has been transferred to a trustee.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Objects</strong></span></p></td><td class=\"nt-cell-blue\"><p>Beneficiaries (or purpose) must be identifiable. Fixed: complete list test. Discretionary: is/is not test. Power of appointment: is/is not test.</p></td><td class=\"nt-cell-blue\"><p>Trust fails; automatic resulting trust if property has been transferred.</p></td></tr></tbody></table></div>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Flashcard Q&amp;A</strong></span></h2>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Question</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Answer</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p>What are the two essential components of a trust?</p></td><td class=\"nt-cell-blue\"><p>Property component (identifiable trust property) and obligation component (trustee exercises legal rights for benefit of beneficiary).</p></td></tr>\n<tr><td><p>Who holds the legal interest and who holds the equitable interest?</p></td><td><p>Trustee = legal interest; Beneficiary = equitable/beneficial interest. Beneficiary is &quot;true owner&quot; in effect.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>Can a trustee be a beneficiary?</p></td><td class=\"nt-cell-blue\"><p>Yes, but they still owe duties to other beneficiaries and cannot use the trust purely for their own benefit.</p></td></tr>\n<tr><td><p>What is the key indicator that a person cannot be a trustee (Re Bond Worth / Richmond Theatre)?</p></td><td><p>If the alleged trustee has the right to mix or use the assets freely for their own purposes, this is incompatible with a subsisting trust.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>What is the key distinction between a trust and a debt?</p></td><td class=\"nt-cell-blue\"><p>Beneficiary has equitable proprietary interest in specific trust property; creditor has only a personal right to repayment and no recourse to specific assets.</p></td></tr>\n<tr><td><p>What is a Quistclose trust?</p></td><td><p>Money lent for a specific purpose where mutual intention is that the money is NOT at the free disposal of the borrower. Borrower holds on trust for lender pending application for that purpose.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>What was Twinsectra&#x27;s key contribution to Quistclose?</p></td><td class=\"nt-cell-blue\"><p>Not sufficient to show money advanced for a purpose \u2013 must show MUTUAL intention money could ONLY be applied for that purpose and was not at free disposal of borrower.</p></td></tr>\n<tr><td><p>What is the requisite intention for certainty of intention?</p></td><td><p>An intention to impose or assume the duty characteristic of a trust (duty to hold/apply property for benefit of beneficiary). Assessed objectively.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>Can a trust be created informally (non-land)?</p></td><td class=\"nt-cell-blue\"><p>Yes. Most trusts except land and testamentary can be created orally, in writing or by conduct (Paul v Constance).</p></td></tr>\n<tr><td><p>Can you declare a trust of 50 shares from 950 identical ordinary shares without identifying them?</p></td><td><p>Yes \u2013 Hunter v Moss. Intangible fungible assets are identical; specific identification unnecessary.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>Can you declare a trust of 50 identical wine bottles from a stock of 200 without identifying them?</p></td><td class=\"nt-cell-blue\"><p>No \u2013 Re London Wine. Tangible assets require specific identification even if fungible.</p></td></tr>\n<tr><td><p>What is the &quot;reflex action&quot; principle (Mussoorie Bank)?</p></td><td><p>If the alleged subject matter and beneficiaries&#x27; interests are so uncertain, this itself evidences an absence of intention to create a trust.</p></td></tr></tbody></table></div>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Common Exam Pitfalls</strong></span></h2>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Pitfall</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Correct Position</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Assuming &quot;trust&quot; language = trust</strong></span></p></td><td class=\"nt-cell-blue\"><p>Use of the word &quot;trust&quot; is NEITHER necessary NOR conclusive (Modelboard; Re Kayford). Courts look at substance.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Confusing precatory with mandatory words</strong></span></p></td><td><p>&quot;Desire,&quot; &quot;hope,&quot; &quot;wish&quot; = precatory only (moral obligation). Imperative language needed for a trust duty (Re Oldfield).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Treating Quistclose as arising from purpose alone</strong></span></p></td><td class=\"nt-cell-blue\"><p>Must show MUTUAL intention AND that money is NOT at free disposal. Paying money for a purpose is insufficient (Twinsectra; Farepak).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Applying London Wine rule to shares</strong></span></p></td><td><p>Hunter v Moss creates an exception for intangible fungible assets. Tangible and intangible treated differently.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Confusing trustees and agents</strong></span></p></td><td class=\"nt-cell-blue\"><p>Trustee acts as principal in transactions with third parties; agent can bind the principal. An agent who receives property for the principal may become a trustee \u2013 fact-specific.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Forgetting the &quot;ministerial capacity&quot; exception in knowing receipt</strong></span></p></td><td><p>Receipt by an agent on behalf of a principal is not beneficial receipt and does not found a knowing receipt claim.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Confusing a trust with estate administration</strong></span></p></td><td class=\"nt-cell-blue\"><p>A person interested in a deceased&#x27;s estate does NOT have an equitable proprietary interest in the assets \u2013 only a personal right against the PR for proper administration.</p></td></tr></tbody></table></div>"
      },

        "id": "trusts-w2",
        "title": "W2: Beneficial Entitlement",
        "content": "<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Trusts Law \u2013 W2: Beneficial Entitlement</strong></span></h2>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Topic Overview</strong></span></h2>\n<p>1. Certainty of objects \u2013 the third certainty; depends on type of trust</p>\n<p>2. Fixed trusts: complete list test (IRC v Broadway Cottages); conceptual + evidential certainty</p>\n<p>3. Discretionary trusts: is/is not test (McPhail v Doulton); still require conceptual certainty</p>\n<p>4. Powers of appointment: is/is not test; no obligation to exercise</p>\n<p>5. Vested interests (in possession vs in interest) vs contingent interests</p>\n<p>6. Capital and income: successive interest trusts; life interest trusts</p>\n<p>7. Sole beneficiary scenarios: absolutely entitled / future interest / contingent</p>\n<p>8. Saunders v Vautier: adult, sound mind, vested interest \u2192 can collapse trust</p>\n<p>9. Extension: multiple beneficiaries must all agree and all qualify (including gift-over objects)</p>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Summary Revision Tables</strong></span></h2>\n<p><span class=\"nt-txt-blue\"><strong>Table 1: Certainty of Objects \u2013 Test by Trust Type</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Trust Type</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Applicable Test</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Authority / Notes</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Fixed trust (single beneficiary)</strong></span></p></td><td class=\"nt-cell-blue\"><p>Beneficiary must be certain; any uncertainty = trust fails.</p></td><td class=\"nt-cell-blue\"><p>\u2014</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Fixed trust \u2013 equal distribution between class</strong></span></p></td><td><p>COMPLETE LIST TEST: must be possible to draw up a complete list of all beneficiaries. Conceptual AND evidential certainty required.</p></td><td><p>IRC v Broadway Cottages Trust [1955]</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Discretionary trust</strong></span></p></td><td class=\"nt-cell-blue\"><p>IS/IS NOT TEST: can say with certainty whether &quot;any given individual is or is not a member of the class.&quot; Must also survey the class appropriately.</p></td><td class=\"nt-cell-blue\"><p>McPhail v Doulton [1971]; Re Baden (No 2) [1973]</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Power of appointment</strong></span></p></td><td><p>IS/IS NOT TEST: same as discretionary. No need to identify every member of class. Donee not required to exercise the power.</p></td><td><p>\u2014</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 2: Conceptual Certainty \u2013 Examples</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Class Description</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Conceptually Certain?</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Notes / Authority</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>&quot;Employees&quot; of company</strong></span></p></td><td class=\"nt-cell-blue\"><p>YES \u2013 legal meaning; specify current/past/future for best drafting.</p></td><td class=\"nt-cell-blue\"><p>\u2014</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>&quot;Children&quot; of an individual</strong></span></p></td><td><p>YES \u2013 legal meaning. Adopted = legal children. Step-children NOT legal children of step-parent.</p></td><td><p>\u2014</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>&quot;Friends&quot; of an individual</strong></span></p></td><td class=\"nt-cell-blue\"><p>NO \u2013 not legally certain.</p></td><td class=\"nt-cell-blue\"><p>\u2014</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>&quot;Relatives&quot; of an individual</strong></span></p></td><td><p>YES \u2013 &quot;descendants from a common ancestor&quot; (Sachs and Megaw LJJ) OR &quot;next of kin&quot; (Stamp LJ).</p></td><td><p>Re Baden (No 2) [1973]</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 3: Vested vs Contingent Interests</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Interest Type</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Definition</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Key Indicators / Notes</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Vested in possession</strong></span></p></td><td class=\"nt-cell-blue\"><p>Current right to current enjoyment of the property.</p></td><td class=\"nt-cell-blue\"><p>Life tenant of a life interest trust (receives income now).</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Vested in interest</strong></span></p></td><td><p>Current unconditional right to FUTURE enjoyment of the property.</p></td><td><p>Remainderman under a life interest trust (right exists now; enjoyed after life tenant dies).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Contingent interest</strong></span></p></td><td class=\"nt-cell-blue\"><p>Interest dependent on occurrence of an uncertain future event. No entitlement unless and until condition satisfied.</p></td><td class=\"nt-cell-blue\"><p>Look for &quot;if&quot;: &quot;to my son IF he survives me.&quot; Presence of gift-over (non-essential). On failure \u2192 resulting trust.</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 4: Types of Beneficial Interest Scenario</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Scenario</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rules on Capital and Income</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Notes</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Sole beneficiary, absolutely entitled</strong></span></p></td><td class=\"nt-cell-blue\"><p>Adult: entitled to receive income as it arises; trustee must pay it. Minor: not entitled to receive income as it arises; trustees may apply it under power of maintenance.</p></td><td class=\"nt-cell-blue\"><p>\u2014</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Sole beneficiary, future (vested) interest</strong></span></p></td><td><p>Interest is vested in interest now; vests in possession at specified age/time. Capital interest carries the &quot;intermediate income.&quot; Over 18: entitled to income as it arises. Under 18: depends on trustees&#x27; powers.</p></td><td><p>&quot;Intermediate income&quot; = income arising during the waiting period.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Sole beneficiary, contingent interest</strong></span></p></td><td class=\"nt-cell-blue\"><p>Nobody else has a separate interest in income, so capital carries intermediate income. Over 18: entitled to income as it arises. Under 18: accumulated.</p></td><td class=\"nt-cell-blue\"><p>\u2014</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Successive interest trust (life interest)</strong></span></p></td><td><p>Income beneficiary (life tenant) receives income during lifetime. Capital beneficiary (remainderman) receives capital on life tenant&#x27;s death.</p></td><td><p>Trustee must balance interests of life tenant (income) and remainderman (capital). Duty of even-handedness.</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 5: Fixed vs Discretionary Trusts \u2013 Key Distinctions</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Feature</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Fixed Trust</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Discretionary Trust</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Trustee discretion</strong></span></p></td><td class=\"nt-cell-blue\"><p>None \u2013 must distribute as directed by settlor.</p></td><td class=\"nt-cell-blue\"><p>Has distributive discretion; determines who benefits and in what shares.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Nature of objects&#x27; interest</strong></span></p></td><td><p>Proprietary equitable interest in trust property.</p></td><td><p>No equitable interest until discretion exercised in their favour; only potential beneficiaries.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Objects&#x27; rights</strong></span></p></td><td class=\"nt-cell-blue\"><p>Can compel proper administration; sue for breach of trust; right to be informed once interest vests.</p></td><td class=\"nt-cell-blue\"><p>Can sue to ensure discretion is exercised (but not in their favour specifically); can sue for breach.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Certainty of objects test</strong></span></p></td><td><p>Complete list test.</p></td><td><p>Is/is not test.</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 6: Powers of Appointment \u2013 Key Features</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Feature</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Rule</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Distinction from Discretionary Trust</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Obligation to exercise</strong></span></p></td><td class=\"nt-cell-blue\"><p>NO obligation to exercise a power of appointment.</p></td><td class=\"nt-cell-blue\"><p>Discretionary trustee MUST exercise discretion within reasonable time.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Wording indicator</strong></span></p></td><td><p>Permissive language (&quot;may&quot;) = power. Imperative language (&quot;must&quot;) = discretionary trust.</p></td><td><p>\u2014</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Gift-over</strong></span></p></td><td class=\"nt-cell-blue\"><p>Presence of gift-over indicates a power of appointment; absence not determinative.</p></td><td class=\"nt-cell-blue\"><p>\u2014</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Fiduciary vs Personal power</strong></span></p></td><td><p>Fiduciary (given to trustee): must periodically consider whether to exercise. Personal (given to non-trustee): no obligation to consider.</p></td><td><p>\u2014</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Rights of objects of power</strong></span></p></td><td class=\"nt-cell-blue\"><p>Cannot compel exercise; can only constrain improper exercise.</p></td><td class=\"nt-cell-blue\"><p>Objects of discretionary trust have broader enforcement rights.</p></td></tr></tbody></table></div>\n<p><span class=\"nt-txt-blue\"><strong>Table 7: Saunders v Vautier \u2013 Requirements and Extensions</strong></span></p>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Scenario</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Requirements</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Key Notes</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Sole adult beneficiary</strong></span></p></td><td class=\"nt-cell-blue\"><p>(1) Adult (18+); (2) Sound mind; (3) VESTED interest in the trust property.</p></td><td class=\"nt-cell-blue\"><p>Can direct trustee to transfer legal title; trust ends. Only where absolutely entitled.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Multiple beneficiaries \u2013 severable fixed trust</strong></span></p></td><td><p>Each beneficiary separately satisfies S v V conditions; interests must be severable.</p></td><td><p>Can exercise independently if interests are severable.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Successive interest / non-severable fixed trust</strong></span></p></td><td class=\"nt-cell-blue\"><p>ALL beneficiaries must agree; ALL must be adult and of sound mind.</p></td><td class=\"nt-cell-blue\"><p>All must act together; cannot be done individually.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Contingent or discretionary trust</strong></span></p></td><td><p>ALL persons potentially entitled (including gift-over objects) must agree and qualify.</p></td><td><p>No single beneficiary can collapse alone \u2013 no vested interest. Very difficult in large discretionary trusts.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Legal limitations</strong></span></p></td><td class=\"nt-cell-blue\"><p>Cannot interfere with administration while trust subsists. Choice: exercise S v V OR remain object and allow trustees to act per trust terms.</p></td><td class=\"nt-cell-blue\"><p>Cannot tell trustee how to perform their role. Must vary terms by exercising S v V and creating a new trust.</p></td></tr></tbody></table></div>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Flashcard Q&amp;A</strong></span></h2>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Question</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Answer</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p>What test applies to fixed trusts for certainty of objects?</p></td><td class=\"nt-cell-blue\"><p>Complete list test (IRC v Broadway Cottages): must be possible to draw up a complete list of ALL beneficiaries.</p></td></tr>\n<tr><td><p>What test applies to discretionary trusts and powers of appointment?</p></td><td><p>Is/is not test (McPhail v Doulton): can say with certainty whether any given individual IS or IS NOT a member of the class.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>What are conceptual certainty and evidential certainty?</p></td><td class=\"nt-cell-blue\"><p>Conceptual: precision of the language defining the class. Evidential: ability of trustees to identify objects on the evidence available.</p></td></tr>\n<tr><td><p>Are &quot;friends&quot; conceptually certain?</p></td><td><p>No \u2013 &quot;friends&quot; has no legal meaning and is therefore conceptually uncertain.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>Are &quot;relatives&quot; conceptually certain?</p></td><td class=\"nt-cell-blue\"><p>Yes \u2013 per Re Baden (No 2): &quot;descendants from a common ancestor&quot; (Sachs/Megaw) or &quot;next of kin&quot; (Stamp LJ).</p></td></tr>\n<tr><td><p>What is the difference between &quot;vested in possession&quot; and &quot;vested in interest&quot;?</p></td><td><p>In possession = current right to current enjoyment. In interest = current right to FUTURE enjoyment (unconditional but deferred).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>What is intermediate income?</p></td><td class=\"nt-cell-blue\"><p>Income produced by a trust between its creation and the beneficiary&#x27;s interest vesting in possession. Carried by the capital interest where no separate income beneficiary.</p></td></tr>\n<tr><td><p>What are the three requirements for Saunders v Vautier?</p></td><td><p>(1) Adult; (2) Sound mind; (3) Vested interest in the trust property (absolutely entitled).</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p>Can a beneficiary with a contingent interest exercise Saunders v Vautier alone?</p></td><td class=\"nt-cell-blue\"><p>No. Must act together with ALL other persons potentially entitled, including gift-over objects.</p></td></tr>\n<tr><td><p>What is the key indicator of a contingent (vs vested) interest?</p></td><td><p>Look for &quot;if&quot; / conditional language. Presence of a gift-over is helpful but not essential.</p></td></tr></tbody></table></div>\n<h2 class=\"notes-h2\"><span class=\"nt-txt-navy\"><strong>Common Exam Pitfalls</strong></span></h2>\n<div class=\"notes-table-wrap\"><table class=\"notes-table\"><thead><tr><th class=\"nt-hdr-blue\"><p><strong>Pitfall</strong></p></th><th class=\"nt-hdr-blue\"><p><strong>Correct Position</strong></p></th></tr></thead><tbody>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Applying the is/is not test to fixed trusts</strong></span></p></td><td class=\"nt-cell-blue\"><p>Fixed trusts require the COMPLETE LIST TEST \u2013 must identify all beneficiaries, not just determine if any given person is/is not in the class.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Treating discretionary objects as having proprietary rights</strong></span></p></td><td><p>Objects of a discretionary trust have NO equitable interest in the trust property until discretion is exercised in their favour. They are only POTENTIAL beneficiaries.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Confusing powers of appointment with discretionary trusts</strong></span></p></td><td class=\"nt-cell-blue\"><p>Key distinction: no obligation to exercise a power; must exercise a discretionary trust. Permissive (&quot;may&quot;) = power; imperative (&quot;must&quot;) = discretionary trust.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Allowing a single contingent beneficiary to exercise S v V</strong></span></p></td><td><p>A beneficiary with a contingent interest CANNOT exercise S v V alone. Must act together with ALL persons potentially interested, including any gift-over objects.</p></td></tr>\n<tr><td class=\"nt-cell-blue\"><p><span class=\"nt-txt-blue\"><strong>Forgetting to check for vesting of interest before applying S v V</strong></span></p></td><td class=\"nt-cell-blue\"><p>S v V only applies where the beneficiary is absolutely entitled. Check: no conditions outstanding; no other person could obtain a beneficial interest; no outstanding power of appointment.</p></td></tr>\n<tr><td><p><span class=\"nt-txt-blue\"><strong>Ignoring evidential certainty</strong></span></p></td><td><p>Even if the class is conceptually certain, the trustee must be able to identify members evidentially (Re Baden No 2 \u2013 claimant must prove to trustee&#x27;s satisfaction they are within the class).</p></td></tr></tbody></table></div>"
      }
